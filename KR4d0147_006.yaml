body:
  text: 莊簡集卷六宋李光撰五言絶句次韻奉酬當時參議見贈遊鍾山五詩二水蒼茫外千峯杳靄間傷心金碧地舉目異河山英謀參上幕爽氣蓋羣雄憤世仍憂國都忘酒盞中六國衣冠盛中原氣象存腰間佩金印莫忘殺王敦雅志希三釡平生擅一丘歸尋赤松約何必更封留塞北烟塵息江南勝氣多君王總戎旅來繼大風歌跋六無詩卷後六無信筆成無令浪流傳它時達官知人人願南遷修仁道中微雨峭寒荒山古道間桃花盛開因偶成小詩古道逢元夕荒山慘暮烟桃花雖作意未是豔陽天時正月十四日丁丑嵗冬夜發家書二首一别關山隔相逢未有期書來知勿藥歡喜偶成詩越國今安在湖邉想舊居衡陽空有鴈不寄一行書七言絶句三月六日聞五馬同郡僚出郊勸農遙聞鼓吹出城闉露冕褰帷意在民父老莫疑頻駐馬使君那顧採桑人旋移瑶席盍朋簮日暮行庖簇栁陰力勸耕農頒漢詔應知聖主愛民心病中作一枕昏昏若醉鄉雲收霧散月臨窗幽人睡足自驚覺雲在青天月在床池外紅蕉雨後芭蕉粲曉霞近如相妬逺如誇臨池似把菱花照隔葉深將翠幔遮立夏日納凉茅菴西畔小池東烏鵲藏身栁影中沙岸山坡無野店不知此處有清風五月八日雨大作聞守倅逰湖以前日白蓮見寄戲成小詩謝之守倅風流好事同笙歌都在雨聲中似知坐上多狂客不許佳人酒靣紅老欽闍黎以政和七年九月十七日夜圓寂趺坐如生道俗歎仰邑丞向仁叔作偈讃悼因次其韻錬得金剛一性堅形如枯木尚凝然莫疑台嶺慈燈息薪盡何妨火自傳老人端悟上乘禪夜壑藏舟已脫然認得本來無一物不將三觀浪流傳寄天童覺老竹牖茅簷屋數間不貪杯酒不逰山征租納罷秋田熟未必天童似我閒贈趙與檳嵗嵗天寒白鶴來篋中舊藁為君開濓伊一脉微如線力踐精思漸可回竹几虛滑輕凉任自然水邉林下最相便他年若遇青城叟成壞方知盡屬天青城叟見費孝先事洞下宗風冷秋初地而近時了覺二老化行淮甸今復盛于閩浙學徒常千餘人豫固疑之昨天童訪豫于五松山交臂立談之頃疑情頓釋因成偈四句奉呈大衆一笑可也一條枯木如青蓋古廟香爐散紫煙百鳥却銜花作供恁時方㑹祖師禪雙雁道中晚潮落盡水涓涓栁老秧齊過禁煙十里人家雞犬靜竹扉斜掩護蠺眠送春層樓極目送春回愁裏匆匆把一杯更有明年尋舊約先驅還到北枝梅羣花落盡栁綿飛陌上逰人去漸稀今日江津送春去明年還向栁梢歸友人惠鵝僕方戒殺贈二小詩還之曉隨蘆鴈聚寒汀只有崇師畫得成欲付庖人應未忍憐渠豈是不能鳴右軍池上動成羣何事羇棲傍主人放汝江湖須逺去莫隨雞鶩惱比鄰留春紅蕉開盡槿花飛載酒登臨到落暉秉燭更期尋勝侣不教容易放春歸白蓮白色蓮花也自竒亭亭水靣半開時恰如西子新粧了未把胭脂汚玉肌跋胡機冝畫卷吳山越嶠對橫斜清夢時時到外沙行過小橋墟落靜定知深處是吾家戲成寄介然先輩鳴鳩隔屋報新晴小閣幽窗分外明怪底女僮來滌硯無人知是和詩成政和戊戌孟夏補試文武遣興一首一簾踈雨鎖牢愁小閣幽軒得暫留漫說金甌能破睡不如玉局解消憂新橋賈客船回泊暮潮夜凉乘月卧吹簫兩堤更擬栽垂栁掩映荆溪罨畫橋浯溪結屋浯溪最上頭氷輪灔灔水悠悠夜深燕坐觀心境月到中天江自流自象登舟入武仙縣境有山聳拔四十丈竒秀異常有道人於此升仙因以得名青山萬疊俯漣漪時有幽花掛石衣百里清溪休蕩槳要看倒影入窗扉陽朔道中兩絶北客多誇陽朔山今朝了了見層巒定知萬壑干岩勝不似山隂道上看萬里南行豈偶然黃粱一枕夢邯鄲初無惠政蘇疲俗父老休迎舊長官覽義叟秋香二首詞情悽惋使人感嘆義叟新有閨房之戚因戲續其韻且知豫感念故人不忘之意小詩清絶與招魂香霧依然濕鬢雲一夜狂風都掃盡鼻端無復嗅餘芬維摩經云如入薝蔔林不嗅餘香冷艷孤芳孰與儔此花飄盡更非秋嶺頭賴有寒梅在接續幽香入品流次韻補之藥名十絶前五絶自謂後五絶寄贈一樽聊對菊花前獨上危樓晚景天風外笛聲聞續斷海桐搖落夜敲磚婆娑終日步蓮塘雲㸃空青月到廊病渴長卿初賦就伏神東壁漏聲長平昔雌黃憫聖丘預知鈎吻卒難收狼牙狗舌須防已擬向前湖覔敗舟百部披尋手不停腸留藁本味精英林泉甘遂髙良性石斛何如五斗輕階前一葉巧隨風夜半金莖沆瀣濃白兔西飛如赤箭烏頭旋復向龍鍾靣壁潜心學大空此身無患任飄蓬草堂自得醍醐味更訪稽山支遁翁山城衢陌厭塵泥獨掃雲房價不低早晚天門自開闔不須雞舌决明啼才過天社又中秋江子何時寫我憂風掃半天河海淨𤣥霜著物蛻蟬休草堂誰緝敗蒲編笑傲松蘿不記年應喜秋來甘澤瀉牽牛時復自蹊田却上南亭望北亭雲生秋石逼簾旌露欺緑玉青蒲色風擲琅玕敗葉聲次韻補之惜花詩年來直欲挽韶華栁徑桃蹊便是家綵錦幕天防橫雨紅紗照夜看飛花詠史項羽不聽韓生之謀背關懷楚亡徴已見漢王卒用張良計致齊王信等㑹垓下入關不守舊山河漢用張良作網羅垓下不知兵已合夜深方訝楚人多紀異掣電驅雷起蟄龍一畨桃李鬬纎穠晚來忽見千山白戲蚓鳴蛙失舊蹤贈林桂髙子向柯山得所從天寒濵海致詩筒卷中更賭忠齊筆力障狂瀾有二公知入廬山翠幾重歸除懷玉不匆匆絶憐梅野雙雛鳯長記閩中一秃翁退朝見越山二首曉來朝退紫宸班馬上悠然見越山便欲掛冠尋舊隱卧看逺岫列窗閒接武鴛鸞綴近班愧無謀略濟時艱打包結伴尋方去相對僧窗一味閒題百官步曉雨微茫水接天隔江茅店有炊烟杖藜獨上沙頭路猶記當時趕渡船失題别乘風流邁昔賢澄江堂下賸栽蓮秋來更有江湖思睡鴨殘蘆帶暝煙賀監門前水一灣藕花十里對梅山歸心不待秋風急恐負輕鷗作伴閒紹興二年三月還自淮西重至宣城與德淵寺丞諸友散步後圃登雙溪樓翛然危觀出風塵千里溪山照映人飛蓋追隨賔客舊滿園桃李不勝春夙銜王命出行朝軍士無譁罷擊刁一笑關頭發三箭却驅貔虎取天驕赴金陵舟過霅川偶作孤村逺浦接微茫處處經行看插秧却憶年時住家處藕花無數繞林塘漁舟蕩漾逐鷗輕嘔軋繅車雜櫓聲却入江淮兵革地夢魂何似此間清宿伯氏南軒江山秀色照忩扉暖閣清簷許暫依白首往來寒食路扁舟長趁落潮歸孚先兄示詩頗懷憤悱且有杜門不出之誓連日病目不能答今小愈因成三絶句奉寄以廣其意荆玉靈珠祗自珍閉門覔句未全貧先生不出人難測應有清風動四鄰發憤潜心正下帷一經傳授寧馨兒三間茅屋真堪隱十畝荒園未暇窺雲出無心鳥倦歸季鷹當日最知機心空一任他人謗道在何妨舉世非即事野性閒心不可鞿歸來况復故人稀三杯自可頻招隱一局何妨小合圍元日徑脫東風入律新翠華移蹕罷東巡中原父老應遮道要看君王玉座春元發弟携家避水于迎山閣且賦二小詩寄諸子勉次其韻襁負蒼皇冒雨來烹茶煮石暫相偎南山况值秋天爽卯酒時時自一杯忽驚落日轉東隅人意欣欣似躍魚泛宅同來真不惡幾家回首歎樓居枕上曉日烘窗度隙塵朝來光景屬閒人有時被暖貪濃睡客到門前且莫嗔水際看雲曾陪鴛鷺綴清班拂袖歸來水石間策杖岸巾聊徙倚孤雲何似此身閒過上方一絶芒鞋笻杖强躋攀示病維摩晝掩關棊罷不知風破雨却擕爐銚過前山再題百官步茅舍荆扉尚宛然重來白首記當年幾回倚杖沙頭路獨立蒼茫喚渡船雞纓冠飽穀更知時振羽階除自在啼驚斷幽窗五更夢北風穿户月沉西夜宿東城有懷風送孤帆掠岸飛籃輿十里漫追隨夜深小市無燈火雪月佳哉祇自知半生香火庇琳宫自怪年來出處同憂患祗今嘗已遍頽然相對兩衰翁次韻得之惠笋南山老竹引鞭長採掇新萌緑玉香已覺年來忘肉味小鐺深煮與君嘗雨中承厲吉老送芍藥色微黃者尤竒戲成二小詩為謝殘紅賸紫輾車塵雨浥豐肌浴太真老眼年來超色界定應辜負一枝春勝韻幽香敢自珍靜中風味見天真亂紅千㸃飄零盡留得竒葩殿晚春逰石橋三絶要觀台嶺百千燈雲水飄然愧衲僧且寄此身江海上不辭千里旋敲氷此身遊走半塵寰贏得顔衰兩鬢斑要是胸中未豪壯重來海際看濤山海上羣鷗了不驚山中草木漫知名祗應門外蒼頑石猶記幽人曳杖聲遊大龍湫觀瀑亭遇小雨成詠十里蒼崖轉碧空出山雲雨細濛濛只因便是龍湫瀑濺沫飛流逐晚風過小江渡行村落間愛其風土偶成未到清溪水半渾山圍蓮蕩鷺成羣槿籬竹塢疑無路雞犬時時隔岸聞入雁蕩山夢想清遊覺又非十年雲水與心違名山今屬分符客不羡凌空振錫飛丁已十二月二十六日過吾村早飯宿後溪永嘉氣溫圖經謂四時皆溫因以得名豫守郡二年未嘗見積雪自行衢婺連見三白梅蘂凌寒雪未消青帘紅斾巧相招十年不踏江山路過盡吾村獨木橋出處平生豈有心心憂時事力難任飽看鴈蕩佳山水却入江西劔㦸林過盡關山到水村衾裯猶訝四時溫朔風凛凛催飛雪似與幽人洗瘴痕過亡妹墳有感死生契濶不堪論鴻鴈驚飛只斷魂白首重來作寒食數行老淚灑松根離天姥五里入石橋路江湖方喜脫風波嶺路還驚上下坡賴自隨身有竿木南來未怕石頭多過豐城匣藏千古祕潜虬夜吐光芒犯斗牛欲把精鋼付陶冶散為和氣滿田疇豫與天台才上座相别踰二十年惠然抱琴見訪老懶日困朱墨度不能欵戲贈小詩當時指法杳難尋二十年來枉用心却抱孤桐林下去青山流水自知音豫去開化三十年戊午仲冬自江西召還道由江山境感嘆成小詩依然山色與溪聲嵗月崢嶸祇自驚獨有老農能耐久路傍猶說長官清過清江寄向伯恭清江已在煙城外碧瓦珠簾隔斷橋不見薌林真靣目霜花風葉暮蕭蕭再寄向伯恭南行萬里敢辭遙過盡江西獨木橋已見薌林真靣目依然華髮兩蕭蕭惜春羣紅飄盡緑隂濃醉裏看花若夢中籬外野桃如有意為豫回首略從容衰年那復惜流芳自愛春深晝景長老眼不愁花落盡移尊來傍緑隂凉離萍鄉晚宿里田鋪曉出萍鄉動越吟清溪無底亂山深頽垣破屋郵亭古靣壁聊觀去住心牂江對雨急雨崩騰㑹百川牂牁江露石如拳兩山南北人來往笑看縱橫小渡船牂江晚眺瘴雲消盡日銜山風動踈簾眼界寬試著胡床臨水坐要看金塔湧澄瀾元發弟六十五姪逺寄貂蟬筆樣孟博有詩因次韻十年慣使雞翎筆一束貂蟬愧暗投待我明窗草𤣥罷論功應合便封侯僕解易已畢李子從家觀李成所畫吳越山水圖朝來陡覺瘴塵空逺浦平林杳靄中異境掇移消底力筆端聊舉一針鋒玻璃碗僕之謫居澄江也吳元預適寓水東時時往來忽一日告别仍以玻瓈碗見贈意則厚矣然僕方宴坐一室空諸所有日食不過飯一盂爾間或散策郊外遇田夫野叟飲輒醉倒何用是寶器哉因戲成小詩復還其碗獨醒難招楚些魂時從蛋叟醉蠻村興來不假玻瓈碗自有隨身老瓦盆九月二十八日枕上年來心氣苦怔忪永夜長憂百慮攻賴是床頭有清聖一杯扶到五更鐘趙丞相過藤州相從纍日因言在朝與諸史官㑹話論修史事恐它時不免南行坐有一士云若有此某當從行今日到此音問也不通退作小詩平時盡道相隨去度嶺何曽見一人賴是隨身有孤影燈前月下却相親朱致祥教諭飲酒奕棋與僕略相上下不見旬日作二詩招之終日沉機喜欲迷一枰勝負未全低清秋九月江頭路不見門前瘦馬嘶老罷無人斷送秋惟憑一酌𣪚千憂莫嫌白酒難成醉尚有黃花插滿頭離容南百里間多古松僵仆道上不免斧斤之患感之作小詩呈陸川邑官使稍禁戢之百年斤斧避龍鱗尚被樵夫斫作薪三伏修塗多暍死清隂留取庇行人乙丑二月豫赴貶瓊山蘇令辦自蔚平追路至陸川訪别臨行作兩小詩墟落相逢一笑迎旋沽濁酒得深傾明朝轉首俱千里君到藤江我到瓊淹留客館雨冥冥烽火仍連近賊營已悟去來生死夢年來愈覺一身輕
