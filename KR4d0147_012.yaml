body:
  text: 莊簡集卷十二宋李光撰奏議辭免知湖州狀降授左奉議郎新除寶文閣待制知湖州臣李某奏準尚書省劄子三省樞密院同奉聖旨李某復寶文閣待制知湖州不候受告不許辭免限指揮到日下起發前去之任者臣聞命震驚罔知所措伏念臣本以庸愚久叨任使夤緣奬拔浸至超踰罪釁橫生謗讟洊至銜寃唶舌不敢自明伏自投間以來已踰兩稔方強敵憑陵陛下親御戎衣之際而臣名在丹書屏伏田里既不能吐一竒䇿仰禆廟算又不獲身當矢石以備戎行無路請纓徒深憂憤今敵既退遁朝廷清明固宜搜訪草萊延登英傑如臣志氣凋落已試罔功華閣清資既難輕受名邦輔郡豈敢冒居伏望聖慈俯察忱辭特收渙汗再除臣宫觀一次以養衰殘庶息多言少安愚分伏候勑旨乞薦舉武臣狀臣伏凖紹興五年三月六日敕中書門下省依臣僚奏請銓量郡守監司遴選縣令及檢會紹興元年十一月十九日手詔令內外侍從官以上監司帥臣各舉所知限半月具奏有以見陛下虛心求助之意可謂切矣然臣頃任行朝職事官已嘗應詔今陛下所求益廣中外薦者紛紛而文學之士峩冠博帶布列中外者固巳足用初無乏材之患昔叔孫通之歸漢從弟子百餘人乃専言諸壯士進之或以為言通曰漢王方蒙矢石爭天下諸生寧能鬪乎故先言斬將搴旗之士若通知時務矣今強敵憑陵中原板蕩此誠陛下馭雄材虎將以制天下之時臣之所薦不敢復言文士臣纍任守臣竊見諸路武士多流落失所其間人材少壯弓馬趫捷武藝絶倫者甚衆朝廷既未嘗録往往散在諸軍無以自拔或委盜賊不能自新甚可惜也臣愚不敢指名論薦欲望聖慈特降睿旨令諸路州軍廣行招收其間雖無武藝而通曉兵機能料敵制勝或造作攻守之具各為一科令監司帥守按試保明發赴樞密院量材擢用庶幾韓彭之徒或為時而出不勝幸甚伏候敕旨七月六日奉聖旨依奏令諸路監司帥臣按試保明具職位姓名申樞密院應詔薦舉武臣狀顯謨閣直學士左朝奉郎知平江府李某申凖刑部符凖紹興五年七月十一日樞密院劄子尚書省關臣僚上言節文竊見諸路武士多流落失所其間人才少壯弓馬趫捷武藝絶倫者甚衆乞令監司帥守按試保明發赴樞密院量材擢用七月十六日三省樞密院同奉聖旨依奏令諸路監司帥守按試保明具職位姓名申樞密院今依應上項指揮其間有已嘗按試曽經使喚委有材武通曉兵機及能造作攻守之具之人具列職位姓名如後保義郎李翼見任建康府兵馬監押今年十月當滿忠翊郎方良見在平江府未有差遣承節郎賀伸見在建康府未有差遣成忠郎翼慶見在江州未有差遣成忠郎孫懋見在建康府未有差遣保義郎韓益效用已借補人朱辨閻肇二人並在湖州未有差遣巳上並係守宣城并建康府日已經按試使喚非徒武藝出倫兼忠實可任成忠郎韓恭保義郎李文保義郎李興效用于青盧堯弼已上並係知婺州在將領李進下使喚武藝人材超絶倫輩未知所在伏乞照會施行乞補外狀臣孤蹇之蹤才無寸長伏蒙陛下起之罪廢之中回翔兩郡還置近列方國家多事陛下宵衣旰食力圖中興之秋而臣久尸榮祿日負素餐之譏今荆襄兩淮列戍相望江湖之間各有重臣所以圖中原禦大敵者可謂有其人矣臣愚素蒙奬憐貪戀恩紀不敢便乞宫祠以遂間逸欲望聖慈除臣福建一小郡以自效庶幾拊循凋瘵消弭寇攘隨事補報仰寬陛下南顧之憂不勝幸甚謹具狀奏聞伏候勑旨乞宫觀狀臣近以久冒邇列坐食無功乞閩南一小郡自效伏蒙聖慈矜憐舊物特降詔旨未賜矜從黽勉供職又復纍月在臣愚分義當捐軀盡命以圖報稱而臣年齡衰晚福過災生自入夏以來沖冒暑毒素有痰眩之疾近輒增劇每一發作狀如中風士友共知不敢矯妄若不早自引退至於職事曠廢支離靦顔煩言既興何所逃罪伏望聖慈憫察孤踨保全危迹除臣一宫祠差遣使得訪尋醫藥休養衰殘非徒保其餘齡亦以全其晚節臣無任哀祈激切之至謹具狀奏聞伏候敕旨再乞宫觀狀臣以痼疾發作遂瀝危懇仰干天聼乞除在外宫祠以便醫藥伏蒙聖慈哀憫舊物特降詔旨未賜矜允顧惟螻蟻之微終冀日月之照伏念臣愚憃難移多仇寡與頃自流落放廢中蒙陛下特逹知遇出入試用十稔於兹訖無涓塵仰禆海嶽貪冒寵祿浸踰分量可去之義自知甚明臣之愚陋豈敢妄論古人出處大節直緣福過災生入夏以來舊疾發作自度衰骸終恐難久若不早自引退稍遂間逸則出入朝班必致顛仆辜負夙志愧辱朝廷伏望陛下施天地之德軫父母之慈待物以誠察其非妄退人以禮必務曲全特賜檢會臣前奏除臣一在外宫祠臣或未即填溝壑異時犬馬之力尚堪䇿勵陛下復欲收用雖赴水蹈火豈敢辭難具狀奏聞伏候敕旨辭免知台州狀臣聞命震恐罔知所措伏念臣愚憃無知久塵從列出入內外纍試罔功揣分自量合置間散敢謂聖恩寬大未即棄捐優禮臣鄰不忘菅蒯知其老鈍尚使牧民豈臣殞首碎胸所能報稱緣臣初以衰疾力祈宫祠峻職便邦豈敢輕受况端殿祕嚴臣雖嘗冒處本非侍從可得伏望聖慈哀憫孤蹤保全危迹特回渙號庶免煩言所有職名并知台州指揮伏望特賜寢罷仍乞檢會臣前奏除一在外宫祠差遣謹具狀奏聞論守禦大計狀臣以孤蹇無能之身蒙陛下起之流落放棄之中更歷內外浸冒器使十稔於兹布衣衡茅之士遭遇如臣者果幾人哉顧惟天地父母之恩雖碎首屠肝豈能稱塞臣到任未幾恭聞大駕移蹕平江府將親御戎輅誓師兩淮此臣捐軀效命之秋念方拘縻郡綬留滯海濵上之不能吐竒䇿以佐軍謀下之不能執干戈以衛宗社乞扈從則貽干進之譏獻謀議則興空言之誚夙夜憂憤莫知計之所出臣聞忠臣不以出處二其心正士不以險夷易所守臣豈敢預憂小人不根之言遽有所畏避哉况臣陛辭之日陛下嘗許臣以言儻有所見其忍緘默臣伏覩關報劉光世張俊捍禦大敵三捷繼聞海宇流傳孰不慶幸然臣聞強敵擁兵淮揚宿亳之間坐觀勝敗此其志不淺趙充國之擊羌以殘滅為期孫權每戒江上諸將不貪小利臣是以未敢以諸將奏捷為喜而方以金人大隊深入為憂昔楊珉問朱伺曰將軍前後擊賊何以每勝伺曰兩敵共對惟當忍之彼不能忍我能忍以是勝耳漢祖與項羽對壘晉宣與諸葛亮相持方形勢未便孤軍逺來未嘗與之爭鋒周亞夫深壁以却吳軍光武堅營以降銅馬此皆已事之驗臣觀今日敵人布置必有主謀願陛下勿輕此戰今朝廷所恃獨一韓世忠彼必以精鋭當之而劉麟輩出沒光黃廬夀間以牽制諸將而分吾力金人必自淮陽以入楚泗若社稷之靈世忠足以禦之則無復事矣萬一衆寡不敵便有瓦解之勢昔楚屈完謂齊桓公曰楚國以方城為城漢水為池雖君之衆無所用之魏文帝至廣陵見波濤洶湧歎曰此天所以限南北也兵法謂善守者敵不知所攻今陛下已據東南形勝之勢敵人萬里逺來投兵死地利於速戰而不利於遲久今不務持重而誇一時之功決一旦之命臣恐正墮敵計非䇿之得也臣狂瞽之言曩備數從列方燕間進退造膝之語所謂萬全之䇿者嘗為陛下陳之矣金人往年入境無所得去冬又無所得而去士馬折傷固已大半異時雖欲復驅衆攻我孰肯為用者此乃坐制強敵之術臣愚伏望陛下戒敕諸將各務持重不過隱忍三兩月間彼師老食盡然後廣設方略出兵遣擊或邀其歸途我得勝算矣偽齊恃金為強金人既退則劉豫父子豈能立國乎復祖宗之故疆還二聖於沙漠當在此舉惟陛下特加聖慮臣狂愚冒昧無任惶懼激切待罪之至謹具狀奏聞伏候敕旨乞宫觀狀臣昨蒙收召復置近列實緣疾疢力祈宫祠伏蒙聖慈未忍置之間散盡還舊職改蒞名邦顧兹恩榮悉出睿斷臣自去年中秋到任黽勉職守亦既纍月本過防秋即伸前請兹者伏聞太上皇帝寧德皇后凶問併至號呼寃憤海宇所同臣子之心所未忍言重念臣出仕逾三十年遭逢陛下特達之知揚歷中外十稔於兹頻年作郡不敢滅裂智慮耗於應酬之勞精力竭於簿書之冗年齡遲暮齒髮頓衰方陛下枕戈嘗膽櫛風沐雨親總戎律之時而臣衰疾逺守海邦不得效戎行一旅之用中夜起坐如伏櫪之馬雖望風長鳴思自奮勵自度已不勝鞭䇿矣兼臣自去冬偶得腰疾艱於拜跪緣本郡祖宗神御所在節朔朝謁尤宜恭慎深恐一旦顛踣貽譏搢紳况巳過防秋别無規避欲望聖慈察臣誠懇特降睿旨差臣宫祠一次庶幾尚霑薄祿保養衰殘謹具狀奏聞伏候敕旨乞增選臺諌狀臣伏奉二月九日手詔節文以太陽有異氛氣四合俾侍從之臣遵前後詔書各舉能直言極諫之士一人臣猥以庸虛冒居從列天變如此既不能仰承聖意有所建明又不薦舉一人以應明詔雖陛下不以為罪臣實愧懼臣伏見朝廷自罷制科踰六十年矣士子唯習經義為有司應用之文一旦責以賢良之舉當具詞業繳進悉如嘉祐故事臣竊謂實難其人又近年以來風俗駸駸衰壞士大夫唯務依阿操求濟之説畏沽激之名不以堯舜之道事陛下當今號開言路而嬰鱗犯顔者臣固未之見况求踈逺草萊之士如富弼蘇軾之流豈易得哉冝其寂寥而無聞也今朝廷艱難至此極矣陛下親馭戎輅以捍大敵因災異以求直言雖拯焚救溺未足踰其急也若依常格薦士儻或有之俟其進卷稍中程度方許召試又有過閣六論行遣迂緩比至大廷非假以嵗月未易集也此豈陛下今日因變求言之本意哉臣恐或者妄議陛下徒有求言之名而無求言之實雖臣亦竊疑之臣在宣和間初除尚書郎例合進對方是時也權幸當路姦邪充斥臣懷不能已力陳一二弊事首以開言路為説大臣惡之謫臣知桂州陽朔縣事况臣今日蒙被陛下奬遇致位通顯當國家禍亂之後強鄰偽齊日以窺覬加以天變如此陛下煢然在疚下詔丁寧旁求直諒之士冀聞藥石之言可謂切矣而臣久稽明詔罪無可逃臣竊惟方今小大之臣百司庶府無言責者既不復論事但時因轉對誦陳言以塞責而已陛下所賴以周知四方利病朝政闕失繩人主之愆違辨臣鄰之邪正者不過三五臺諫官耳自古天子有爭臣七人唐制𣪚騎常侍諌議大夫各四人左右拾遺補闕各四人共十有六人國朝左右諌議大夫左右司諫正言各二人常不下六人専論人主過失夫人非堯舜誰能無過賴諌臣以正救之耳御史者邦之司直専以排擊姦邪為職唐制御史大夫一人中丞二人侍御史四人殿中侍御史六人監察御史十人本朝因之雖其數或有增損未嘗闕也故自三公宰執侍從百司力敵勢均一非其人咸得論奏故能排權幸於進用之始折禍亂於未萌之前其任豈不重哉陛下即位以來臺臣諫官預言事之列不過二三人而中丞諫議久虛其位豈大夫懷姦朋比能以忠實事陛下者未易得邪何久而不除也如其不然士大夫未嘗負陛下而陛下疑之是陛下自塗其耳目也大抵人主意向雖一嚬一笑之間衆得而窺伺之其應如響在陛下所行何如耳陛下用一骨鯁之士則在位節儉正直而萬物吐氣矣陛下用一諛佞之人則在位皆持祿保寵小人無忌憚矣其利害豈不萬萬哉臣久去闕廷身紆郡紱寵祿既優無所禆補重念忠臣雖在畎畝義不忘君偶因明問輒復妄發狂瞽之言仰瀆冕旒之聼死有餘罪惟陛下赦其愚而採聼焉謹具狀奏聞伏候敇旨再乞宫觀狀臣近嘗罄瀝誠悃仰干天造以衰疾丐間伏蒙睿慈特降詔旨未賜矜允銜恩局蹐不敢復有奏陳伏念臣到郡踰年黽勉職守幸朝廷奠安海道寧謐今嵗雨暘應期民間豐稔别無掣肘避事之嫌實緣臣素有痰眩之疾入冬以來發作無時職事委有妨廢兼近承吏部關報已除樓照為代以親老家貧力請補外盛壯之年諳曉民事必能仰副陛下牧養之意若使守待逺闕實非人情伏望聖慈檢會臣前奏除臣在外宫祠差遣一次以養衰殘庶幾兩便謹録奏聞伏候敕旨論諸路月樁之弊劄子臣契勘諸路月樁最為民間重害而江東西為甚元降指揮取撥應干上供封樁諸司并州縣等不以有無拘礙上供經制酒稅課利及漕司移用等錢樁辦如此州縣尚自應辦不足今江南路漕司往往將移用等錢於逐州主管司専委通判拘收不許取撥遂致民不堪命欲望聖慈特降睿旨行下諸路應有月樁錢並許將諸色錢樁辦如有餘方許漕司拘收庶幾壠畝之民不至失業取進止小貼子契勘諸路月樁錢當時守臣不量民力有承認偏重去處重為民害如撫信二州是也欲望聖慈行下諸路漕司將逐州每嵗所敷不得輒有輕重以傷民力辭免江西安撫大使狀臣聞命震驚莫知所措竊以朝廷設諸路大帥內則欲其衛王室外則欲其禦大寇有推轂分閫之専膺一道兵民之寄責任既重事權匪輕自非一時元老大臣不以妄授伏念臣才力不強智識淺暗徒緣遭遇躐置近班雖中外之備更無事功之可紀海邦出守亦既逾年最績罔聞日虞罪釁臣已兩貢忱辭力祈間退聖恩寬大未即矜從念方朝廷艱危陛下親御戎輅之時忠義之士孰不思自奮勵勉效涓埃如臣素受異恩安敢擇地實緣年齡遲暮齒髮頓衰兼素有風眩之疾發作無時故雖東甌樂易之鄉心知難強而當西道連率之職力豈勝任深懼仰負陛下艱難謀帥之意臣若貪冒寵祿不自引避則臣前者丐間之章實為矯妄捨小圗大人言謂何伏望聖慈憫臣誠懇檢會前奏除臣在外宫祠差遣一次庶安愚分臣已將郡事交割與以次官迤邐至婺州以來聽候指揮外謹録狀奏聞伏候敕旨乞令漕司撥還本司錢物狀臣昨蒙恩除前件差遣雖知駑怯難勝職任誠以迫于威命不敢固辭重惟臣之孤迹久去闕庭伏自陛下遭罹變故兼臣職守有合奏陳等事臣之區區不敢請覲者非徒本司見闕正官不敢逗留而干進之嫌人言可畏曾不得一望清光少申犬馬之戀俯傴受命俯默就塗已於今月十七日到洪州交割職事訖本司合行事件已有前後畫一臣已遵依施行外惟是財計一事臣頃為江東安撫大使蒙朝廷差到漕臣陳敏識專一應副又蒙賜支給賞銀絹數千匹兩今本司兵馬雖不多而一路盜賊縱橫虔吉等處出沒猖獗實未殄滅及近據虔州申凌聳等結集動以萬計本司遣發將兵收捕出入無時今前安撫制置大使李綱却盡將本司所有金銀錢物繳獻其間官告敕牒錢等散在諸部實未出賣朝廷為見數目稍多既行下漕司盡將應在取撥前去江州樁管府庫為之一空臣到任之初實難措手伏望聖慈特降睿旨令漕司却行撥送假臣嵗月若用度實有餘臣亦豈敢妄費庶幾凋弊之後不至科斂以仰寬陛下憂顧之意謹具狀奏聞伏候敕旨劾武登狀臣伏見武功大夫江南西路兵馬鈐轄武登老謬不才貪猥無耻到官日久全無職任乃與本司人吏保義郎檢點文字雷德成交通以親外甥成忠郎姓符人娶其女日夕往來宴飲其雷德成元係白身因先來充常平司人吏驅磨出虔吉州失收義倉米合得賞錢其米即未見收到實數便妄冒於提舉司請領賞錢於紹興六年九月內將本司給降空名保義郎官告書填顯屬違法臣已將雷德成先次勒罷外其武登難以存留在任伏望聖慈將本官特降睿旨放罷以為貪汙之戒謹録狀奏聞伏候敕旨應詔論盜賊事宜狀本司準御前金字牌降到樞密院三月二十三日劄子樞密院奏契勘虔吉州管下鄉民間有嘯聚作過去處朝廷屢遣官兵討捕并纍降指揮立限招撫放免以前罪犯令安田業至今纍年未見衰息理宜措置右奉聖旨令本司専委近上謀議官一員前去逐州體訪盜賊起之因與守臣同共講究討捕招撫之䇿合如何措置可以久逺寧息仔細條具利害申帥司詳度申樞密院劄本司疾速施行須至奏聞者右臣依應聖旨指揮差權參議官吕南夫遍詣虔吉諸郡與守臣條具利害其論紛然難以盡凂聖聼臣今擇其可採及臣耳目所見聞者其致盜之因弭盜之䇿不過擇守令寬徭役而已守令民之父母所與陛下共治天下者也守令得人則刑政必清差科必平寃枉有所申訴姦贓有所畏戢朝廷之德音必達百姓之疾苦必聞如此雖驅之使為盜不從也今以江西一路言之疲癃老病者居其半謬懦者次之以循良稱者不過一二耳縣令亦然蓋有不可勝治者矣若陛下謹擇守臣責之宰相不問親故使得盡其公忠擇縣令付之銓曹無拘文法使權歸於長二有以不職及贓賄聞者使各任其責而黜陟行焉如此守令庶乎得人守令得人而民不安業盜賊不息者未之聞也本路自經金人蹂踐繼以李成曹成劉忠輩驅虜劫掠十室九空其被害比他路尤甚頻年以來荆襄屯駐大兵州縣有月樁之數不免科須百姓避稅役之重不敢復業以舟楫為生者或奪充綱運以網罟為業者則籍為水手差徭例及於貧民營田抑配於上户民不為盜則將坐以待死耳此其致寇之大者不敢不以實聞若其他瑣細措畫如選將材添武尉募土豪等亦皆可行臣則别具條陳申樞密院取旨施行外臣狂瞽之言冒瀆冕旒之聼死有餘罪謹録奏聞伏候敕旨辭免除吏部尚書狀臣今月八日準尚書省劄子三省同奉聖旨除臣吏部尚書聞命震驚罔知所措伏念臣頃以衰殘力祈補外往來江浙首尾二年既罔著於事功久合從於罷斥兼臣年齡遲暮疾疢交攻筋骸疲於將迎之勞智慮耗於簿書之冗念方防秋之際未敢丐間豈謂陛下廓臨照之明開公正之路矜憐舊物收拾陳人不遺菅蒯之微復置鵷鴻之列况天官髙選銓部劇曹豈臣憃愚所敢冒處伏望聖慈察臣誠悃特賜除臣一宫祠差遣庶安愚分以息煩言臣已交割職事見起發至衢信間聽候指揮謹録奏聞伏候勑旨辭免參知政事劄子臣驟聞寵命驚懼交集伏念臣學術孤陋智識淺短汨沒州縣簿領之間消鑠風波危辱之地年齡衰晚志氣凋落比蒙召自遐方還置近列曽無古人正色獻替之效莫副陛下虛懷延佇之勤晝夜以思未知稱塞况今朝廷艱難之際敵使在疆國論恟恟上欲慰陛下懷念父母罔極之思下欲不沮海內忠臣義士之氣則夫今日處廟堂之上從容求濟顧不難哉豈臣愚憃所能克堪今舊德老成俊乂之士布列內外其間望實出臣之右者甚衆捨而不求乃此虛授倘或冒處必致顛危伏望聖慈憫憐孤蹤特賜追寢成命庶安愚分取進止乞令諸路提刑司大暑慮囚狀臣備數從臣職在論思獻納之地退食之暇閉閣靜思念無以仰禆聖政之萬一方兹大暑清宫涼榭不免喘暍而囹圄之間囚人求死不獲其間疾患不肯責出獄吏守視不謹有非重病而致死亡者何所伸訴臣愚伏望聖慈惻然興哀特降詔旨令諸路提刑司限指揮到日遍行屬郡躬詣獄司取素見禁罪人姓名其間有大情已具而小節未完者量情結絶不得滋蔓淹延其見在獄罪人並令檢會條法掃灑牢房刷蕩獄具內有荒僻縣分許令選差諸郡清強官按視庶幾炎酷之際不至橫暴以仰副陛下惻怛欽恤之誠謹具狀奏聞伏候勑旨乞宫觀劄子以亢旱求罷臣以非才誤膺擢任叨祿既久績效蔑然上之不能弼諧獻替以增主之明下之不能彌縫禆贊以救時之失是至天災流行亢陽為沴仰觀天道俯察人事罪實在臣雖陛下進退大臣固有禮貌臣若妨賢路不自引避出入朝列臣實無顔兼臣自入夏以來疾疹交作年逾六十去死無幾伏望聖慈察臣誠悃非出矯偽特降睿旨除臣一宫祠差遣以養衰殘臣自今月二十三日更不入都堂治事臣無任惶懼迫切之至乞罷政劄子與秦檜不合求罷臣早來獲對便坐輒陳懇欵乞解政事之任實緣臣材質駑下無所建明叨冒踰年已妨賢路兼臣年踰六十齒髮寖衰兩目昏花視物茫昧右膝緩弱步履艱難臣非不欲黽勉職守圖報大恩而默自揣量實難冒處若日復一日讒間漸開負陛下責任之誠傷同列久要之好伏望聖慈憫憐孤迹曲賜保全除臣宫觀差遣使得退就畎畝保養衰殘以全晚節不勝幸甚取進止乞罷政第二劄子臣昨者輒露懇誠乞罷機政伏蒙聖慈特遣中使押赴隨班奏事進退局蹐心神靡寧臣竊謂大臣以道事君不可則止所謂大臣必能振舉朝綱肅清中外生殺利害賞慶刑威之權歸之人主禮樂征伐必自天子出然後為稱其職也今臣猥以凡庸久竊重任拱手循默一無所為可謂失其職甚矣臣於此時若不自引去是知其不可而不止也重念臣頃遭陛下更歷中外十稔於兹怨仇滿路孤蹤易搖患難風波何所不有獨蒙陛下保全以至今日擢參大政日享厚祿恩榮上及於父祖飽暖下逮於妻孥臣殞首碎胸何以論報若復黨蔽雷同不為陛下振舉職守陛下一旦覺悟則欺君罔上之罪尚何所逃故臣欲及陛下未至厭薄同列未至傾擠乞臣殘骸退伏田里伏望陛下哀憫孤蹤誠出迫切特許臣解罷職任除臣宫祠差遣臣倘未死亡尚期圖報冒瀆天威臣無任乞罷政第三劄子臣巳兩上封章乞解政事伏蒙睿慈未賜矜允再遣中使押赴都堂治事聞命以還震懼隕越懇誠所迫欲止不能臣猥以菲才誤膺擢用義當同心輔政協濟事功庶幾仰副陛下責任之意今才小有異同已不為同列所容若復俯默就職但日享陛下厚俸而已則臣平生所守一旦掃地若陛下矜憐保全孤迹使之善退則是陛下天地父母之恩非臣捐軀所能圖報臣無任乞罷政第四劄子臣比以老疾請間已三上封章早來復蒙宣押隨班起居奏事再瀝血誠期於得請伏蒙聖慈察臣懇欵特許臣解罷機政至今未奉指揮伏念臣自陛下東巡即蒙擢任更歷內外已踰十年筋力既疲思自放於田里年衰多病豈復久於人間伏望聖慈哀憫孤蹤特降睿旨除臣一宫祠差遣儻遂微志沒齒何言臣無任乞罷政第五劄子臣比上封章以老疾乞宫祠差遣伏蒙聖慈特賜詔旨所請宜不允者載念臣愚陋無知自蒙陛下抆拭拔擢俾預大政雖黽勉職守粗知竭盡而日復一日績效蔑聞况今艱難之際陛下慨然思欲興起治功以紹復祖宗之舊宜得英賢共濟逺業而臣學殖荒落智識淺暗自知不能難以冒處已蒙矜憫許臣解罷機政伏望檢會纍奏速賜施行冒瀆威尊臣無任辭免除職與郡劄子臣今月十五日準尚書省劄子三省同奉聖旨以臣上章乞解機政除臣資政殿學士與郡者臣本以衰疾難任機政非敢有欺於陛下實緣臣素有風疾自入冬以來常覺昏眩醫者李安仁診臣脈一息六七至洪數異常安仁語臣恐開春不作瘡瘍則是中風之證外間但見臣步履康強髭髮未至全白便謂臣引疾求去韓愈謂善醫者不視人之瘠肥察其脈之病否而已安仁今為入內醫官伏望陛下清間之燕曲垂訪問知臣不妄兼臣元係端明殿學士今輔政踰年略無績效所除職太優難以冒處恐致人言所有除職與郡指揮伏乞併賜罷寢檢會臣纍奏除臣宫祠差遣使之從容田里尋訪醫藥若一二年間稍獲平復陛下緩急任使不敢辭難臣無任小貼子臣所乞宫祠若蒙俞允仍乞特免謝辭臣祈間之請已蒙陛下洞照今來若復除郡臣決不能往徒至紛紛伏望聖慈察臣誠懇特賜矜從又臣昨具辭免及祈特免謝辭至今未奉處分竊緣臣既已蒙恩解罷機政難以久留行闕今欲迤邐起發前去紹興府聽候指揮伏望聖慈速賜施行取進止
