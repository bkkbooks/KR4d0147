body:
  text: 莊簡集巻十二宋李光撰奏議辭免知湖州状降授左奉議郎新除寳文閣待制知湖州臣李某奏准尚書省劄子三省樞宻院同奉聖㫖李某復寳文閣待制知湖州不候受告不許辭免限指揮到日下起發前去之任者臣聞命震驚罔知所措伏念臣本以庸愚乆叨任使夤縁奨㧞浸至超踰罪釁横生謗讟洊至銜寃唶舌不敢自明伏自投閒以来已踰兩稔方强敵憑陵陛下親御戎衣之際而臣名在丹書屏伏田里既不能吐一竒䇿仰禆廟算又不獲身當矢石以備戎行無路請纓徒深憂憤今敵既退遁朝廷清明固宜搜訪草莱延登英傑如臣志氣凋落已試罔功華閣清資既難輕受名邦輔郡豈敢冒居伏望聖慈俯察忱辭特收渙汗再除臣宫觀一次以養衰殘庶息多言少安愚分伏候勑㫖乞薦舉武臣状臣伏凖紹興五年三月六日敕中書門下省依臣僚奏請銓量郡守監司遴選縣令及檢㑹紹興元年十一月十九日手詔令内外侍從官以上監司帥臣各舉所知限半月具奏有以見陛下虚心求助之意可謂切矣然臣頃任行朝職事官已嘗應詔今陛下所求益廣中外薦者紛紛而文學之士峩冠博帯布列中外者固巳足用初無乏材之患昔叔孫通之歸漢從弟子百餘人乃専言諸壮士進之或以為言通曰漢王方䝉矢石争天下諸生寧能闘乎故先言斬将搴旗之士若通知時務矣今强敵凴陵中原板蕩此誠陛下馭雄材虎将以制天下之時臣之所薦不敢復言文士臣累任守臣竊見諸路武士多流落失所其間人材少壮弓馬趫㨗武藝絶倫者甚衆朝廷既未嘗録徃徃散在諸軍無以自㧞或委盗賊不能自新甚可惜也臣愚不敢指名論薦欲望聖慈特降睿㫖令諸路州軍廣行招收其間雖無武藝而通曉兵機能料敵制勝或造作攻守之具各為一科令監司帥守按試保明發赴樞宻院量材擢用庶㡬韓彭之徒或為時而出不勝幸甚伏候勅㫖七月六日奉聖㫖依奏令諸路監司帥臣按試保明具職位姓名申樞宻院應詔薦舉武臣状顯謨閣直學士左朝奉郎知平江府李某申凖刑部符凖紹興五年七月十一日樞宻院劄子尚書省闗臣僚上言節文竊見諸路武士多流落失所其間人才少壮弓馬趫㨗武藝絶倫者甚衆乞令監司帥守按試保明發赴樞宻院量材擢用七月十六日三省樞宻院同奉聖㫖依奏令諸路監司帥守按試保明具職位姓名申樞宻院今依應上項指揮其間有已嘗按試曽經使喚委有材武通曉兵機及能造作攻守之具之人具列職位姓名如後保義郎李翼見任建康府兵馬監押今年十月當滿忠翊郎方良見在平江府未有差遣承節郎賀伸見在建康府未有差遣成忠郎翼慶見在江州未有差遣成忠郎孫懋見在建康府未有差遣保義郎韓益效用已借補人朱弁閻肇二人並在湖州未有差遣巳上並係守宣城并建康府日已經按試使喚非徒武藝出倫兼忠實可任成忠郎韓恭保義郎李文保義郎李興効用于青盧堯弼已上並係知婺州在将領李進下使喚武藝人材超絶倫輩未知所在伏乞照㑹施行乞補外状臣孤蹇之蹤才無寸長伏䝉陛下起之罪廢之中囘翔兩郡還寘近列方國家多事陛下宵衣旰食力圖中興之秋而臣乆尸榮禄日負素餐之譏今荆襄兩淮列戍相望江湖之間各有重臣所以圖中原禦大敵者可謂有其人矣臣愚素䝉奬憐貪戀恩紀不敢便乞宫祠以遂閒逸欲望聖慈除臣福建一小郡以自効庶㡬拊循凋瘵消弭㓂攘隨事補報仰寛陛下南頋之憂不勝幸甚謹具状奏聞伏候勑㫖乞宫觀状臣近以乆冒邇列坐食無功乞閩南一小郡自效伏䝉聖慈矜憐舊物特降詔㫖未賜矜從黾勉供職又復累月在臣愚分義當捐軀盡命以圖報稱而臣年齡衰晚福過災生自入夏以来冲冒暑毒素有痰眩之疾近輙増劇每一發作状如中風士友共知不敢矯妄若不早自引退至於職事曠廢支離靦顔煩言既興何所迯罪伏望聖慈憫察孤踨保全危跡除臣一宫祠差遣使得訪尋醫藥休養衰殘非徒保其餘齡亦以全其晚節臣無任哀祈激切之至謹具状奏聞伏候勅㫖再乞宫觀状臣以痼疾發作遂瀝危懇仰干天聼乞除在外宫祠以便醫藥伏䝉聖慈哀憫舊物特降詔㫖未賜矜允顧惟螻蟻之㣲終冀日月之照伏念臣愚憃難移多仇寡與頃自流落放廢中䝉陛下特逹知遇出入試用十稔於兹訖無涓塵仰禆海嶽貪冒寵禄浸踰分量可去之義自知甚明臣之愚陋豈敢妄論古人出處大節直縁福過災生入夏以来舊疾發作自度衰骸終恐難乆若不早自引退稍遂閒逸則出入朝班必致顛仆辜負夙志愧辱朝廷伏望陛下施天地之徳軫父母之慈待物以誠察其非妄退人以禮必務曲全特賜檢㑹臣前奏除臣一在外宫祠臣或未即填溝壑異時犬馬之力尚堪䇿勵陛下復欲收用雖赴水蹈火豈敢辭難具状奏聞伏候勅㫖辭免知台州状臣聞命震恐罔知所措伏念臣愚憃無知乆塵從列出入内外累試罔功揣分自量合置閒散敢謂聖恩寛大未即棄捐優禮臣隣不忘菅蒯知其老鈍尚使牧民豈臣殞首碎胷所能報稱縁臣初以衰疾力祈宫祠峻職便邦豈敢輕受况端殿秘嚴臣雖嘗冒處本非侍從可得伏望聖慈哀憫孤蹤保全危跡特回渙號庶免煩言所有職名并知台州指揮伏望特賜寝罷仍乞檢㑹臣前奏除一在外宫祠差遣謹具状奏聞論守禦大計状臣以孤蹇無能之身䝉陛下起之流落放棄之中更歴内外浸冒器使十稔於兹布衣衡茅之士遭遇如臣者果㡬人哉顧惟天地父母之恩雖碎首屠肝豈能稱塞臣到任未㡬恭聞大駕移蹕平江府将親御戎輅誓師兩淮此臣捐軀效命之秋念方拘縻郡綬留滯海濵上之不能吐竒䇿以佐軍謀下之不能執干戈以衛宗社乞扈從則貽干進之譏獻謀議則興空言之誚夙夜憂憤莫知計之所出臣聞忠臣不以出處二其心正士不以險夷易所守臣豈敢預憂小人不根之言遽有所畏避哉况臣陛辭之日陛下嘗許臣以言儻有所見其忍緘黙臣伏覩闗報劉光世張俊捍禦大敵三㨗繼聞海㝢流傳孰不慶幸然臣聞强敵擁兵淮揚宿亳之間坐觀勝敗此其志不淺趙充國之擊羌以殘滅為期孫權每戒江上諸将不貪小利臣是以未敢以諸将奏㨗為喜而方以金人大隊深入為憂昔楊珉問朱伺曰将軍前後擊賊何以每勝伺曰兩敵共對惟當忍之彼不能忍我能忍以是勝耳漢祖與項羽對壘晋宣與諸葛亮相持方形勢未便孤軍逺来未嘗與之争鋒周亞夫深壁以却吳軍光武堅營以降銅馬此皆已事之驗臣觀今日敵人布置必有主謀願陛下勿輕此戰今朝廷所恃獨一韓世忠彼必以精鋭當之而劉麟輩出没光黄廬夀間以牽制諸将而分吾力金人必自淮陽以入楚泗若社稷之靈世忠足以禦之則無復事矣萬一衆寡不敵便有瓦解之勢昔楚屈完謂齊桓公曰楚國以方城為城漢水為池雖君之衆無所用之魏文帝至廣陵見波濤洶湧歎曰此天所以限南北也兵法謂善守者敵不知所攻今陛下已據東南形勝之勢敵人萬里逺来投兵死地利於速戰而不利於遲乆今不務持重而誇一時之功决一旦之命臣恐正堕敵計非䇿之得也臣狂瞽之言曩備數從列方燕閒進退造膝之語所謂萬全之䇿者嘗為陛下陳之矣金人徃年入境無所得去冬又無所得而去士馬折傷固已大半異時雖欲復驅衆攻我孰肯為用者此乃坐制强敵之術臣愚伏望陛下戒勅諸将各務持重不過隠忍三兩月間彼師老食盡然後廣設方畧出兵遣擊或邀其歸途我得勝算矣偽齊恃金為强金人既退則劉豫父子豈能立國乎復祖宗之故疆還二聖於沙漠當在此舉惟陛下特加聖慮臣狂愚冒昧無任惶懼激切待罪之至謹具状奏聞伏候勅㫖乞宫觀状臣昨䝉収召復置近列實縁疾疢力祈宫祠伏䝉聖慈未忍置之閒散盡還舊職改莅名邦顧兹恩榮悉出睿斷臣自去年中秋到任黽勉職守亦既累月本過防秋即伸前請兹者伏聞太上皇帝寧徳皇后凶問併至號呼寃憤海宇所同臣子之心所未忍言重念臣出仕逾三十年遭逢陛下特達之知敭歴中外十稔於兹頻年作郡不敢滅裂智慮耗於應酧之勞精力竭於簿書之冗年齡遲暮齒髪頓衰方陛下枕戈嘗膽櫛風沐雨親搃戎律之時而臣衰疾逺守海邦不得效戎行一旅之用中夜起坐如伏櫪之馬雖望風長鳴思自奮勵自度已不勝鞭䇿矣兼臣自去冬偶得腰疾艱於拜跪縁本郡祖宗神御所在節朔朝謁尤宜恭慎深恐一旦顛踣貽譏搢紳况巳過防秋别無規避欲望聖慈察臣誠懇特降睿㫖差臣宫祠一次庶㡬尚霑薄禄保養衰殘謹具狀奏聞伏候勅㫖乞増選䑓諌状臣伏奉二月九日手詔節文以太陽有異氛氣四合俾侍從之臣遵前後詔書各舉能直言極諫之士一人臣猥以庸虛冒居從列天變如此既不能仰承聖意有所建明又不薦舉一人以應明詔雖陛下不以為罪臣實愧懼臣伏見朝廷自罷制科踰六十年矣士子唯習經義為有司應用之文一旦責以賢良之舉當具詞業繳進悉如嘉祐故事臣竊謂實難其人又近年以来風俗駸駸衰壞士大夫唯務依阿操求濟之説畏沽激之名不以堯舜之道事陛下當今號開言路而嬰鱗犯顔者臣固未之見况求踈逺草莱之士如富弼蘓軾之流豈易得哉冝其寂寥而無聞也今朝廷艱難至此極矣陛下親馭戎輅以捍大敵因灾異以求直言雖拯焚救溺未足踰其急也若依常格薦士儻或有之俟其進巻稍中程度方許召試又有過閣六論行遣迂緩比至大廷非假以嵗月未易集也此豈陛下今日因變求言之本意哉臣恐或者妄議陛下徒有求言之名而無求言之實雖臣亦竊疑之臣在宣和間初除尚書郎例合進對方是時也權倖當路姦邪充斥臣懷不能已力陳一二弊事首以開言路為説大臣惡之謫臣知桂州陽朔縣事况臣今日䝉被陛下奨遇致位通顯當國家禍亂之後彊鄰偽齊日以窺覬加以天變如此陛下煢然在疚下詔丁寧旁求直諒之士冀聞藥石之言可謂切矣而臣乆稽明詔罪無可逃臣竊惟方今小大之臣百司庻府無言責者既不復論事但時因轉對誦陳言以塞責而已陛下所賴以周知四方利病朝政闕失繩人主之愆違辨臣鄰之邪正者不過三五䑓諫官耳自古天子有争臣七人唐制𣪚騎常侍諌議大夫各四人左右拾遺補闕各四人共十有六人國朝左右諌議大夫左右司諫正言各二人常不下六人専論人主過失夫人非堯舜誰能無過賴諌臣以正救之耳御史者邦之司直専以排擊姦邪為職唐制御史大夫一人中丞二人侍御史四人殿中侍御史六人監察御史十人本朝因之雖其數或有增損未嘗闕也故自三公宰執侍從百司力敵勢均一非其人咸得論奏故能排權倖於進用之始折禍亂於未萌之前其任豈不重哉陛下即位以来䑓臣諫官預言事之列不過二三人而中丞諫議乆虛其位豈大夫懐姦朋比能以忠實事陛下者未易得邪何乆而不除也如其不然士大夫未嘗負陛下而陛下疑之是陛下自塗其耳目也大抵人主意向雖一嚬一笑之間衆得而窺伺之其應如響在陛下所行何如耳陛下用一骨鯁之士則在位節儉正直而萬物吐氣矣陛下用一䛕佞之人則在位皆持禄保寵小人無忌憚矣其利害豈不萬萬哉臣乆去闕廷身紆郡紱寵禄既優無所禆補重念忠臣雖在畎畆義不忘君偶因明問輙復妄發狂瞽之言仰瀆冕旒之聼死有餘罪惟陛下赦其愚而採聼焉謹具状奏聞伏候敇㫖再乞宫觀状臣近嘗罄瀝誠悃仰干天造以衰疾丐閒伏䝉睿慈特降詔㫖未賜矜允銜恩跼蹐不敢復有奏陳伏念臣到郡踰年黽勉職守幸朝廷奠安海道寧謐今嵗雨暘應期民間豐稔别無掣肘避事之嫌實縁臣素有痰眩之疾入冬以来發作無時職事委有妨廢兼近承吏部關報已除樓炤為代以親老家貧力請補外盛壯之年諳曉民事必能仰副陛下牧養之意若使守待逺闕實非人情伏望聖慈檢㑹臣前奏除臣在外宫祠差遣一次以養衰殘庶㡬兩便謹録奏聞伏候勅㫖論諸路月樁之弊劄子臣契勘諸路月樁最為民間重害而江東西為甚元降指揮取撥應干上供封樁諸司并州縣等不以有無拘礙上供經制酒税課利及漕司移用等錢樁辦如此州縣尚自應辦不足今江南路漕司徃徃将移用等錢於逐州主管司専委通判拘收不許取撥遂致民不堪命欲望聖慈特降睿㫖行下諸路應有月樁錢並許将諸色錢樁辦如有餘方許漕司拘収庻㡬壠畝之民不至失業取進止小貼子契勘諸路月樁錢當時守臣不量民力有承認偏重去處重為民害如撫信二州是也欲望聖慈行下諸路漕司将逐州每嵗所敷不得輙有輕重以傷民力辭免江西安撫大使状臣聞命震驚莫知所措竊以朝廷設諸路大帥内則欲其衛王室外則欲其禦大㓂有推轂分閫之専膺一道兵民之寄責任既重事權匪輕自非一時元老大臣不以妄授伏念臣才力不強智識淺暗徒緣遭遇躐寘近班雖中外之備更無事功之可紀海邦出守亦既逾年最績罔聞日虞罪釁臣已兩貢忱辭力祈閒退聖恩寛大未即矜從念方朝廷艱危陛下親御戎輅之時忠義之士孰不思自奮勵勉効涓埃如臣素受異恩安敢擇地實縁年齡遲暮齒髪頓衰兼素有風眩之疾發作無時故雖東甌樂易之鄉心知難強而當西道連率之職力豈勝任深懼仰負陛下艱難謀帥之意臣若貪冒寵祿不自引避則臣前者丐閒之章實為矯妄捨小圗大人言謂何伏望聖慈憫臣誠懇檢㑹前奏除臣在外宫祠差遣一次庶安愚分臣已將郡事交割與以次官迤邐至婺州以来聴候指揮外謹録状奏聞伏候勅㫖乞令漕司撥還本司錢物状臣昨䝉恩除前件差遣雖知駑怯難勝職任誠以廹于威命不敢固辭重惟臣之孤迹乆去闕庭伏自陛下遭罹變故兼臣職守有合奏陳等事臣之區區不敢請覲者非徒本司見闕正官不敢逗留而干進之嫌人言可畏曾不得一望清光少申犬馬之戀俯傴受命俛黙就塗已於今月十七日到洪州交割職事訖本司合行事件已有前後畫一臣已遵依施行外惟是財計一事臣頃為江東安撫大使䝉朝廷差到漕臣陳敏識專一應副又䝉賜支給賞銀絹數千匹兩今本司兵馬雖不多而一路盗賊縱横䖍吉等處出沒猖獗實未殄滅及近據䖍州申凌聳等結集動以萬計本司遣發将兵收捕出入無時今前安撫制置大使李綱却盡将本司所有金銀錢物繳獻其間官告敕牒錢等散在諸部實未出賣朝廷為見數目稍多既行下漕司盡将應在取撥前去江州樁管府庫為之一空臣到任之初實難措手伏望聖慈特降睿㫖令漕司却行撥送假臣嵗月若用度實有餘臣亦豈敢妄費庶㡬凋弊之後不至科斂以仰寛陛下憂顧之意謹具状奏聞伏候勅㫖劾武登状臣伏見武功大夫江南西路兵馬鈐轄武登老謬不才貪猥無耻到官日乆全無職任乃與本司人吏保義郎檢㸃文字雷徳成交通以親外甥成忠郎姓符人娶其女日夕徃来宴飲其雷徳成元係白身因先来充常平司人吏驅磨出䖍吉州失收義倉米合得賞錢其米即未見收到實數便妄冒於提舉司請領賞錢於紹興六年九月内将本司給降空名保義郎官告書填顯屬違法臣已将雷徳成先次勒罷外其武登難以存㽞在任伏望聖慈将本官特降睿㫖放罷以為貪汙之戒謹録状奏聞伏候勅㫖應詔論盗賊事宜状本司准御前金字牌降到樞宻院三月二十三日劄子樞宻院奏契勘䖍吉州管下鄉民間有嘯聚作過去處朝廷屢遣官兵討捕并累降指揮立限招撫放免以前罪犯令安田業至今累年未見衰息理宜措置右奉聖㫖令本司専委近上謀議官一員前去逐州體訪盗賊起之因與守臣同共講究討捕招撫之䇿合如何措置可以乆逺寧息仔細條具利害申帥司詳度申樞宻院劄本司疾速施行湏至奏聞者右臣依應聖㫖指揮差權參議官吕南夫徧詣䖍吉諸郡與守臣條具利害其論紛然難以盡凂聖聼臣今擇其可採及臣耳目所見聞者其致盗之因弭盗之䇿不過擇守令寛徭役而已守令民之父母所與陛下共治天下者也守令得人則刑政必清差科必平寃枉有所申訴姦贓有所畏戢朝廷之徳音必達百姓之疾苦必聞如此雖驅之使為盗不從也今以江西一路言之疲癃老病者居其半謬懦者次之以循良稱者不過一二耳縣令亦然葢有不可勝治者矣若陛下謹擇守臣責之宰相不問親故使得盡其公忠擇縣令付之銓曹無拘文法使權歸於長貳有以不職及贓賄聞者使各任其責而黜陟行焉如此守令庶乎得人守令得人而民不安業盗賊不息者未之聞也本路自經金人蹂踐繼以李成曹成劉忠輩驅擄刼掠十室九空其被害比他路尤甚頻年以来荆襄屯駐大兵州縣有月樁之數不免科須百姓避税役之重不敢復業以舟楫為生者或奪充綱運以網罟為業者則籍為水手差徭例及於貧民營田抑配於上户民不為盗則将坐以待死耳此其致㓂之大者不敢不以實聞若其他𤨏細措畫如選将材添武尉募土豪等亦皆可行臣則别具條陳申樞宻院取㫖施行外臣狂瞽之言冒凟冕旒之聼死有餘罪謹録奏聞伏候勅㫖辭免除吏部尚書状臣今月八日准尚書省劄子三省同奉聖㫖除臣吏部尚書聞命震驚罔知所措伏念臣頃以衰殘力祈補外徃来江浙首尾二年既罔著於事功乆合從於罷斥兼臣年齡遲暮疾疢交攻筋骸疲於将迎之勞智慮耗於簿書之冗念方防秋之際未敢丐閒豈謂陛下廓臨照之明開公正之路矜憐舊物收拾陳人不遺菅蒯之微復寘鵷鴻之列况天官髙選銓部劇曹豈臣憃愚所敢冐處伏望聖慈察臣誠悃特賜除臣一宫祠差遣庶安愚分以息煩言臣已交割職事見起發至衢信間聴候指揮謹録奏聞伏候勑㫖辭免叅知政事劄子臣驟聞寵命驚懼交集伏念臣學術孤陋智識淺短汨沒州縣簿領之間消鑠風波危辱之地年齡衰晚志氣凋落比䝉召自遐方還寘近列曽無古人正色獻替之效莫副陛下虚懐延佇之勤晝夜以思未知稱塞况今朝廷艱難之際敵使在疆國論恟恟上欲慰陛下懐念父母罔極之思下欲不沮海内忠臣義士之氣則夫今日處廟堂之上從容求濟顧不難哉豈臣愚憃所能克堪今舊徳老成俊乂之士布列内外其間望實出臣之右者甚衆捨而不求乃此虚授倘或冒處必致顛危伏望聖慈憫憐孤蹤特賜追寝成命庶安愚分取進止乞令諸路提刑司大暑慮囚状臣備數從臣職在論思獻納之地退食之暇閉閣静思念無以仰禆聖政之萬一方兹大暑清宫涼榭不免喘暍而囹圄之間囚人求死不獲其間疾患不肯責出獄吏守視不謹有非重病而致死亡者何所伸訴臣愚伏望聖慈惻然興哀特降詔㫖令諸路提刑司限指揮到日遍行屬郡躬詣獄司取素見禁罪人姓名其間有大情已具而小節未完者量情結絶不得滋蔓淹延其見在獄罪人並令檢㑹條法掃灑牢房刷盪獄具内有荒僻縣分許令選差諸郡清强官按視庶㡬炎酷之際不至横暴以仰副陛下惻怛欽恤之誠謹具状奏聞伏候勑㫖乞宫觀劄子以亢旱求罷臣以非才誤膺擢任叨禄既乆績效蔑然上之不能弼諧獻替以増主之明下之不能彌縫禆賛以救時之失是至天災流行亢陽為沴仰觀天道俯察人事罪實在臣雖陛下進退大臣固有禮貎臣若妨賢路不自引避出入朝列臣實無顔兼臣自入夏以来疾疹交作年逾六十去死無㡬伏望聖慈察臣誠悃非出矯偽特降睿㫖除臣一宫祠差遣以養衰殘臣自今月二十三日更不入都堂治事臣無任惶懼廹切之至乞罷政劄子與秦檜不合求罷臣早来獲對便坐輙陳懇欵乞觧政事之任實縁臣材質駑下無所建明叨冒踰年已妨賢路兼臣年踰六十齒髪寖衰兩目昏花視物茫昧右膝緩弱步履艱難臣非不欲黽勉職守圖報大恩而黙自揣量實難冒處若日復一日䜛間漸開負陛下責任之誠傷同列乆要之好伏望聖慈憫憐孤迹曲賜保全除臣宫觀差遣使得退就畎畆保養衰殘以全晚節不勝幸甚取進止乞罷政第二劄子臣昨者輙露懇誠乞罷機政伏䝉聖慈特遣中使押赴随班奏事進退跼蹐心神靡寧臣竊謂大臣以道事君不可則止所謂大臣必能振舉朝綱肅清中外生殺利害賞慶刑威之權歸之人主禮樂征伐必自天子出然後為稱其職也今臣猥以凡庸乆竊重任拱手循黙一無所為可謂失其職甚矣臣於此時若不自引去是知其不可而不止也重念臣頃遭陛下更歴中外十稔於兹怨仇滿路孤踪易揺患難風波何所不有獨䝉陛下保全以至今日擢参大政日享厚禄恩榮上及於父祖飽煖下逮於妻孥臣殞首碎胷何以論報若復黨蔽雷同不為陛下振舉職守陛下一旦覺悟則欺君罔上之罪尚何所逃故臣欲及陛下未至厭薄同列未至傾擠乞臣殘骸退伏田里伏望陛下哀憫孤蹤誠出廹切特許臣解罷職任除臣宫祠差遣臣倘未死亡尚期圖報冒凟天威臣無任乞罷政第三劄子臣巳兩上封章乞解政事伏䝉睿慈未賜矜允再遣中使押赴都堂治事聞命以還震懼隕越懇誠所廹欲止不能臣猥以菲才誤膺擢用義當同心輔政協濟事功庶㡬仰副陛下責任之意今纔小有異同已不為同列所容若復俛黙就職但日享陛下厚俸而已則臣平生所守一旦掃地若陛下矜憐保全孤跡使之善退則是陛下天地父母之恩非臣捐軀所能圖報臣無任乞罷政第四劄子臣比以老疾請閒已三上封章早来復䝉宣押随班起居奏事再瀝血誠期於得請伏䝉聖慈察臣懇欵特許臣解罷機政至今未奉指揮伏念臣自陛下東廵即䝉擢任更歴内外已踰十年筋力既疲思自放於田里年衰多病豈復乆於人間伏望聖慈哀憫孤蹤特降睿㫖除臣一宫祠差遣儻遂㣲志沒齒何言臣無任乞罷政第五劄子臣比上封章以老疾乞宫祠差遣伏䝉聖慈特賜詔㫖所請宜不允者載念臣愚陋無知自䝉陛下抆拭㧞擢俾預大政雖黽勉職守粗知竭盡而日復一日績效蔑聞况今艱難之際陛下慨然思欲興起治功以紹復祖宗之舊宜得英賢共濟逺業而臣學殖荒落智識淺暗自知不能難以冒處已䝉矜憫許臣解罷機政伏望檢㑹累奏速賜施行冒凟威尊臣無任辭免除職與郡劄子臣今月十五日准尚書省劄子三省同奉聖㫖以臣上章乞解機政除臣資政殿學士與郡者臣本以衰疾難任機政非敢有欺於陛下實縁臣素有風疾自入冬以来常覺昏眩醫者李安仁診臣脉一息六七至洪數異常安仁語臣恐開春不作瘡瘍則是中風之證外間但見臣步履康强髭髪未至全白便謂臣引疾求去韓愈謂善醫者不視人之瘠肥察其脉之病否而已安仁今為入内醫官伏望陛下清閒之燕曲垂訪問知臣不妄兼臣元係端明殿學士今輔政踰年畧無績效所除職太優難以冒處恐致人言所有除職與郡指揮伏乞併賜罷寢檢㑹臣累奏除臣宫祠差遣使之從容田里尋訪醫藥若一二年間稍獲平復陛下緩急任使不敢辭難臣無任小貼子臣所乞宫祠若䝉俞允仍乞特免謝辭臣祈閒之請已䝉陛下洞照今来若復除郡臣决不能往徒至紛紛伏望聖慈察臣誠懇特賜矜從又臣昨具辭免及祈特免謝辭至今未奉處分竊縁臣既已䝉㤙解罷機政難以乆㽞行闕今欲迤邐起發前去紹興府聽候指揮伏望聖慈速賜施行取進止
