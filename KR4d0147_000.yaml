body:
  text: 提要莊簡集十八卷别集類三宋臣等謹案莊簡集十八卷宋李光撰光有周易詳説已著録其集目載於紹興正論者四十卷載於宋史藝文志者前後集三十卷載於焦竑國史經籍志二十六卷錯互不合錢溥祕閣書目葉盛菉竹堂書目俱載有莊簡集八册是明初尚存其後散佚原目多寡遂無可考證今從永樂大典中掇採編次共得詩四百二十五首詞十三首雜文二百六十五首釐為十八卷考王明清揮麈餘話稱蔡京既敗攻擊者不遺餘力光獨無劾章坐貶謝表云當垂涕止彎弓之射人以為狂然臨危多下石之人臣則不敢而集中無此一篇又趙甡之遺史載光在儋耳嘗賦東坡六無詩今止有食無肉居無屋二詩餘四題亦尋檢不獲是佳篇之遺落者已多然即就其現存者觀之波瀾意度亦約略可覩考光本傳光值國步阽危之時忠憤激發所措置悉有成緒又以爭論和議為權相所排垂老投荒其節概凛然宜不可犯而其詩乃志諧音雅婉麗多姿大抵多托興深長不獨張淏雲谷雜記所舉雙鴈一詩道中贈樞密使臣一詩為清絶可愛至所上奏議如論守禦大計勸車駕親征戒約煩苛裁減營繕諸劄子尤剴切指陳有禆國是論梁師成燕瑛等疏疾惡如風俱可想見其丰采逮過嶺以後與胡銓往還簡札甚夥乃皆醇實和平絶無幽憂牢落之意其所養抑又可知矣名臣著述幸而獲存雖殘章賸句固當以鴻寶視之也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a90e2caec1c17e5c756376a6cf1150e24ef81f7703212dd2a1c7bb0232d6edc2
