body:
  text: 提要莊簡集十八卷别集類三宋臣等謹案莊簡集十八巻宋李光撰光有周易詳說已著錄其集目載於紹興正論者四十巻載於宋史藝文志者前後集三十巻載於焦竑國史經籍志二十六巻錯互不合錢溥秘閣書目葉盛菉竹堂書目俱載有莊簡集八冊是明初尚存其後散佚原目多寡遂無可考證今從永樂大典中掇採編次共得詩四百二十五首詞十三首雜文二百六十五首釐為十八巻考王明清揮麈餘話稱蔡京既敗攻擊者不遺餘力光獨無劾章坐貶謝表云當垂涕止彎弓之射人以為狂然臨危多下石之人臣則不敢而集中無此一篇又趙甡之遺史載光在儋耳嘗賦東坡六無詩今止有食無肉居無屋二詩餘四題亦尋檢不獲是佳篇之遺落者已多然即就其現存者觀之波瀾意度亦約畧可覩考光本傳光值國歩阽危之時忠憤激發所措置悉有成緒又以争論和議為權相所排垂老投荒其節概凛然宜不可犯而其詩乃志諧音雅婉麗多姿大抵多托興深長不獨張淏雲谷雜記所舉雙鴈一詩道中贈樞密使臣一詩為清絶可愛至所上奏議如論守禦大計勸車駕親征戒約煩苛裁減營繕諸劄子尤剴切指陳有禆國是論梁師成燕瑛等疏疾惡如風俱可想見其丰采迨過嶺以後與胡銓往還簡札甚夥乃皆醇實和平絶無幽憂牢落之意其所養抑又可知矣名臣著述幸而獲存雖殘章賸句固當以鴻寳視之也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ce22775065a8da69042160bac788acaedc2e921c6951b9189e0d8e2eb736e73b
