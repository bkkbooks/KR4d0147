body:
  text: 莊簡集卷十七宋李光撰題跋跋李丞相所作顔魯公真贊子因郡圃忠義堂繪顔公像龕置其上軍事判官東陽鄭剛中記其本末詳矣江西安撫大使李丞相復寄示真贊其詞宏偉簡嚴英風大節落落相望蓋將友其人於千載真無愧矣嗚呼士固重其死不幸生於危亂之間遭時變故將靡然而從之不有特立獨行之士為世標率則偷生茍免媚賊稱臣者何所憚乎後之登斯堂覽公遺像誦江西之文庶知豫區區之意因併書其後以風吾黨云跋閻立本列帝圖右閻立本列帝圖王贄家物後歸吳珏儀仲豫守永嘉日其子祖忠出以相示偶建安僧靈機善畫人物尤工傳神因使摹得之後有富公序跋距今才七十八年而縑素斷爛乃甚於前畫或疑其非真然富公親筆眷眷如此斯人豈欺世者哉紹興丁已前十月㑹稽李某謹題跋蔡君謨茶録蔡公自本朝第一等人非獨字畫也然玩意草木開貢獻之門使逺民被患議者不能無遺恨於斯題富鄭公奏議鄭公奏議略覽一二篇如聽咸池九韶之奏亦可見仁宗皇帝天地之大德終始無虧如一元之氣默行乎其中但吾老矣時時焚香整冠以手加額願汝輩遭逢聖主無愧斯文而已跋再刋初虞世必用方豫觀千金外臺祕要諸方書皆前古聖賢有意拯救生靈其功甚大不可輕議但去古既逺分劑率用升斗有今人不能曉者初公和甫本朝儒醫博學能文精通醫術所著必用方最為有用五十年來中原士大夫家藏此書其間所居僻逺一旦老少疾恙難致良醫按方治療無不愈者雖門類不多而包括殆盡信竒書也自兵興以來北人多流寓二廣風俗漸變有病稍知服藥不專巫祝之事豫謫居于瓊偶與郡守論近世方術之妙無出此書者遂欲刋行因以所藏本授之庶遐方異域知醫藥之可恃稍加崇信則禨祥禱解之風不攻而自破矣紹興癸亥二月初吉上虞李某題跋陳元達鎖諌圖豫觀陳元達鎖諌圖劉聰震怒於上元達慷慨陳說有不屈之狀劉氏手疏倉皇切諌庭下二人雍容救解其人物態度各有生意豫頃仕中朝嘗見此本今傳摹雖多而不失真是可貴也劉聰盜據中原愍懷䝉塵之後海內痛憤忠義之士扼腕切齒義不共戴天况肯北面臣事之乎或者以此責元達不知所託昧逆順之理以為邀時幸禍者是大不然元達本後部人方居貧隱約時為元海所知而聰尤顯用之其忠於所事未為不順也晉室之亂士大夫世受國恩如王夷甫輩平時祖尚浮虛以竊寵祿一旦翻然臣賊以至勸進固不罪也聰之失德元達職為廷尉捐軀盡節鎖樹而諌此與茅焦解衣以激秦帝朱雲攀檻以悟漢成殆無以異其孤風勝韻凛然有古烈士之風固足以羞愧一時貪夫佞人之顔尚何訾云溫陵康元夀暇日出此圖相示遐想其人相與歎息久之跋碧虛子纂經庚午冬至後四日再閲一過碧虛子何人出入儒釋道三教可謂博達之士矣自念平生交友未見其人其方外之士道家者流乎異時見潘子當質之跋維摩經贈羊荆華昨所言維摩經字畫精妙僕所寶藏今以遺荆華海外不知佛法公能留意於此日誦一卷以歲計之當得百餘卷異時此邦之人薰染成熟悟真如之性造無生之理當自荆華始可不勉哉紹興辛未五月十一日無礙居士跋許覲所藏法帖世之學禪者雖雲門洞山黃蘖臨濟諸家各有所宗其所傳心印一也書法亦然顔栁之瘦硬歐虞之端徑徐李之豪壯各自名家考其筆意未始不同此論聞之前輩今世鮮有知者本朝惟蔡君謨天資超勝輔以力學遂為本朝第一惟蘇子瞻善論書可繼君謨而氣超勝不減二王近世惟江裒仲嘉作字得楷法不幸生宣和間書法弊壞之時莫有知之者今三衢尚有仲嘉子姓及碑刻而程俱致道亦善論書今皆亡矣豫來海外昌化許覲善書其大父珏雖商人而喜與士大夫逰東坡先生與之甚厚作酒子賦贈之其父某遂纍取鄉舉為南遷官好收古法帖其淵源所來亦逺豫與之往來至熟覲作字不俗然但知學東坡書粗得其形似而不知蘇公之書自二王諸人來故豫嘗勉覲力學以古人為師法然後知東坡字畫有所宗也後生作字若知用筆意便如王謝家子弟縱使不能端正而氣韵自覺超勝也豫久處荒裔如逃空虛聞人足音跫然而喜矣紹興乙亥九月下浣許子偶攜此卷來為跋其後跋所書華嚴經第一卷紹興丙子冬紹興辛酉冬豫得罪南遷幼子孟傳生才六年未能從行今二十一歲矣䝉恩近改郴江一日書來寄華嚴經一卷曰鄉僧法久募士大夫如經之數各抄一卷自念八十之年目昏手顫字畫欹斜貽笑同社復憐其勤懇之意不忍違之晨起盥手焚香日課才三百字凡十八日而畢重惟此經所說華嚴重重世界不可思議而吾家長者所著合論發明至理尤為簡妙嗟乎世人流轉無量生死昧其本心如吾父子隔闊既久忘其面目一旦相見即日豁然既知是父歡喜悲涕更無可疑亦如善財童子一念發心頓無能所自覺自悟本來是佛豈不了然哉雜著示孫文少年欲勵志操見世間膏粱子弟當以儉素勝之不起羡慕之心見居處華潔過度凉榭溫室洞房窈窕則思顔子陋巷之安見人之盛饌甘脆肥濃則思仲尼飯蔬飲水之樂見人之佩服車輿犀象珠玉之珍則思子路衣敝緼袍之溫若能置吾言於座右常作是觀庶免鄙夫陋人之稱見賢思齊見不善惕然自省則可入聖賢之域古人不難到顧力行何如耳效莊周句法蘇子瞻幼年未讀莊子因過外家程氏架上有南華真經問此何書知莊周書也公且飯且讀因喟然嘆曰吾昔年有見于此中口不能言今見是書得吾心矣自是凡意所欲道筆端悉能達之其為文雖不剽其語而源流血脉多自莊周書來如云白龜能見夢于元君而不能脫豫且之網能七十二鑽無遺䇿而不能免刳腸之患及作顔樂亭記云人能碎千金之璧而不能無失聲于破釡能搏猛虎而不能無變色于蜂蠆韓文公廟碑能開衡山之雲而不能回憲宗之怒能馴鰐魚之暴而不能弭皇甫鎛之謗如此等語未易槩舉此正詩人所謂奪胎換骨法也書李林甫傳後上嘗諭侍從令各舉所知踰月遂以姓名奏上人不過二人有㫖並引對宰臣秦檜曰士人稍衆欲止令堂中審察量才與差遣豫曰陛下以久在東南用江浙士大夫多前日靣諭侍從令舉北方士人臣竊見侍從搜訪中原流寓之士已具名奏上若各引對陛下觀其人才察其議論然後諭宰相量才擢用庶幾仰副陛下側席求賢之意孫近探檜意不樂乃進曰近報藍公佐等使金國回將入境大議未决朝廷多事侍從所薦幾四十餘人皆逺方小臣何用一一引對豫曰更在陛下裁處上意稍不懌卒不引對今日偶觀李林甫傳事頗相類猶恨林甫傍無一孫近為助耳捨黃蘖裴公真像并偈宣州廣教禪寺實唐裴公故宅黃蘖道場二公像設存焉氣韻森嚴筆法簡古豫守郡日命工摹得之顧私家不能嚴净適通公律師訪豫五松山一見若有宿契因請留置鐡磬堂或曰靜凝學徒皆宗律教以南山為祖師得無異議乎豫曰不然禪律二宗本相因依後學末師妄自分别昔寬禪師謂白樂天曰無上菩提者被於身為律說于口為法得於心為禪應用者三其致一也故如來所說大乘諸經以文殊為問答之首者皆明法身妙慧之門以普賢為問答之首者皆明妙智之萬行諸佛菩薩皆依此二尊者以為師範然後成菩薩之極果處如來之上乘豈有二哉通公志行苦卓識趣超然禪律並行不相留礙其必有得於此矣恐諸衲子尚有疑情對大衆前復說偈曰君看鐡磬堂前像恰似文殊對普賢更著白須裴老子夜深同聽祖師禪豫作此文通公蓋嘗刻之石矣字畫既不工又鐫刻失真師意每悵然豫以紹興乙邜仲春赴官霅川師追餞至上虞臨别猶眷眷要豫書且礱石以俟仲秋幾望其徒仲珣法嗣遣净人持書至平江言師以七月五日示寂坐逝嗚呼師雖學律而於少林宗風尤所通解蓋已超然神逰八極之外矣無足深悲者適豫友人鄒德久相過因道師行業之美相與感歎德久書實當今第一篆真行各臻其妙庶幾師之名託此以不朽也五松居士李某題祭馬伏波文維靈當東漢之初遨逰二帝君臣定交立談之際帝欲征蠻在庭孰先公雖老矣矍鑠據鞍紛紛謗傷過若風雨名垂日星照映終古某之心跡唯公可知遷流萬里落天一涯孤帆漲海寄此一身其卒相之庶幾有神尚饗寒食享祀祝文伏以心存梓里每懷霜露之悲身處瘴鄉久濶蘋蘩之薦雖關山之有阻隔念魂氣則無不之輒竭愚忱躬陳菲奠具位積善在已受祿於天鄉黨推仁子孫䝉福恩深顧復雖愈久而不忘報在蒸嘗豈厄窮而敢怠牲牢肥腯酒饌潔豐頓轡南來恍若音容之如在叩頭北望不知涕淚之無從尚饗先兄二十五承事祝文生也不辰死因無後每緣霜露之感難忘手足之情神如有知歆此家饌
