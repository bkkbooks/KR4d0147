body:
  text: 莊簡集卷四宋李光撰七言律詩吾里桃花之盛不减武陵獨東院一株色白而多葉跗蕚皆碧世謂之碧桃主僧回公折以相贈置几硯間蕭然有出塵之想因賦鄙句不作尋常好靣皮唐人有桃花靣皮之語劉郎去後弄粧遲喚回濃睡春方好洗退殘紅晚更宜薝蔔有香陪冷豔酴醿無力鬬豐肌最憐月下朦朧影定起山僧莫皺眉總持師示近詩一軸輒次最後神字韻梅花一篇水邊難覩似梅人且看垂垂一樹新獨許玉妃陪寂寞可須青女助精神傳杯冷艷愁聞笛入户幽香已報春抽盡空花經月雨此心那復住根塵重午食大麥春來斗米欲逾千麥熟家家㸑有煙手磨旋推雲子落腳鐺深煮蚌胎員香聞並舍兒童喜效録竒方胃海便信是書生能說食杜陵饑客漫流涎得之寓靜齊斆學之暇不廢吟詠甚自得也因其歸省作詩送行數椽茅屋絶過從窗户深明一徑通雨過竹叢增晚翠風翻荷沼亂殷紅揩磨五字無瑕纇鼓吹羣經有折衷斆學從來自强半應憐時輩尚談空贈李振祖兒時思致早飄然便合髙鶱在少年下第令人感二鳥上庠寄徑應三鱣義方永訣詩無恙手澤珍藏墨尚鮮識取前修顯揚事决科之外有流傳向丞㕔舊有小軒榜曰日哦庳隘不爽近徹墻向南植竹數竿改曰分翠與僚友邑之賢彥日遊其間且索鄙句因賦二詩呈諸友旋植修篁一徑深蕭然便可滌塵襟碧移湘浦千梢净清借淇園十畝隂曉檻秋聲風撼玉空庭寒影月篩金造門賴有山隂客酒熟時來伴醉吟先生活計未全貧一徑篔簹碧玉新野趣近依陶令宅幽姿深隔庾公塵獨餘世外冰霜操不逐人間草木春吏隱何妨成小築風流重見竹林人題向丞竹軒琅玕新植覺深幽頓使軒窗一夜秋寒影靜侵書幌冷翠隂清逐桂花浮蕙蘭終許依霜操桃李從教媚冶逰公子已多林下趣更看仙吏落銀鈎詩悼德輿通判寺丞扁舟訪我海邉村笑語俄驚隔九原蕭寺新題雲有態德輿訪别日嘗留題於姜山詩語頗工故鄉清譽玉無痕傷心姹女能傳業銜痛慈親尚倚門紖紼情乖臨穴送一尊聊酹若敖魂德輿無子題藏春軒何必金丹訪洞賓壺中日月自長春直疑簾幕遮藏得未怕鶯花漏泄頻摩詰神通移不去桃園風景畫難真尊罍賸把笙歌擁沉醉何妨墊角巾送知府提舉出守虢略繡斧當年舊使星却分符竹往専城流風逺繼三堂詠扶路爭看五馬迎不獨循良追漢吏便應清切振家聲都門祖帳人多羡嫋嫋春風動斾旌次韻叔興計議端午發家書感懷之詩細葛香羅罷賜衣十年風雨暗蝸廬浴蘭紉佩憐兒女懸艾題符徇井閭地勝斗墟饒賦詠日長蓮幕少文書欲憑尺素傳深意千里殷勤附鴈魚贈趙璚夫世間兒子總紛紛屬籍吾賢最不羣天在山中須畜學風行水上自成文操存有約要真見記問夸多只謏聞我與東巖情分腆臨分書此勉郎君遊破山通幽軒用前人韻呈同行諸友小軒佳致信通幽爽氣侵人挾九秋暇日不妨尋舊隱清時無用借前籌能詩誰復追常建愛竹吾今似子猷已有琴書隨杖履更邀閒客伴清遊題無俗亭一榻蕭然岸幅巾寒梅為友竹為鄰清談謝傅風流勝倒載山翁氣味真獨把琴棊消永日未須歌管送餘春簿書堆案應頻掃不學陶潜避俗塵一云心地常無一㸃塵人日立春呈元成進道二兄人日春風動琯灰新年佳節併相催金花巧向叉頭見和氣潜隨斗柄回青入池塘頻夢草暖生官閣易尋梅相從便好擕爐銚乳靣新來勝撇醅新詩如律起寒灰多謝鄒郎著意催清比金莖天上落句生春草夢中回才髙可但空吟雪心鐵猶能强賦梅山月欲圓人又好羡君同潑甕頭醅校文毗陵經由見寄牽衣兒女最相關節物催人嵗欲䦨船落草聲驚夢斷水涵山影照杯殘堂深空羡河陽集被冷誰憐范叔寒坐想歸途花正好杜䳌聲裏破愁顔度黃陂嶺肩輿渺渺厯﨑嶇自笑謀身老更迂獻策但知憂社稷投荒那敢顧妻孥南行已度黃陂嶺北去何愁青草湖冒雨穿雲信竒絶茲遊真豈是良圖次郊行韻森森巨麓蔽秋岡薄日籠隂一味凉散策繞溪閒覔伴幅巾對客坐焚香午潮暗長看平岸野竹才添便出墻巖壑自無南北異不妨隨處得相羊某近復得女補之有詩次韻為謝荆棘林中蛇虺驚懸知不作鳳雛鳴維熊已誤傳佳夢得女猶能繼頌聲貧賤預求梁氏壻才情敢擅謝娘名囊中幸自全無物更覺新來分外清諺謂盜不過五女之門今幾半矣和胡德暉增明軒詩窗間列岫鬱嵳峩一寸遙岑已是多跨海空青疊寒玉浮天濃緑豔修蛾漫傳五嶽歸圖畫坐想千巖見詠歌從此閉門閒覔句直將世事付依阿次韻補之續思越吟俗軌紛紛正背馳鑑中白髮愧明時致身何必營三窟入仕聊同庇一枝故里有懷松菊老聖朝無用計謀竒相從喜有忘形侣杖屨山樊酒滿巵奉和補之至日書懷薄宦伶俜祗自傷捧巵無復獻華堂暗驚老去蒼顔在誰道隂鋪白晝長天際雲煙成五色堯階鴛鷺列千行懸知凍筆孤吟罷徙倚南忩揖翠浪次韻七夕犢鼻長挑竹杖頭未能免俗想清流西來誰遣青禽至仙去還乘白鶴逰天上歡娛才瞬息人間恩愛漫綢繆穿針乞巧真兒戲曝腹庭中更可羞又德循補之寵示七夕酬唱聊發狂言以當一笑好事多應與願違經年消息却如期匆匆舊約重尋處耿耿銀河欲渡時綽約肌膚雲路逺低迷簾幕玉鈎垂夜凉風露非塵世天外彎彎墮月眉補之以鍊養之說勉德循眷眷之意并見二詩若懼其不我從者以待德循可也他人能無誚乎因次韻奉寄漫道壺中别有春枉教衆楚笑齊人本來妙說元無說信是靈真未識真佩劍擕書如可繼殺雞炊黍不妨頻相逢且說無生話若問長生有大鈞不用休糧學隱淪眼前無事即仙人解官終作陶元亮晦迹聊同鄭子真交友盡緣酬唱密關山豈礙往來頻流行坎止平生志夀夭還如泥在鈞客醉而亟歸不慮畏塗之可戒當為罪首丞令不行與吏慢丞命其罪均也以為不然則縣令先入又何逃焉因次韻戲答德循且誚深山道人眷眷炬火非胥靡登危而不栗者遂并以寄之肩輿歸去未全醒倚户何人念逺征事在赦前皆可罪過因酒後各原情壺中未便乘風去夜半何妨祕息行不向險中求不死却因何處覔長生次韻補之瑶堂瑞蓮映水雙開帶晚烟丹葩浥露鬪鮮妍瑶堂地産金蓮瑞蒿里人歸玉府仙並立江臯珠珮冷相親漢苑曉粧偏舜庭敷奏無虛日潜德并遺柱史傳和睡起飲茶虛堂清簟午拋簮人靜䟱簾映晝閽身過中年心已倦病因煩暑氣常昏紫煙碧月天初賜乳竇寒泉世莫論塵味暫忘惟嗜此更無餘思到芳樽贈髙申夜半匆匆離府庠那知造物相槐忙直言賈禍翻成福正論驚人竟擅場景文論策甚持正論庚戌掄魁卿有技甲辰近榜士流芳勉旃學問全名節富貴儻來如探囊送韋子駿赴中書舍人召桃李成蹊竹徑幽幾年依隱玩林丘日邊紫詔頻催入郭外青山故挽留河右始知天子聖淮南應寢叛臣謀絲綸世掌真餘事濟難徐觀用巨舟賊退雙溪樓遣興是時方力辭召命朝來喜見妖氛靜坐覺山川勝氣還關塞罷征車馬健郊原得雨老龍閒黃綿慣擁茅簷日白髮羞陪玉筍班好在故園兵火後那無破屋兩三間八月晦日遊東山彥約有詩次韻為謝永夜全莖下九天郊坰風物正凄然百年寶地空蕭瑟十里青山水接連局上笑談碁易勝坐中竒險句難聨定回老演應相問淨社何時到白蓮燕坐僧窗爇水沈暫時塵務不關心殿堂突兀諸天擁花木扶踈曲徑深節近重陽堪把玩景如圖畫費摹臨秋晴急趂黃花約短日凄風易作霖辛亥中春遂宫祠之請自漁浦轉山入離渚宿化城以歸道中成鄙句誰倩冰霜一掃空旋烘和氣轉春風野田溢水層層落山路催花樹樹紅門巷旋教開竹徑姓名初喜掛琳宫江湖乍脫風波地莫擬扁舟伴釣翁獨宿有懷危亭搔首撥寒灰夜久無人共一杯濕翠沾雲溪外竹暗香浮月壠頭梅烏啼日落孤村晚被冷燈青夜夢回還許對床尋舊約肩輿應為我重來次韻幕僚喜雨詩卷皇天欲遣雨催詩潤澤焦枯自應期江上半犂如有繼田家一飽豈無時漢軍乏食徴方急商后精祈事敢遺湯以六事自責嘉榖蒿萊俱茂遂故應沛澤稱平施題塵外堂故園重到豁塵襟桃李成蹊竹塢深三徑頻來無俗客五更喚起有鳴禽溪光山影常遮眼酒盞茶甌獨掛心塵外莫言無一事苔痕掃盡復相侵歸五松有作呈陳志尹諸兄幾年辛苦厭兵間多謝君恩肯放還故里蕭騷松竹在流年荏苒鬢毛斑愁多不分青春過睡足聊欣白晝閒况有弟兄同保社年年擕酒共澆山北人以上墳為澆山復用前韻簡志尹已謀湖上屋三間身退聊同倦鳥還老去最便青篛笠夢回空想紫宸班斑班字詩人多通押東坡和程正輔詩云助我金鼎光斕斑再和云他年許綴蓬萊班招邀山月當軒醉結約江鷗作伴閒賴有淵明能賦詠悠然把酒對南山和孚先兄安貧樂道以書史自娛嘉歎成詠青山繞屋水侵籬拙計何妨與世違窗有殘燈供夜讀瓶無儲粟補朝饑日長門巷荆枝合嵗暮風霜塞鴈歸白首重來耆舊盡餘年從此永相依次韻孚先兄寵示汲古佳章甕牖蓬窗守素風弟兄來往一生中祇憑六籍為修綆豈有雙梁架綵虹朝市山林非有異衆生心佛本來同誰知白首維摩老萬事都將袖被䝉今嵗遇元夕于五松連日大雪巷陌蕭然孚先兄有詩詫燈火之盛因成四韻里巷蕭條户半扄更無冷月掛山城熒熒小市唯漁火耿耿幽窗但雪聲海國此時瞻氣象端門何日覩升平㑹須一掃隂霾盡盡放冰輪徹夜明孚先兄以連雨形于詠歌是時適聞韓侯淮北之捷因次韻頽垣敗屋未須悲淮北于今暗鐵衣背水漢營朝氣鋭青岡敵騎夜聲微蕭條里巷徴符急浩渺江湖羽檄稀不及戎行親矢石獨將詩禮繼庭闈伏覩親征榜又聞韓侯過江北是皆可喜然小臣區區亦有不勝憂者輒次韻成鄙句呈子駿侍郎親征一紙詔書頒頓覺中原氣象還漫說風沙臨瀚海遙憐草木舊淮山百年社稷傾危後一擲乾坤勝負間北望鑾輿心共折小臣無路得追攀和孚先兄久雨未容春色到園林寂寞鶯花困久隂積潦壞墻低易補曉寒侵被破難禁門閒賸欲償詩債裘敝猶堪當酒金昨夜東風掃羣翳放回天地發生心甲寅仲秋水漲獨民先兄元發弟徙居招提日有登覽棊酒之勝連日雨復大作水且洊至舉室幾于濕浸仰二公之曠逹歎輜重之為纍輒成鄙句以寄并呈志尹宣教表兄洎往來諸友兄一笑活計從來祗旋營急難方悟此生輕資身但有書盈腹潤屋不將金滿籯塵榻曉寒資酒力空階夜雨雜棊聲茗甌時赴湯休約肯念人間雨與晴喜晴西風一夜卷層波并落人聲喜氣多巨浸漲天吞夢澤空庭積水湛星河光搖萬瓦疑浮動翠颭羣山巧琢磨從此江湖更清曠肯將軒冕換漁蓑賦長慶寺白桃花似與江梅欲抗衡空庭初見數枝橫素肌臨水瓊琚冷落葉沾苔絮雪輕玉體生來清自韻冰魂别後夢難成故應天遣娛春晚一洗人間紫與頳三月十一日獨寓經閣民先元發商叟見過縱步長廊因至旻師房愛其潔雅擕棊瀹茗竟日而歸因成鄙句長廊散步尋僧話青眼相邀得老旻久禮懴堂心獨苦慣迎野客語尤真當軒翠竹根根靜對手拈棊局局新日暮循隄還舊隱一杯那復較醨醇晚晴宿雲解駮逺峯青谷鳥驚呼報午晴屋冷籬踈茅店迥路平沙軟筍輿輕行窮坡嶺山方好捲盡旌旗眼更明慷慨未須關世務胸懷得酒暫能平贈池元堅去國曽聞首扣閽今聆議論汗漿翻忠忱我愧西都向行誼君賢太學蕃壁水門開趨輦路黃封囊奏乞神幡英風義槩幾成俗涵養都由聖主恩常丞若問老庸齊屋借湖光一鏡開執卷多應鵠袍至載醪無復繡衣來漁樵賸喜皆豫伍鷗鷺相忘不我猜翰長鄰居清健甚時時賡唱亦竒哉孤坐有懷燭底黃花伴獨醒小窗寒月半櫳明滿添宿火留香霧重理殘杯漬落英老驥自能尋舊櫪偏師暫喜解長城獨餘惠逺秋蓮社懷抱時時得再傾蘧庵道人寄和重九感懷詩五章語皆超勝意兼釋老輒次其韻百嵗光隂日半斜因緣已透更何嗟飽參禪窟傳心印一見桃溪悟落花了得頓門方自在修持徑路斷無差世人學道徒勤苦終日蒸炊只是沙次曽敦史㑹秀野詩韻握手相逢醉别筵興酣真是飲中仙一枰聊欲觀成敗三盞何勞辨聖賢老去不傳巫峽夢夜來頻咽玉池泉鑑湖自昔多清賞結約芒鞋上釣船閒地逢君懷抱開攜壺選勝得同來青山滿眼空排闥紅袖何人為舉杯四靣軒窗供眺望一時簮履許參陪黃昏渺渺溪橋路燈火微明恨獨回厲安行結小庵湖山之間破竹激水甚自適杜得之作詩因次其韻不慕軒裳慕隱淪直將富貴比浮雲竹溝引水通銀漢石甃澄瀾起縠紋湖上三間容我卜溪邉一𣲖與君分枕流潄石平生事黜陟從今了不聞比見客談東福昌之勝若可避世恨未能一逰偶杜某謂得之出諸公宿雲庵詩軸戲題其後聞道招提枕半岡結茅真在白雲鄉嵐光滴瀝衣裳冷爽氣空濛枕簟凉幻滅不傳神女夢心清時到贊公房是身直與雲相似肯與衆生出岫忙不出示鄰士豫自入夏多徜徉逃暑中秋後乍凉杜門却掃求古聖賢於殘編斷簡中漸覺有味喜而成詩小窗秋半日暉暉蠧簡陳編漸可窺晨起已空摩詰室晚凉深下董生帷參差紅影蕉臨水散漫寒香菊繞籬從此杖藜休引步習池花草任離披與得之手談約不勝者賦詩探題得題厲吉老所居得之當作豫和之云聞道全家避亂離數間茅屋畏人知閒尋倦鳥安巢處靜看孤雲出岫時甕釀濁醪緣好客棊翻妙著待贏詩從來谷口稱真隱應笑通衢賣卜醫陳氏園亭亭今屬霽眀年來稍加葺治面山臨水松竹蕭然暇時常從諸鄉友杖策來逰徘徊竟日因以宴喜名其堂杜得之賦詩因次其韻并呈常往來諸友花徑微通竹徑幽暮年清賞在林丘登臨未覺三山隔俯仰常隨萬壑流樂土自應多樂事閒身居此得閒遊酒杯棊局平生事莫把枯腸數攪搜遊智林寺扁舟來訪小叢林花木通幽院落深旋拂繩床成午夢閒持貝葉動秋吟竹聲瑟瑟生虛籟山意峩峩入素琴更喜老綱能㑹事手携爐銚自相尋獨宿報恩寺次韻竹枝桐葉滿秋霜愁倚欄干望草堂過澗歇時芳草渡繞池逰處芰荷香應思佳客傷情逺欲訴衷情促拍忙好是山亭宴僚友夜深紅燭映天長幹譽舍人將赴召前一日録示左丞公昔年見寄佳什輒用韻奉送不用移文託北山須公一出濟時艱飛鳬自欲朝天闕老驥終思入帝間直使姦諛俱落膽要令凋瘵變歡顔霅川之民困於月糴軍儲廟堂雖深知其弊未聞有所蠲减公久閒親被其害又日來米斗千錢拯救焚溺莫急於此中興事業須耆傑炯炯何妨兩鬢斑隂崖結屋全家隱世路風波任險艱白首嗟豫三黜慣青山羡子十年閒時危莫忘頻攀檻主聖何妨數犯顔賈誼歸來定前席金鑾玉簡綴清班世綵堂耕桑不擾罷開邉家國安榮二百年三世綵衣疑有種一門忠孝豈無傳遭時自致公卿貴積慶多因父祖賢鶴骨松標長照世不須圗畫上凌烟送張子猷給事帥福唐五馬東來隘里閭旌旗照海奉安輿時危未暇寬徭役嵗歉無勞進羡餘赤子弄兵先解散烏衣侮法費驅除兵戈滿眼瞻王室郵傳時時附諌書十二月二十五日詩悼傅子駿給事歸尋北海橋邊路慟哭斯人但故廬三徑空存陶令菊萬籖難見鄴侯書丹青寫照空留影慷慨論文孰起豫歎息平生英妙氣只今寂寞契真如悼陸公彥常右司藴藉風流絶世稀妙年詞賦邁雲機漢庭留滯馮唐老越國雍容賀監歸方喜鏘金翔禁闥忽驚埋玉掩泉扉傷心里巷從游地獨對秋風淚濕衣送廖用中侍郎知漳州羡君忠孝兩無虧出處雍容自造微供帳都門疏受去懷章郡邸買臣歸君恩已荷全家飽治績行看百姓肥回首文昌舊游地相從漸覺故人稀自天姥入石橋路雖險絶而氣象殊勝殆非人境豫將遙禮方廣諸尊者偶成鄙句曉入天台訪石梁縈紆嶺路繞羊腸溪田溢水層層落巖壑經秋步步凉花乳散甌爭供茗瑞光騰彩競拈香心知未是真消息方丈蓬壺共渺茫亨仲察判赴召以重陽日酌酒夢草堂賦詩送行夢草池邉一笑同冥冥雲迹羡飛鴻青山不屬紅蓮客黃菊羞簮白髮翁直使淮南叛謀寢未妨冀北馬羣空中興事業須公等勿憚危言逹聖聰逺䝉宫使密學侍郎寵示和章謹再用韻寄呈疇昔心親迹異同端如社燕與秋鴻關河此日歸真主巖壑他年屬兩翁老去熟知交友態憂來頓悟世緣空傳聞敵騎謀深入好為提兵勦勒聰公詩及前書有避地永嘉之語故以勉之和戴禹功遊水雲館舉目江山有異同笑談尊爼恨匆匆雲烟杳靄長淮隔花木扶䟱曲徑通閒伴鳬鷗浮野水未隨鷹隼擊秋空㑹當雪後尋君去不學子猷清興終送禹功還錫山羽書烽火迫防秋努力聊寬聖主憂契濶友生多散落急難兄弟自相求近以書寫機宜辟兄長歸歟便可追吳隱相對安能效楚囚從此音塵渺江海相思時上庾公樓九日㑹南樓坐客十有二人以人世難逢開口笑菊花須插滿頭歸分韻得歸字不用擕壺上翠微南樓風景古云稀寧辭坐上吹烏帽應笑籬邊候白衣舉目佳山傷客意滿園叢菊待人歸分題未盡賔僚數更看紋楸小合圍餘須滿兩字子忱彥約輸棊得之次韻子忱郎中九日南樓宴集登樓把酒面孱顔富貴功名了不關千古池臺悲帝子一時賔幕陋龍山影沈寒水鴈聲斷香抱秋花蝶意閒八郡往來聊自哂孤雲出岫尚知還逹明宫使右丞寵寄新詩輒次韻為謝吏役無因棹酒船一杯蕭寺破茶煙文章雅健追前輩交舊凋零感暮年聞道巖廊勤注想豈容琳館久回旋好風吹寄凌雲句無數珠璣墮我前衰白相逢贑水邉十年存沒竟誰賢别來舊隱荒三徑醉後高談驚四筵晚節功名君未免半生憂患我堪憐秋風久負蓴鱸約歸夢時時到剡川宫使少卿作喜雨詩豫輒續貂然連日蒸鬱雨意殊未解霅川地瀕太湖畏雨而喜旱亦有足憂者輒再和賀子忱韻并呈少卿公一笑老鈍安能濟中興知君此意每推誠邦人雖喜天心格農夫預憂禾耳生秋後竹隂侵簟冷夢回蛩響雜階聲雨溪自昔傳佳詠雲水相依夜自明次韻劉仲臯少卿喜雨漢詔寬慈下玉京人心天意格精誠初欣父老扶攜聽忽看風雲洶湧生千里沾濡隨渥澤萬家愁嘆變歡聲南樓夜色晴方好與子賡歌待月明富陽道中懷劉希顔兼得道任書寄二公渺渺平蕪雪正晴旋驅征騎出郊坰越山似我頭全白江栁如君眼欲青有信梅花傳驛使忘機鷗鳥戀沙汀洞霄結約香燈社便欲相從老翠屏
