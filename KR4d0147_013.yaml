body:
  text: 莊簡集巻十三宋李光撰表車駕親征進起居表俯頒一札親總六師將廵視於江淮遂廓清於河洛神靈拱䕶海㝢駿奔中謝伏惟皇帝陛下宻運乾剛獨持夬決思雪父兄之恥是興貔虎之師舉必萬全衆猶一旅至躬忘於暴露期力濟於艱難發軔東呉猶扶桑之升曉日來蘇中土若大旱之望雲霓逺邇懐徠中外震疊臣欣聞盛舉逺隔清光身繫漢符莫展馳驅之效心存魏闕徒勤警衛之誠臣無任謝除徽猷閣待制表臣某言伏奉告命除臣徽猷閣待制知臨安軍府事尋具辭免奉聖㫖不允臣已望闕祗受訖南國分符已竊江鄉之守西清庀職更參禁掖之聨自慚疎賤之蹤有此遭逢之幸寵繇上出感自中深中謝竊惟内閣之深嚴實寶先朝之謨訓凡預論思之列必求文學之良宜得英才當兹妙簡如臣者起從寒苦備歴險艱釋隴畆鋤耰之勤守簡編鉛槧之業彯纓入仕但知移孝以為忠捧檄當官已分忘家而徇國惟堅死節豈暇全身頃力守於孤城乃横當於彊冦外乏蚍蜉之援旁嬰貔虎之羣集衆苦於一身脱餘生於九死豈期末路更踐清塗既陞次對之班復玷藩宣之寄靡容遜避苐切兢危此蓋伏遇皇帝陛下大度兼容英謀獨斷得駕御羣材之術有奠安四海之心遂使衰遲有兹僥倖臣敢不益圖後效期稱深恩職列從官獻替敢拘於内外身為屏蔽糜捐誓矢於死生臣無任謝知臨安府到任表臣某言准尚書省劄子奉聖㫖除臣徽猷閣待制知臨安軍府事臣已具辭免職名外先於九月二十二日到任交割職事訖分符宛水曽無善最之稱易守武林疊冒藩宣之寄思欲上寛於憂顧惟知自竭於糜捐祗拜恩榮彌深惕厲中謝伏念臣受才剛拙渉世迂愚寡與多仇久處衆嫌之地孤立一意獨持自信之誠頃守孤城數遭巨冦頼朝廷之威令遣兵將以掃除一境再生全家免禍盡出乾坤之造曽何絲髪之勞方自媿於罔功乃併叨於異數進陪從列移守名邦惟呉㑹之要衝望鑾輿於咫尺甲兵刓弊城邑荒墟當凋殘煨燼之餘繼鹵莽㓕裂之後有民人社稷既常為退遁之謀無甲胄蓋藏何以稱拊綏之意倘非健吏曷整頽綱夫豈懦庸可勝委任此蓋伏遇皇帝陛下斡旋鴻化總攬乾綱舉法度而賞罰明判忠邪而真偽核遂使至愚之品每膺過分之榮臣敢不肅整營屯撫循流寓使屏翰之防稍備庶警蹕之衛加嚴少期嵗月之淹獲展涓埃之效臣無任除宫祠謝表紹興元年正月八日被㫖移守豫章以疾乞宫祠䝉㤙差提舉臨安府洞霄宫抱疾呼天敢避再三之瀆施仁及物迄䝉寛大之㤙釋藩方捍禦之勞遂祠館便安之適退循僥倖深切凌兢中謝伏念臣渉世迂愚禀生艱苦勇忘量力智昧周身蚤日涖官粗勵羔羊之節頻年出守横當畫鶡之羣積是驚憂幾成委頓念平時徇難雖肝腦之可捐今兹祈閒實筋骸之難强力陳愚悃仰叩至慈幸洪造之矜從撫危𠂻而感慨此蓋伏遇皇帝陛下乾坤博施日月照臨於人何所不容無物不得其所遂令衰憊稍獲安全小智易殫况有負薪之疾大恩莫報徒存結草之忠臣無任除吏部尚書謝表職列貳卿方懼黜幽之典位聨八座亟䝉圖舊之恩趣就列以惟恭媿循墻而莫避寵由上錫感自中深中謝伏念臣賦性迂愚受才疎拙孤立一意獨持自信之誠寡偶少徒久處衆嫌之地雖殫千慮無補萬分僅遵唱注之規蔑著品題之目乏山濤之識量詎能激濁以揚清匪毛玠之公方何以正身而勵俗仰荷非常之遇終懐不稱之憂兹蓋伏遇皇帝陛下盛徳日躋至仁天覆能知人有堯之哲不求備得湯之寛知臣有忠於所事之誠察臣無善自為謀之計老更世故粗飭官箴未忍棄捐俾膺奨擢臣敢不益思砥礪謹守綱條方聖君嘗膽之時敢懐持禄惟臣子致身之義期在捐軀臣無任賜對衣金帯鞍馬謝表臣某言伏奉誥命除臣端明殿學士仍賜對衣金帯鞍馬者圖書秘殿既􅖍借於隆名車服徽章復叨塵於異數抗辭莫避撫已難勝中謝伏念臣患難餘生離竒朽質蓽門圭竇敢希清切之游布褐柴車豈有輕肥之念敢謂聖神之眷不忘孤逺之蹤賚與所加官師知勸此蓋伏遇皇帝陛下天地况施日月照臨智先成務之幾仁得親賢之急過形褒詔深察厚誣既𨽻職於禁庭復宣威於巨屏舉兹寵渥併及罔功臣敢不仰體眷私益思䇿厲攷惟徳其物之義彌謹臨深遵循名責實之方稍圖報稱臣無任謝知建康府到任表臣某言伏奉誥命除臣端明殿學士左朝奉郎江南東路安撫大使兼知建康府充壽春府滁濠廬和州無為軍宣撫使尋具辭免伏䝉降詔不允臣巳於閏月十一日到江南東路界首交割安撫使司牌印二十一日到建康府交割本府職事訖總華省之三銓久慙尸素抗戎旃於兩路更冒寵榮撫已無堪循涯有愧中謝伏念臣禀生窮苦渉世闊疎剽聞前哲之緒言粗識人臣之大節備論思之職蔑聞獻替之能操啓擬之權罔著公方之譽叢謗䜛而銷骨積憂患以薫心雖上無投杼之疑而臣有履氷之懼忱辭屢貢敦諭益勤拜君命於大庭欽承徳意窺王言於詔紼祗服恩私用勉䇿其疲駑庶仰分於憂顧任隆力小感激涕零此蓋伏遇皇帝陛下天度無私海涵莫測務廣招賢之路協成恢復之功謂臣樸忠稍知於勤瘁察臣孤立曲被於使令兼撫江淮之封盡付兵民之寄金陵㑹府江左奥區承頻年兵火之餘適千里流亡之後招携懐逺撫循必以寛恩折衝銷萌經畫乃其餘事臣敢不仰遵睿訓益懋逺圖說禮敦詩蓋嘗聞於郤縠附衆威敵當勉效於穰苴庶殫犬馬之勞少荅乾坤之造臣無任復兩官謝表臣某言今月初二日凖都進奏院逓到告一道以臣前任江東安撫大使日不合擅支上供内蔵庫物帛充諸軍衣賜特降兩官伏䝉聖恩復臣左朝奉郎依前寶文閣待制差遣封賜如故臣已即時望行闕祗受訖者投閒三載深思既往之愆復秩二階仰荷非常之澤恩隆莫報涕極無從中謝伏念臣奮迹孤鄉起家白屋志存忠孝每先憂國而愛君力赴事功豈暇保身而防患夤縁遭遇浸至超踰聨八座之清班膺十城之重寄徒竊無功之禄遂為獲戾之臣頼聖主之達聰無幽不燭故愚臣之小過不辨自明方釐事之告成荷寵光之均被此蓋伏遇皇帝陛下深仁善政盛徳兼容既大賚於四方遂蕩宥於多辟致此孤危之迹例叨甄叙之恩臣敢不食蘖誓心飲氷承命奉公守法敢違三尺之文戢吏愛民仰體一人之意勉䇿駑駘之力少酬天地之恩臣無任除顯謨閣直學士謝表錫寵芝函猥竊幹方之任陞華延閣叨陪扈從之聨雖瀝懇以固辭終冒恩而虛受中謝伏念臣才疎寡與學淺無聞周旋節義之大閑唯知許國佩服詩書之明訓資以事君出際休明浸膺膴仕自獲塵於噐使嘗備歴於險夷外執銓衡罔著公方之譽入陪經幄蔑聞獻替之規頃叨秘殿之崇資俾冒名都之重寄懐印未幾謗書已聞悵孤根之易揺如拉朽爾嗟譛言之已甚更下石焉頼聖度之灼知排羣言而復用起從田野付以麾符僅閱兩時稍還舊列特下十行之札使兼三組之榮曽是罔功實為非據眷私若此圖報謂何此蓋伏遇皇帝陛下道大兼容智明旁燭憐臣久侍於從槖弗忍遐遺知臣粗謹於吏方特加奨用臣敢不益堅素履勉繼前修雨露之澤自天何酬造化葵藿之心向日本自精誠臣無任謝知平江府到任表臣某言准尚書省劄子奉聖㫖除臣顯謨閣直學士知平江府臣已具辭免職名外先於七月十四日到任交割職事訖者分符霅水曽無善最之可書易地呉門復玷蕃宣之重寄瞻宸居而甚邇紆郡紱以知榮中謝伏念臣守道不通師心自信誤䝉簡記浸冒使令謂忠義可以立身而専於事上謂廉勤可以為吏而果於奉公叢衆毁之所歸堅一心而獨往久困江湖之流落頻更牧守之往來粤自小邦遽移名郡雖禽魚之本性樂此自安顧犬馬之㣲誠終於戀主使筋骸而可强豈繁劇之敢辭况此全呉今為㑹府頃嘗游宦備悉土風洊罹兵火之餘無復豪强之習朱轓入境覺豺虎之俱空竹馬相迎悵兒童之非昔夫何覉蹇有此遭逢此蓋伏遇皇帝陛下如日燭幽體乾行健御羣材而並用無一物之或遺憐臣志在當官樂於循理察臣老不生事或可庇民遂使賤㣲數叨奨用臣敢不勉圖報効益勵操修職在近嚴敢怠忠嘉之告身為屏蔽力求控禦之方臣無任孟傳賜進士及第謝表臣某言伏覩今月五日皇帝御殿放榜臣男孟傳䝉㤙賜進士及第者聖君圖治方捜四海之英材童子何知猥被九天之渥澤恩覃魏闕慶集蓬門中謝竊以下詔求賢本以待寒酸之士臨軒發策實欲聞讜直之言教化以是為本原國家由之而治亂况及當今之急務豈容泥古之常談自非夙負實學之稱曷以仰副虛懐之問臣男孟傳才非茂異識愧淹該束帯效官未歴簿書之任趨庭禀訓粗知詩禮之傳僅踰既冠之年偶齒命鄉之薦充庭上對方懐譴累之憂趨陛唱名遽有超陞之異既塵乙覽遂寘甲科遜避靡遑兢凌失措此蓋伏遇皇帝陛下乾坤至大雨露無私念其犬馬之㣲勞獲紹箕裘之素業遭時不世被寵非常臣敢不策勵初心激昂晩節仰服詩書之明訓益循忠義之大閑勉移孝以事君庶忘家而徇國守經傳後愧非韋氏之賢能事教忠圖效晋臣之志臣無任辭免除叅知政事表臣某言凖尚書劄子奉聖㫖除臣叅知政事尋具辭免伏䝉聖恩特降詔書不允者需章瀝懇冀安分義之私詔㫖屢頒仍示延登之寵愚𠂻既竭淵聼未囘重干咫尺之威敢避再三之瀆中謝伏念臣以凡庸之品遭特逹之知雖久冒於使令無可稱之績效周旋八郡荏苒十年帥閫總戎已叨重寄天官率屬復拜異恩閱嵗月之浸深乏㳙塵之可補顧兹忝竊方懼譴呵不圖驟玷於聖知更使叅陪於政路負且乗足以致冦名與噐豈以假人敢自愛於捐軀實深虞於誤國伏望皇帝陛下思用人之賢否實為國之重輕特寢誤恩追還成命誓堅犬馬之志仰酬天地之恩臣無任除叅知政事謝表臣某言伏奉告命除授臣左中大夫叅知政事封賜如故尋具辭免伏䝉聖恩特降中使賜臣不允批答仍斷來章者天聼甚髙雖牢辭而莫獲令行弗反趣就列以惟恭祗服寵靈不勝感懼中謝伏念臣性資愚蠢問學空疎立朝惟信於朴忠渉世幾成於强聒更州縣簿書之職徧䑓省清切之司譽不足償謗讟之言功豈能掩罪累之迹方俟瘝官之譴敢期共政之圖幸出非常分誠匪據兹蓋伏遇皇帝陛下徳参化育明極照臨人無同異而并包材有短長而並用察臣粗知於體國念臣素拙於謀身忘其凡庸超至嚴近臣敢不義之與比知無不為感千載之遭逢戒一時之僥倖居其位食其禄固當盡大臣事君之誼視所以觀所由庶無負明主知人之鑒臣無任瓊州安置謝表臣某言今年二月十六日凖藤州公文送到尚書省劄子三省同奉聖㫖移臣瓊州安置臣尋於當月二十日起離藤州至三月十五日已至瓊州貶所訖者投寘嶠南採公言而未厭竄流海外據罪戾以猶輕悵来日之無多豈生還之敢望徒懐結戀莫報恩私中謝伏念臣寒苦立身間關出仕躬受聖神之眷屢更要劇之除越自從班超預機政而臣剛褊自任戅愚不移噐小疾顛亟投閒而置散根孤易㧞卒負釁以招尤顧九死以猶甘雖三黜而無憾捫心自訟没齒何言空貽嵗月之多難逭簡書之畏尚全視息未即誅鋤此蓋伏遇皇帝陛下舜孝格天堯仁覆物干戈載戢故得百姓之歡心温凊不違以盡一人之榮養有如草芥咸被矜容而臣年僅七旬久拘囚於瘴地行踰萬里更冒渉於鯨波伏望憐臣奉事之有年憫臣廢黜之已久稍囘眷遇曲賜保全大明中天庶容光之必照時雨及物幸枯枿之再生永依樵牧之羣以畢桑榆之境臣無任移昌化軍安置謝表十年逺徙猶冀生還三黜愈嚴未知死所驚魂失據危涕自零中謝伏念臣性實戅愚老益頑鄙遭時遇主妄有意於功名抱槧懐鉛本無稱於翰墨年齒衰晩志氣凋零久雜處於黎蠻唯歸依於佛祖每師蘧瑗深悟已非敢效鄭人妄議朝政而臣子孟堅平居里巷不擇交游怨咎横生語言妄發納官贖罪罕逢國士之知下石反擠近出鄉人之手仰恃神聖之眷未加斧鉞之誅恩重命輕咎深責重此蓋伏遇皇帝陛下體天地之大徳擴日月之盛明憐臣嘗冒近班念臣頻更繁使年同絳老宜久辱於泥塗罪比虞翻盍永拘於海島捐軀無路沒齒何言臣無任量移郴州安置謝表久拘海島已為終老之期亟徙近藩復有再生之望恩深難報感極涕零中謝伏念臣賦性顓䝉天資狷淺孤忠自許獨立無朋邇列冒居本求協濟榻前論事豈敢雷同仰憑聖主之當陽不顧權臣之在側果遭竒中卒蹈危機飄泊一身遷流萬里黎蠻雜處魑魅為羣二子䘮亡全家隔絶寄隻身而無託撫孤影以自憐敢謂聖慈俯矜愚昧察其老死之無日示以歸塗之有期此蓋伏遇皇帝陛下獨運乾剛躬持慈寶聰明不作而百度自正神武不殺而萬國咸寜遂令菅蒯之㣲均被雨露之潤臣敢不益堅晚節誓竭愚忠行歩龍鍾莫展驅馳之力壮心消隕難陪帷幄之謀欲酬隆天厚地之恩但有衘環結草之報臣無任狀申都督府乞令耿進屯池州狀勘會池州正臨大江與江北舒蘄等州相對最為控扼昨來李彦卿屯泊韓世清一軍劉洪道屯駐崔邦弼等諸頭項軍馬防守劉洪道將帯崔邦弼等前去建昌軍捉殺䝉差下王進將帯所統人馬池州防隘今來王進一軍已䝉朝廷差充都督府統制官其池州即今並無軍馬守禦縁防秋在近及據池州申舒州界見有盗賊出沒作過不可闕兵備禦今照本司所管軍馬内王冠一軍已依朝㫖發往廣德軍防隘及張崇係樞宻院水軍并李貴小張俊係要於建康府邊江把截應援使喚外有水軍耿進一項人船今相度欲遣發前去池州防托江岸檢準都督府四月四日劄子備奉聖㫖逐路見今應統兵大小將帥並許聼節制縁本司軍馬係聼都督府節制未敢擅便起發伏候指揮申樞宻院乞令王進依舊屯池州狀契勘池州最係𦂳要控扼之地諸處潰兵不時侵犯不可不屯重兵以備守禦今来王進已勾赴都督僕射相公府充統制官本州守臣葉煥雖已到任本官别無兵馬竊慮緩急不可責以必守今来王進已到本府與某相見亦願且在池州屯劄除已具狀申都督僕射相公伏乞指揮且令王進依舊統制軍馬就池州防托委得両便伏乞指揮施行小貼子契勘江池二州新差文臣其劉紹先王進却令赴都督府某竊詳朝廷之意本慮紹先等已為守臣恐勢不相下今則不然二州皆財用窘乏之處若使文臣為守以撫養百姓武臣為將以捍禦盗賊各自両便伏乞照㑹啓上館職啓伏審給札禁林校文天禄來副朝廷之妙選是為儒者之至榮蓋圖籍祕藏上帝名之冊府而賢能萃聚前古謂之道山豈徒搜羅文章翰墨之流實欲涵養輔弼公卿之噐真材獲用公論攸歸伏惟某官文掞國華識超物表著左思之三賦少作已工讀黄香之異書晚觀益博果膺睿奨入踐要塗允為鴻漸之階佇見鵬摶之運某方縻簿領猥辱緘題斷木在溝知朽株之難斵明珠照夜覺蔀屋之生輝佩服之私敷宣罔既荅婺州交代傅龍圖啓崧卿期年報政方興襦袴之謡一節趨朝亟奉絲綸之寵顧慙朽質獲踵後塵恭惟某官識洞幾先學窮繫表早年馳譽即有志於事功壮嵗立朝益奮身於忠義一昨提兵靖冦承詔禦戎免胄以入賊營開門而納降將士民䝉賴異翁子之還呉父老歸心陋相如之諭蜀笑談亂定指顧功成比自鄉邦擢臨近輔欲壮藩維之勢暫煩經濟之謀唯聖主之深知方須獻替雖斯民之切戀寜許挽留佇聞麻制之行即秉鈞樞之任知建康府謝宰相啓入陪從列謬参八座之聨出領藩條連委十城之寄顧慙疎拙積冒寵榮竊以江左名區金陵㑹府兼河山表裏之勢號股肱藩輔之雄虎踞龍蟠徒仰帝王之宅蜂旗虎幄既為戰伐之區羣偷屯結而未聞蕩定之方百姓流離而曾乏招懐之䇿非得邁倫之士曷収經世之勲如某者質本駑駘學惟糟粕奮身一介受任三朝第知直道以事君所愧矯情而鎮物夤縁遭遇寖冒使令此蓋伏遇僕射相公功業冠乎古今忠信行乎蠻貊既隆寛而博愛亦公聼而並觀舟楫濟川坐弭風波之險鹽梅調鼎曲成品物之和致是迂愚有兹僥倖某敢不仰遵廟算俯究民情外圖疆場之事幾内訪閭閻之疾苦上酬洪造次答已知與越守綦内翰啟崇禮伏審顯奉宸恩榮開帥閫玉堂金馬輟從内相之聨皂蓋朱轓聊假大邦之重恭惟知府内翰寶文身兼數噐學洞九流道徳安强折衝千里之外文章爾雅追還兩漢之餘欲分東道之憂暫出北扉之直弼諧之任雖舉朝野以共期康濟之懐顧於内外而奚擇第方切淵衷之眷或不容煖席之淹行有峻除送登揆路某頃塵從列獲厠英游姓名尚𨽻於刑書竿牘敢通於記室兹縁天幸適此里居因得自陳懇欵之誠庶幾少見依歸之素囘葛待制啓投閒三載分老於田閭假守一麾遽分於符竹方莅簡書之始未遑竿牘之修敢謂撝謙過形褒借撫存甚厚銘佩可量恭惟宫使待制學際道真才推王佐以儒術縁飾吏事早著能聲以文章粉飾皇猷夙推雅望屬此艱難之運方深俊傑之求閒館珍臺久徜徉於物表黄扉紫闥行宻勿於政途某猥以庸虛謬當委寄流風未逺有善政之可師積弊難除豈惡聲之能掩庶加䇿勵仰副奨知囘漕使張郎中啟三年去國徒勤仰斗之誠千里分符未遂趨風之便箋題猥及銘佩可量某官敏識造㣲通才周物任兼中外允資經濟之謀職總輸將兼舉澄清之志蓋將整齊將士之紀律豈特周知金榖之盈虛方著休聲佇膺顯擢某屏居陋巷起奠大邦雅素不忘先累繭重縢之問褒詞過厚發殘荄枯枿之榮囘湖州交代陳侍郎啓與義三嵗投閒分老江湖之上一麾假守職還侍從之班顧惟疎拙之蹤猥繼仁賢之躅退循忝冐尤劇兢慚伏惟某官學貫百家身兼數噐文章爾雅追還兩漢之風道徳淵源根極中庸之學早踐揚於華貫浸騰踔於英躔當聖哲馳騖之時實雋乂功名之㑹輟自承宣之地暫司封駁之聨金馬玉堂即還舊物黄扉紫闥遂聼新除某猥以庸虚獲相先後長牋加厚有踰褒衮之榮短技易窮終負續貂之愧囘常州鄭右司啓屏跡窮閻稍逃謗議分符便郡獲借餘光未遑竿牘之修遽辱音塵之及故情弗替朽質増華伏惟知府右司噐業宏深性資夷粹清名雅望衆推獻替之才紫閣中臺嘗賛彌綸之務念斯人方急於惠養故名流暫假於藩宣行被峻除即還要路某衰頽已甚智術無堪但思平易以近民或跂循良而比迹知平江府謝宰執啓霅水分符方安䟱拙呉門易守遽被陞遷釋湖山清曠之居當舟車凑集之㑹雖恩榮之過分顧謭薄以難勝伏念某智不足以趨時用非長於渉世徒縁遭遇浸冒使令每懐報主之心敢作容身之計羣囂横議衆毁交攻一去修門再歴嵗時之久三紆郡紱不離江浙之間訖無善状之可稱苐慙救過之不暇敢冀曲加奨與力借吹噓寵驟至以若驚命已行而莫避諸惟僥冒實有夤縁兹蓋伏遇僕射都督相公盛徳格天元勲蓋世内隆寛而博愛外公聼而並觀舟楫濟川坐弭風波之險鹽梅調鼎曲成品物之和致此孤蹤屢叨殊奨某敢不䖍修職業勉䇿疲駑儻蒲柳之餘年未填溝壑庶涓塵之薄效粗報生成囘張䖍州柔直啓海國承流方上投閒之請江鄉命帥乃叨分閫之榮知餘論之見私撫㣲𠂻而增愧恭惟某官議論風生智略輻湊竭誠心而為國秉直道以事君息盜安民已傳渤海之政運籌決勝方施圯上之書行令流殍之餘盡復耕桑之舊顧如衰朽實頼庇存悵郡紱之見縻望鈴齋而徒切知温州謝丞相啓三載投閒自放江湖之上一麾假守遽膺符竹之榮祗服恩私徒增感愧伏念某趣操不足以合乎流俗學問不足以望乎古人徒以一介無能之身遭逄千載欲治之主頻更事任屢致顛隮補劓息黥乆冥心於禍福彈冠結綬敢妄意於功名不圖矜憐猥見推擇鬷明之於叔向或假片言越石之遇晏嬰蓋縁一見夫何疎賤初未叅承輙肩古人驟辱知巳幸流言之昭洗知公道之顯行既還侍從之聨復玷承宣之寄過都請覲獲瞻天子之光叩閣承顔始識汾陽之面謂㧞茅而引類在推轂以薦賢遂令憃愚有此僥倖此蓋伏遇僕射都督相公以虛心而収天下之助以直道而答明主之知斤斧衆才如良工之無所棄妍媸庶物若定鍳之不可欺眷此㣲生獲歸鈞播某敢不勤求民瘼思報國恩詔令是遵首務農桑之勸教條不擾庶期獄市之虛囘餘姚知縣啟伏審夙擁華軒將臨治境奉九重之綸綍分百里之江山視事云初依仁竊幸恭惟某官行實著於閭里風采聳於搢紳戢吏愛民固巳兆四時之和氣樂善忘勢又將障一世之頽波賜以長牋假之餘論詞源甚博獲窺雅健之文褒借過優用作衰羸之寵囘宫使婁察院賀正啓寅統發春孟陬紀朔順協履端之吉宜膺出滯之祥恭惟某官經徳不囘誠身有道浮沈里巷有渾俗之真涵詠詩書懐自得之學敢論大事不卑小官天道好還佇奉惟新之命帝心簡在行聞求舊之除囘邑宰賀正旦啓一氣囘春太簇賛陽而出滯三陽交泰君子體仁以長人惟與時以偕行斯考祥而視履伏惟某官誠身有道經徳不囘莅事惟能信忠嘉之有相履端於始冝福禄之鼎來某方久隔於鄉閭阻前趨於賔謁永言傾頌第極鄙悰荅陸氏求婚啓人倫之重禮尤謹於婚姻家道之成義莫先於夫婦恭惟令嗣第四承務江南望族業詩禮以傳家而某第三女子林下素風愧功容之無取辱叙鄉閭之舊特勤媒妁之言篚幣載臨葭莩有託㓜能遵教已聞孟母之賢長必大成庶遂甘公之志後漢周謙字恭祖同縣甘公出遇之見其容貌駐車與語甚恱因許與女夫人怒甘公曰彼有竒表長必大成遂與之荅潘舍人求婚啟三十年之莫逆豈云勢利之交四千里為流人敢有婚姻之請顧衰宗之藐爾仰風義之凛然伏承令姪承務詩禮傳家雅服過庭之譽而某第五女子功容無取粗安姆訓之嚴豈謂未替故情曲敦夙契通家已久尚煩媒妁之言投分益深永有子孫之託謝孔倅啓竄身二紀已甘終老之期恩詔四傳遂有生還之望伏䝉某官俯憐老朽曲軫窮塗賜以好音錫之品物坐賔常滿不空文舉之尊罍家學有傳肯墜伯魚之詩禮退量譾薄曷副襃揚感愧之私敷宣莫既
