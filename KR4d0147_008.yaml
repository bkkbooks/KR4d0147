body:
  text: 莊簡集卷八宋李光撰奏議乞開言路劄子臣聞帝王之美莫大於詢謀治安之時尤先於警戒歷觀前代有為之君雖聰明有餘而切直之言不絶於耳雖天下大治而幾微之慎不忘於懷恭惟皇帝陛下以睿知寬仁之資膺祖宗積纍隆平之業勞心求治幾三十年華夏乂安天地交泰符瑞之應史不絶書所謂太平盈成之期實在今日陛下所當憂勤宵旰虛已以聼納羣臣所宜精白勉勵夙夜以進戒而近嵗以來士大夫狃於因循宴安寵祿諂佞成風至妄引荀卿有聼從無諫爭之說以杜塞言路多士盈庭莫敢開說是陛下有容納之德而羣臣進拒絶之計朝政之闕失臣下之姦邪生民之利病海內之休戚何由盡聞乎古人有言曰堂上逺於百里堂下逺於千里門庭逺於萬里蓋言壅隔之禍深也臣愚伏望陛下博延羣臣明詔天下廣衆正之路開不諱之門使忠良謇諤之士有所規益而讜言進傾邪讒巧之徒不得壅蔽而下情通實天下幸甚取進止論百姓失業劄子臣聞堯舜在上天下無窮人文王之民無凍餒者蓋國以民為本而民以食為天自古賢聖之君莫不貴農重榖以裕天下一夫不耕或受之饑一女不織或受之寒饑寒並至而能不為姦邪者鮮矣仰惟陛下臨御海㝢躬修節儉以安百姓涵養生息如天地之無不覆載雨露之無不潤澤每發德音下明詔未嘗不以寬恤為先懷生之屬罔不欣戴可謂治極乎堯舜而恩深於文王好生之德浹肌膚淪骨髓矣邇者朝廷稍務損益時政以適厥中而奉承之吏用意過當不復推廣陛下仁民愛物之心貪殘苛暴公肆掊斂百姓嗷嗷失業者衆監司守宰坐視流亡恬不加恤强者結集為冦盜弱者轉徙乎溝壑是致輦轂之下丐者日滋號呼呻吟枕藉道路此陛下耳目所及至近而易察者然且壅隔而不盡聞况四方萬里之外乎深恐怨嗟之聲干戾隂陽聚為祲厲傷害和氣臣愚伏望陛下流寬大之澤抑煩苛之吏申敕諸路提舉常平官或間遣信使以巡撫四方延問民所疾苦蠲逋負省徭役以仰副陛下愛育元元之意實天下幸甚取進止辭免除右司諫狀臣准東上閣門告報已降告命除臣右司諫臣聞命震驚罔知所措伏念臣資性朴愚學術荒落方陛下初登寶位開廣言路褒直盡下之時宜得方正忠謇之士置在左右拾遺補闕庶有禆益如臣庸妄風節無聞倘或冒居實纍初政伏望陛下察臣誠悃非敢矯飾追寢成命别除臣一職合入差遣庶安愚分所有告命未敢祇受謹具狀奏聞伏候敕㫖論梁師成劄子臣伏覩敵騎內侵需索犒軍金銀陛下以宗社生靈為重屈意求和上自乘輿服御宗廟器皿下至民間首飾之物拘收殆盡大臣戚里之家不免直取獨未聞宦官能體陛下憂勞之意者近年以來宦官用事或殖貨利或治宫室或開拓邊境或進退臣僚皆能竊弄威權以厚自封殖此陛下耳目所及不復縷陳其専權擅勢桀黠尤甚者莫如梁師成師成用事日久能作威福計其家資無與為比當此危急之時獨不在直取之數臣竊惑之臣謹按師成出入禁掖踰二十年罪惡貫盈不可悉數方蔡京王黼相繼用事朝綱隳壞賄賂公行姦邪朋附而為之用忠賢擯斥而不得進師成與之締交關通表裏䝉蔽引用浮薄布滿中外依憑城社玷辱聖朝以至海內怨嗟養成今日之患迹其罪惡久合誅鋤方陛下踐阼之初聖政日新一時憸人咸知退縮而師成儼然居中執政大臣慮其狡獪多計恐一旦復得進用莫敢動搖伏望陛下斷自淵𠂻以師成付有司籍其家資窮究姦慝以正典刑因以風厲黨類庶有懲革實天下幸甚取進止言蔡京章疏不繫階分析狀臣凖尚書劄子二月二十二日奉聖㫖言蔡京章疏柳約李某不曽繫階令分析聞奏者臣聞命震驚罔知所措臣昨於今年正月二十四日供職至二月初三日入局忽報臺諫官上殿臣方驚疑詢問同列據司諫李㑹正言師驥云初二日晚有急速公事乞對緣臣是日早出不暇相率既未得班次至初三日只將侍御史孫覿論列蔡京文字列銜同上即不曽聚議及報臣知委臣是時供職未及旬日正當朝廷多事之際敵騎未退臣嘗按梁師成罪惡首以蔡京王黼締交關通表裏䝉蔽為說然臣後來不曽再有彈奏臣實失職雖天度包荒未即罷斥在臣愚分誠不自安臣見居家待罪伏望聖慈解臣言職以厭公議論內臣梁永劄子臣訪聞髙品梁永等昨因宣和七年十二月差充伴送金國回謝畨編欄官沿路作過挫辱守令毆擊頓司恣橫不法及取受過錢物每名不下一千五六百貫送大理寺根勘各係贓罪流在案該大赦原罪凖律諸以贓入罪正物見在者還官其已費用者死及配流勿追餘皆追之今永等所配雖已該赦有追到贓物見在大理寺贓罰庫永既釋放却計㑹內侍省差權大理寺監門節次將劄子求囑本寺少卿請出元追到贓物臣契勘永既因罪追攝下寺根勘於本寺官已有妨嫌况贓物在庫未經戶部拘收遂敢一面請領顯屬違法欲望聖慈令戶部日下將上項已追到贓物重别估定價例除已納足所犯贓外其餘恐合給還仍乞罷本人見權監門庶免姦弊取進止乞罷李彥辟官劄子臣近奉聖㫖専委臣看詳京東西兩路係李彥辟置西城所害民之官並合放罷臣今契勘兩路州縣官係御筆內降聖㫖除授之人其為員數尚多吏部不肯著實供具若盡行放罷其間却致枉濫臣今欲將監司知通元係聖㫖司録已下元係吏部注授别無害民顯迹並且存留外其餘並乞放罷取進止論鄧雍劄子臣伏覩近降指揮今之尚書侍郎異日宰執之選也都省所接詞訴分送六曹與决施行陛下責任之意可謂重且専矣則居是職者非得天下英偉豪傑之士智識才器足以當異時輔弼之選者曷冝任此哉臣謹按吏部侍郎鄧雍不學無術世濟奸邪其父洵武任樞密使因緣請託特許赴殿試關通近幸猥中科目濫厠從列帷薄荒穢士大夫目為豔班兼雍不曉吏事又欲廢法任情専受請託選人關升改官意所欲與雖郎官執條例以進輒遭詬詈人材猥下趣操頗僻不足汚天官之選伏望聖慈特賜罷黜施行庶厭公議取進止論鄧雍第二劄子臣伏見近年以來嬖幸用事奸邪擅權賢否混淆是非顛倒世家之子布滿要塗瀆亂朝綱莫斯為甚臣謹按前吏部侍郎鄧雍専以便僻側媚躐取要官初無學術而使之特赴殿試不知古今而使之猥厠經筵帷薄不修踪迹醜穢士林傳播以為笑談今雖罷遣尚仍舊職玷髙華之選實於公議有所未允伏望特出睿斷早賜褫奪職名投置閒散庶幾聖朝名器不以假人且絶奸邪覬覦之路實天下幸甚取進止乞追究王蕃召姚古劄子臣等伏見朝廷自聞金人入境即差王蕃姚古充京畿四面制置使今姚古未聞來期王蕃統領禁兵避敵逺遁不知所在京畿諸邑及近京州縣例被劫掠道路不通都城閉關多日民間百物窘乏人情憂懼欲乞先次選差將兵分屯城外以禦他冦仍開南城一面門多差將兵譏察守禦以通往來仍乞差官趣召姚古追究王蕃所在取進止論吳鏜劄子臣聞重刑再覆國之常典唐太宗每决一囚必三令五覆蓋所以重人命也訪聞元豐庫受納金銀一項百姓王宜納金五十兩貼司李元亨上厯誤作五兩當日有提領官吳鏜到庫㸃檢係胥長劉鐸即時以元數執覆取鈔呈驗發覺訖元金見在李元亨畏罪逃竄吳鏜不曽送所司根勘一面申奏取㫖便將監官降官劉鐸貸命杖脊刺配沙門島雖已䝉改正其吳鏜并無行遣臣謹按鏜本市井小人狡獪反覆自來諂事權幸不一二年致身從槖今來為見大臣收簇金銀急於傅㑹遂致廢法任情欺罔聰聼衆論藉藉咸謂枉濫實纍陛下始初清明之政伏望聖慈矜憐無辜將鏜重行竄斥非獨為小人之戒亦以仰副陛下欽恤之意取進止論曾紆等劄子臣惟國家之興聖聖相授専務愛育元元以固邦本而四海之廣所與共治以惠養斯民者尤在於守令監司之職委以刺舉實外臺耳目之寄専以按察州縣者也其任顧不重哉伏自陛下即位以來號召天下豪傑之士聚之朝廷而貪汙不法之吏多在外服或倚勢作威或倚法虐下誅求掊斂靡有藝極使逺方之民無所申訴朝廷何賴焉臣伏見江西轉運曾紆福建轉運趙岸唐績提舉市舶張佑提舉廣東香鹽黃昌衡府界提舉常平陸棠皆緣交結權幸以躐取名位邪佞凶狡素無亷聲皆不足以當一道之寄岸績逺任福建漕臣朝廷近差陳磷等為代遂通賄賂於梁師成以造茶為名不肯離任佑本泉州大商今市舶廨治乃在泉州背公營私何往不可近聞營造第宅盡令屬邑科買材木贓汙不法一方之民咸受其弊昌衡棠皆奴事朱勔昌衡頃知秀州華亭縣抑勒人戶依等第科買白鶴每隻至有百餘千者自秀至蘇花石珍禽絡繹不絶遂就除本州通判益肆掊取東南之民莫不憤怨棠知平江府長洲縣専一勾當朱勔家事民間訟牒悉委佐官平江地瀕太湖勔田産盡在長洲縣多被水患民間不肯承佃棠既為抑勒上戶佃種稍不承認即枷項送獄既承之後永無脫期至破家蕩産賣妻鬻子猶監錮不已良民妻女稍有姿色者必多方鈎致百姓田園號為膏腴者必竭力攘取以搜尋竒玩而發人籠篋者有之以訪求古物而掘人冢墓者有之紆故相布之子因諂事宦官進職賜帶頃任楚州及鎮江府通判皆以本州娼女自隨替罷挈之而去帷薄荒穢父子聚麀尤為清議之所不容伏望聖慈特降睿㫖盡行竄斥以正刑書仍乞精擇廉幹修潔素有風力之人以充監司之選庶幾朝廷惠澤得以下究細民疾苦得以上聞仰副陛下勤恤民隱之意天下幸甚取進止乞奉迎上皇劄子臣聞唐明皇避冦幸蜀肅宗即位靈武及二京平李泌為羣臣通奏具言天子思戀晨昏請促還以就孝養若泌者可謂善處人父子之間矣恭惟陛下天性仁孝伏自上皇東幸暴露日夜憂思至避殿减膳不遑寧處羣臣士庶莫不知之而軍興之際朝廷多事道路隔絶臣恐陛下至意未能感通而姦邪之人易成間隙以上貽宗廟之憂下為羣臣之禍治亂之原安危之機盡在於是臣愚伏望陛下親降詔㫖令三省樞密院集兩省臺諫官合議奉迎上皇典禮使陛下大孝之美純粹光顯過於未登大位之時實天下幸甚取進止論內臣鄧珙等狀臣恭惟道君太上皇帝倉卒南征暴露野次陛下憂懼不知所為金人退師之翌日遣使問安又擇見任執政為奉迎使陛下東嚮臨遣於庭令所至賞犒隨行將士撫諭行宫使已下令扈從以必上皇之歸孝思至矣且命宗室父老迎謁近甸亦既越旬未聞屬車之音羣臣士庶不能無私憂者以羣小人在側耳臣訪問隨行內侍其間頗有讒邪之人造飾奸言欲以離間陛下父子以龍德為隘而進西幸之策使陛下以天下之大而不能安其親挾此為奸何所不至此誠社稷之深憂也臣願陛下擇其尤甚者行遣一二其往來京城踪跡詭祕如鄧珙者傳播詔書以惑衆聼如劉奭者妄議朝政不循分守如徐霽者朋附道流凶惡稔著如董舜賢者李琮梁師彥之隂懷反側任鈞馮彥石如岡之素著凶豪凡此數人皆工讒善佞小人之桀黠者也自知過失既多畏陛下之嚴恐一旦有所不容是以日夜窺覘搆間百端不可不慮臣愚伏望陛下遣使躬禀上皇將此數人重行竄斥别選老成端願之人以充上皇掃除之役庶幾小人不敢牽制行宫既復二聖重歡實天下慶幸論宋㬇劄子臣等伏見新除發運副使宋㬇憸佞庸狡専事反覆蚤締交於王黼復聨姻於蔡攸叨竊寵榮積有過惡朝廷近者再除㬇發運使臣等謂陛下濶略往愆責以後效未敢論列今乃聞㬇包藏禍心覆出為惡撰造不根之語脅持上下欲以離間陛下父子之愛物論恟恟莫不疑駭伏望陛下斷自淵𠂻早賜竄逐以厭公論取進止三月三十日奉聖㫖宋㬇落職與在外宫祠論明節皇后不當立忌狀臣准西上閣門關凖太常寺關今年迎奉道君太上皇帝若在四月二日到京緣當日係明節皇后忌辰合分定奉迎及行香官者臣嘗考求典禮明節皇后不當立忌昨緣太常少卿林震率意迎合妄援溫成故事為明節皇后立忌因以為例不復討論遂使聖朝著非禮之舉貽譏後世不可不革竊詳忌日之制罷樂廢務修齊行香皆子孫致其追慕之誠五季之亂可謂無禮法矣周世宗宣懿皇后入廟議者猶以太后在上疑祔廟之後立忌非便嘉祐中言者以久雨隂沴宗廟之禮恐有未順且謂城南立溫成廟四時祭享並同太廟之禮蓋當時有司失於講求商宗遭變飭已思咎祖已訓以典祀無豐於昵况以嬖寵列於秩祀非所以享天心奉宗廟之意也熙寧中有司議改溫成廟為祠殿嵗時遣宮臣行事忌日齊祭並合廢罷識者是之今陛下初嗣厯服宜大正始之時宗廟國之大事伏望聖慈下有司討論典禮務合中制所有明節忌辰乞且依溫成故事罷百官奉慰行香止令內臣就祠殿行事薦以常饌庶合典禮謹録奉聞伏候敕㫖論制國用劄子臣伏覩祖宗之制天下財榖悉總於三司非條例有定數不敢擅支朝廷知其大數量入為出故能倉廪充溢用度有餘近年以來政出多門法度寖弛戶部既不得總天下財賦朝廷亦無緣盡知錢榖大數侵支互用不可幾察名為應奉御前其實般入私室東南財賦盡於朱勔西北財賦困於李彥天下根本之財竭於蔡京王黼自徐鑄蔣彛為常平司官何漸為茶馬司官張琬徐惕燕瑛為市舶官應安道朱彥美王子獻王復為轉運司官胡直孺盧宗原為發運使王仲閎胡邃為提㸃刑獄宋誨為香鹽官劉寄吕岯毛孝立為鹽司屬官天下財賦盡歸權幸之家小人乘時無復忌憚今所至匱竭公家無半年之儲百姓無旬日之積加之兵興府庫金帛散用將盡此乃國用危急之時所謂理財經久之術不可不慮伏望遵依祖宗故事使三省樞密院通知兵民財利大計與戶部量一嵗出入以制國用仍乞精擇健吏通知財計者置司驅磨諸路應干錢物往來移用過及見在之數其官吏各量添俸給課以功限為之賞罰或専遣使命就所至勾集諸司人吏驅磨庶幾利源歸一而天下財用可得而理矣取進止論三鎮親王劄子臣聞春秋之義許外國者不一而足顔師古曰節制之不皆稱其所求也臣伏覩金人恃衆凌犯邀求無藝陛下天度包荒不愛重寶不惜土地又遣親王大臣為質卑辭厚禮惟恐少失其意待之可謂盡矣而貪婪無厭詭詐難測近者載遣使人復以親王大臣都尉為請無禮亦甚矣臣職在諫垣連日伺候班次未䝉引對退伏維念上皇在東南陛下闕晨昏之養未有以慰其意今連遣二子入不測之敵無乃傷父子之情乎况肅王孱弱置之軍中萬一暴露感疾陛下有殺弟之名又三鎮者皆天下徑兵處太祖太宗百戰乃得之一旦舉以豫人陛下為人子孫嗣守大業使兩路生靈無故陷沒尚何以為國乎此又不可之大者夫城下之盟諸侯之所深耻以國家全盛之勢四海九州之廣勤王之師不絶於道伏望陛下明詔將相大臣别議攻守之䇿仍乞間道遣使檄河東河北兩路盡發强壯䇿應首尾掩擊天地助順必成大功臣無任忠憤激切之至論土豪乞依戰功補授劄子臣伏見河北河東路宣撫副使李彌大申乞初等不理選限官誥一百道欲以召募土豪此必彌大窺見朝廷不肯假借且懼招權之嫌故其所乞不敢過當又能為陛下吝惜名器志雖可嘉臣竊聼外議以為方今多事之際正藉捐軀死難之士使真有土豪能糾率勇士捍禦邊方恐非虛名所能招致指揮一下聞者竊笑伏自陛下即位以來罷花石之冗費斥應奉之邪塗濫恩僣賞所省已不資矣奪彼與此孰得孰失况今太原危急邊境繹騷此正拔士卒為將帥之時所有應緣召募首領合與官人並乞作戰功補授庶幾人人樂從應募必衆取進止辭免除侍御史劄子臣聞命震驚莫知所措伏念臣承學淺陋賦性迂愚比者伏䝉陛下擢置諫垣日月未幾曽無古人正色獻替之效莫副陛下虛懷聼納之勤靦顔尸祿日俟罪譴敢圖誤奬更踐臺端况今多事之際士論未一民論未孚非智識議論足以禆益政體剛方諒直足以糾正官邪曷可仰副陛下責任之意如臣妄庸猥被簡拔恩私過厚職任難勝退自省循安敢冒處伏望陛下察臣誠悃追寢成命别除一閒慢差遣庶安愚分臣無任激切屏營之至謹具狀奏聞伏候敕㫖再辭免侍御史劄子臣近䝉恩除侍御史尋具狀辭免聖恩深厚未賜矜從非臣捐軀所能報稱而義有未安不能但已須至頻瀆淵聼伏念臣出自寒鄉蹤跡孤逺歷官州縣踰二十年風節無聞志氣凋落兹者伏遇陛下龍飛首擢諫列詢事考言曽無㳙埃可以上禆聖政之萬一方懷憂畏日俟譴呵豈敢躐處要路以冒不次之寵况陛下初嗣大政當擾攘之時避殿减膳躬自貶損憂勞備至而德意未孚於國人播告雖修而實利未及於天下羣囂喧閧權柄下移遂使人主之威福朝廷之紀綱幾無以自立復以畏避相先莫敢任責而臣人微望輕乃於斯時身任言責橫當風波實恐無以稱塞上辜陛下委寄之意伏望聖慈察臣情辭非出矯僞别移一閒慢去處庶可勉䇿駑短隨事補報臣不勝哀祈激切之至取進止論體究姚古等劄子臣準朝㫖差往河東路體究姚古已下統制官不進兵等事係干重密合先次取㑹因依次第看詳體究詣實竊慮古等却作因糧道不繼别以私說回報雖未眀虛實理合體究的實恐臨時有妨施行其前項事若干涉監司州縣等處即未審合與不合一就體究伏望聖㫖詳酌施行如䝉許一就體究即乞特降處分付臣照㑹所有應干今來體究公事合關報臣事節並乞依已降指揮不得下司所貴慎密不致漏露取進止五月一日三省樞密院同奉聖㫖河東諸統制官內有逗遛不進者其姚古不能莭制以軍法從事致久未成功姚古可落檢校官罷節鉞與承宣使依舊河東制置使其統制官差侍御史李某前去體究逗遛尤甚者械送赴闕取㫖李某令東上閣門今月二日引見上殿訖疾速起發仍不下司有劄付李侍御靖康元年五月一日押已而不果行論行宫冒賞劄子臣聞唐德宗狩奉天自發洋州以來百姓進獻瓜果欲各與散官陸贄以為不可且曰爵祿天下之公器而國之大柄也惟功勳才德所宜處之夫散官虛名也贄猶力爭至數千百言而不已誠以所繫者重也臣伏聞上皇東巡州縣供饋無闕此乃臣子之常分何足為功兼供饋之物自一毫以上皆行人及坊郭鄉村有物力之人非出供饋者之家也供饋愈辦則剝民愈深臣訪聞其間巧於謀身者多是交結近習縱其請求需索無藝往往緣此得其歡心揄揚贊美逹之上皇遂致增秩賜金行宫如市有再任者有進三官者有召赴都堂審察者恩賞僣濫非散官之比也陛下修明百度抑絶奔競如此而士大夫冒犯廉隅僥幸茍得如彼况上皇鑾輿還闕將士冒行陳突銛鋒以衛護社稷者或橫尸原野或暴露邊陲未聞少加恩典而首及州縣猾邪之徒非所以示天下之公也所有巳降遷官進職等指揮伏望聖慈特賜寢罷以安人情臣無任激切待命之至取進止五月二日奉聖㫖上皇經由道路宣力之人可依下項寧陵知縣趙子游等各轉官有差論王氏及元祐之學臣愚昧朴拙當陛下初政偶承乏擢置言路每因進對備聞德言未嘗不以紹復祖宗法度為說忠臣義士莫不歡欣鼓舞日須德化之成也臣今月十七日入臺伏覩三省降到黃榜一道臣寮上言以王安石為名世之學發明要妙著為新經天下學者翕然宗師又言熙寧元豐間內外安平公私充實法令備具賦役均平其意専以王氏之說為是公肆誕謾無復忌憚以陛下聖明未可遽欺既以司馬光與安石俱為天下之大賢又云優劣等第自有公論觀言者之意必不肯以光為優以安石為劣夫光與安石行事之是非議論之邪正皎若白黑雖兒童走卒粗有知識者莫不知之當熙寧元豐間如韓琦富弼歐陽修之屬尚皆無恙安石惡其議已皆指為因循之人擯斥不用卒以憤死恭惟太祖太宗創業之艱難真宗仁宗守成之不易規模宏逺矣安石欲盡廢祖宗法度則為說曰陛下當制法而不當制於法欲盡逐元老大臣則為說曰陛下當化俗而不當化於俗蔡京兄弟祖述其說五十年間搢紳受禍生靈被害海內流毒而祖宗法度元老大臣掃蕩禁錮幾無餘藴矣幸賴宗廟社稷之靈上皇悔悟以祖宗不拔之基全付陛下今言者又創為熙豐之說以安石為大賢臣恐此論一出流聞四方鼓惑民聼人心一失不可復收非朝廷之福也
