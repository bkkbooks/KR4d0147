body:
  text: 莊簡集巻五宋李光撰七言律詩余丈中大自䖍還鄱陽弭節豫章南浦亭下相從累日議論慨然志節彌勵感歎不足成鄙句送行抗志潜心六籍中文章直欲擬軻雄誰云前輩風流盡尚有斯人氣味同南浦送行傷碧草北牕歸卧享清風君王寤寐思黄髪㑹見蒲輪徴此翁予得罪南遷朝廷樞宻院凖備差遣張君送伴凡八十日予嘉其勤於其行也作詩送之日日孤村對落暉瘴烟深處忍分離追攀重見蔡明逺贖罪難逢郭子儀南渡可憂鳶共堕北轅應喜鴈相随馬蹄慣踏闗山路他日重來更送誰瘦笻羸馬一貂裘江浙湖湘得縱逰萬里逺勞君伴送隔年應笑我淹留黙祈衡嶽雲開嶺夜入浯溪月滿舟北闕舊交如問訊為言白盡老人頭分水鋪步月人随烏鵲正南飛月到中天列宿稀逺近江巒明霽色横斜烟霧助清輝危亭搔首風傳笛逈野微行露濕衣兒女未須頻悵望春來應與鴈同歸余將卜居水東先以詩寄吳令茅齋背郭面孱顔已有幽人約徃還學道逺尋岣嶁令卜居長占荔支灣水東有荔支窻間山色紅塵逺竹外碁聲白晝閒静掃風軒同宴坐柴扉應為夜留闗簽判黄元功頃攝守蔚平枕江有小亭予假居乆之稍加葺治且作詩其上名之曰横江今既還職輒用寫呈西來一水䕶山城突兀横江占小亭春盡浪花浮竹屋夜深漁火亂沙汀支頥塵榻清無夢隠几明牕醉有經掃洒待君還舊隠却來相對守黄庭寄内予學道無力每世慮紛擾輒竟夕不寐間因士友相過悠然數酌即投床酣寢始覺此物乃有大功故入冬以來無夕不飲僕兵徃來流傳稍過妻孥輩遂以書相戒以此詩寄之學道㕘禪久不成惟將麴糵破愁城三杯徑醉客已去一枕未回天欲明長羡籬邉元亮醉誰憐澤畔屈原醒甕頭濁酒須多釀凖擬歸來細細傾遷城南新居背郭通幽面翠微病軀野性最相宜旋栽花竹頻開逕恐礙雲山短著籬曉日臨牕時讀易晚涼隔屋聴評棋三年瘴嶺無歸日聊向深林占一枝次前韻甕牖茅簷白版扉地偏猶與病相宜雨添山澗苔侵徑竹近陽陂筍過籬三爵沉酣陶令酒一奩成敗謝公碁車塵不到門前路漸覺蒿萊長舊枝申之移竹數十竿植之後圃增賁幽人之居作詩為謝節槩平生慕此君晚年流落偶相親裝添小圃林泉勝隔盡權門車馬塵雨浥寒梢香掩冉月歸疎影夜精神他年亭下清隂滿誰記當時種蒔人再䝉自然使君寵和竹詩率爾為謝畫手休誇最逼真東牆月影畫難親曹希藴作墨竹詩云最愛小軒岑寂夜月移清影上東牆蘇公每歎賞此句次韻吴傳正枯木歌云天公水墨自竒絶瘦竹枯松寫殘月夢回疎影在東壁驚恠霜枝連夜發常陪翠柏凌寒景幾見夭桃委路塵鳴鳳引雛來應瑞籜龍得雨便能神雙泉異日増幽勝開盞時時中聖人自然使君連賦竹詩輒復次韻閒客攜觴日對君嵗寒相與獨心親栽培野外千竿碧抖擻胷中萬斛塵月影臨牕如見畫風輪長笋不無神世言草木之長常在昧明間蚤作而伺之乃見拔起數寸竹笋尤甚東坡和子由拔白髪詩云風輪曉長春笋節使君好事頻吟賞蕭灑襟懐似晉人瓊臺玉臺孤聳出塵寰碧瓦朱甍縹緲間爽氣遥通天際月滄波不隔海中山潮平賈客連檣至一云春深乳燕營巢穏日晚耕牛帶犢還安得此身生羽翼便乗風馭叩天闗一云五馬醉歸簫鼔散折衝尊爼静夷蠻一云村落年豐無吠犬為傳夜户不須闗庭植家瓊山水北小園頗幽勝予頃寓雙泉每食罷招鄰士杖䇿訪之園有小亭常與客對奕因名坐隠今嵗亭側輒生雙竹庭植二子皆卓然有立豈造物者産此以瑞其家庭乎作長句贈之桃笙澀勒漫成林並立林亭一徑深月下競看雙鳳影風來時聴二龍吟氷霜不改夷齊操富貴無忘魯衞心寄語園人頻愛䕶等閒莫遣斧斤侵桃笙事見栁文名晉人多以龍鳳其子東坡答馬中玉詩靈運子孫皆得鳳慈明兄弟孰非龍靈運謝氏慈明荀氏也用孟博寄孟堅韻汝到家時解我憂歸來何處遇中秋夢遊滄海休回首路入梧灘穏泛舟屋裏琴書無汝愛宅邉松菊為吾留朋遊若問南方事莫説瓊州勝越州丙寅元日偶出見桃李已離披海南風土之異不無感歎獨追維三伏中荔支之勝又江浙所不及也因并見于詩逐客新年偶歎嗟海南風物異中華溪邉赤足多蠻女門外青帘盡酒家庭院秋深時有燕園林春半已無花堆盤荔子如氷雪惟此堪將北地誇久旱得雨奉呈申之權郡學士不用椎牛瀆帝鄉精誠端可格穹蒼舉頭忽見千山雨黙禱惟憑一瓣香已度南天三伏旱未妨北牖午風涼老蛟欲睡重鞭起莫遣晴鳩喚夕陽次林庭植喜雨韻一瓣黎沈徹九幽随車甘雨散民憂風聲震海驅雲出雨㸃翻空捲地流午夜村墟無吠犬夕陽坡隴有耕牛歡謡不獨聞田父更向東陵覔故侯題將領占勝亭亭據雙泉之上盡見城東南風物之勝落成之初屢來乞詩為賦長句云結茅坡頂俯平川占得城東勝槩全衮衮長江通瀚海森森喬木帶雲煙月當庭户初圎夜霧隠樓臺欲雨天玉帳今聞罷刁斗却來閒處翫林泉柯君近提兵撫遏黎人歸葺此亭阜通閣元夀使君到官未幾浚川築堤以通商賈之利急先務也因為閣扁其牓曰阜通辱示佳章因次其韻危閣峥嶸枕碧流籌心計慮匪人謀千颿不隔雲中樹萬貨來從徼外舟富國要先除國蠧利民須急去民蟊使君不日歸華近要路翺翔徧十州重陽後二日㑹嚴氏野趣亭坐客吳徳永裴堯文杜志林林元憲李彦實嚴君錫魏介然及予八人因成拙詩以紀一時之集云已過重陽得勝遊海南秋色尚遲留旋沽白酒君須醉未信黄花蝶解愁菡蓞香浮曲沼静㯽榔葉暗小亭幽始知風景中原隔對泣何須效楚囚唐常建作破山寺詩云竹徑通幽處禪房花木深歐陽永叔毎歎賞此句以為不可及温陵康元夀守瓊踰年樂其地僻而事簡以清静治之於郡圃植竹數百竿中有小亭因榜曰通幽偶成拙句蕭灑襟懐慕子猷賸栽修竹徑通幽三間逺比淵明宅百尺徒誇庾亮樓風送鳥聲春寂寂日篩簾影夢悠悠一云花露泣殘春寂寂鳥聲驚㫁夢悠悠破山絶景親曽到誰遣移來海外州予重和戊戌嘗為常熟宰破山在焉八月十六夜江邉對月晚雨㝠濛洗瘴塵㫁雲遮月尚鱗鱗影涵漲浦揺金鏡光動天街碾玉輪村市更無沽酒客小樓時見捲簾人不須辛苦瓊臺上展席移觴近水濱丁邜二月二十七日與客縱步至判官陳師正所居前有花竹後有港浦愛其幽勝退作此詩師正歴官九任今年六十有一母年九十二嵗杜門養親不復仕宦盖瓊士之安貧守道者也幽居非是避危機澀勒遮蔵客到稀白髪不傳毛義檄青衫常戯老萊衣舟行别浦随潮去燕認低簷帶雨歸從此欲尋棊酒社肯論時節叩柴扉寄内丁夘九月裊裊秋風度泬寥卧聞微雨打芭蕉黄花籬落重陽近白髪江津客路遥家信隔年新恨過箧衣經暑舊香消小槽正想珍珠滴海舶來時寄一瓢悼亡子詩并序紹興辛酉予得罪南遷長子孟博從行明年孟醇更戍以歸乙丑春再貶海外復來視予踰年感微疾遂不起實丁夘孟冬二十三日午末未初是日天氣澄霽里巷咸覩祥雲起于屋隅中有水墨形了然冉冉升舉道俗駭異因成此章以寫予悲昔延陵季子聘於齊長子死𦵏嬴博之間既封而號者三遂行其言曰骨肉歸復于土命也若魂氣則無不之矣孔子於繫辭曰精氣為物逰魂為變是故知鬼神之情狀盖曰變則無不之矣抑善者陽之類惡者隂之類人之積善與陽俱升積不善與隂俱降今吾子平生聰敏好學忠信孝悌行業無少虧其死决不淪堕幽塗魂氣超升盖無可疑者予恐或者以予言為過因備叙其事以示平昔從吾兒遊且審知其詳者云脱屣塵寰委蜕蟬真形渺渺駕非烟丹臺路杳無歸日白玉樓成不待年宴坐我方依古佛空行汝去作飛仙恩深父子情難割淚滴千行到九泉次韻陳列之感春二首新年人物自熈熈綵索青帘到處垂日暖桃蹊花落盡雨深茅屋燕歸遲登山野屐應頻蠟出郭輕車想載脂老境逢春正愁絶為君援筆強題詩堤栁垂垂拂路塵長條祇解絆歸人營巢燕子穿簾急帶雨花枝照眼新一壑風煙如可擅滿牀書帙未全貧狂吟痛飲須公等枯木菴前草自春四月十四日晚陳列之見顧追涼翫月於東橋之上輒成長句以寫一時風景之勝小橋浮動似乗槎坐看歸牛帶晚鴉風捲斷雲飛玉馬水揺明月走金蛇影翻鳳尾檳榔葉香散龍涎茉莉花絶景勝遊仍有伴不妨流落在天涯列之将歸温陵以詩告别因次韻送行相逢海上欲忘年誰似君家父子賢氣比金莖吞沆瀣文如巖壑帶雲烟李太白云世人之文如山無烟雲春無草木追随里巷吾無伴獨歩詩騷子有權青紫他年應俯拾定中何必問諸天八年嶺海未歸人萬里天涯老病身久堕黎蠻難擇友頻經憂患易沾巾我無妙䇿甘捐葉子有長才預選掄後夜更邀橋上月為傳羲御且停輪孟堅将北歸枕上成送行還家凖擬作重陽行止升沈豈在忙童稚迎門歸亦好雲山作伴住何妨經行汝政窮幽賞宴坐吾今喜夜長解柁徑須尋舊隠誅茅先葺竹間堂已已二月已發書殊不盡意偶成長句寄諸子姪并示元發商叟徳舉資萬里一笑囊空無物寄妻兒萬里惟憑一首詩舊日琴書都藞䕢新年行步漸羸垂時開竹户通幽徑旋結茅庵傍小池去冬郡差土丁開芙蓉後小池永日無人惟宴坐不貪杯酒不枰棊已已重九小集拙詩記海外風景之異呈亨叔十年重九老天涯異域空驚節物佳楊栁枝頭無落葉芙蓉池面有殘花籬邉菊好延陶令坐上詩成戱孟嘉随分清歡須酩酊歸時風帽任欹斜秋日題池南壁間牢落雙泉一病翁十年憂患掃還空荷稀竹宻宜秋雨户窄簷低耐颶風盡日抄書北窗下有時閒步小橋東誰知萬水千山外亦與鄉居興味同記夢一首瓊州作姜山静凝寺在姚虞二邑之間去予所居纔十里頃嵗閒居每攜子弟或與賔客同游輙留宿山間今嗣闍黎繼通律師講席學徒常滿夜坐秉燭翻貝葉率至三鼓予因遣家僕回致嗣書八月二十三夜夢至其處往年氣象了然在目枕上成潺字韻一聯興所見也覺而足成之書以寄嗣知予宿縁或在此山也夢魂忽到姜山寺竹徑松門夜不闗堂上千燈還閃閃池中一水自潺潺十年迥悟空心法萬里歸尋𦵏骨山欹枕覺來城角動牀頭殘月尚彎環和郡守喜雨之什一犁甘澤應䖍恭頓覺山川返舊容宿靄醸成千嶂雨迅雷驚起九淵龍水生洲渚寛溪女潤浹郊原慰老農衰病不知春過去强持杯酒畧相從魏子介然甲戌中春不逺數百里訪予寂寞之濵予方厄窮適此久旱市無魚肉園乏佳蔬介然處之宴然眷眷不忍捨去予與介然别久介然氣貌議論益超然孟夏既望慨然請辭欲歸築室讀未見之書科舉之文不足學走筆作長句送行且勉使力學志其逺且大者仍用喜雨詩韻愛君凛凛有英風刮目相看為改容榻解乆懸延孺子樓登百尺卧元龍貨因縷積成良賈學務深耕鄙惰農已約三冬重過我盡攜書史日相從人日偶得酒果因與客飲成鄙句并紀海外風物之異燕歸茅屋草芊綿節物方驚海外偏風掃落花春寂寂雨添幽澗水涓涓臘醅每謝隣邦餽北果來從賈客船勝日漫逢聊一笑白頭那問嵗時遷二月三日作真率㑹遊載酒堂呈坐客郊外初聞黄栗留仲春風物漸和柔殺雞炊黍成真率挈榼攜棊得勝遊聊欲勸君終日醉未須悲我十年流朝來已換輕衫窄酒盡何妨典破裘路接蓬瀛日景遲塵心消盡忘歸期雨餘荒草侵三徑風起微瀾皺一池晚色逺涵殘照外春光欲近禁烟時黄鸝不肯簷間語隔葉相呼過别枝二月九日北園小集烹茗奕棋抵暮坐客及予皆霑醉無志一時之勝者今晨枕上偶成鄙句寫呈逢時使君并坐客勝日邀朋醉北園森森喬木欲㕘天更無粉色汙尊爼只有琴聲敵管絃臘酒旋開浮綠蟻春芽初破瀹新泉欲修禊事清明近曲水流觴擬晉賢七月既望雨後對月招鄰人夜飲不至獨酌成詩一首以寫一時之景虹斂江空正寂寥苦無燈火夜蕭蕭暮潮和雨歸滄海華月穿雲上碧霄沙路微行塵不到柴門深閉客難招一杯黎酒還成醉羇枕時聞犬度橋秋夜有懐金爐未冷旋添香風静雲開月到廊何處獨吹西塞曲無人同醉北牕涼鱗鴻路隔書難寄皷角聲遲夜漸長明日欲尋真率約濁醪時許過鄰牆海南氣候與中州異羣花皆早發至春時已盡獨荷花自三四月開至窮臘與梅菊相接雖花頭小而香色可愛頃嵗蘇端明謫居此郡嘗和淵明詩其畧云城南有荒池瑣細誰復採幽姿小芙蕖香色獨未改即此池也今五十餘年池益増廣臨川陳使君復結屋其上名賔燕堂今夏得雨遲七月末花方盛開因成此詩約勝日為採蓮之集云秋來雨足溢方塘華屋臨流四面涼風颭圓荷翻翠盖水涵芳蘂艶紅粧淡煙難掩天真色薄日時烘自在香詩老未須譏瑣細解陪梅菊到氷霜昨晚約逢時使君今日食後過賔燕瀹茗觀蓮今日雨忽作因記東坡遊西湖遇雨詩云湖光瀲灔晴方好山色空濛雨亦竒之句作雨中觀蓮詩戲呈并示同行諸君城南方沼盡栽蓮得雨花開晚更妍自有清芬來襲袂不須紅粉笑當筵彤霞暈臉深還淺碧盖跳珠碎復圓更擬中秋陪燕賞月娥休妬水中仙移具訪逢時堅白堂已許擕壺就綺羅却因風雨斷經過不辭美酒十分勸欲聴佳人一曲歌掌上要觀摩勒果池中難借右軍鵝近舶船至頗得北果又一鵞甚大且肥将烹之摩勒果見維摩經使君獨醒空囬去被冷燈青客奈何庚午重九予以憂患經此節物亦强舉杯復同坐客歩至陳氏水閣率爾成韻累嵗嚴亭㑹衆賔今年九日未全貧樽中有酒須招客籬外無花免笑人昌化地熱九日不見菊李太白九曰龍山詩云九日龍山飲黄花笑逐臣竹杖芒鞋行自慣風軒水閣坐來頻鬢邉强把茱萸挿萬里誰嗟老病身辛未嵗旦用蘇子由韻成兩詩寄諸子姪朋遊族黨死生分老夀今居第二人予辛酉冬南行城中老朋友如韓似夫王從道陸元鈞本房兄弟徳充舍弟元發堂兄孚先民先介之皆物故獨堂兄去華無恙今八十矣松竹飽經炎海瘴栁梅空想越溪春身行九折心無轉息住三田氣自新白晝漸長牕日暖始知羲馭解停輪頻把光隂惜寸分十年閲盡世中人衰容暗換圗中象和氣潜回海底春香裊金爐沉水暖茶烹石鼎乳泉新儋崖産沉香天慶觀乳泉東坡有賦丹元息息添真火肯使空花翳五輪目有五輪謂血氣水金瞳也見九仙經吳徳永逺寄乾栗五百顆荷其厚意戲作長句謝之海山深處住多年容貌雖衰齒尚堅長使玉泉歸絳闕毎留真火暖丹田感君特地貽乾栗知我猶能咬石蓮土物欲尋香翠報近來行市正増錢來書言僕筆力不異徃年乃深究仙經道録之效因以為戯所寄栗硬如鐵石煮終不軟四月望夜郡寮悉赴盛集羊荆華林伯夀伯安相繼見過同登涌月閣待月成拙詩并呈常往來諸友杖藜欲往歎塗窮頼有林廬寓此翁日暮凭欄看涌月夜涼開牖濯清風浮沉直擬羣鷗鷺冷煖安能效燕鴻獨酌城南二三子擕棋挈榼笑言同羊荆華敞小軒靣叢竹予以細香名之盖用杜子美風吹細細香之句因賦此詩負郭林廬帶草堂小亭軒敞對修篁祖師但指青青色詩老能聞細細香風過户庭常掩冉雨餘衾枕自清涼幽蘭茉莉徒芬郁氣味不如君乆長昌化雖窮寂今嵗偶諸處寄酒東船至得北果又老庖自海康來人日與客飲邂逅成醉座中賦此去年人日醉陳園竹外風流洗瘴烟花落野桃春寂寂海南地暖雜花皆臘前開盡潮回南浦水涓涓臘醅每謝鄰邦使北果常随賈客船佳節漫逢聊一笑老庖能鱠海鱸鮮悼程伯㝢尚書目斷佳城户一扃名山千古返英靈郡祠空復存圗像公典宣信撫三郡所至有恵愛父老為立生祠朝路無由認履聲大節已書班氏筆豐碑應勒退之銘文章不朽傳賢嗣收拾何勞假六丁壯節滋培雨露深褎然文采冠儒林恩霑二族全純孝伯㝢初為臧氏舅所飬登第之後不忍遽歸既升朝叙封而臧氏夫婦繼亡服闋還朝乃自陳歸宗此事古今罕有殆天以全節付公無愧范文正公也忠貫三朝秉一心墓木未懸吳札劍㫁弦誰續伯牙琴傷情故篋存遺帖洒淚行間自不禁八月一日詣新學瞻禮廟像退與客徜徉訪尋幽勝所至清談瀹茗晚至陳氏園亭酌乳泉而歸一時清集無愧前人主簿趙元弼乃有厄陳之歎形於篇詠因次其韻兼呈諸友郊居多與泮宫鄰囬首清游迹已陳曳杖入門瞻廟像穿林度壑訪幽人逺稽鄒魯衣冠古近揖江山氣象新飲水飯蔬真樂趣始知席上有儒珍元弼主簿喜飲而吝於開閤又累輸棊不償同僚頗以為言八月朔出郊乃有戹陳之歎因再次其韻飛蓋追随訪隠淪坐中佳客有荀陳貪盃且可偷鄰甕愛竹何須問主人雨後已㸔山色爽雲頭漸喜月華新烹羊載酒邀同社冷落盃盤笑集珍郡學落成之初八月二十二日陪郡守同來仍榜郡學二字遒勁結宻觀者興歎是日燕郡僚并學職郡守謂予本起諸生俾預燕集因成鄙句呈逢時坐客氣清天朗屬中秋黌舍初成燕魯侯依舊規模環璧水斬新牌牓燦銀鈎青衿士子欣榮遇白髪迂儒預勝遊尼父道行千載後坐令南海變東周海外自去冬不雨至今農圃俱病郡侯率僚友為民祈禱二月十八日祭社致齋是日雨作喜而成詩呈逢時使君随車甘雨應精祈樂嵗豊年喜有期草色青青連粟壠海外俗不種小麥惟賴粟以接禾稻竹聲細細想荷池欣逢山路花開日正值田家酒熟時凖擬明朝風日好野桃應有未開枝靈真道人乆無詩來用協甫韻并前篇寄之且拉爾耳翁同賦道人何處是生涯山遶孤村水繞家鬢裏雪霜全掃白胷中梨棗旋開花巳乘緑景功初就更服黄精善莫加若向静中生妄想還如炎地走氷車梨棗綠景氷車見真誥林庭植雖巳受代勉為感思之行交印後即浩然歸隠徜徉里巷間以碁自娛樂哉未易得也因成拙句贈行乙亥孟秋歴徧昌江守令權却囬小邑作神仙宦游未遂心先淡歸槖雖空意愈堅濁酒三杯須滿酌枯棋一局要争先閒居自得閒中趣更活人間七十年吏隠堂有序贑川陳自厚再領昌化郡符所居堂湫隘不蠲一洗而新之栽花蒔竹累石為山凛然有巖壑之趣予為名曰吏隠意欲不妨為吏而有隠遁之風也并賦長句云海邦地僻少迎將心逸身閒白晝長賸欲哦詩追沈謝不求名迹擬龔黄旋移松石成雲壑時引笙簫入醉鄉吏散簾垂公事畢清風一榻傲羲皇拙詩奉送厚之權郡還闕天衢未擬縱驊騮南顧聊寛聖主憂民頌永傳儋耳國後漢蠻夷傳云海外有儋耳國家聲夙著虎頭州簿書脱屣歸華貫翰墨收功入勝流去去願將民疾苦盡攄胷臆副旁求獨居自遣一首寄厚之平生憂道不憂貧萬里風波一葉身路滑須憑木上座天寒那用竹夫人閒尋獨鶴為仙友笑指孤雲作近鄰北客不勞頻問訊已拚終老海南濵送秦令元發赴吉陽吉陽雖逺郡其實魚米之鄉泉甘酒美實海外樂國近年守土者率不能謹三尺遂致紛紛朝廷察知其弊俾三司選清强官徃攝郡事瓊司以臨臯令秦元發累任海外有亷聲即以名聞乙亥十月被命南来道由昌江相從累日喜而成詩以送行云百里威風已震驚朱幡夾道聳先聲耕桑不擾民歸業香翠無求吏自清老去方知五馬貴愁来未覺一杯輕世情冷暖難開口懐抱因君得盡傾象臺有序象臺謝氏所居去郡城六十餘里有溪山之勝今瓊州司户洪兄弟四人皆以儒學得名好賢樂善不求聞逹右丞王復道嘗館其家作扶踈堂等詩户曹之子傑以幹至昌化數訪予執禮甚恭若有求而不敢問之盖亦欲得予詩也念方老病未暇今晨忽來告别無以酬其意勉作長句送行若亭榭之勝景物之美尚須異時登覽而賦傑兄弟亦四人皆預鄉薦有聲場屋云全家卜築面孱顔變態煙雲坐卧看丘壑時應擕妓女階庭還見産芝蘭水涵山影千尋碧路轉松隂十里寒杖策它年容叩户盡驅佳處入毫端和雨後對月載酒人無顧寂寥秋來門巷更蕭蕭風驅雨脚收千嶂雲捲月輪升九霄松竹此時聊谷隠巾車指日見弓招登臨莫作殊鄉念乘興時尋小石橋海外氣候每嵗三四月間巳如劇暑客有自吉陽至者寓館問漢亭累日且言吉陽氣候晝夜如炊因歎此邦之勝乃知人生無有足時不經熱惱豈知平日之清凉乎故古之逹者毎以此對治釋氏云推落大火坑火坑變成池皮鞋和尚以為即時清凉也蘇公亦云嶺南瘴毒地有此江月寒乃知天壤間何人不清安予謫居嶺海踰十五年見聞習熟不以為異因作此詩以自慰且以警世之賤丈夫一不快即愁歎怨憤或譏謗怒罵如栁劉之徒盖未足以語此也客自東來説吉陽始知儋耳本清凉潮聲巻海千峰雨月色侵門滿地霜更欲何方尋佛國此生真欲老蠻鄉安心守一師吾祖尚覺人間日月長予生世幾八十年交游士友有昧平生而一見氣合者有同鄉並舍而終身情乖者因悟笑曰此釋氏所謂宿縁也知此則可以忘憂惱泯是非免輪迴而脱生死也因作拙句以道其意云路隔仙凡只一塵浮生出没轉風輪宿縁未斷形雖換異世相逢意自親圓澤再來尋舊伴房公一笑悟前身若將愛見迷真性萬刼難超未了因丙子正月二十三日紀事風捲隂霾日月明鯨鯢已戮海波平姦憸藉手捐竒貨交友通書免詭名舊俗衣冠嗟化劫新疆兵革偃長城聖君若用當時將一洗烟塵宇宙清離陽夀縣百餘里遇大風雨溪流漲溢宿修仁境小寺新潔可喜不復有滯留之歎偶成長句老病字畫欹斜輙自笑也仲子孟堅同來逐客多年住海濵今朝喜作北鄉人飄風掃地捲煩暑驟雨翻空洗瘴塵境惡乍離賔館陋眼眀欣覩佛祠新松林竹徑俱幽勝留滯何庸歎苦辛紹興丙子六月十九日某到郴幾兩月適當重陽而菊猶未開然江山清逺又仙佛所居有足樂者因成鄙句以寫離憂重陽從古多傷感逐客南来重歎嗟鏡裏但驚添白髪樽前猶未見黄花求仙頓覺三山近成佛無令一念差習氣平生都掃盡更憑橘水洗塵沙郴士為作暖閣既成是夕雪作喜而成詩郴士謂郴户曹邢晦暖閣初成荷北鄰歡然一笑欲烘春香煙苒苒縈紆轉鼻息齁齁出入勻睡美忽驚天曈曨夜寒誰怕脚舒伸老兵来報雪床厚凖擬明朝共飲醇七言長律悼程伯㝢尚書人物江東第一流天衢闊步縱驊騮彈冠事主俱青紱握手論交到白頭照世詞華窺賈馬致君事業擬伊周平生自謂孔北海晚節欲為陳太丘危行危言逢有道一生一死見交遊自憐罪大無歸日哭送松門嘆莫由
