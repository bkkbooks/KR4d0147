body:
  text: 莊簡集巻十四宋李光撰書與楊龜山書某皇恐頓首上啓冬候凝凛伏惟晏居多暇台候起居萬福某還里擾擾度日旦夕南去逾逺誨語伏望為國倍萬保輔前膺褒擢奉狀不宣又某皇恐頓首上啓宫使待制老丈台座某再拜某八月半離水門一路幸無留滯偶到錢塘阻風潮到越已十月矣治行間以曹氏來廹女子親期既不可挈行又難委之而去不免且草草發遣巳定此月二十日成禮三五日大歸不肖取二十八日登塗雖隆冬南去料須稍暖似浙間三男子皆令就學委之兄嫂此行正如行纒衲子平生故人多在南方老丈果遂省墳亦有瞻見之幸喜可知也又某再拜老丈還里生計料只如昔毗陵供須能如昔否某亦苦貧近又有女子之役幸其壻知義不相望亦不曾舉責謾恐知之李樞必見之其昆季誰同行南便一一示報又某皇恐再拜某不孝罪逆幼失父母稍省事即逰走四方今幸通籍朝端而墓隧之銘未立人子之心誠不自安中前已累托二令嗣以孫大臨所撰行状拜呈欲干老丈一言以信於後世想今少間願幸寘念来使廹行復以姻事逼廹未盡所懐伏冀矜察與翟公巽書某咨目頓首再拜知府安撫内翰台座即日伏惟台候萬福某自越赴召至杭八月一夜值軍變逃避民居凡五日稍與人接乃聞衆軍獨不剽薛昻家意欲請昻領府事以求招安昻畏避不出賊勢日熾至硬刺平民擄刼婦女衣冠之族尤被其辱某兩貽書昻乞援福州金陵例權領府事昻第皆賊兵環守不能達至十九日昻猶遲疑又得寄居官列状同請方肯就職巳而憲漕兩司遣承議郎趙子璘入招安賊須黄榜乃受命又得左右提兵叩城親與士卒同甘苦賊既素聞左右恩威始大恟懼直至月末始受髙士曈補官文字昻謀遣某與方祕監等四員押第四頭項陳青詣秀請士曈入城撫定之九月三日見士曈於秀士曈雖善遇青而遲疑不進某嘗以大義責之且言左右渉大江入不測而閣下號節制乃逺在數百里外適得黄榜赦令到士曈乃行未至杭三十里間羣賊遣迎状相屬城門巳開某等先士曈之閭里人情已帖然賊兵皆免胄解甲賊首陳通其三沈安其六葉軒以素隊郊迎士曈於新橋士曈不約束從者稍捽辱之以刀拍其背捜觧其刀環仍奪其繫巾金環羣賊忿怒疑陳青賣巳盡掠其家貲殺其妻而囚之新憲周格至猶望其徑入初八初九連遣父老僧道往城外妓樂城内俟其入已而聞格暴戾怒罵其弟杞羣賊大憤城内人情惴恐賊首來昻第凶悖殊甚使羣刀手擁某及趙子璘及齎黄榜使臣於庭下欲殺久之乃免但使某與子璘及方元若皆處薛昻第晝夜賊兵七十餘人白旗子十七人防守廵邏仍釘其後門事勢危甚十日大耀兵十一日賊出兵刼鮑貽遜為鎗仗手所敗幾擒其二楊貴者殺傷甚衆是日聞外兵攻湧金門賊衆併力往救使人呌呼百姓詐言外兵屠城刼使挈水救火續傳火息兵退又傳湖上小舟載兵不可勝數倉皇盡召諸賊往救至未時又傳兵退然賊衆大懼逹旦奔救呌呼廵警不敢息而其徒紛紛出怨言百姓强刺者亦望官軍破城立降旗下某等不勝欣躍意謂翌日外兵必大集連日繼攻則賊破必矣巳而寂然無聞十四早聞賊出餘杭門欲刼兩憲某等意謂兩憲既不肯入城且已交鋒必引中軍據要害且檄鮑所統鎗仗手為聲援而士曈皆不然至午間忽傳擒士曈殺格城中士大夫驚駭之極其日賊衆兇熖尤熾闔城生靈不保性命至十七日聞羣賊出臨平昏夜不囘次日乃知臨平大掠罷飲於酒坊炊未及熟聞鮑兵在長河欲來討擊遽引歸是日㣲雨道滑自相驚恐棄甲而遁三鼓乃入城次日大恐却有就招安之意適㑹秀守趙叔近遣使臣以檄書來招遂欣然從之數以文書往來至十月二十日昻復召某等往秀請叔近速入撫定四日至秀五日叔近行事必可濟某等不復往矣自去月初士曈懦怯格暴戾無術遂致平民二萬人為賊所刺南㕔十九萬緡為賊所費妄散倉米十數萬石拆燒民居數千間塗炭一月不可形状招安遂成於叔近所以就招安者初畏越兵終畏鮑卒十七日追襲之威也竊惟執事以名臣守郡控制東南威名逺著二浙倚為長城羣賊情状所宜盡知是用粗述已事布於左右某﨑嶇避難凡六十人僅存單孑一身自告勅料厯等皆未知所在方避難時相為命者獨左右所遣虞候孫昌一名耳至今相隨其他皆為所虜亦已甘心矣冬候頓寒伏惟保重不宣宣城與屬縣官書本州近縁戚方賊馬已破寜國人情恟恟日夜望公提兵來同守禦久之不至何耶今再遣節級去若諸頭項今不體察亦當重有行遣不得巳也胡宗符亦能捐軀深可憫惜其子不來何耶鮑琢子先與被授發囘庶慰往者之意聞其家貧前日稍輟已俸不知衆官有應和者否不欲强率之也此間止是牢立寨柵併力守禦更不出戰二公可那一人星夜部領前來近報車駕旦夕欲來此幸甚幸甚餘非面莫究不宣又某頓首彦恢教授權縣逹之權縣今日石大博來議車駕移蹕宣城來早復行但戚方人馬廹境失旌徳保甲之助殊覺費力累往起發事勢乃如此可笑也昨日御營司巳有勅榜使臣親往馬寨必不敢猖獗若能便喻頓首星夜發一半前來則不肖恩臨許久亦足以少償其心也但城中士卒雖寡人人用命氣亦粗勝更得二公部轄外應如解倒垂也早來道任行令面說其詳是時賊方叩城其勢可畏今日自早及暮數處攻城其實不過千四五百人餘皆婦人巾褁持鎗仗技止此耳賊勢累挫射死中砲不及以門扇棺木來攻城皆用大磢一放輙殺數人此乃天神所佑早便燒斷橋并木塔等處夜來城外一火而盡今日更燒天寜此賊無糧并人衆無著身處此時若得公糾率精勇三四千人晝夜掩至彼必謂從天而下况大駕欲移蹕得全一城其功甚大此非不肖虛語也馬吉已受君命書來甚順同此封呈切切勿疑亦欲作咨目干馬來援正恐與鮑相妨千萬以君父為念州府為䘏速與同來真觧倒垂也逹之意不殊此今日道任自行在來議移蹕事旦夕必有大兵來可喜可喜馬賊亦不侵犯公能星夜前來應目下倒垂之急如何如何與程伯㝢書某疎賤偶當郡寄適四郊多壘之時流亡嘯聚無處無之到任即值防秋修城壁治軍旅皆非平時所學者然今已兩時粗有次序若内地少冦可保無虞所患者敵人耳今大駕遷幸平江村公擁兵駐建業此固未為甚失但未聞諸公經營兩淮防遏大敵山郡雖有區區入衛之意莫有繼者此間料揀保甲得精勇堪披帯可及萬人吕公祖相應副得空名三十道且盡智竭力保䕶之中春乃力求去依舊宫祠徜徉山水豈非素志耶未由一見握手道舊臨紙慨然餘冀自愛不宣又某頓首伯㝢司業賢友某再啓中春丐閒凡八月中秋䝉恩出守方幸承際即日就道庶幾一見故人銜觴道舊夫何旬時既改東陽旋有六官之除凡兩月間奔走千里十月盡方抵行在擾擾不可言旦夕復移蹕臨安孤拙無補深愧游舊何以教之近下詔求賢羣公交薦長者想不能久外臺也更望為蒼生一起幸甚子駿子賤時時相從促膝把盞未嘗不奉思也公他時不免一來種種望見諭若來武林則不肖亦单騎可同寓也樓仲暉近亦至但日來傳冦頗熾恐不多上游依大駕為少安也葉李二大帥物論恐不足信如何子駿獨留親覲不允其意似可見念非老友孰能賛一請乎伯紀亦常得書天下果無事使此英傑老死可也若聖主真欲經畧中原使海内有忌才蔽賢之嘆亦可惜子賤雖不逺一夏懶惰不通書旦夕遣人也又某二十一日得省劄不許再辭固難久稽朝命又廹於諸友鐫諭豈敢不行但職任終恐難勝然已分一死久矣本且单騎之官適此間又以徐文故連日不静至殺人於通衢雖是夤縁假託其實縁烏合之衆遂不可蹤跡韓世清㨂退者又盡帯行某巳决意與骨肉偕行建康事勢其大者不過兵與食耳若未到任便劄脚與朝廷理㑹錢糧則是建康又産一光世也以此且欲徑赴任先生禍福與一門同之小舟暫駐北關稅務前公能與子駿畧至相見庶幾展盡餘非紙墨可既又某行役已次於潛儒生以单身統衆日夕危恐得兵卒一路不擾流言不至朝廷幸已大矣前途未知能勝責任否乎胡正字傳示戒勅之語公之愛我厚矣此行亦無與晤語者胡亦止㽞於潜若帶行非獨累他亦累我也程致道遽出亦可怪言者似非宣諫文字因風望示諭制誥遂虛席可乎子賤必膺妙選仲暉必有成命須保䕶勿使小人䜛間其間某本二十八日行適麗人今早到連日又徐文軍變蓋世清兵欲殺文以叛幸而覺早遂擒五十餘人斬訖踰城𣪚走者數百輩蓋當時就糧之謀深可笑大藩積二三萬斛便恐陳腐何耶不肖定初二日行蓋老幼無託又人情恟恟若往建康便作過冬計不若便以自随耳吕公淮甸之行氣象方盛葢㳂江三帥保守家計渡淮入洛經營中原此両段商量庻㡬萬全若不守江専欲深入非萬全之計此不肖區區所見始終守此不可移奪也道任得先與指揮乃佳葢坐守差遣於進退非是爾如何又某連日以都督來一畨擾不可言趙不忙前鋒殘三縣僅得六十餘此數百人者皆入北投降夜來報崔增作前鋒先來建康矣吕公疾勢已少損但食飲久不進非老人所便此責任匪輕所將止萬人以巨師古為心腹虛聲既不足以威敵實備又無以禦冦傅子駿諸人書來悉有願削職投閒之語此間倚督府如泰山事乃可憂如此劉光世亦偃蹇恐自此益難駕御耳不肖在此備員實愧初心諸郡悉應辦吕相不暇兩漕司自到此並不見面今皆徑趨督府屯兵萬衆嗷嗷待哺誠無以為計旦夕亦哀祈於朝乞一閒慢處以自效耳淮西獨王􅎲角者往來亳壽間出沒作過乃葉少藴無事啓之其實不足畏吕相來必遣人擒捕所患今冬敵人来侵前日見朝廷紛紛謂劉豫嚴守備此何足道臨安連火此非小異星家謂熒惑今正在東南固為我宋之福言熒惑所在兵不能犯此兩干戈不入之證也然此宿性察朝廷少有過失必示災祥若縁此得人主恐懼修省退小人抑姦倖専意任用豪傑庶幾轉禍為福耳大駕久在呉㑹或謂衆賢皆南人無復經理之意但便家鄉耳建康形勢如此不早圖興復日復一日尚何待耶若大駕到此則淮南自然屯重兵敵境自然窮促豈當惜此三二十萬耶此豈前日崇飾臺榭之比耶公前所繳誠當亦各行其志使漢王長王漢中項氏豈遽亡耶望公更熟議之使大駕來不肖當過廬壽間耳潘子須以南榻處之庶幾無得而辭耳若泛召恐以親為解也江端友以所知累見丞相欲以為郎何遲遲耶近見乞出一章難進易退理所當然今日可憂之事不在敵國特在廟堂耳聞政局首及吏員及宦官皆有所裁抑此固在所先然外間所傳已鬨然至於堂吏及六部取㑹知幾之士必知正黨自此傾矣彼方呼吸羣㐫傍挾悍將雖不為清議所容至於宣滛兩路流播敵境有崇寜宣和所不欲為者葢韓姚諸妻皆聚於毘陵卒伍能竊笑之如此而使在廟堂總百寮何以示天下此修政所當議也公所排擊之人偃然坐政事堂棄老父而提挈少妾以出如此而欲望治不亦難乎仲暉未及奉書修政一事不可不加察天下大勢如此乃欲一一裁抑首及權倖天下清議孰曰不然亦當斟酌輕重先後之序量而後入毋使小人得以為資也吕丞相離行朝六十日一病不能到建康而返防秋如此非徒無益其為害甚大淮西晏然又合肥邑屋如故中原人心苦於金豫率斂其望接應甚於倒垂之求解近見吕丞相送到奏草乃止欲以千人屯壽春僅同兒戱中前葉少藴遣王冠幾二千巳上人宿州城内見之解體云我本欲歸據南兵寡弱如此定不足恃胡武囘文甚有理大略恐汝不能接應徒重罹殺戮耳今吕老欲以千人往不若不遣之愈不肖此論大不同今若又立異同則又取怒姑任之耳事勢有可為有可憂若不容我屬展力旦夕亦且病發狂􅏥朝廷不放歸田里則死耳終不能坐見困辱也車駕欲來又不預於淮西作屛翰如傅子駿欲往又不遣止以無糧為解不知賊兵過淮巳復脚忙手亂雖有錢糧将誰守乎淮西營田粗有倫理今年大稔若不遣人守宿亳間則是前日借貸種種皆委為盗資曽不若不經營之為愈也吕老本無定議又不肯用人之言止是我能我㑹誤朝廷者必此人不肖身號大帥今既有都督一事不可為漕臣直相慿陵如陳敏識輩吏文中一語稍廹便敢移文請問到任五十日方識其面甚至諸軍半月無糧而尋漕臣不見面不欲喋喋干朝廷者葢欲勉强了一職若盡以上聞是生一秦耳萬事不可盡言不肖亦欲且乞宫祠葢如前所陳實有不可為之勢也所喜獨樓子稍遷江子忽還爾潘真勇决葢近年學佛之功也久不通右相書因見為言曲折前者因二公書别紙諭今日事勢若大駕止在臨安終非有為之地得捐一二十萬稍葺行宫畧示經理之意兩淮生靈必漸復業所在小盗知畏戢耳不謂便作申聞行下若乗此機㑹得翠華順動豈非協中外之望非如前日營繕池臺崇飾苑囿為觀逰之美然吾友所見亦是一說豈為不美但慮未能明吾區區之心耳知已得外補既繳駁不行理自當出况今日事勢得脫身刀劒林中豈非全身之大耶但恨公前此相挽為建業之行今乃先我而去不無悵惘耳得子駿書亦憂深况吕老多病前日前鋒潰去今已擒獲臨安駐蹕氣象終不勝願公審思自古未有如此而可興王者漢髙祖豈肯長王漢中今中原謳吟思宋此今日機㑹不可失得一二十萬可以一毫不及民建康旦夕便可興復若公囘鄱陽自専人奉書兹不詳悉又某頓首伯㝢侍郎老友某師還巳次近境一行幾四千餘人所過雞犬不驚庶幾仰副九重保䕶生靈之意度初十日午間可抵城外单騎同親事官數人徑入直舍曲折併須面禀承諭具悉張令才士也但選人未用陞陟沈肇雖遲鈍而學問性質甚美雖處以館職或書局可也公何以知之頃不曾見之亦不通書江子我不肖薦之右相半年矣恐是左相疑其迂濶然此人實竒士但前詔使所放苗稅實過當葢嘗歴州縣又在朝日淺未能盡曉然亦安可以此遂棄之也兹見除一紙郎官乃不見姓名使人悵然也潘子賤出守桐江奉親之計於潘得之矣然惜此人物使朝廷不知今朋友間屈指可數如潘者幾人不肖輩正可奔走州縣一二勝友異時逺出闕庭謗書滿篋孰與辨明乎此乃區區私情至於拾遺補過見事風生今朝路豈復有此人乎可歎可歎知公累有繳駁流俗尚同久矣孤立一意惟公一人耳進退去就之間想巳素定但正士稍去非朝廷之福耳某孤跡前已决意丏閒幸得之獨䝉開諭鐫戒至五六而不止遂無可脫去計矣與老少日夕在顛危中但業已至此譬如乗舟遇風已到大洋姑任其所至耳潘子亦求去甚力親老不為無詞末由欵見臨風悵然塵外佳章殊為竒特陋室增輝矣承示壽星賛藹然祥慈孝友之風三復嘆仰又䝉見索鄙句豈敢續貂輙不揆作數語資一笑耳近詩不暇盡録輙令小兒冩呈此非老友不敢出也某去夏兩被召命繼還舊物方具辭免間俄有與郡指揮方江左紛擾時假守宣城知不免矣車駕益東金人入境進既無生退亦必死遂與血屬同守孤壘偶幸獲全朝廷不察又付以大邦此乃長老喋鱉之義然君命嚴峻莫得而辭但職名非敢當耳武林被害甚酷金人退脚踰半年為政者専為退遁之謀城池荒蕪市井蕭然葢瓦礫場中欲建立官府又劉開府為大使曽紆為漕臣欲以空拳加之掣肘蹈禍必矣相望千里何時握手道舊區區所藴非此能悉又日来時時得浙西諸友書諸友極有意向進若乘此時移蹕建鄴亦是機㑹近見詔書乃用孟庾申請囘臨安此恐小人探伺而為之也廬與江陽桂廣皆已除帥但惜似矩逺去耳魏矼馬承家皆以章罷必知之張柔直林少伊皆引赦叙此似封雍齒顧如老友負天下公望能乆閒耶傳潘書問往来不絶江元夀已除司農廖用中正赴行在今日為腹心之患者獨一王居正葢起初受知於宗尹宗尹黨稍稍在當路耳右揆經理疆埸事往来淮浙四大將並在鎮江岳侯来日至矣李伯紀請入覲已允旦夕亦至此公進退前無古人然其區區為國之心則可恕矣江西湖南大饑朝廷餽餉且不繼何能賑給窮乏事事可憂雖促膝握手未易言之子賤已丁憂然上極喜其為人以告就賜且賻以五百緡宜何以報之仲暉率一二日相見故人可以語心者惟此郎爾民俗有大利病願時以見告崔發見尋窠闕子駿數言之上意未解今子駿去僕獨任其責昨日又言之左相矣某承乏又已七八月衰頽倦遊非復往日思自放於田里如痿人之不忘起也但國勢方艱時事如許未忍求去然行藏出處大節所系月末且申前請或幸全璧而歸庶保晚節耳與時宰書某再覆敵某久在兵間其謀精宻必出萬全去冬全璧而歸我師暴露國用匱竭坊場秋租盡行預借技盡於此民力已疲今冬金若再入其勢必張所謂萬全之䇿莫如儲蓄財用廣募將兵守兩淮之衝據長江之險今已是春季俛仰之間便廹防秋安得不汲汲冒凟威嚴不勝皇恐某再覆與張徳逺書某再拜上覆某不能多作楷字前幅輙令兒子代書不勝皇恐某孤踪歴落可笑想曲折不俟繁言自夏初即丐去以得鈞諭五月當暫還因遷延以俟一見既未可期而某日有職守懐不能巳時時妄言投隙抵巇者因肆無根雖一時宴譚嬉笑之語無不聞者自度禍至無日矣因遂决去就不復計較利害不知相公能察其區區否乎恭惟相公慷慨大節勤勞王家恢復之志有古名臣之風孔明周魯輩不足道也某陛辭之日自謂逺闕庭卒未有見上之期因復論說今日大臣可屬任大事者無踰相公上亦宣諭天生此人為朕中興輔佐之語公為上所倚重如此欲禦外患而掃兵氛必先撡大公至正之道上合天心下協人望然後謀無不成事無不就萬一胸中尚容一毫之私引用親黨布之要路隂為不㧞之計任用朋邪倚為腹心之助自古及今亦鮮有不顛覆者某自還朝既荷諸公収召本意深欲以公心直道賛助一二每因進見有聞必言有言必盡而或者反用小人之說妄意測量至疑為躁言指為立異是豈真知某心哉伏自相公還朝海内歡慶日來過當事平時指為行府今多寛除百姓知休息有期矣江浙今嵗大稔國事濟矣豈非和氣感召天意昭格乎大駕進發定何時兹事體大尤宜謹重伏計廟謨巳定非外間所得盡聞也與沈元用書子韶書已領近附家問去矣别紙所喻尤荷軫念有骨月之情衘荷何言柳州纔一通書然亦何足與深言近郡探劄敵使兩畨踵至已關報姓名似非妄傳某到此已七八月間與兒子粗安家在萬里雖鐵人石心豈能忘懐自収三月一日書至今未得音問北望心折也平生鑚故紙不透習氣難忘姑以此度日若能宴坐超然何以加之今夏江漲平地五六丈跧伏小舟七月一日復還故廬頹垣壊壁幾無人理今亦少安矣偶得建茗數器見絶勝念蠻鄉無與享此輙以奉寄治下多名賢巨公燕譚之餘可資清啜勿以塵瀆為罪幸甚張丞相寓治下度公必能極意周旋之某以竄伏遐徼名在丹書不欲以書問累之公因相見煩致謝悃與張徳逺書某自庚申在㑹稽通問記室南遷以來動静累人與一世人俱相忘矣然於門下未嘗一日忘也連於二廣為最善地氣候與湖南北不殊想侍奉國太君知甚適國太平生學道巳悟大乗則與世間種種夢幻皆遊戱事耳况又令兄致逺徽猷左右親側骨肉團圞海内重望惟公一人願益加保䕶終見天日某老矣自度不復見公矣偶陳令歸臨賀云因事到連州此人真實决不至失墜因託致此幅紙與趙元鎮書頓首再拜上覆専使伏領誨翰備詳曲折欣承即日鈞候動止萬福某郊居一向癡頑度日瓊士間有可語者叩門即與終日但不可使念起耳釋氏謂念起即覺乃知諸佛亦不能忘念也聞自重陽後開葷甚善以血肉補血肉與金石之功懸絶導引吐納量力為之勿使至倦此閒静中工夫大勝與俗子往來前此風雨凄冷兩日又煩熱可袗絺綌惟祝以道消息佇俟旋復之命不宣又某再覆烏葯適有天台附來者輙納數兩又容南烏葯本草以為最勝但色㣲赤而磨之香味殊佳併納少許可擇用之然醫家欲如猫矢者為上亦在八陳之數久留無害也近日郡中就桂府置到生葯名色亦多公要用切須盡批數字來闕者亦可府中買也章某入獄二十許日遂卒葢不堪其入也乃趙漕案發得藤人書謹繕呈可知其詳也瓊守康寕未聞起發度冬至後可至謫居與州郡了不相干沒興中何所不有徐自然念道已是可人豈有强狠暴戾過此者乎皇恐頓首上覆又近因吉陽兵還上狀必以呈逹自至節前到今凡拜六書并附生葯皆未知浮沉相去若不甚逺但再隔重溟音問便艱阻如此况去鄉萬里乎良自憫嘆春暮炎酷如三伏惟頥神養性康濟有道即日鈞候動止萬福某屏處郊坰與兒子茍活朝夕海外雖苦炎熱既無關山之限風氣曠蕩却免瘴烟若能放懐憂患之外不起歸歟之心庶可度日但此心未能頓忘耳竊聞鈞體自去冬以來小有不快今喜勿葯良用欣抃憂患中惟此心清涼可以敵彼熱惱諸人並未聞有檢舉者要自有時節惟天道好還踈而不失但乞寛免即膺新渥不宣又要生葯可託朱令専人來此買雷州轉海無期若自萬安陸行却有定程累月不得北耗静江書問亦久不通十二月十三日見一兵過去從福唐來附宅上信物客人所販物郡中一切放免今得公二月十九日書猶未到何邪恐海上亦有假託者不可不察也又皇恐頓首上覆春後數拜狀近復托吉陽専人度無不逹但去冬數書附生葯者竟不知浮沉即日大暑伏惟燕坐清虛衛生有道鈞候動止萬福某與孟博寓此茍度朝夕萬事皆非偶然死生禍福固巳前定一切任之孔子所謂素富貴行乎富貴素患難行乎患難素蠻貊行乎蠻貊觀此數語雖釋氏千經萬論豈能越此亦願相公常作此觀勿起一念異時方知得力耳閒居欲致一物不可得今年荔子雖盛而郡中収買烏衣家至自五月半後已不可得前此相知所餽皆佳者偶得此烈日㬠得千顆輙以奉寄已七八分既香味不甚减更令見日色或剥肉雜以乾糖罐盛之可少留也真千里鵞毛恃眷愛敢此率爾李軍判忽告行作此紙未能盡曲折幸望深察不宣又頓首上啓近領重午所恵真翰知前書皆逹矣不勝欣浣李軍判行奉状度巳呈視覽日來連得雨少觧煩藴伏惟燕處超然神明所相鈞候動止萬福某年來衰頽今嵗經此大暑殊覺疲苶蠻鄉無與晤語但時䝉恵好音慰孤寂耳何李二子竟逐矣一紙輙凂呈可見大畧惟冀若時珍重不宣又某再覆今嵗暑氣異甚自入六月時得急雨清風夜輙颯然有秋意想鈞體自此一成輕快有病固當攻以葯石然不若調飲食使日中二餐如意乃康濟上䇿也白樂天所謂食後一杯茶茶罷一覺睡此是要法日長無事未能如方外逹生之士宴坐納息若於一經一史隨力探閱亦是消磨日月之術比之聲色不有間乎張全真輩晚年皆玩意聲色六七年間死者繼踵不下十餘况紛紛之徒如半刺君又不足掛齒牙也静觀衆愚如蛾赴火良可哀憫未易具言吾徒當直忍耐如丹田灼艾過後亦得力耳䝉别紙垂諭解易不勝皇恐僕平生不以文字取知於人雖公久在相府未嘗致片言求知左右况三畫之妙前有胡程諸大儒解釋一掃漢魏以來諸儒拘礙象數之學能通此者巳是佳士况敢落筆著書取笑天下乎自度嶺海無所用心實嘗留意於此晝度夜思時有所見到瓊偶巳終篇正以無朋友琢磨之益未嘗敢以示人乾坤二卦易之領袖嘗見前人解釋不以類求多斷章取義如小象文言所釋不附之爻則一篇之義都不貫穿既稍出巳見未敢輕出須俟異日面呈以求筆削餘卦恐有補於今日處患難之道如困蹇等當俟後便冩呈連州不相聞久矣渠以母老畏禍甚不欲累之不若相忘之愈也何鑄計議不知何事去日行至今未囘并乞知察
