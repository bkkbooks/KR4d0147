body:
  text: 莊簡集卷十八宋李光撰祭文祭江郎中子我文士有隱居求志而志不獲就行義達道而道卒不伸嗟嗟子我實惟其人文章氣節邁往絶倫傲睨公侯心慕隱淪跌宕文史若將終身我初識公嚴瀨之濱白鬢紅頰藜杖幅巾抵掌笑談豪氣如雲憤世嫉邪羣囂狺狺立言雖多意終在民嗚呼哀哉公之志操凛不可奪救護衆生甚於飢渴不知公者見謂強聒數對便朝詞直意豁人謂才迹公豈迂闊嗚呼哀哉公在奉祠我處田里詩文往來曽不我鄙期公對牀放浪山水豈謂奄忽賫志永已嗚呼哀哉人之處世不過百年生死輪回情感愛纒孰如子我去住蕭然神遊八極心遍大千嗚呼哀哉我守永嘉攜孥南奔道過鴈山巋然孤墳懷想清標精爽如存我欲有言呌號莫聞􅞕恍徘徊寓哀一尊嗚呼哀哉四海之內孰非弟昆過者必酹奚必子孫嗚呼哀哉尚饗祭張龍圖柔直文維紹興八年戊午四月丁已朔二十七日癸未具位李某謹以清酌庶羞之奠昭告于亡友虔州府君龍圖張公柔直之靈嗚呼哀哉天之生材夫豈偶然或負其器業可為世用而卒于不試或已試不盡而中道夭閼者古人皆歸之天嗟嗟柔直忠信孝友雖武夫悍卒皆知其賢曷豐其德而嗇以年嗚呼哀哉我初識子傾蓋握手惟其純誠持以悠久故雖蠻貊可行虎豹可馴麋鹿可友其臨民馭衆雖教條不設而民之愛之如父如母嗟嗟世人厭常好竒任數設詐謂人莫知謂民可罔謂君可欺孰如柔直胸懷坦夷貌如其心燥濕莫移嗚呼柔直早厠英躔中遭放逐既跌復振晚剖符竹藹時休聲如漢龔遂化被獷俗弄兵潢池賣刀買犢子之云亡邦失良牧如晉羊祜郡民巷哭行者望碑墮淚濡目嗚呼哀哉我來江西實總甲兵入境之初書來歡迎孰謂奄忽遂隔幽明雙親在堂二孤惸惸我亦老矣朋舊凋零寓詞千里有淚如傾嗚呼哀哉尚饗祭胡公文維紹興八年歲次戊午七月庚申朔二十六日乙酉具位李某謹以清酌庶羞之奠敢昭告于故徽猷閣直學士給事胡公之靈惟昔仲尼生于衰周志不得伸褒善貶惡困于獲麟中遭禁錮微詞久堙晚學末師莫覩其真天生碩儒邁往絶倫強壯潛心白首知津發明綱領芟夷荆榛我為諸生識公成均道與世違衆説日新衡山之陽寂寞之濱鼓吹六籍若將終身晚遇聖主堯舜是陳入侍經筵獻替咨詢排斥異端誅擊亂臣據經守正羣囂狺狺一斤不復竟至沈淪泰山其頽無復斯人嗚呼哀哉嗟我與公迹踈心親我出公入有如參辰琅然書詞誨言諄諄公既有子付以斯文死生旦暮曽何足云緘詞千里寓哀一尊嗚呼哀哉尚饗祭孫昌文維紹興十六年歲次丙寅九月戊辰朔初八日乙亥具位李某今遣虞候陳武以酒食之奠致祭於故吏進義尉副孫昌之靈惟丁未之初汝方事豫實二十年武林之變犬狼豺虎戈矛滿前奔逃竄伏晝夜擁護脫豫饞涎豫之得罪臺輿皂𨽻散如雲煙汝獨萬里梯山航海從豫南遷嗚呼哀哉豈謂汝之一病藥石非效竟至沉綿汝之生也能自刻勵抄經坐禪今其死也必不泯默淪墮九泉死生出沒敗壞相續理之常然豫所恨者日冀勿藥從豫北遄今其永訣不可奈何必歸之天嗚呼哀哉荼毗歸骨豫敢忘汝屬纊之言聊致薄奠魂其有知享吾意焉墓記莫叔達墓記建中靖國元年辛已豫妹適餘姚莫叔達越崇寧三年甲申十月二十二日以疾卒即其年十二月二十一日葬于縣之雙雁鄉乾溪之原是時豫在國學每以不及見為終身恨大觀四年庚寅遽聞叔達以六月二十八日卒豫又竊祿河東自甲申距今七年而君夫婦相繼不幸吁可傷哉况豫與君為姻契蓋有不可解于心者其生也既不得數與君逰其死也又不得臨尸而一祭此重為可傷也叔達家世儒者少孤而立天性和易居家遇人與待交逰初終一心不為迹昵厚薄故其死也親故無有怨議既無愧于生死矣方吾妹之凶君始過冠遂無復有繼室意平居藴藉有蕭灑出塵之趣故其死也脫然如有所之復何愧于夭夀邪享年二十八諱彥逵叔達其字也曾祖政祖偕父易皆隱德弗耀以明年政和改元三月三十日合葬于吾妹之域從先卜也生一子歲周而殤先瘞其母之側豫聞君訃得其死之詳故其葬也述此以見其傷君之情且以紀其歲月云將仕郎晉州嶽陽縣尉兼主簿專切教閲保甲管勾學士李某書杜府君墓志銘杜氏故京兆人五世祖輦唐末習開元禮以本科出身仕至太子少保贈太師五季之亂南渡至會稽樂其風土因居焉正獻祁國公以直道相昭陵清節照映一世於君為伯祖曽大父薳不仕祖父式右朝議大夫父調宣德郎娶莫氏遂為餘姚人生七男子悉使從師友皆嶄然有立君即第五子諱縝字伯玉宣德君既捐館舍生理益落君方少年能自刻厲讀書晝夜不息應鄉舉又試於開封崇寧中朝廷以舍選取士君亦入鄉校雖纍占優等卒皆不售及既有子則慨然曰吾平生苦志而不偶者命也則盡以其所學授其子師旦師旦又能克成其志力學有聞負笈逰上庠一時名士多館致之遂中紹興二年進士第蓋將大君之門使君姓名益顯雖師旦之賢亦君善教之功也結廬近郊得江山之勝浮沉閭井間有以自娛客至未嘗不飲一枰之上不知日之既夕也鄉鄰有緩急叩能隨力賑貸師旦榮歸君喜甚為文戒之略皆忠信孝友立身行已之大節當以祁公為法可謂知所訓矣紹興七年四月二十三日卒於家享年五十有九以其年十一月甲辰葬于山隂縣迎恩鄉苦竹小塢之原從先塋娶莫氏生三子長即師旦今為從政郎新授饒之餘干令次師望舉進士次師奭早卒女二人長適韓師堯次適鄉貢進士顧大陸翰林學士臨之孫氣節學問凛然有祖風君之將葬師旦從豫求銘數矣然不止益勤義不可辭於是敘次其平生而系之以銘銘曰杜自祁公正直匪躬其源既深其流則豐君生孔艱稽古不逢教子雪恥將大厥宗小塢之原水逺山崇從先人居永閟幽宫左承議郎吳君墓志銘君姓吳氏諱升字潛道明之鄞人曽祖德祖澤皆隱德不耀父渭以君登朝纍贈宣教郎君九歲而孤母守志鞠養稍長告以汝父長者嘗拊汝當為儒君因發憤讀書畫夜不息遂博通經史下筆為文簡而有法元豐間朝廷以經術取士君兩預鄉薦大觀已丑遂中進士第釋褐授迪功郎主宣之涇縣簿攝水陽鎮郡太守纍稱其賢而未薦也或曰盍求之君曰彼知我而不能薦我為下寮不求為可知二者胥失也考滿丞溫之樂清禆贊縣政而彌縫其失政有大不便者君力爭不能得則歎曰豫不負丞令長其可負百姓乎水陽瀕大江素有水患君去才旬日水輒大至去樂清未幾巨盜竊發焚掠殆盡官吏多遇害君慨然顧謂妻子曰造物于我厚矣始吾讀書姑成先志爾今年踰六十二子相繼登科吾尚何求哉因挂其冠得左宣教郎致仕以歸遇淵聖皇帝及今天子登寶位轉左承議郎賜五品服敘封妻史氏為孺人孺人有淑德孝順勤儉能以禮法自持夫婦白首相待如賓子孫侍側雍雍如也人皆榮之先君十年卒諸子卜明年庚申正月丁酉奉君之柩合葬於四明之梅嶴從治命也君任真自得遇人無貴賤貧富一以誠當官任職未嘗擇所向蓋無入而不自得也豫與秉彛實太學同舍生嘗至其家見君頎然而長髮鬢垂白貌溫而氣清方精力強壯內懷止足之計不待及期而浩浩然勇退雖古高人勝事何以加之所居環堵竹樹蕭然家事有無一不以介意晚益蕭散諸子卜居擇勝得小溪之芝山君欣然從之浮沈里巷間芒鞋野服間從方外之士遇興輒往一枰之上忘懷得失不知歲月之老也喜怒哀樂禍福利害之端了無足以動其心者享年八十有五未嘗有疾一夕奄然而逝莊周所謂不刻意而高不導引而夀者君幾是歟生五男長曰秉仁四上禮部次秉彛左迪功郎樞密院計議官次秉禮先君卒次秉智舉進士未第次秉信左宣教郎諸王宫大小教授二女皆嫁為士人妻始君少時方力學有道士叩門自言齋醮之夕奏章帝所見金字榜曰龜齡顯裕天錫吳升其説雖幻怪不經然退考君平生簡易真率而得數之多子孫之盛若非偶然者秉彛一日與其弟秉信纍然衰絰踵門泣而言曰先君潛德退節仕不究其祿舉世無知者且持左奉議郎主管台州崇道觀高所為行狀請銘於豫因附以所聞而為銘曰芝山峩峩水泠泠中有隱者逃其名少時力學通羣經老不釋卷博且精平生所修胸中誠持身接物心和平忘懷得失寄一枰遺棄軒冕浮雲輕自然夀考身康寧何必辛苦棲巖扄叩門道士心通靈飛神杳眇遊青冥羽衣翩仙朝帝庭琅函金字標龜齡臨行一念超凡情脫然視身如郵亭子孫蕃衍天可憑積善衮衮生公卿刻詩同藏播芳馨深固蔥鬱真佳城胡府君墓志銘吾友胡浚明諱宗汲世為越之餘姚人自其叔祖父穆始以進士起家仕至屯田員外郎子孫遂以儒為業曽祖諒贈大理寺丞祖儼父尚能皆隱居不仕君自為兒時有成人之撡其父目為老子比長刻意問學手未嘗釋卷夜引睡則以首叩柱其自強如是為文清古不蹈襲前人一語少年預鄉薦益自信不疑翺翔兩學幾十年會朝廷以舍選取士移其籍以歸久之復不利即所居築室買書以教子聚宗族鄉黨子弟不問踈昵講説經史責課程皆聳然知化君性至孝雖飲食起居未嘗忘親治居第首嚴祖廟不以便燕私之適堂室奧址規模與世俗異登其門者皆恍然自失奉養至儉薄田廬所入僅足糊口而遇人急難極力拯救雖焦首濡足不悔也鄉鄰仰以喪葬婚嫁與病而醫藥者甚衆以是生理益落君為之不少變蓋急義樂施出于天資或以為過君行之愈力嘗曰吾損已以益人雖過于義庸何傷已酉冬敵犯明越惡少相煽而起幾遍山谷君挺身諭止之士族避地竄逃顛沛君與之周旋調護恩若骨肉真可以託死生者鄉人爭訟多就評曲直君每折以理法皆灑然而返不以干有司聞人一善若已有之或少有過差必正色詰誚雖其尊屬憚若嚴父師惟恐君之聞也方士有以竒藥爊黃金術授君忽夢若有告者曰君欲為盜乎既寤亟取焚之每小疾必夢僧伽處方服之輒愈所居湖山並海百井皆鹽夢人指其處鑿之得甘泉皆君誠意所格也建炎改元今上皇帝登寶位凡五上禮部例皆推恩宗人強起之授房州文學調潭州瀏陽縣丞改迪功郎有知君者薦諸朝監嚴州比較務譏察出入吏不能欺郡遣官季點君輒囚服待罪衆亦察其亷介不復問務既清整課亦增羡尋轉右修職郎監潭州南嶽廟考滿轉右從政郎既而授饒之德興丞其在嚴也郡將尢加禮嘗啖以厚利君曰此非所當得拒不受未幾為郡者以賄聞至下詔獄坐貶獨君無一毫之汙衆皆歎服某與君雖同里閈崇寧初始識君京師一見氣合其後契濶離合不常每見必歡然道故噫君雖窮老而浩然之氣不少衰議論益剛決謂富貴功名可以立致不在吾身則在子孫日夜勵其子為學而沂復嶷然有立能成君之志魁多士取甲科聲名籍甚君喜曰是必大吾門吾志得矣因復丐嶽祠從其子宦逰奉養甚適往來江湖間幅巾蕭散怡然自得享年七十以紹興十年八月癸未卒於其子秀州軍事判官沂之舍即日護其柩以歸士友皆為流涕明年十二月壬申葬本邑翁家湖之原從新卜也君平生未嘗閲佛書死之日沐浴盥櫛神識不亂娶莫氏有賢行能通書史凡君所為固有不近人情者夫人能順適之人尤以為難子男二人長即沂次汾舉進士亦有志操葬有期沂衰絰踵門出其友左迪功郎溫州州學教授虞仲琳之狀求銘于某某知君能詳追惟雅好不敢以鄙拙為解因掇拾其大略如是銘曰凛志節以希古之人兮既鋭而堅謂功名可立致兮恥沒世而無傳強學疾驅兮人十已千見義必為兮人後已先心亨志遂兮樂只丘園雖屈于一時兮白首迍邅其存而不朽兮嗣子之賢蓋造物者不報其人而報其人之天翁湖之濱卜此新阡餘慶流芳子孫綿綿靖州通判胡公墓志銘豫自藤再遷瓊瓊守張公仲奭嘗為豫言通守靖州胡公有交遊之雅可人也豫恨不識其人無幾何廬陵胡邦衡自廣東遷珠崖道瓊山見豫於雙泉則其季也會張公亦來二人合談靖州之美不容口豫益以未獲見為歉後豫再遷儋耳距邦衡不數舍一日邦衡忽書來告靖州兄篤行文雅君子也今不幸即世世之知者蓋鮮非公直書恐遂湮沒不傳敢以銘請豫出涕曰哲人云亡尚忍言也耶邦衡請不懈益虔遂刪取其狀敘而銘之公諱份字兼美姓胡氏其先自建康家廬陵曽祖不仕祖諒將仕郎考登臣贈右宣教即妣歐陽文忠公族朝散郎粲之女公三歲失母字於李氏姑九歲而宣教郎繼室前太夫人之妹儒林郎延夀之女劉丞相沆之外孫公事後母已以孝聞早就外傅能肄宵雅之三長學章句司業李公朴時蒞講席門甚高獨與其進藝屢占髙等不喜時文文一出已無剽竊每郡試輒伏場屋標望籍舍法行貢璧水繼入上庠閲一星學益進年三十八釋褐授臨江軍刑曹明習三尺法多所平反吏不得舞筆時有以深文賊不辜者鉤得其情刑不濫及吏深刻者折其尾毒力職常最其列以妣憂去官服闋遷掾袁州兵曹建炎初官制行改司法繼改辭曹攝郡幕得憲臺移文取讀之則宜春縣斷牛訟未直也索案一見知其寃蓋冨人與貧人子居相直冨人久欲其居不與也其牛偶蹊冨人之門而攘之牛人無敢言久復放之野牛歸貧人家冨人反訟之縣坐以盜貧人訴於州罪之如縣公語吏是不可不直遂歸牛貧人一郡稱快時給事中李公大有之子同幕以白其父李抵公書不意老年見古循吏方用兵兼機幕郡政一出公畫會盜起郡乘城官分隅以守而隅長不時給米士有飢色公怒欲斬以聞其人叩頭祈哀得免兼倉民與其僚賦粟卒數十恚言粟紅腐手刃譟呼稍稍引避公獨開以禍福卒舍兵拜是日微公幾殆叛將趙萬訌江西地既散老弱係路命左右廪凡無告者訪所親歸之人多其義同僚有去官遭掠者亦賙護其行衆以為難上即位覃恩晉從政郎罷歸久之除衡州教授而宣教公捐館免喪且數年無仕進意或謂恩未暨親乃詣闕除教授澧州始至生員才十數既四方來學者輻湊學宫大張一歲諸司章交改左宣教郎郡以訓導有方上聞得終成資賜象服左魚尋除通守靖州轉奉議郎初州郡率開邊釁公至務在撫摩九溪按堵酋獻琛于朝乞為管伴公不可郡犬牙蠻獠儲粟寡一被圍則乏軍興公經營增其廪入無倉卒憂歲旱盜且萌蘖與郡將齋禱飛山之神雨隨車至鄙以不聳渠陽士亡幾公招攜以禮酋爭遣子入學士科對者以內郡禮祖行溪猺嚮化翕然守條死要不相魚劫以公善綏撫乞留郡以聞公曰吾忍左墳墓久於此乎轉左承議郎代還送者卧轍百餘里弗忍去還鄉轉左朝奉郎請老童顔秀眉偶感疾而終實辛未正月辛丑也享年七十娶彭氏前十六年亡媲德於公人無退言男四人昌朝昌時苦學早夭昌時嘗舉進士試禮部昌言昌明能緝父志克肖其為昌言今為右迪功郎澧州石門縣主簿一女適右文林郎新授辰州録事參軍張瓘前卒孫男四人曅昂皓昱皆志學昂後公二月而死孫女九人長適進士易如璋次適楊忠襄公幼子蔚文次適進士張璆易張兩孫女亦繼卒餘在室公為文長於持論在郡庠太學時屢中第一士爭膾炙工為詩得風雅體有書解三十卷文集五十卷藏于家紹興二十二年十二月癸酉葬于吉水縣之中鵠鄉山塘之原公性寬易躬自厚而責人薄善如自口出於惡焉隱操履純正雖暗室不欺務以中道訓人故號所居堂曰中庸謁入無親迹倒履以迎雖少必肅談辨終日無一言忤物愠怒不見辭氣或夷俟則曰我必無禮呼以緩急無在亡辭儉以幅已祭祀潔豐若節春秋必身先之事親盡道閨門睦如親疾藥不嘗不進在視寒暖帶雖夜不解居喪柴毁過禮加等既葬朔望必哭墓雖疾風迅雷大雨雪不避也妣忌日則設外祖妣享之族有不克祀者春秋享焉從叔父子死養叔母終其身連舉三喪費不資不靳從弟貧不給周之及卒無子為立嗣喪葬計三十萬鈔於我乎出鄉黨或誤絓憲網冒寒暑求救不得請食不下咽蘇枯弱強有害善稚者必痛抑雖要人居間不聽也處庠序朋友疾夙夜藥石弗懈同舍有取已器物者衆詰責請庚之謝無所失取者慙公蒞政通敏為大吏所知有闕員至兼數職簿領山委日披決至夜分為常大吏或摘語對無一謬持官將身亷清所行無顧忌不妄干進當路多平昔同舍生一不凂汲援至困躓二十餘年淡如也廨舍敝葺之則止有請為遊觀地曰勞人費財以役耳目豈吾志耶嘗言不願宰邑拙於催科毋以賊賞改官懼有寃抑卒不愆于素又嘗語猶子公武仕宦惟亷勤和三者闕一不可吾行之二十年未嘗有失其大概如此豫聞廬陵胡氏世業儒無顯者公始起家里人豔其榮進進於學而兄敡字歸美者繼取賢科自是弟銓鎬連中第而子姓貢禮部相躡皆公發之惜乎公卒老于州縣而不大顯于時蓋有待云銘曰襮順裏方氣剛以閎蓋德之光爬癢櫛垢弱強植稚吏帖民良父父子子家巷術理刑于鄉邦穀我後嗣玄石昭美千稔之藏塔銘律師通公塔銘豫出仕逾三十年百謫之餘頗欲歸依佛乘究生死之説紹興壬子自建康得罪還里而依止通公律師適退居薑山相望不十里有湖山之勝間放纍年惟師方便自在遂為蓮社之交或命籃輿或掉扁舟不知日月之老也師諱惠通字可久姓王氏會稽新昌人處母胎十有二月而生自幼性識明悟志樂空寂父母不能奪禮福聖寺俱實為師年二十二誦經得度即慨然有出世之想由是刻勵修行究觀祕義以為由定發慧必用毗尼為壇宇遂執業禹迹寺元簡律師其後聞錢塘擇其律師即會正記主之門人深得南山四出求異之意因杖錫從之服膺纍載卒究其業一時學者皆敬畏之有虎子之稱其公謝講乃以所援鐡手爐并會正記以付之又有用暉妙生二師者嘗往返叩請暉公嘗曰汝于吾宗必大作佛事矣生公曰汝已成之器尚俯求于我邪自是卷械還鄉謝絶世故人罕知者如是十年而道益進名益顯知之者益衆道俗延住真如靜凝明教三道場靜凝在餘姚上虞兩邑之間雖氣象雄勝而久茀不理破屋數間僧徒不過三五人師至晨夕講論如處廣厦如臨大衆檀施聞名爭為築室廬具像設金碧煥然學徒雲集率不下千指鐘梵之聲洋洋如也或利其成辦倚權貴人易置它所師不為動卒亦莫能奪太守徐敷言命師為臨壇宗主前後若干會翟公汝文治越復欲以僧職處之師力辭不就大駕駐蹕會稽城內名藍悉屯兵衛師因謝病歸老薑山講解之暇澆花蒔竹翛然有物外之趣師雖主戒律而曠達無礙宗説俱通嘗云戒律即心也戒生定定生慧欲最上乘而不始於戒律可乎南山有言江南江北求菩提菩提共行不相識若推原佛心從粗入細特頓漸之異耳師于四大部及楞嚴楞伽法華等經無不該綜以至起信唯識諸論傳燈宗鏡祖原諸録並綿絡旨統窮其義趣刋正戒業兩疏章記尤為精詳平生無長物衣鉢所餘惟賑窮乏療疾病全活者甚衆所蓄惟鐡磬得之耕夫每以自隨召衆講習則一鳴之自號鐡磬老人亦以名其堂豫觀世之律師能以禍福語恐動聾俗或創立新竒改更宗旨變其音聲易其服制流俗翕然和之惟師能守其舊説勤苦堅忍無一毫作相睦寇竊發師時在靜凝領衆如故嘗題于梵夾有講鐘賊鼓咫尺安危之語其後敵犯浙東十餘里間皆敵營也師處之晏然且夢神人告以賊退之期不失晷刻紹興乙卯秋七月大旱師率衆祈禱因感微疾即以書告嘗所往來者且謂大衆曰吾將歸山以是月五日隱几而逝春秋六十八僧臘四十六師于薑山若有緣契一日與長老繼椿經行澗谷得院南平地數畝羣山環繞前直峨眉一峰因列植松柏將自為窣堵波豫為名其堂曰寂照以是年十二月二十二日門人即因之以葬從遺令也豫頃守吳門其徒仲珣俾法嗣狀師行業求文以識諸塔豫與師逰久知師為詳乃為銘曰我聞如來惟説一乘戒為慧本慧以定興曰優波離以持律稱九代末師互相詆辱各資已見正法顛覆爰及南山絶而復續偉哉通公身律心禪護持禁戒久而彌堅慈受忍攝隨分化緣衆方紛紜本拔源塞登壇誓衆會正復出中興毗尼垂範作則薑池之南牟湖之濱石塔巍巍松柏鱗鱗我作銘詩以詒後人
