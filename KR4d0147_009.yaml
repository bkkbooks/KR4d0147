body:
  text: 莊簡集卷九宋李光撰奏議論蔡攸欲潜入都城劄子臣伏見蔡京父子當國日久竊㺯威柄敗壞紀綱使朝廷失信于四方至上皇負謗于天下軍民怨憤士論沸騰前後臣寮論列非一其它元惡巨姦悉已竄逐獨京父子尚遲回近甸未正典刑訪聞攸不自引避欲以扈衛行宫為名僥幸入都竊聽民言深可憂慮若攸果入都城則百姓必致生變萬一驚犯上皇屬車之塵則臣坐不預言之罪伏望陛下特降睿㫖早賜黜責施行議太上皇后還宫之儀狀臣近覩禮部關報太上皇后先次還宫陛下屢降德音戒敕有司繕治擷景園易名寧德宫務極閎麗以稱崇奉之意使命往來不絶于道陛下每於艱危擾攘之時延見羣臣憂形于色未嘗不以暴露為念此於太上皇后可謂無負矣臣聞近日外議藉藉咸謂太上皇后輕信小人之言遣使切責陛下臣在外庭不知何事妄傳欲開宣德門入居大內羣臣士庶莫不惶駭以臣料之萬無此理設或有之此豈太上皇后保全鄭氏之意哉恭惟道君太上皇帝上畏天戒下順民心以宗廟社稷之重躬行堯舜之事退居潜藩以神器付陛下大內者天子之居神器所在也使無纎芥之嫌陛下欲便溫凊之養迎奉入內亦當躬稟上皇下有司討論典禮如漢唐故事繕營宫室嬪嬙􅉏御嚴為限隔以防意外之變縱陛下母子慈孝萬無他嫌其如左右近習之人懷姦結怨搖動兩宫則蕭牆之憂不可不慮伏望陛下明詔三省樞密院大臣速議太上皇后還宫之儀以全陛下母子之愛臣不勝激切待命之至論在京擅離官守人一等科罪劄子臣竊惟聖主制世御俗之方莫大於賞罰所以行賞罰者莫先於至公古者爵人於朝與衆共之刑人於市與衆棄之明不敢以已之私恩廢天下之公議也臣伏見金人內侵都城危逼士大夫委職而去者五十二員近緣臣寮論列有㫖令吏部具職位姓名送大理寺根勘約法斷罪陛下示天下大公之道可謂盡矣命下之日士論紛然或謂罪同罰異致陛下有失刑之譏大臣負黨姦之謗不可不察如衛仲達張勸馮溫舒蔡行兄弟皆從官也林虞劉燾袁植皆致仕也在仲達勸則除名勒停虞則追五官除名勒停行兄弟及溫舒燾植則置而不問或旋求名目如蔡績蔡續者或妄託假故如許行宋時者種種姦欺莫究虛實其為擅去官守一也今詐冒者反得輕典孤拙者多陷深文陛下既已付之有司法者天子所與天下公共也原情定罪不容有所輕重况得而私之哉伏望聖慈將大理寺定斷到應干逃避臣僚係在去年十二月十七日已後不問有無事故盡作擅去官守一等坐罪庶幾公道昭明人言弭息不勝幸甚取進止論劉延慶等劄子臣聞易日師出以律否臧凶言治衆而不用法無不凶也故曰將軍死綏咫步無却顧望避敵逗撓有刑我藝祖以英武定中原養兵止二十餘萬懲罰訓練一按師律嘗曰唐莊宗二十年夾河戰爭取得天下不能以軍法束此輩縱其無厭誠為兒戲朕撫養士卒不吝爵賞犯吾法者惟有劔耳故能南征北伐灑濯氛祲神戈所指無不從志誠御將得其道也臣伏觀近年以來將帥之柄付之宦官兵政不修賞罰不嚴馴致前日敵騎充斥瀰漫兩河非小變也幸賴宗社之靈陛下神聖得天人之助金人退師宜於此時修軍政以耀威稜明賞罰以聳羣聽擇其誤國生事罪狀明白將士怨憤久稽天誅如劉延慶父子者重置典憲以勵三軍平燕之役延慶提數十萬衆當契丹殘破之師兵鋒未交一夕遁去芻糧器甲委為盜資兵夫枕藉填滿坑谷挫損國威莫此為甚金人緣此遂有輕侮中原之意其子光世光國亦皆凶悖専恣傲睨不恭近者金人圍守太原事勢危急朝廷遣光世赴援既遷延不進反與折氏為仇旋致敗衄擁兵奔逃光國頃為陜西提刑陵轢州縣五路官屬畏其凶焰尋醫侍養託故解職者不可勝數今兩路用兵防秋在近正藉將士用命以守禦邊疆以衛護王室如延慶父子䝉國厚恩一門之內建籍正任園地田宅歌童舞女志滿意得不復以朝廷大計為念及种師中姚古王元之流皆陛下親擢元為真定總管師中為河北制置使古為河東制置使委任華重亦復偃蹇自肆使之禦敵則望風先奔使之䇿應則逡巡不進用兵行師如循一軌若此之類朝廷未嘗少加詰問有罪不坐犯法不誅此皆異時因循姑息之政亦何以感勵將士使之仗節死難者乎前日失守追斬梁方平驕將惰卒孰不知懼以陛下英明當今日外國內侮之時制軍御衆若不稍加裁戢但務涵容茍玩嵗月遂使忘身效節率衆先登者獲譏於士卒僨軍蹙國緩救失期者自以為智能義士痛心勇夫解體豈不殆哉伏望明詔三省密院大臣將自來姦欺罔功罪惡顯著最為敵人所譏笑如延慶等重賜顯戮傳首邊城或鐫削官職竄流逺方庶幾邊將革心軍聲大振賞罰當而功罪明威令行而軍政肅矣不勝幸甚取進止乞用河東土豪援太原劄子臣近因進對伏見陛下以太原圍閉日久援兵無功深軫宸衷憂形于色臣退與寮屬具言今日之患誠無急於此者臣東南書生豈知為兵因輒詢求博采衆議及河東士大夫有訪臣者皆言方今事勢危急欣代二州已為敵境澤潞汾晉又遭劉嗣初殘破富家大姓往往奔走四出獨力田之民戀著鄉土多自團成保甲守護鄉閭朝廷若起而用之可得土民十餘萬人人自肯為戰蓋子弟之衛父兄手足之捍頭目其勢然也今朝廷兵力單弱四方兵未有至者萬一太原不守則河東决非朝廷之有若恤小害則大患不除欲望聖慈逐急就委折彥質盡起晉絳慈隰澤潞威勝汾州八處民兵自二十已上五十已下及本路諸候弓手令見任州知通縣令佐據所統屬各自部轄其間亦有土豪及士人願為頭首者甚衆若假以初等官及應副器甲使與官軍協力赴援比之他路起兵無逃竄剽掠之患減飛芻挽粟之勞人自為戰家自為守功必倍之仍乞先遣信使齎詔書諭以禍福人必樂從出夫之家給復三年州縣敢逗撓者並以軍法從事愚計如此儻粗合聖意乞詔三省樞密院大臣詳議施行取進止再乞起河東民兵狀臣近嘗具奏乞盡起河東民兵赴援太原乃是臣呼召平陽府進士刁處仁等商議為臣言力田之民頗戀著鄉土各自團成保甲咸有鬭志若起而為兵比之他路無逃竄剽劫之患減飛芻挽粟之勞其言似可採用未䝉施行今河東士大夫避地至都下者甚衆其刁處仁等亦各願隨逐使人前去乞下臣章樞密院令出榜召募詢訪謀䇿庶有禆益謹録奏聞伏候敕㫖論胡直孺劄子臣伏覩近除胡直孺為工部尚書命下之日士論沸騰莫不疑駭蓋直孺素結朱勔為發運使為待制知平江府為户部侍郎皆勔力也臣近論朱勔及言東南財用為羣小侵蠧直孺其一也老而無恥素節凋喪不足汚八座之選靦顔朝列不自引退伏望陛下斷自宸衷重行竄黜以為士大夫不顧亷隅者之戒取進止論胡直孺第二劄子臣近再上章論列工部尚書胡直孺罪惡已䝉陛下開納許以必行亦既纍日不見降黜此必大臣以直孺為賢曲加覆護以臣言為妄未肯施行夫大臣以進退人材為職所進忠賢則國家享其利所進憸佞則人主受其欺陛下不以臣不肖使得待罪言路若大臣用人失當臣得而論之朝廷行之則陛下威權立矣今臣力言之陛下虛已而聽之大臣沮抑之則是陛下威福之柄反制於大臣而臣區區不能但已者也况直孺佞邪天下所聞與應安道盧宗原相繼為轉運使及發運使欺罔朝廷如循一軌將上供物料及糧綱船盡充花石之供號為應奉州縣帑藏為一空起發封樁妄稱均糴嵗計不足猶進羡餘緣此進職濫厠從班遂知平江府縱朱氏請求益肆掊斂不復知有朝廷矣直孺素畜聲妓每攜就朱氏園亭與倡優雜處啖其子姪吳民怨憤目為朱家奴勔入京師凶焰益熾至與宰執爭權竊㺯國柄首引直孺為户部侍郎搢紳側目莫不駭歎伏自陛下即位灼見姦凶以次流放黨類屏息獨直孺反被褒擢聯八座之選命下之日士論沸騰前後臣寮論列不一伏望陛下斷自淵衷速賜竄黜以為多士之戒如臣所奏失實欺罔聰聽亦望解臣言職重置典憲臣與直孺理難兩存臣不勝激切待命之至取進止論燕瑛胡直孺劄子臣伏見燕瑛胡直孺二人以姦佞相濟傅㑹匪人用事専權恣為不法盜用官錢如同已物刻剝細民甚于豺虎前後臣寮疏列罪惡瑛頃任廣南市舶専以貨賄交結近幸目為香燕及為開封尹専任猾胥政事紕繆輦轂之下冦盜縱橫褫職居外曽未旬月百計經營由散官徑為戶部尚書直孺任兩浙漕臣假託應奉耗竭帑藏醜穢之迹中外所聞知平江府諂事朱勔日三造其門勔所欲為無求不獲家畜聲妓専事媚悅以圖進用名教所棄清議不容陛下灼見姦慝亟議誅竄今二人皆帶龍圖閣直學士名曰罷斥其實升遷自祖宗以來非名德重望為士類所推者未易得此陛下始即大位慎重名器愛惜生靈之時如使此流列顯職當郡寄臣恐四方忠義之士不以聖朝爵祿為榮人人解體羞與比肩恐非朝廷之福臣與瑛直孺實昧平生所以拳拳不已者誠見陛下慨然思治乃於賞罰功罪輕重失當未能厭服人心實纍聖治伏望陛下奮發乾剛大明黜陟將此二人鐫職投閒庶協公論臣不勝憤激之至再論燕瑛胡直孺劄子臣竊謂監司郡守號為近民之官勢力氣焰足以制百姓死生之命頃者姦幸當權奢淫無度竭生靈之膏血不足以供溪壑之欲於是分遣親信之人忍為殘賊敢為姦贓者布滿州縣夤緣假借上下相䝉其剝民愈甚則獲賞愈多如應安道徐鑄之流死亡略盡今其在者蹤迹顯露莫如燕瑛胡直孺二人皆自郡守監司以贓汙致身臣纍具彈奏必䝉陛下委曲開納臣亦委曲為陛下言之若以朝廷多事之際以為有材亦當置在三邊財穀之地不當佚以宫祠優以便郡也今乃反得輔郡地望愈隆沮天下至公之論成憸人怙寵之私成命既頒物議沸騰此必大臣有隂為之地者二人平昔止能以珍竒貨賄交結權幸飲饌聲伎媚說要人身雖去國各留子弟見在京師日造大臣之門對衆附耳營求百端稔惡弗悛無復忌憚伏望陛下奮發威斷直批付三省褫奪職名重行竄殛以解四方之疑不勝幸甚取進止論燕瑛胡直孺第三劄子臣纍論列燕瑛胡直孺不當寵以峻職䝉陛下開納許以必行至今纍月未見禠奪瑛關通交結皆出宦官直孺拔擢悉由朱勔此陛下所知也夫人主之於臣下患在不知其姦茍或知之而復赦之則小人放縱無所忌憚矣故知善而不能用與知惡而不能去誠人主之深戒也今此二人非獨臣知之天下之人莫不知之臣若不言則負陛下言之則觸大臣儻大臣以直孺等為才當多事之際欲湔洗而用之則當置在三邊兵刑財賦有用之地尚為有名不當佚以宫祠優以便郡也臣誠愚瞽官小言輕非仰恃陛下優容勢必不敵伏乞檢㑹臣先後所上文字降付三省早賜施行取進止論王子獻等劄子臣近准尚書省劄子専委臣取索㸃檢京東京西兩路西城所創置擾民等一切並罷元係西城所辟置及曽應副害民之官先次放罷具名聞奏除已一面令吏部供具本路州縣官外臣今所聞兩路最為李彥信任陳獻利便創立租稅忍於害民為國斂怨僥冒賞典轉官除職之人其尤甚者京東則有王子獻吕岯毛孝立京西則有劉寄杜徽彥李端願子獻為京東轉運使將梁山濼收入西城所辟置孝立岯為屬官遍詣州縣自濟兖鄆濮興仁廣濟等處為之騷然迫脅官吏抑勒細民有不承佃者便枷項送獄人人惴恐莫保性命蒲魚荷芡之利皆日計月課纎悉無遺遂致濼傍之人無所衣食强者結集為冦盜弱者轉徙乎溝壑岯孝立皆驟被拔擢自文林郎不二三年轉至朝散朝請大夫自曹官為通判自通判為郡守監司又孝立任濟州日母死其父欲只作所生規免解官未幾父又死遂干求李彥請御筆候葬畢起復孝立家本三衢憚往返迂逺不復挈喪歸鄉只就濟川營葬近緣亷訪奏劾國忌日就司録㕔用妓樂深夜飲燕為臣不忠為子不孝敗壞風俗莫此為甚寄徽彥端願或自白身或由小官為李彥汲引將唐鄧汝蔡四州九縣取民間稅地謂之公田斂取無藝百姓失業流丐者衆風諭諸邑催索租逋急於星火確山令劉願前後杖下决死良民千餘人徽彥近緣金人內逼添差京西運判分遣屬官四出有甚冦盜襄城一邑科率至十七萬謂之助國錢更不抄上赤厯此數人者朝廷雖已放罷而罪惡貫盈公議未允伏望陛下洞照姦慝久為民害特發睿斷重置典刑或竄流嶺表以謝兩路生靈不勝幸甚取進止再論王子獻等劄子臣近准詔㫖姦貪之吏蠧國害民者尚未竄逐所以好惡未孚贓吏未懲民未被澤臣職在臺端仰煩聖訓宣諭使之彈劾在臣愚分誠為失職臣伏自供職首尾半年前後論列姦貪之吏多矣陛下雖有聽納之明而未見力行之果臣輒再具已嘗論奏而未䝉施行者如京東轉運使王子獻前知淄州毛孝立前東平府通判吕岯前京西轉運使杜徽彥提舉常平李端願劉寄此六人者皆奴事李彥竭兩路膏血以奉彥者假借事權勢力氣焰足以制百姓生死之命彥非得此六人亦不能成其姦凶如此其暴也臣聞此一等人其類尚多自陛下初政灼見姦慝雖已落職送部止是退居鄉里復帶前銜金章紫綬所在州郡皆以嘗任郡守監司往往差破人從日陪燕逰無復省躬念咎之意亦莫有依元降指揮赴吏部受差遣者是陛下賞罰號令止行於小臣而不行於大吏伏望檢臣前奏重賜竄逐仍乞行下吏部取責前後送部臣寮如有傲睨偃蹇不肯赴部之人即與直注逺地或河北河東合入見闕差遣庶幾方命慢上者知所警懼不勝中外之幸取進止七月二十六日奉聖㫖王子獻等並送吏部注逺小監當論王雲等劄子臣近嘗論列同簽書樞密院事宇文虛中給事中王雲身為士大夫職列侍從朋附童貫贊助開邊使兵連禍結及敵騎內冦朝廷憂危將命募兵逗撓不進前後臣寮交章定虛中雲罪與王蕃等蕃已責授散官安置議者猶謂輕典獨此二人赦而不誅已駭物論今乃反置近列居密勿獻納之地急則用計而脫禍緩則詭辭而冒榮専為身謀無復人臣之節兼近年以來士大夫交結宦官寖以成俗虛中為翰林學士雲為中書舍人皆朝廷華選貫皆倚為腹心每用兵行師皆有將帶前去之語靦顔就道曾無愧恥陛下初即大位拔用人材宜以禮義亷恥風厲士類若不痛加懲革則後來者更相倣效亷恥之道愈喪而禮義之俗寖隳矣夫人君養士之亷恥所以重其國士之有亷恥亦所以重朝廷唐李鄘恥為吐突承璀所引卒辭相位史氏書之以為美談今虛中輩姦貪趨利庸近凡鄙交結近習迹狀明白辱國甚矣伏望檢臣前奏付外施行早賜罷黜以厭公論不勝幸甚取進止論王子久劄子臣伏見陛下即位之初承姦凶用事四方凋弊國用匱乏之後兵政不修將卒驕惰城池樓櫓未經修葺一旦金人掩至城下四方勤王之師未有至者人人惴恐士大夫至委職而去危急甚矣獨陛下奮發乾綱宵衣旰食經營備禦慨然策勵二三執政大臣固守宗社將士戮力人心安固都城百萬之家無一動搖者伏自金人退師益修守禦之具戒畿甸之兵為保伍之法召諸道之兵為赴援之期東南轉粟舳艫相銜選將陳兵常若冦至陛下固守都城之志可謂堅矣為臣子者義當率心協力宣布德意使遐邇之情莫不安帖臣訪聞中亮大夫同州觀察使知東上閣門事王子久世襲膏粱無所知識輒敢對衆宣言建避地之䇿動搖朝廷規喧衆聽外廷傳播莫不駭愕流聞四方為害非小欲望陛下特出睿斷將子久重行黜責仍乞速降詔㫖布告中外以靖國人不勝大願取進止乞假借臺諫委任大臣劄子臣伏見陛下自即位以來懲艾前日姦邪當國杜塞言路之弊於是增置諫員雖憲臺六察咸得言事又許臣寮實封投匭職事不應上殿人亦得奏對開公正之路閉私邪之門海內聞風莫不稱慶今才數月未聞用一直言得一賢士而言路寖復有壅塞之患近降指揮奏事既罷不得從容留身不合上殿人雖有指揮亦令覆奏臣知陛下有厭言之意矣諫官御史不稍假借一言忤意旋被斥逐臣知陛下有拒諫之實矣陛下貴為天子富有天下如天地之無不覆燾日月之無不照臨而懷疑偏任惴惴然惟恐羣臣之欺已此得御姦邪之術而未得任忠賢之道也陛下所謂親除者一舉而得余應求再舉而得陳公輔此二人者今乃迎合大臣或為遊說例被斥逐使誠有之是親除之人豈足信任乎以天下之大四海九州之廣而陛下欲以耳目所及擢用一二士大夫所任未必得人而先已失衆心矣衆心一失人懷疑二不知孰與共守天下者乎不亦所得者小所失者大乎耿南仲為東宫官輔導陛下十有餘年此腹心之臣也雖甚愚陋之人莫不知之而李綱敢與抗論詆訐其短此其䟱率無謀可知矣而謂懷姦以事陛下則非也彼懷姦以事陛下者知南仲不可動搖則隂交而固結之上可以保寵榮下可以行私意而天下安危社稷存亡則有時而不暇恤夫南仲與陛下同休戚利害者其設心豈有他哉特其所見或有偏係不通之處未能曠然使陛下以大公至正之道照臨百官撫御寰區也臣恐姦邪之徒窺見陛下好惡更相譛毁迭相媒孽無忠信仁厚之風成猜忌刻薄之政人人惴恐莫肯披露情實以事陛下伏望稍回淵慮假借臺諫則盡聽納而容狂直禮貌大臣則専委任而責成功臣誠狂愚不識忌諱有所聞見懷不能已伏惟陛下留神聽納天下幸甚乞擇臺省官節録封事劄子臣伏見陛下自即位以來懲創前日姦邪當國杜塞言路之弊於是增置諫員憲臺六察咸得言事猶以為未也又許臣寮實封投匭職事官不應上殿人亦得引對開公正之路杜私邪之門海內聞風莫不稱慶今才數月未聞旌一直言用一正士而言路寖復有壅塞之患近降指揮奏事既罷不得從容留身不合上殿人雖有指揮亦須覆奏議者謂陛下有厭言之意矣祖宗假借言事官虛懷聽納雖布衣之士必須溫顔誘接至有辭氣狂悖者未嘗加罪今諫官御史一言逆㫖旋被斥逐議者謂陛下有拒諫之實矣况今姦諛未盡去蠧壞未盡飭邊方未寧百姓匱竭更張廢置未盡合天下之公論慷慨獻忠者當纍及之或謂陛下已厭封事之多不暇省覽或付之三省密院大臣門人子弟得以傳播誠為非便臣伏見仁祖時嘗委張方平司馬光詳定中外所上封事盡心料簡合於義理可施行者雖文采不足一一奏聞光與方平亦嘗奏乞其間識慮稍出於衆開陳政體時務文理詳明者乞特賜召對面加詢訪果有可採密籍姓名隨材擢用今太平日久誠為多士之時所獻封章豈盡無可觀採臣愚伏望聖慈檢㑹祖宗故事専委兩省或臺諫官二員擇其公忠端亮者俾之遴選據所可取者節録成冊每季進呈以備乙覽忠言嘉謀庶有裨益以輔成陛下中興之治天下幸甚論貶逐臺諫乞不施行日下出門指揮狀臣伏覩前諫議大夫唐重等五人與郡日下出門流傳四方士論驚駭陛下新即大位開懷聽納之初宜優容直言禮遇臣下今重等備員臺諫不知所論何事既令日下出門議者遂致紛然造飾語言稱師驥論十事孫覿李擢等攻擊宰執緣此被逐蓋朝廷未嘗降出得罪之因宜其紛然有以議陛下也重等既各與便郡如同枤和皆天下膏腴處正使自擇不過此耳何至迫逐使之倉皇若此哉臣伏見祖宗朝斥逐言官雖逺在嶺外未有日下出門者熙寧中王安石為相急於行法惡人之議已始有此行遣後來蔡京王黼用事欲行已私循用此例緣此言路塞絶豈可施於今日艱難之時哉伏望特降睿㫖將日下出門指揮更不施行庶令般挈家屬收拾行李以示陛下優納之意乞戒在位揚職奉法劄子臣嘗謂文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑髙以陳貴賤位矣言君臣之位猶天地之不可易也先王因制天下使尊尊相髙貴貴相承名以命之器以别之四方仰視朝廷之尊羣后翊戴人主之勢故能消患折衝姦人無窺覬之意昔漢髙祖以馬上得天下韓彭輩論功議賞至拔劍擊柱漸不可制叔孫通制禮儀諸侯王以下莫不震恐肅敬於是髙帝曰吾乃今日知為皇帝之貴也陛下踐阼之初敵人侵侮國勢搶攘執政大臣議事喧閧於上士民伏闕詬詈於下士大夫一旦習為茍簡三省六曹百司庶府官吏因循不復治事伏望陛下俯從羣臣之請申勑有司擇日御殿欵謁宗廟然後誥誡列位各揚乃職有不奉法者御史臺閣門覺察以聞庶幾隆主勢而正朝綱實天下幸甚取進止
