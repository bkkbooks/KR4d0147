body:
  text: 莊簡集卷十一宋李光撰奏議辭免吏部侍郎狀臣十月二日凖尚書省劄子九月二十八日三省同奉聖㫖除臣吏部侍郎令乘遞馬疾速前來者臣聞命震恐罔知所為伏念臣禀性拙艱承學固陋幸遭旦暮之遇得效馳驅比自宫祠更守近郡携孥到任曾未浹旬敢謂誤恩有此除授退循謭薄彌切兢凌况天官劇曹素號雄選吏姦而莫究其弊官冗而未知所澄非得剛明之才曷振頽靡之習如臣庸懦豈敢冒居伏望聖慈特賜追寢成命庶安愚分臣巳於當日交割職事與以次官一靣起發迤邐至前路聽候指揮謹具狀奏聞伏候敕㫖乞車駕親征劄子臣聞能扶天下之危則據天下之安能除天下之憂則享天下之樂能救天下之禍則獲天下之福故聖人不畏多難而畏無難蓋多難之世懷戒懼怵惕之心無難之世有宴安鴆毒之纍自昔有為之君或開創基業或撥亂中興身遭艱厄而能奮然特起者未易槩舉以漢髙之英雄身居項王掌握中數矣然城破復收兵散復合彭城之敗至推墮二子而不顧窘亦甚矣卒能滅楚以有天下者忍小恥以成大功也光武北徇燕薊困於王郎䝉犯霜露靣背破裂惶惑不知所之然卒能破郎以興漢祚者因危難以恢帝業也恭惟陛下以慈儉之德當艱厄之運維揚之變起於倉卒人心緣此而震恐將士因是而驕惰近年以來議論之臣各懷顧避上下一律莫肯慨然以持危扶顛為已任者今翠華駐蹕㑹稽首尾三載自去秋迄今見敵人無復南渡之意淮甸咫尺了不經營長汢千里不為限隔惴惴然日為乘桴航海之計謂之萬全臣所未喻也以區區晋元草創建國於基緒既絶之際猶能立宗社修宫闕興學校農桑保有江浙劉琨祖逖與聰勒拒戰於并冀兖豫梁雍諸州未嘗陷沒也以石季龍之彊大兵叩歷陽命王導都督中外諸軍事以禦之周世宗當五代之末取淮南攻隴右下三關皆御軍親行威震逺近未聞専主避敵之謀如今日也况陛下英武命世以真主之勢而臨金邦以中國之尊而抗外國天人助順軍人士庶孰肯甘心委質俯首帖耳終身為汙辱降敵之人哉今將非不武兵非不衆陛下儻整兵順動則簞食壺漿以迎王師者袂相屬也患在陛下無其志耳臣愚欲望陛下明詔三省密院大臣分令將士守禦江津力為保境之謀徐决親征之策庶幾經略中原漸謀興復以副海內生靈顒顒之望天下幸甚取進止乞追罷守臣遷避詔書劄子臣頃守宣城凖樞密院劄子建炎三年六月十二日奉聖㫖金人入境多是因敵就糧深入內地致使吾民重遭塗炭令逐州府守臣與當職官共議或守或避各得自便臣仰見陛下憂憫元元開示寬大之意可謂至矣臣竊謂守土之臣朝廷委以人民社稷之重固當存亡以之若預開遷避之門則人心携二亦無肯固守者矣臣觀百姓安土重遷非謂其愚無知也亦其勢不得不然蓋富者少而貧者多所資以生養者不過日求衣食之奉居於山者則有樵採之利居於澤者則有網罟之利都邑之民則盡智於交易田野之民則竭力於壠畝皆相資以為生者今使轉而之他則是數者皆失其本業將坐而資於官乎數萬之衆力固不足以給之如此非獨老弱轉乎溝壑雖强且壯者固不免也朝廷設官分職凡以為民若使列郡各得擇地遷避大者不過全其帑藏小者不過保其妻孥而已此於百姓何所利哉臣之區區誠願陛下申敕諸郡修城池備器械積芻粟聚人民力為固守之計有望風逆降棄城者皆嚴立法禁責以必死大者保境小者守城敵人雖復長驅豈能遽窺行在如前日乎臣愚伏望陛下速降指揮追罷三年六月詔書慨然責以大義命將帥遣戍役力為保境之謀庶幾列郡聞風有所畏憚實天下幸甚取進止乞戒約苛斂狀臣契勘移蹕事務不免科擾臨安府及傍近諸郡如竹木等物蓋有不獲已者今來不住體訪得諸邑及嚴州等處更有轉運司科𣲖下供應班直木炭藁薦萬數浩瀚初不曽被受朝廷指揮以此道路傳播頗屬騷擾深為未便緣臣使事止是總領本府其傍近諸郡難以㑹問伏望聖慈作訪聞行下嚴賜約束庶幾少革苛斂之風仰副陛下仁儉之意不勝幸甚謹録奏聞伏候敕㫖論移蹕措置事宜劄子臣伏覩朝廷已降詔㫖移蹕臨安府士大夫皆倒笏相慶又聞御批令婺州所屯張俊兵亦移屯臨安府臣仰見陛下乾綱獨斷不為衆議所奪此誠社稷之福生靈之幸也然臣竊有愚慮大抵舉事務欲萬全若不審思必有後悔臨安經屠戮焚掠之酷金碧之區化為瓦礫一旦移蹕復屯大兵則官司廬舍未易遽葺茅茨土階之陋陛下縱能安之其如當此寒沍若加以雨雪連綿數萬之衆不免散處市井侵奪民居勢難禁約臣愚伏望陛下逺詔三省密院大臣就卿監郎官中選差有精力幹才者一二人専往本府同徐康國及見任官多方措置務要不擾而辦候行宫軍壘稍成次第然後發遣諸軍翠華順動其婺州所屯將兵家屬乞且於衢婺寄留止發壯勇仍令本府量度人數先次搭蓋席屋方得移屯庶幾盛寒之際居者按堵免遷避之勞行者如歸無暴露之患不勝幸甚乞裁減營繕行宫狀臣昨凖尚書省劄子奉聖㫖遣臣先至臨安府節制本府人兵及總領移蹕事務臣到本府踰旬與漕臣宋輝徐康國及知臨安府席益以次僚屬協力幹辦稍見次第臣契勘行宫殿宇元奉指揮合依徐康國所上圖䇿以一百間為率士大夫傳誦皆仰服陛下深自貶損愛惜民力之意臣今體訪不住承凖內降御寶營造去處非元圖所載竊慮兩漕臣及臨安應辦過當輦致木植追呼夫匠無有已時前日所降敕榜戒約殆為虛文臣今欲望陛下應合增修起造去處令臣預知或有過當許臣執奏庶幾上體陛下恭儉之德下寬九邑凋瘵之民實天下幸甚謹録奏聞候敕㫖乞免住罷行宫營繕狀臣近凖省劄奉聖㫖今防秋戒期建康府修內可罷封樁所降錢别聽指揮臣除已恭依即日住罷外竊緣臣所造正殿寢殿兩廊殿門等處各已畢工獨别殿壅舍雙門既已立木惟給瓦未了工役已多若便住罷竊慮暴露風雨枉壞材植他日之費必倍未審合與不合逐旋搭蓋結瓦更合取自聖裁况今農事將隙自有添差通判吳師直専領營繕與臣防秋職任自不相妨伏候勑㫖九月十一日三省同奉聖㫖依已降指揮日下住罷其已立木并見在材植並如法遮蓋不得損壞乞罷營繕添支狀凖尚書省劄子發運副使宋輝等劄子承降下添修劈截行宫所畫一除修內司兵近已奉十一月二十一日聖㫖許每日支破食錢一百文外所有壕寨監修部役催促物料㸃檢醫藥飯食監門等官每日往來監轄工作分頭部役委是勤勞即未有許支食錢指揮已奉聖㫖自都壕寨官日支一貫至白身尅擇官日支三百文凡三十一員以月計之共支錢五百餘貫須至奏聞者右臣契勘今來諸營造已見次第不出嵗前可以畢工今上項監修官已有本身請給又有劵錢今又添支逐日食錢委是太優竊慮緣此妄作名目多方遷延未見了日臣愚欲望聖慈特降睿㫖除軍營席屋外其行宫百司並限紹興二年正月初五日已前結局更不添支食錢如此非獨大駕移蹕有期亦足少革妄濫之弊謹録奏聞伏候勑㫖乞蠲二浙積缺劄子臣伏見近年以來國運艱難中原板蕩陛下駐蹕東南乘輿服御悉務減省而百司兵衆皆仰給於二浙加以今日營繕所須一毫以上皆出民力師旅飢饉之後斗米千錢民雖凋弊罔有怨詞深可憐憫臣愚伏望聖慈因今移蹕之後稍留寬大之澤以慰人心應二浙積負一切蠲除臣契勘臨安九邑科配比它郡最為煩併其折變小麥為害尤甚及去年殘零稅賦見今轉運司責限催納其數至微欲望特與釋放昨緣前知府孫覿將義倉米於正稅外更有折糙米二斗五升倉場受納復增至一石又有鈔旁公吏乞覔不下一二千及每嵗和買州縣既不曽支與價錢今聞本府每匹更令納見錢四百文足謂之縻費錢竊慮行之既久遂為永例諸縣因軍馬經由支過係省錢斛多不肯豁除坊場虧缺課利委非侵欺無緣補發而官吏欲假此騷擾時一舉行追呼捕逮謂之干照錢縣官無所從出止是剝民如斯苛細望悉蠲除庶幾小民䝉被實惠仰副陛下勤恤民隱之意取進止進裴度平蔡州故事論主斷唐書李訴傳曰初吳秀林降元濟請罪梯而下檻送京師臣聞古之善用兵必有正有竒是也唐太宗問李靖曰曹公云竒正旁擊卿謂若何靖曰臣愚謂大衆所合為正將所自出為竒烏有先後旁擊之拘哉臣觀李訴之入蔡蹈不測之險以邀非常之功可謂用竒矣當是時吳元濟徑兵鋭卒多屯洄曲宰相裴度為宣慰招討使馬總副之韓𢎞為都統李光顔烏重𦙍為大將軍賊兵雖衆勢足以抗之訴之勝敗不係朝廷之安危也訴自文城柵襲張柴疾馳二百里夜半到蔡黎明擒元濟其摧大敵不啻反覆手之易一何神哉今議者不盡歸功於訴曰平淮蔡者裴度也不盡歸功於度曰成蔡功者憲宗也蓋訴雖出竒其實功狗耳而排衆論以主伐蔡之謀者度也度雖主謀議而獨斷不疑者憲宗也故韓愈頌曰凡此蔡功惟斷乃成嗚呼社稷之計安危之機有間不容髮者與衆智慮之一庸人足以擾之故謀之欲廣斷之在獨斷而後行鬼神避之非人主灼見禍福利害之源孰能成其功哉進德宗稅間架故事論聚斂唐建中四年初行稅間架法臣聞之易曰何以守位曰仁何以聚人曰財理財正辭禁民為非曰義然則善為國者安可不務理財以足用度乎故周室之興厚生民之本則有如公劉齊威之霸富國强兵之術則有如管仲李悝之平糴耿夀昌之常平劉晏之平凖皆能斂不及民而用度足其經理財用必有術矣至於後世聚斂之臣蓋非有生財之道不過掊克生靈割剝百姓以欺惑人主冒一旦之寵祿而已豈真能為人主興利除害使上下給足乎今軍興之際固宜講究利源以佐國用而自冬春及今朝廷用議者之說巧為名目以斂民財户帖鬻爵交引給換等法中外騷然逺近疑惑上下愁怨臣恐邦本一搖其禍有不可勝言者伏望聖慈深詔大臣訪求通知財用之士别議生財之術量入為出以制國用如前世數人遺法尚有可施行者古人有言與其有聚斂之臣寧有盜臣蓋自古亂離社稷憂危未有甚於今日者皇天后土眷顧陛下故十年之間强敵僞廷稍稍沮却東南年穀屢登兵力漸振中原赤子矯首望幸庶幾復覩漢衣冠者恃陛下德澤有以得人心也昔范祖禹論奉天之難其略曰德宗以饑羸之卒守一縣之地而當朱泚十萬之師備禦俱竭危不容喘所恃者人心未去也卒能克復宗社不失舊物而况以天下之大億兆之衆守之以道德用之以仁義其孰能敵之故人君茍得民心則不在地之廣狹兵之衆寡王天下猶反掌也湯以七十里文王以百里豈不信哉臣每每戒陛下以不可行苛刻之政無名之賦務存省深慮此聲一出逺近傳播人心動搖也惟陛下察之論招降盜賊劄子臣聞之書曰火炎昆岡玉石俱焚天吏逸德烈於猛火殱厥渠魁脅從罔治太祖皇帝創業之初蓋用此道故能混一區宇平定天下其本在乎得民心而已國家自靖康以來因金人內逼百姓失業無所得食弱者轉徙乎溝壑强者結集為寇盜固非有讎主嫉上之心特出於不得已耳若撫循有道駕馭得術因其謳吟思歎之心廣開招懷撫納之路民皆吾民土皆吾土則陛下建立中興之功不啻若反掌之易今曹成張用李宏馬友劉忠孔彥舟之徒各擁衆數萬跨州連邑荆土騷然比之敵人尚可以遊說動也况祖宗德澤在人陛下寬仁得衆倘能降咫尺之詔遣一介之使布宣王靈開示德意又以實利及之彼不為我用尚何為乎臣觀自古創業中興之君未有不藉此屬而能得天下者漢與楚大戰彭城不利隋何說黥布發兵背楚卒滅項王關西號光武為銅馬帝正以受降群賊耳魏武得黃巾三十萬衆遂定中原今朝廷兵力寡弱議者乃謂盜賊不可保恃持必殺之說臣所未喻也自李成破敗北走劉豫群盜稍稍革心倘因斯時顯用一二酋豪以風厲黨類必遞相歆豔以次歸降伏望陛下斷自聖心因孟庾韓世忠出使諭以此意勿以多殺為功而以招納為本仍乞别選漕臣一二員下荆湖之粟專切應副糧食汰其老弱以散處淮甸收其精勇以防守江津蔽遮金人興復中土是謂一舉而兩得也乞降空名官告狀臣契勘今來防秋選差材武兵將分守江險及措置淮西軍政事務所繫非輕比來不住有北來效順歸國及投獻機密之人未有重賞誘慰其心欲望聖慈特降睿㫖給降空名迪功郎承信郎等官告付臣收管候接納到效順及有竒功顯著之人量其功績書填給付訖具名申知朝廷庶幾招懷撫納不煩干戈有以激勸乞廢東南湖田劄子臣契勘東南地瀕江海水易泄而多旱厯代以來皆有陂湖蓄水以偹旱嵗蓋湖髙於田田又髙於江海水少則泄田中水多則放入海故無水旱之嵗荒蕪之田也祥符慶厯間民始有盜陂湖為田者三司轉運使下書切責州縣復田為湖當時條約甚嚴謹水之畜泄則有閉縱之法禁民之侵耕則有賞罰之法近年以來所至盡廢為田潦則水增益不已旱則無灌溉之利而湖之田亦旱矣民既已承佃無復脫期所收租稅悉充御前而漕司暗虧常賦數至百萬而民之失業者不可勝計可謂兩失伏望聖慈速賜指揮盡罷東南廢湖為田者復以為湖庶幾凋瘵之民稍復故業不勝幸甚取進止三月一日奉聖㫖令逐路轉運司常平司同共相度奏聞論孫覿劄子臣伏覩紹興元年十二月十四日三省同奉聖㫖備坐祖宗舊制應贓吏决杖配諸州牢城蓋謂軍興之際不免時有科率若更容縱贓吏並緣為姦則民力愈弊此有以見陛下意在生靈深疾貪汙命下之日孰不相慶今已纍月而諸司按察官循習既久恬不為怪遂使朝廷美意委為空文臣竊痛憤伏自艱難以來朝廷一切姑務涵貸凶貪之徒割剝生靈無所忌憚况朝廷行法當自貴近始臣伏見前知臨安府孫覿在任贓汙不法逺近播傳諸司懼其一旦復用則為巳害不敢按發覿之為人朝廷所知前後臣僚論列罪大惡稔至辱詈君父甚於仇讎有臣子所不忍聞者陛下貸而不誅又使復典郡寄於覿恩髙厚矣乃不悛革益肆無賴到任之初以軍期為名拘九邑縣令在府勒令出錢共四萬伍千餘緡名曰助軍不附文厯又將親信使臣毛汝能辟為都監文林郎毛圭權錢塘縣令令二人提領本府應干倉場庫務偷盜轉易不可稽考郡中官僚相顧側目至有人生五馬貴莫受二毛侵之語臨安府捉獲酤賣私酒百姓其家富厚覿令圭受錢一千貫更不解送所司至帖下本縣直行放免又遣所親姓董人乞覔過新城縣百姓唐邦臣等錢一千伍百貫皆有跡狀除代之後將犒賞金銀錢物與都吏専知官等分受比至得替其公庫供帳之物並不發還及將空名度牒官告等移易妄用收附不明監司往來厚加結納每到發送饋謂之合食日事燕逰每㑹不下百餘千以此上下相䝉無緣顯露伏望聖慈奮發乾剛出自睿斷送大理寺或差臺官一員就府置司體究候贓證分明捕逮送獄依法斷遣以警具僚其屬邑縣令及人吏等迫於威勢者贓非入已或許其自首庶幾逺近聞風咸知畏戢實天下幸甚取進止畫一申請狀某凖尚書省劄子奉聖㫖除江南東路安撫大使兼夀春府滁濠廬和州無為軍宣撫使合行事件並依葉夢得已得指揮施行合有申請下項一契勘近葉夢得申請沿江一帶分屯人馬約五萬人月支錢一千五萬貫米三萬七千五百石雖承建炎四年九月二日朝㫖許於本路取撥應干諸色上供經制等錢四十萬貫米二十萬石應副緣所降錢米經今一年餘愈見闕少無可取撥欲望特賜指揮依例下户部印造臨安府𣙜貨務見錢關子四十五萬貫變轉軍糧支用等一契勘本司激賞銀絹近葉夢得申乞行給降銀絹各五千匹兩雖承朝㫖令本路漕司依數支給其本路除合起上供外别無合取窠名若依例乞下戶部應副亦系朝廷所管之數某近緣差赴宣州分㨂韓世清軍馬有拘收到本軍絹六千七百五十匹見在宣州樁管續承朝㫖起赴行在并前知本州李學士計置到銀一萬八千餘兩金一百五十六兩亦在軍資庫樁管伏乞就行取撥専充激賞候支使絶别具申請支降上項畫一伏乞詳酌速賜施行申三省樞密院乞支錢立寨屋置軍器狀契勘今來防秋自建康府沿江一帶險隘去處並合劄立寨柵炮座備禦見已措置建康府東接鎮江府界南接太平州地分相視到合立寨共二十四處合要寨屋并安立炮座所用竹􅲵木植數目浩瀚建康府未經殘破以前舊是諸縣團集土豪各自建置本府昨遭兵火殘破至甚民力凋弊倉庫匱乏無所從出目下已自秋深事不可緩欲望朝廷詳酌速賜指揮支降見錢五萬貫付本府起置其錢乞就便於見在本府𣙜貨務內支撥所貴便得使用伏候指揮乞差文臣屯兵廬州狀臣契勘淮西路廬濠二州及六安軍最於僞地接境近聞王彥充復於夀春府鳩兵聚糧有窺伺之意竊慮王亨寇容謝通輩兵力寡弱透漏過淮南則大江之外盡入賊境深為未便臣自到任纍具申奏後來又乞五六千人并乞差近上文臣一員前去廬州屯駐雖䝉聖慈憫察降付都督府至今未䝉施行今吕頥浩已到行朝伏乞速降指揮庶幾防秋之際不致誤事伏候敕㫖貼黃臣契勘長江千里守禦為難若止於兩淮防托則力省功倍臣所乞文臣一員如傅嵩卿難行則本司參議官宗頴乃宗澤之子以其父故為諸將所愛又其人亦慨然有忠憤之氣或䝉聖慈假以制置或招撫使副之名臣一靣措置乞賜速降指揮八月八日奉聖㫖令李某别仍選文臣一員充淮西巡撫使差兵二千人付所差官將帶前去廬州屯駐乞差胡舜陟往淮西狀臣近准樞密院劄子奉聖㫖令臣别選文臣一員充淮西巡撫使仍差兵二千人付所差官將帶前去廬州屯駐臣今再踏逐到知江州胡舜陟揚歷內外差遣頃知廬州為一方軍民所愛兼其人忠義奮發諳曉軍政堪充任使伏望聖慈特與復元職名速降指揮施行論火災狀臣近權刑部職事今月二日凖尚書省劄子備坐臣僚章疏論臨安府回祿之警一月之內火凡數作焚爇之家通及千餘乞申嚴昨降指揮以凌遲處死治放火者仍乞下密院劄付沿流州軍密行捕捉等事三月十四日三省同奉聖㫖依奏臣之區區竊有可疑者臣聞堯以水為警豫湯以大旱而罪巳未聞盡歸之於他人者自昔火災之變上應天道蓋熒惑徘回斗牛之間久矣牛斗吳分也又南方之性察陛下宜思所以致火之變朝政之闕失臣下之姦邪賦役之重民不聊生流亡者多百姓失業州縣之吏或倚法而恣贓貪囹圄之間或受賕而多枉濫有一於此皆足致災今議者曽不恤此方峻刑以治失火之家緣及官司舍屋皆付之極典夫姦細固所當治也而失火之家蓋有不幸者臣恐淫刑濫罪橫及無辜非陛下遇災恐懼修省之意兼沿流州軍譏察細姦自有約束今乃使之各察放火之家則是硫黃發燭千里而隨身矣臣愚伏望聖慈止行下臨安府令督責在城兵官各認地分如有違犯重置典憲所有今來已得聖㫖指揮臣未行出謹録奏聞伏候勑㫖御筆前降指揮更不施行乞委官節録封事劄子臣恭聞陛下因城內火災惕然恐懼延問近臣憂形於色乃發德音下明詔以求直言此甚盛之舉也陛下自即位以來數遭變故倉卒之際即下求言之詔勤勤懇懇發於至誠然玩歲閲月國勢日削鄰敵日强盜賊益熾百姓益窮天地之變水旱為災星辰失度寒暑反時此豈盛德之報也哉臣意陛下有求言之名而無聼言之實故也今艱難之時憤激獻忠者當纍及之臣竊慮封事之多未易省覽不免壅積是徒為文具而已臣伏見仁祖時嘗委張方平司馬光詳定中外所上封事盡心料簡合於義理可施行者雖文采不足一一奏聞光與方平亦嘗奏乞其間識慮稍出於衆開陳政體文理詳明者乞賜召對靣加詢訪果有可採藉其姓名隨才擢用今中原士大夫輻輳東南所獻封事豈無公論臣愚伏望聖慈檢㑹祖宗故事専委侍從官二員擇其公忠端亮者俾之遴選據所可取者節録成冊每季或逐月進呈以備乙夜之覽忠言嘉謨庶有禆益以仰副陛下恐懼修省艱難求助之意
