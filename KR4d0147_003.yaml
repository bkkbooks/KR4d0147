body:
  text: 莊簡集卷三宋李光撰五言律詩郊居雜興竹舍臨寒浦柴門閉落暉潮回沙路淨月出野航歸風徑砧聲急夜長更點稀子雲雖寂寞未覺草玄非荷珠荷珠圓復碎欹側動相關去似臨江失來如合浦還賈人應誤喜蓮女想輕攀百斛傾梅雨天公豈是慳觀穫老農勤畚鍤嵗暮閲星霜相見如遺秉安能助太倉晚晴雞鶩喜蓐食婦姑忙應有深村酒招邀隔短墻贈林湘先君師建學梅塢最交深共探先天易同哦正始音親亡友亦盡人古道猶今子續通家好遺書幸細尋九日登樓二首久客驚秋意天涯思不窮三年猶北國萬里對西風時序悲歌裏乾坤醉眼中黃花一樽酒千古此心同木落秋容靜時平國勢雄望雲心自逺采菊興誰同詩酒浮生過功名一笑空留連憑痛飲冠幘任髙風寄吳元預出門懷抱惡别我去逰秦季子黃金盡潘郎白髮新一枰誰敵手五字愈驚人勉赴功名會如公定不貧人日人日靈川縣山深雪未融誰知桂嶺北宛似浙江東墟市人煙合僧窗竹徑通杖藜間信步日暮怯溪風近傳已有代者補之作詩見寄因次其韻清時民訟簡尺素半偷間岐路將迎裏人情喜怒間舄鳬隨意逺遼鶴自知還小艇春洲晚歸尋天姥山馬上寄補之以急歸不果追前約為恨歸鞍乘月夕度嶺訪靈真路轉山邀馬溪回水趂人春殘花院靜家近夢歸頻回首追前約猶如未了因贈髙端禮炎暑勞相過清言扇為停新吟捨瑟作衰耳洗竽聼諸老子猶接正音今已零君家髙記室句法是儀刑同永嘉諸賢奠謁右丞許公少伊蔥欎佳城祕回環宅兆深懸崖森翠柏踴地布黃金天下方雲擾斯人竟陸沈塵侵徐孺榻絃斷伯牙琴次韻師川見贈鈞樞歸雅望邪志寢姦雄雕鶚清秋急豺狼當路空經綸思妙手談辨想英風未厭東山卧沈機一局中贈陳讜識字嗟逢晚安貧未易招儒冠走江浙詩笥帶衢饒學貴參先覺才須驗後凋諸賢書穩致定不作洪喬人物有興廢山川無古今匹夫空有志四海孰知心莫覩芝蘭室如遊薝蔔林同行六七子涕淚各沾襟次韻賀子忱喜雨天眷周王德功歸傅説霖少寬邊餉急聊慰老農心雷隱滄江轉階喧玉漏沈西山多爽氣拄笏助清吟子忱告别忽改塗湖外迎護母夫人殯宫惻然念之作詩送行異縣傷孤殯慈顔念倚閭舊阡無觸鹿新薦有跳魚舟楫踰江水風霜迫嵗除歸來一大事莫忘剡溪居德起侍講侍郎以親老丐外章纍數十上上雖察其誠至眷待方隆卒不許其去五月九日有旨令歸覲且使迎奉以來一時士友莫不歆豔稱歎為人臣子能使聖主敬愛貪戀如此誠千載之遇足以顯其父母揚名後世矣上虞李某作詩送行别浦征帆速歸寧漢詔溫青雲方得路白髮笑迎門欲報慈親意難忘聖主恩朝回奉溫凊忠孝兩能存有懷念一兄三二弟晚墮容江側蠻蛋且雜居懷兄頻有夢憶弟懶觀書憂國心徒切謀身計已踈歸田儻有日握手喜何如城北江岸獨行成此詩居人皆竹籬茅屋無壁可題歸而書於此散䇿江村路柴門欲訪誰榕根盤古岸藤菜蔓踈籬未辦遊春屐間尋敵手碁天涯隨處好莫作楚囚悲豫始到瓊衆謂海南自來無大寒今嵗臘月連日風雨殆不異北地因成小詩記之海國冬常燠隂霾忽滿山颼颼北風徑凛凛凍雲頑蟋蟀已無語芭蕉猶強顔江頭梅栁色春色幾時還丙寅十月二十二日孟堅理舊篋見純老送行詩有見及語因次其韻南來償宿債一笑悟前身白首癡頑老清朝放逐臣休傳江左夢愁見海南春魯叟乘桴意他年莫問津衣冠雙闕逺煙瘴百蠻深不記朝天路難忘拱極心任從生死病莫問去來今身似孤雲逺間飛不作霖竄流今六載無復望天朝象魏闕云逺寶陀山匪遙音書時有繼風義未全凋只有獼猴性年來亦漸調八月十六夜江邊對月水月交相映江空淨客衣孤光凌象緯倒影射忩扉宿鳥依林動流螢逐暗飛興來隨杖履難下董生帷連日以目疾不能躬課子侄輩枕上成四十言粗明汲古之意以勉之文史三冬足窺尋究始終夜窗捐末事嵗計見深功古井家家有靈泉處處通隨身具修綆取給自無窮五言長律近買扁舟篷棹悉具戲示諸兒此生雲水興今日買扁舟著岸從人繫乘風逐處浮山歌和漁子淨社結江鷗夜泛寒潮穩朝尋古寺幽謝安空雅量范蠡漫多謀豈若吾無事平湖盡日留瓊士黃與善會友堂課諸生作移竹詩為賦一首緑竹名清友書齋植最宜根深知舊壤葉密帶新枝寒暑時須易冰霜操不移影寒金瑣碎聲振玉參差引鳳符周運為龍待葛陂諸生頻掃徑琴海每相隨泂酌亭詩并序舊傳雙泉相去咫尺而異味東坡先生易名泂酌且作詩其上後稍稍增葺疏為三池今兹五十年水益清駛然所謂雙泉乃混而為一非知水味者莫能辨也東坡詩題不復存紹興乙丑之春豫再貶瓊山九月二日自行館與仲子孟堅徙居之因訪尋舊題得泂酌亭三字於鄉老朱景貺復揭之亭上居間無事因作古風二十韻意殊未盡復賦律詩一篇以示太守徐自然别乘李申之投老幾三黜郊居更一遷江山相映帶風物自清妍妙墨移新榜清詩失舊鐫地偏無俗轍境勝賴前賢氣浹岡巒潤榮滋草木鮮雙泉今莫辨異味豈虛傳餘潤分畦圃支流給市㕓幽嵌鏘玉佩石罅湧璣璿瀝漉聞朝汲淙琤攪夜眠甘寒通沆瀣精潔祕蜿蜒奔駛觀洄洑泓渟有折旋滂沱蘇旱嵗清冷變炎天鴈過空遺影僧來忽誤禪二事見傳燈録澄瀾涵璧月暗谷響朱弦夢想千岩秀徜徉一壑専使君常倒載别乘屢加籩隔竹聞茶臼臨池泛酒船塵襟如可洗來此弄潺湲三月三日康守燕嚴亭禊飲城西路山翁岸幅巾習池還倒載曲水暗通津鼓吹雄南國旌旗照暮春莫嫌娼妓拙自有主人真散䇿花迷徑隨車雨洗塵杖藜歸興晚猶有浣紗人
