body:
  text: 莊簡集巻三宋李光撰五言律詩郊居雜興竹舍臨寒浦柴門閉落暉潮回沙路净月出野航歸風勁砧聲急夜長更㸃稀子雲雖寂寞未覺草𤣥非荷珠荷珠圓復碎欹側動相闗去似臨江失來如合浦還賈人應誤喜蓮女想輕攀百斛傾梅雨天公豈是慳觀穫老農勤畚鍤嵗暮閲星霜相見如遺秉安能助太倉晚晴雞鶩喜蓐食婦姑忙應有深村酒招邀隔短墻贈林湘先君師建學梅塢最交深共探先天易同哦正始音親亡友亦盡人古道猶今子續通家好遺書幸細尋九日登樓二首乆客驚秋意天涯思不窮三年猶北國萬里對西風時序悲歌裏乾坤醉眼中黄花一樽酒千古此心同木落秋容静時平國勢雄望雲心自逺采菊興誰同詩酒浮生過功名一笑空留連憑痛飲冠幘任髙風寄吴元預出門懐抱惡别我去逰秦季子黄金盡潘郎白髪新一枰誰敵手五字愈驚人勉赴功名㑹如公定不貧人日人日靈川縣山深雪未融誰知桂嶺北宛似浙江東墟市人煙合僧窻竹逕通杖藜閒信步日暮怯溪風近傳已有代者補之作詩見寄因次其韻清時民訟簡尺素半偷閒岐路将迎裏人情喜怒間舄鳬隨意逺遼鶴自知還小艇春洲晚歸尋天姥山馬上寄補之以急歸不果追前約為恨歸鞍乗月夕度嶺訪靈真路轉山邀馬溪回水趂人春殘花院静家近夢歸頻回首追前約猶如未了因贈髙端禮炎暑勞相過清言扇為停新吟捨瑟作衰耳洗竽聼諸老子猶接正音今已零君家髙記室句法是儀刑同永嘉諸賢奠謁右丞許公少伊葱欎佳城祕回環宅兆深懸崖森翠栢踴地布黄金天下方雲擾斯人竟陸沈塵侵徐孺榻絃斷伯牙琴次韻師川見贈鈞樞歸雅望邪志寢姦雄鵰鶚清秋急豺狼當路空經綸思妙手談辯想英風未厭東山卧沈機一局中贈陳讜識字嗟逢晩安貧未易招儒冠走江浙詩笥帶衢饒學貴參先覺才須驗後凋諸賢書稳致定不作洪喬人物有興廢山川無古今匹夫空有志四海孰知心莫覩芝蘭室如游薝蔔林同行六七子涕淚各沾襟次韻賀子忱喜雨天眷周王德功歸傅説霖少寛邊餉急聊慰老農心雷隠滄江轉階喧玉漏沈西山多爽氣拄笏助清吟子忱告别忽改塗湖外迎䕶母夫人殯宫惻然念之作詩送行異縣傷孤殯慈顔念倚閭舊阡無觸鹿新薦有跳魚舟楫踰江水風霜迫嵗除歸來一大事莫忘剡溪居德起侍講侍郎以親老丐外章累數十上上雖察其誠至眷待方隆卒不許其去五月九日有㫖令歸覲且使迎奉以來一時士友莫不歆豔稱歎為人臣子能使聖主敬愛貪戀如此誠千載之遇足以顯其父母揚名後世矣上虞李某作詩送行别浦征㠶速歸寧漢詔温青雲方得路白髪笑迎門欲報慈親意難忘聖主恩朝回奉温凊忠孝兩能存有懐念一兄三二弟晩墮容江側蠻蜑且雜居懐兄頻有夢憶弟懶觀書憂國心徒切謀身計已踈歸田儻有日握手喜何如城北江岸獨行成此詩居人皆竹籬茅屋無壁可題歸而書於此散䇿江村路柴門欲訪誰榕根盤古岸藤菜蔓踈籬未辦遊春屐閒尋敵手碁天涯隨處好莫作楚囚悲予始到瓊衆謂海南自來無大寒今嵗臘月連日風雨殆不異北地因成小詩記之海國冬常燠隂霾忽滿山颼颼北風勁凛凛凍雲頑蟋蟀已無語芭蕉猶强顔江頭梅栁色春色幾時還丙寅十月二十二日孟堅理舊篋見純老送行詩有見及語因次其韻南來償宿債一笑悟前身白首癡頑老清朝放逐臣休傳江左夢愁見海南春魯叟乗桴意他年莫問津衣冠雙闕逺煙瘴百蠻深不記朝天路難忘拱極心任從生死病莫問去來今身似孤雲逺閒飛不作霖竄流今六載無復望天朝象魏闕云逺寳陁山匪遥音書時有繼風義未全凋只有獼猴性年來亦漸調八月十六夜江邊對月水月交相映江空净客衣孤光凌象緯倒影射忩扉宿鳥依林動流螢逐暗飛興來隨杖履難下董生帷連日以目疾不能躬課子侄輩枕上成四十言粗明汲古之意以勉之文史三冬足窺尋究始終夜窻捐末事嵗計見深功古井家家有靈泉處處通隨身具修綆取給自無窮五言長律近買扁舟篷棹悉具戲示諸兒此生雲水興今日買扁舟着岸從人繫乗風逐處浮山歌和漁子净社結江鷗夜泛寒潮稳朝尋古寺幽謝安空雅量范蠡漫多謀豈若吾無事平湖盡日留瓊士黄與善㑹友堂課諸生作移竹詩為賦一首緑竹名清友書齋植最宜根深知舊壤葉宻帯新枝寒暑時須易冰霜操不移影寒金𤨏碎聲振玉參差引鳳符周運為龍待葛陂諸生頻掃徑琴海每相隨泂酌亭詩并序舊傳雙泉相去咫尺而異味東坡先生易名泂酌且作詩其上後稍稍増葺䟽為三池今兹五十年水益清駛然所謂雙泉乃混而為一非知水味者莫能辨也東坡詩題不復存紹興乙丑之春予再貶瓊山九月二日自行舘與仲子孟堅徙居之因訪尋舊題得泂酌亭三字於鄉老朱景貺復揭之亭上居閒無事因作古風二十韻意殊未盡復賦律詩一篇以示太守徐自然别乗李申之投老㡬三黜郊居更一遷江山相映帶風物自清妍妙墨移新榜清詩失舊鐫地偏無俗轍境勝頼前賢氣浹岡巒潤榮滋草木鮮雙泉今莫辨異味豈虚傳餘潤分畦圃支流給市㕓幽嵌鏘玉佩石罅湧璣璿瀝漉聞朝汲淙琤攪夜眠甘寒通沆瀣精潔秘蜿蜒奔駛觀洄洑泓渟有折旋滂沱蘓旱嵗清冷變炎天鴈過空遺影僧來忽誤禅二事見傳燈録澄瀾涵璧月暗谷響朱弦夢想千岩秀徜徉一壑専使君常倒載别乗屢加籩隔竹聞茶臼臨池泛酒船塵襟如可洗來此弄潺湲三月三日康守燕嚴亭禊飲城西路山翁岸幅巾習池還倒載曲水暗通津鼓吹雄南國旌旗照暮春莫嫌娼妓拙自有主人真散䇿花迷逕隨車雨洗塵杖藜歸興晩猶有浣紗人
