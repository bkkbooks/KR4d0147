body:
  text: 莊簡集卷七宋李光撰七言絶句渡海三載藤江守藥爐身輕那復羡飛鳬瓊山萬里乘風便始覺驚濤異坦途出處從今莫問天南來跨海豈徒然須知魯叟乘桴興未似商巖濟巨川潮回齊唱發船歌杳渺風帆去若梭可是胸中未豪壯更來滄海看鯨波雷化多曠野道傍常聞鷓鴣聲已過梅嶺更南征渺渺瓊山四百程自雷渡海南四百里日暖風和寒食路行人休聽鷓鴣聲俗訛其聲曰行不得乙丑生朝今朝生日豈須論老去難酬父母恩惟有海南香一瓣直教薰炙遍乾坤次韻徐念道瓊臺泂酌亭兩絶笙簫杳渺鶴徘徊嬴女時應下玉臺莫問三山在何許更尋方丈與蓬萊蘇公陳迹半成空杖策經行紹聖中便與佳名還泂酌曄然光景照無窮泂酌亭瓊臺在海南孤絶之處限以鯨波而風物蕭然若在塵外疑即三山之一也東坡先生紹聖間往來瓊山獨飲雙泉因作亭其上名曰泂酌亭且留詩云即事十二首秋雲漠漠日昏昏積潦連江隔逺村賴是陳編有餘味斷無車馬到衡門青鞋踏遍海邉沙葉暗檳榔樹樹花蛋子也能留客坐旋添活火待煎茶榕葉隂隂日向西翠禽無語畫簾垂晚凉庭院經行好洗出蕉花一兩枝橋南橋北水漫漫泂酌依然碧玉寒鄰里何妨頻汲取莫教摧折小欄干家僮投晚閉柴荆倚錫聊同結夏僧夜漏欲傳城上鼓籠紗初㸃佛前燈客舍生涯自寂寥秋來仍復雨連宵前村隱隱人來往時有篝燈過竹橋過却東橋即是村浣紗人出閙紛紛倚笻爭向前灘望漲水潮來减幾分異域遊從見靣䟱掩關終日自端居正須文字相料理病眼常嫌細字書涉旬風浪戰扶胥咫尺烟波信息䟱見說北船今日到故人應有寄來書南鄰小魏隔雲巢里巷相從近結交聞道秋來作文賦可能借我一齊抄鯨波萬里海南州郭外新居事事幽一味清泉堪瀹茗千年蠧簡可忘憂潮平賈客輸蠻貨日晚鄰翁約勝逰月黑無人來打水喧呼長怕五更頭與善借示魯直集雕刻雖精而非老眼所便戲成小詩還之墻角年來棄短檠捐書默坐眼方明知君欲嗣江西𣲖净几明忩付後生近日吕居仁舍人作江西宗𣲖序以魯直為宗主也連夕大寒示鄰士凍雲垂地北風顛粧㸃江湖欲雪天我亦隨身有蓑笠興來同上釣魚船紙帳蒲團度厄年一菴聊可寄深禪隔忩要聽芭蕉雨襆被須來對榻眠重過橫河宿莫氏南軒扁舟重過海邉村野竹侵階桞映門相對小窗賔客散十年憂患不須論庭植惠雪菊嚴冬盛開冷豔霜苞向日舒移將小檻近階除應知海外冬無雪留與寒儒夜映書十二月寒甚小雨打忩有霰雪聲成小詩招鄰士飲行窮海北到瓊山二月猶驚塞外寒小雨灑忩風淅瀝擁爐來聽雪聲乾豫自暮春與客燕野趣亭俯仰三時始復再至則花木益茂亭亦稍葺矣因思去嵗重九之集覽物增慨題三小詩經時不到嚴家館千樹檳榔一徑深莫把小亭頻展拓恐妨幽步緑苔侵秋容野色擁簾旌森木中間結小亭斫盡枯荷露清淺夜深來看一池星聫騎同來倒載還勝游那復羡龍山空餘把酒題詩地忍對籬邉菊蘂斑戲題林庭植茅亭十畝茅亭倚壁開中安五寸黑香臺小忩容膝頻招客呼出丁香佐一杯時丁香盛開次韻趙丞相海鳴幽人一枕夢魂清風鼓寒潮夜有聲海色天容本澄靜年來應為不平鳴身如一葉任風飄閉眼觀心路匪遙慣聽海鳴還熟寢未妨歸夢趂回潮三月三日陪郡守宴嚴亭旌斾悠悠照暮春蘭亭修禊在斯晨不須縣尹前驅去自有隨車雨洗塵坐間得雨尋花問桞到村扉葉暗檳榔晝影移從此山翁頻倒載嚴池今勝習家池癸亥上元余謫藤江是時初開樂禁人意欣欣吳元預作紀事二絶頗入風雅戲和其韻曽見端門萬炬燈天街追逐少年行如今老病惟貪睡懶向州衙看樂棚再聞韶樂共欣然太守推行詔墨鮮山郡莫嫌娼女拙嫁他蛋戶已多年次韻康守通幽亭三絶篔簹脫籜已穿林裊露搓烟蘚徑深宴坐蒲團空寂處一聲啼鳥故相侵風捲千梢偃斾旌杖藜徐步到幽亭他年持節重逰地父老爭看舊使星吏散庭空絶往還焚香默坐似居山新詩改罷重搔首自拾階前筍籜斑端居無以遣興偶成三小詩仍用前韻呈元夀㑹元二公桄榔澀勒易成林午枕蕭然一榻深春半已無桃杏在夜深惟有月華侵搖搖北望動心旌老病聊依泂酌亭時有小兵來滌硯清泉一掬冷涵星流轉南來未放還此身忽到海中山臨池顧影聊娛戲懶把青銅照鬢斑十月二十二日縱步至教諭謝君所居愛其幽勝而庭植道源諸友見尋烹茗奕棊小酌而歸因成二絶句城隅詰曲趂溪斜遙望青帘認酒家行過小橋沙路盡忽逢菡萏一池花歸來庭院欲棲鴉冷落誰憐副使家獨向小園行欲遍籬邉黃菊有殘花十月三十天氣重隂門巷蕭然乏酒不能招客鄰人釀酒適熟而梁軍判周主簿芋學録不約而至洗盞更酌喜而成詩以示坐客火冷燈青正寂寥夜寒風徑酒香飄隔墻知是鄰醅熟踏雨沾泥不待招昨以酒熟鄰士皆來戲作小詩而國幹和章獨未至今日天氣溫和再成鄙句促之朝來風靜凍雲消簾靜忩明瓦不飄鴉呌三聲乾鵲喜南人諺云鴉呌三聲酒食不停魏介然云故應知我有嘉招星河湛湛夜寥寥閉戶微聞麝篆飄况有南鄰愛酒伴興來不假楚辭招五月望日市無魚肉老庖擷園蔬雜以杞菊作羮氣味甚珍戲成小詩適梁軍判送酒頭來并成三絶謝之旋擷園蔬二寸長牙齦脆響菊苖香欲招鄰友同來啜恐被雞豚越短墻小說有郡守攜具訪一山人是夕寤驚云誰令羊羣踐我菜圃也疏簾冉冉度茶香日午誰陪竹戶涼陋巷簞瓢巳清絶更將詩句攪空腸麴米新篘只隔墻西風吹過酒頭香故知王母憐愁獨煩送瑤池九醖觴國幹送酒新年雜興十首春潮和雨沒平沙沙岸疏籬盡酒家北客慣尋寒食路不知人日已無花海邦人日似深春籬外桃花半不存自要杖藜閒信步蹇驢牽去繫榕根紅蕉欄畔小池塘山雨添花映短墻自是氷霜元不到浮花那解傲氷霜獨酌怡然萬慮平夕陽忩牖喜新晴矮牀睡穩誰呼覺只有幽禽一兩聲世事悠悠委逝波六年歸夢寄南柯北來莫怪音書斷衡嶽元無雁字過信是閒中日月遲頽然那惜寸隂移消磨永晝非無術䄂手旁觀數局棋蕭然一榻本無塵轉物庵中老病身江上桃花空記靣不如啼鳥解留春負郭幽居一味清殘花寂寂水泠泠夜深宴坐無燈火捲起疏簾月滿庭佳節無人共一尊熒熒燈火雨昏昏慿誰與喚烟霞伴直上羅浮看上元去國頻經曠蕩恩新年猶寄海南村掇移妙境非難事直使心超不二門秋日雜詠十首三載幽棲養性靈焚香默坐萬緣輕空庭野草萋萋碧更覺秋來少送迎抄罷唐詩筆暫停不將竒字問添丁郊坰秋半無炎暑淨拂明忩讀道經風露蕭蕭月欲沈方池水靜影橫參何人睡覺來陪我更取金荷瀲灔斟八月十四夜四鼓招呼佳侣暫忘形夜久金莖露欲零風捲晴雲時㸃綴未妨華月上青冥中秋招鄰士小酌海濱三度過中秋雨橫無因到庾樓萬里無塵今夕月不須攜客上羅浮沙路微行到懶窠晚風斜日滿烟蘿焚香坐久疑無路忽見帆檣竹外過道人了然卓菴號懶窠杖策尋幽路欲迷華鬘椎髻雜生黎空階秋晚無霜葉自把清詩竹上題老去忘情不厭閒酒杯詩軸最相關籬邉知是重陽近萸實微紅菊蘂斑天南誰把尺書傳老眼經秋自不眠鼓角聲回忩未掩可堪殘月到牀前可笑餘生習氣纒時時吟詠偶盈編心閒身老趨平淡不是新來效樂天贈傳神陳生直綴還縚岸幅巾三年海外見來頻鬢髯若為添霜雪始覺衰容更逼真列之告别為之悵然小詩送别小橋西巷每徜徉忽趂南風返故鄉旋汲雙泉烹日鑄從今誰共北忩涼小詩送孟堅北歸汝到家中暫喜歡倚門慈母問平安舉頭便見天邉月莫作千山萬水看已已二月三日晚食罷步至林氏園了然道人新築小亭愛其閴寂獨坐久之白上人來出門又逢魏子歸而寫之以詩偶翻舊藁見之恍然因書以示庭植新築茅亭澀勒間蒲團坐久欲忘還道人應供歸來晚只有野僧相伴閒夕照穿林暮靄收出門忽見月如鈎幽人曳杖來尋伴一笑能令萬慮休書尾寄六十五姪孟容轉物庵中一老人十年嶺嶠且藏身黎山萬叠波千頃心鏡孤圓月一輪雙泉亭豫自甲子春再貶瓊山寓居雙泉首尾六載稍葺治之結亭泉上甃以青石可百年南遊昌化留小詩亭中甃石流溝汲愈新秋無落葉旱無塵他年莫忘癡頑老曽是雙泉舊主人陳氏靣北小亭逺依林壑下瞰長江主人每醉卧其下歎羡不足戲留小詩云赫日曉林起瘴烟小亭風景獨蕭然門前剝啄須輕手忩下幽人正醉眠十一月二十八日陳令分寄梅花數枝為賦兩絶句幽香偏許夜深聞冷蘂從來水外村南地恨無霜雪伴獨將孤影照黃昏一枝淡靜玉無痕便覺蕭娘氣味村旋汲清泉滋蓓蕾小忩留待月微昏二子繼韻復賦二首香超薝蔔斷知聞窮臘開花處處村應笑多姿桃杏俗更嫌貪睡海棠昏城上胡笳枕上聞却愁羌笛起孤村氷容不入丹青手玉骨那憂瘴霧昏文昌陳令寄龍眼甚富不羡蒲萄馬乳寒品流須著荔支間幽人頓覺空囊富合浦明珠一夜還儋耳病起偶題病骨支離睡半醒雨餘芳草入簾青焚香隱几無人到讀盡黃庭一卷經黎人二首褰帷露冕更停輪渺渺旌麾入瘴雲異境盡憑詩寫去郡僚爭喜得新聞桄榔林裏便為家白首那曽識使華莫說蠻村與黎洞郡人觀覩亦咨嗟春日偶題庵後疏籬蔓碧花庵前榕葉晚藏鴉階前草長苔痕滿裝出儋州副使家海外實未嘗見梅為賦一絶春日追逰載酒堂名園疑有野梅芳籬邉水畔無尋處只向風前認暗香德舉豫丱角友生也書來寄三小詩并示杜門圓妙方指趣深逺因次韻為謝仍寄出門散方亦反招隱之義也兼示商叟一笑出門散方别見杜門一法有深機勝把𤣥關叩祖師覆罷忘憂還獨酌免陪歌酒免論棊老野狐瓊士吳志寧居城之東北隅深居簡出若素隱者已而來儋耳託言學易且云願見異人豫始甚嘉之已而乃聞與一老婦逰一日坐間為陳守所詰慚沮不自安夜半挈之而遁戲作此詩欲追寄之不及變化形容似老儒南來權作白髭鬚祗應坐上無鷹犬走作人間老野狐中春之初與諸友逰黎氏園荆華贈豫桃花一枝歸置瓶中連日不凋因成兩絶示同行且令同賦桄榔林裏見桃花正似羅幃翠幕遮老去已無篸髻夢淨瓶歸插一枝斜竹外籬邉映桞條一枝纎軟更妖嬈似知摩詰愁無伴留向書忩不忍凋庖人宋奕請告往瓊般家怪久不至聞已設厨矣戲贈朱推市無魚肉㸑無烟晨起齊厨每索然欲識先生真樂地飯蔬飲水曲肱眠感松海外獨昌化宜松父老云往年自報恩寺西行皆松柏林也州縣無禁約邦人折以為薪根節堅潤者以為明今惟十里外尚有之三十年後無復種矣感之作三小詩題之寺殿柱中以勸郡人有知者庶其少弭乎瑟瑟聲微冉冉香炎天瘴海變清涼從今莫遣兒童斫留取濃隂庇一方根盤厚地幹參天護養龍髯幾百年忍把斧斤頻剪伐坐令鱗甲化非烟每憶西湖九里松眼明忽見紫髯翁隱居庭院多栽種為愛笙簫遞晚風陶隱居喜聽吹笙特愛松風庭院皆植松每聞其響欣然為樂昌化肉不常得豫蔬食已慣每聞有猪則召一二友生同飯月不過二三四月二日聞有猪亟令召三職事顔樂簞瓢孔飯蔬先生休歎食無魚小兵知我須招客市上今晨報有猪豫三貶而至儋耳又復二年平生習氣掃除殆盡海外去國萬里士民不知朝廷事免議朝政惟是里巷之間是非曲直偶及之入于耳中有如穢物置之寶器自今客至惟經史禪悅道家養生之說乃所樂聞其餘非已所預者可付之一默并成小詩以述已意云庵中宴坐戶長扄鼓瑟吟詩樂性靈客至不妨談道妙儒書釋典及仙經戊辰冬與鄰士縱步至吳由道書㑹所課諸生作梅花詩以先字為韻戲成一絶句後三年由道來昌化索前作復次韻三首并前詩贈之氷容幽勝肯爭妍獨樹亭亭近水邉不但色香俱第一品流宜占百花先清影扶疏晚更妍每教移植小池邉一枝獨守凌寒操肯與羣花較後先月娥姑射妬清妍白髮羞將插鬢邉冷艷獨排殘臘破孤芳長占小桃先陳渭老今夕開閣誠為盛事戲成二小詩以侑坐客釀成春甕勝玻璃旋壓真珠味更竒飲客莫辭今夕醉黃河清後卒無期長堤楊桞映門垂南北行人認酒旗坐上飲流須强醉休將河水較醇醨行潘峒諸村愛其巖壑之勝田疇之美因成小詩烟市雲中自一墟幽花夾道路縈紆無人與寫巖巒勝聊展營丘半幅圖豫離藤日李子從惠李成山水村落家家社酒香雜花開盡緑隂涼山畦是處田疇美時有歸牛待夕陽元發惠鳴雞塵榻昏昏睡未醒床頭腷膞老雞聲年來學道多晨起免聽城頭畫角清朱冠𤣥臆氣橫秋得食相呼飽即休語默從來有程度不妨風雨夜颼颼客惠豫早鳴晚鳴二雞各賦一絶逺和城頭角調清鄰雞寂默尚無聲幽人底事偏嫌汝驚斷歸鄉夢不成早鳴長庚東出月沉西飽粟貪眠尚穩棲却笑城烏自多事更籌未急已先啼晚鳴反舌喧喧木杪㺯新晴羈枕驚回夢不成任是舌端能百囀園林春盡寂無聲謝文孺寄三接丹岐伯言人各有百二十嵗之夀其多夭折者聲色害之也如醉後入房等三事皆促夀命之目豫來年八十若服此得終其天年道人之遺也三接靈丹古所傳扶危起死勝神仙衰顔全藉刀圭力少駐人間四十年豫謫海外久矣䝉恩徙郴所寓適與蘇仙鄰暇日攜兒徜徉歷覽遺集因閲本傳不載致仙之因特以事母盡孝行耳自古仙真得道如吳真人之流未有不由此而致者世人不知出此多棄遺父母入深山窮谷中父母凍餓不恤也以此求道去仙逺矣因成二小詩題之壁間庶亦少警欲學道而忘其親者打包行腳為尋真偶與蘇仙作近鄰萬里移來今有伴叩門時許訪幽人不須辛苦學神仙九轉功成亦偶然但向閨門躬孝行㑹須白日上青天題義郴傳神贊平生疾惡不量力指佞擊姦期屏迹流落南荒二十年更無一㸃烟塵色詩餘李公伯紀寄示水調一闋詠歎李太白詞采秀發然豫於太白竊有恨焉因以淵明為答水調歌頭元亮賦歸去富貴比浮雲常於閙裏端的認得主和賓肯羡當年軒冕時引壺觴獨酌一笑落冠巾園圃日成趣桃李幾番春揖清風追往躅事如新遺編諷詠斂袵千載友斯人君愛謫仙風調我恨樓船迫脅終汙永王璘何似北忩下寂寞可棲神清明俯近感嘆偶成寄子賤舍人前調自笑客行久新火起新烟園林春半風暖花落栁飛綿坐想稽山佳處賀老門前湖水欹側釣魚船何事成淹泊流轉海南邉水中影鏡中像漫留連此心未住贏得憂患苦相纒行盡荒烟蠻瘴深入維那境界參透祖師禪宴坐超三際瀟灑任吾年昌化郡長橋詞昌化郡城之北長橋跨江風月之夕氣象甚勝庚午八月望夜士友悉赴郡㑹杖策獨逰頗懷平生故人作水調歌以自釋豫自長年粗聞養生之說放逐以來又得司馬子微叙王屋山清虗洞所刻坐忘論一篇因得専意宴坐心息相依雖不敢仰希喬松之夀度未即死庶有㑹合之期前調獨步長橋上今夕是中秋羣黎怪我何事流轉古儋州風定潮平如練雲散月明如晝孤興在扁舟笑盡一杯酒水調雜蠻謳少年場金蘭契盡白頭相望萬里悲我已是十年流晚遇玉霄仙子授我王屋竒書歸路指蓬丘不用乘風御八極可神遊過桐江經嚴瀨慨然有感豫方力丐宫祠有終焉之志因和致道水調歌頭呈子我行簡兵氣暗吳楚江漢久凄涼當年俊傑安在酌酒酹嚴光南顧豺狼吞噬北望中原板蕩矯首訊穹蒼歸去謝賓友客路飽風霜閉柴扉窺千載考三皇蘭亭勝處依舊流水繞修篁傍有湖光千頃時泛扁舟一葉嘯傲水雲鄉寄語騎鯨客何事返南荒重九日宴瓊臺南歌子佳節多離恨難逢笑口開使君攜客上層臺不用籬邉凝望白衣來且看花經眼休辭酒滿杯玉人低唱管絃催歸去瑣忩無夢月徘徊民先兄寄野花數枝狀似蓼而叢生夜置几案幽香襲人戲成一闋前調南圃秋香過東籬菊未英蓼花無數滿寒汀中有一枝纎軟吐微馨被冷沈烟細燈青夢不成皎如明月入忩櫺天女維摩相對兩忘情甲子中秋微雨聞施君家宴戲贈臨江仙畫棟朱樓凌縹眇全家住在層城中秋風露助凄清香凝燕寢遮莫下簾旌佳節喜逢今夕月後房重按新聲姮娥端解妬娉婷微雲㸃綴不放十分明客贈梅花一枝香色竒絶為賦此詞减字木蘭花芳心一㸃瘴霧難侵塵不染冷淡誰看月轉霜林怯夜寒一枝孤靜夢破小忩曽記省燭影參差脉脉還如背立時符昌言寫寄朱胡梅詞酬唱語皆不凡因次其韻念奴嬌榕林葉暗見一枝獨與霜華爭白寫我精神惟賴有瀟灑西湖詞客玉骨清羸氷容冷落似恨關山隔蠻烟侵妬未應减動肌雪幽夢時繞芳枝夜寒誰見我身為蝴蝶抱蘂窺叢驚睡覺忩影橫斜和月謝館池邉松風亭下忍使香消歇多情饒恨算應天解磨折松風亭見東坡梅詩瓊臺元夕次太守韻危閣臨流渺滄波萬頃湧出氷輪星河淡天衢逈絶纎塵瓊樓玉館遍人間水月精神清江瘴海乘流處處分身邦侯盛集嘉賓有香風縹眇和氣氤氲華燈耀綺席競笑語烘春窺簾映牖眷素娥偏顧幽人空悵望通明觀闕遙瞻一朵紅雲逢時使君出示所作送春佳詞引楚襄事因次其韻鷓鴣天踏舞貪看赤腳娘送春春去莫悲傷飛花逐水歸何處落絮沾泥不解狂都是醉任飛揚百年三萬六千場使君親按新歌舞魂夢相逢笑楚襄陳逢時置酒賓燕堂仍攜愛姬晚值雨作見示佳詞輒次眼兒媚韻漠漠春隂人似霧那用繡簾垂不道持杯是阿誰須拚倒金罍人世渾如天上月離合比盈虧冒雨須來帶雨歸神女解相隨豫頃在瓊山見桃李甚盛但臘月已開盡三春未嘗見桃花每以為恨今嵗寓昌江二月三日與客遊黎氏園偶見桃花一枝羊君荆華折以見贈恍然如逢故人歸插淨瓶中纍日不凋豫既作二小詩同行皆屬和忽憶吾鄉桃花塢之盛每至花發鄉中人多醵㑹往游醉後歌呼今豈復得緬懷疇昔不無感歎因成長短句寄商叟德矩二友若悟此空華即不復以存沒介懷也漁家傲海外無寒花發早一枝不忍簮風帽歸插淨瓶花轉好維摩老年來却被花枝惱忽憶故鄉花滿道狂歌痛飲俱年少桃塢花開如野燒都醉倒花深往往眠芳草
