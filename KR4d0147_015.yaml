body:
  text: 莊簡集卷十五宋李光撰書與潘子賤書某頓首孟堅行日附狀必已凂逹元宵後有専介自婺女過乃不令往請書踰年不得公書殊跂仰也即日溽暑伏惟台候起居佳勝某自乙丑春渡海今踰二年矣幸且頑健但老無超然之見日復一日年已從心如舶船已離港汊入大洋兩軍已交鋒生死劈面來如何避得潘居士雖在酒色林中十二時中亦要著便宜其次夜半或五更睡覺來燕坐定息吐故納新舒眉引手令稍倦再睡此活計大不負人得正月十五日一報聖主有寬大之意囚錮之人皆起生還之望此亦妄想耳與胡邦衡書某頓首度日來起居佳勝三經新解未能遍閲然嘗鼎一臠窺豹一斑亦足見其大略矣如行李匆匆且納還此書異時不患不流傳也四卦二書俟食罷探伺無雜賔面納所懷非此能悉不宣某再拜又某頓首早辱報教過情之言伏讀愧赧欣承起居佳勝聞雇夫殊未集非三四日不辦如此少駐固有名矣來日度必未行有嚴氏小亭欲具早膳烹茶少欵庶盡叩所疑匆匆語離便有千里之隔切幸不外荔子兩等贈諸郎娘不宣某再拜又鄙句寫呈一笑昨晚一士人來傳公黎姥夢事枕上偶成揮汗奉簡幸恕草略此詩切不可示人它年乘槎北還可以出矣今日必未成行有所闕勿外幸甚某再拜又某再拜午暑伏惟起居佳勝早來拙句嘗聞唐人有諸邪赤子之對因黎姥夢事偶爾成詠方以為愧乃蒙屬和既捷且工如差邪二韻古之作者不過此耳不勝歎服令嗣寒熱必不作行尚從容庶圖邂逅不宣某再拜又某頓首今日果成行否想一畨勞勩過此亦遂多事矣早作起居佳勝昨暮聞有盛集殊悵然四卦不知嘗經覽否區區欲再見之意誠有所未盡也僕於左右亦嘗效其狂言矣公有所疑亦望指擲豈如世俗以諛言相媚悅哉此書本不以示人以公致力於斯文之久必能洞見此僕相求之意也度今早必未有它客聊敘區區因以詗候動止不宣又中前湯字鄙句何以流傳至彼和章又得千里一噱海外士不肯讀書又耻於下問有見過者默坐而已然淨名一默溫伯雪子目擊而道存自愧癡頑不能頓悟耳陳逢時緣了襄事因得從容符子繼往想今冬不落莫矣别紙所喻荷意愛之厚但各在一涯會合未有期平生不敢失信於朋友豈敢預計邪得家人去冬書云孟博女子已一面出適第四兒子已一面娶婦今諸孫女雖多惟孟堅女子僕去家時才周晬今十四嵗矣聞極端慧與令郎年正相當但人事有不可預定者言之但怏悵耳某再啓與蕭德起書人生享全樂孰如德起者六十之年有此具美無愧老萊不知前世作何大因緣有此無量善報耶某度嶺海首尾六年惟書史可以自娛此心不敢它用也紹伊居相近必時會合城中見諸友望一一致意許厚之夫婦併亡橫傷之後愈覺寂寥天之報施果何如哉厚之貪嗜酒色乃有取死之道古宿云出世間法乃大丈夫事非將相所能惟公勉之某中間緣喪第三子逺鄉無與開釋悲惱過當遂至大病幾入鬼録踰年得安始翻然感悟今幸頑健如舊某自離鄉朋友喪亡如胡已茂張全真無慮數十人多緣不能節省世緣全真在會稽搜求妙麗丹砂茸附如啖魚肉徒資嗜欲耳自謂享榮貴得便宜今為一藂枯骨有甚便宜到這裏便世尊諸大菩薩出來也救不得豈不哀哉與胡邦衡書某頓首顧戎來辱問訊意愛甚篤三復感歎三月二十一日忽有昌化之命乃因次子孟堅為鄉人所中云僕嘗作私史詆謗事兒子亦就逮詔獄至今得家書十年嶺海未快仇人之意時時撰造此身已在生死之外但付之一笑耳只今惟一僕自隨隻影萬里秪自憐悼近方入公館灑掃茍完明忩淨几復理琴書聊以度日承索序引中間亦草得前日因私史事凡平生具草盡付丙丁尋亦自悔更俟神思稍定紬繹續奉寄也公之訓釋自足名世何假區區之言顧君忽過此云即行草草作此不宣某頓首又某咨目上啓秋暑異常伏惟衛生有道台候起居佳勝某旋得省劄大理具獄兒子竄峽州永不檢舉父子蹈此大禍固無可言而纍及平生知友如張燾程瑀二尚書潘良貴舍人各降三官坐嘗通書胡寅侍郎鎸職坐通書扇搖經略餘人賀許二郎官凡五六人各降兩官使人不能不悵然也諸友自知無益各巳相忘久矣架空造此不知其因蓋此數人一向投間此其罪也置之勿復道連日憂憤無與晤語領來書啓緘快讀信如執熱之濯清風佳篇乃未嘗得見蘇李句此句法則工而擬非其倫則不敢當三序須俟神間志定今未暇也然骫骳之文豈足發揚妙趣以傳示後來聞命愧惕令郎氣象未易量僕孫女多俟公還朝未免當擇一端謹以配君子長兒女子乙卯生已非偶矣亭午汗方浹背勉作此紙閲畢則付丙丁不宣某咨目上啓與海南時官書日來呂願中帥桂林未必便有相害之意小人觀望田憲復差一武大夫李望者來守昌化望本張俊太傅軍中壕寨官粗暴無禮觀望上司百端凌辱郡中官僚士人不許往還行户不許供應飲食囚之空廨死在旦暮八十老翁豈堪摧辱如此耶與羊荆華書某前承示諭令嗣新年當命名觀其氣象靜重秀爽必為令器輒欲以堯民為名而字之曰元夀可乎恐宗黨有同者却煩垂示某啓上荆華解元又小亭以檳榔叢竹為勝二物皆有香杜子美詩云雨洗涓涓淨風吹細細香以細香名之可乎早涼乘興寫得納上某上荆華又某啓早辱訪别不無悵然移時起居增勝筆一枝聊為文場決勝之具來早定行無緣詣别塗中萬萬加愛不宣某啓上荆華學録又羊四蹄酒二尊輒納上助諸公行春大瓶甚佳云是臘中造煩二公為東道僕以過客例不出亦覺老倦羊切不可分惠僕一口不乏也餘客須君謨希用其它二公擇之某悚息上學録荆華又鄙句本不欲廣昨蒙垂諭再寫呈或得諸公和章可聨粘以示郡侯亦一美事也切不可更粉飾以彰拙惡幸甚某啓上學録荆華又夜來獨坐因改細香亭詩落一聮似覺一片之意有所歸宿挑燈乘興寫得奉呈但換一長字以易押只今能過早飲否某痢藥自朝下手方合了焙乾百五十圓可即令服某上荆華晚具家餐未時可過某白答符秀才書某昨辱過顧長箋見貽議論粲然三復增嘆想晨夕起居佳勝所論左氏能發明春秋之旨孔子云左丘明耻之丘亦耻之則是其好惡取舍未嘗不與聖人同也後來諸儒紛紛之論蓋未易以臆決其是非至如馬遷班固范曄之徒各成一代之史亦不免互相譏評是豈可以所短而廢所長乎况丘明親授經於仲尼故傳或先經以始事或後經以終義或依經以辨理或錯經以合異杜元凱蓋終身好之自謂有左傳癖其言豈茍然者若因元凱以求左氏因左氏以求春秋庶乎聖人之微旨得矣吾子有志於問學况已得良師異時當卓然有立於世願言勉之衰老荒唐又何以進焉目昏手顫不罄所懷某啓上與薑山嗣老書某啓王勝至辱示書三復嘆詠伏承日來法體安勝慰喜無量薑山風景清幽而吾師行業孤峻鐡磬家風千古不泯矣僕違離鄉土十有三年過去事不復追念未來事豈敢希求芙蓉有云從來不了只為今時若了今時更有何時平生學道今粗得力故能於煩惱泥中一塵不染瘴鄉炎海本自清涼固難與俗子道也然生死去來本是常事若罪垢未除𡨕心宴坐無常來到撒手便行别紙所喻有退居之意不勝欽嘆大雲墳庵本如師肯來諸事成辦無柴米之虞若師真有退間之志便令小兒打疊方丈迎請歸庵蘇公有云悵西湖之久别本是偶然為東坡而少留無不可者來嵗家中必遣人來切望垂報適連日天寒雲色凄黯書問填委意思荒忽勉作此紙惟祝加愛不宣壬申十二月望某啓上又黃精逺寄極荷某巳造直掇寄近村三十里然古人既死漾在尸陀林中劉伯倫常以鍤自隨曰死便埋我楊王孫以布袋褁尸入穴則去袋此皆逹人大觀能辨真假不流滯於三塗一點冥靈自有去處如此殊覺今日多事不免見笑於大方之家也但吾儒以孔孟為宗師棺槨衣衾不敢廢也又某啓老兵至辱惠問勤勤詞語超勝三復歎仰就審日來法體安穩某衰年久處遐方粥飯之外有以自樂海外風濤渺然人情物態久亦安之乃知華嚴重重世界十世古今不離於當念而摩詰老人掇移妙喜世界不為神通坐想薑山長松蔽道流水涓涓如在目前耳吾師一向安間經禪之外必有妙句幸時見寄惠笋乾時時咀嚼未忘鄉味餘人並無能及黎香僅有四兩供佛之外或同志相過時爇一瓣便如坐寶陀山與白衣對談也與胡邦衡書某頓首儋崖雖不乏便小海之隔風波亦可畏惟是跂仰未嘗少忘也郡中附至四月中所惠書并玉友魚醢深用感戢玉友履此風濤烈日而色味殊不少變信乎其能耐久也仍審即日起居增勝吉陽天下至陋窮處今學者彬彬知所尊仰何陋之有劉賔客作謫九年賦意謂陽數之終當變况吾二人巳踰一紀天道好還但力行一忍字需之象曰君子以飲食宴樂若能日飲醇酎不辜此風月則無入而不自得也相與勉之而巳不宣某頓首又某啓近因許秀才便舟附手書并麵菴昨日有自昌化來者云尚未行甚悔輕付也春暄伏惟起居佳勝春後殊無好懷此間雜花如桃李亦罕見之意天地中和之氣至此盡矣言至於此亦似可笑前所寄六詠欲易三兩聮今冉寫去幸因的便却付前本也北耗杳然家間所遣人至今未到一身寓此日有意外之慮然劉伯倫以鍤自隨死便埋我則又釋然耳出無友之説誠如東坡所云近黃舜揚秀才巳到書館相近得此一士少慰孤寂會下士人如向携公書來及小裴氣象巳超勝乃知詩書醖釀之功亦大矣仲尼嘆道之不行欲乘桴浮海又欲居九夷豈虛言哉武王克商封箕子於三韓至今為禮義之國吉陽之居公之不幸而一時士類之幸也三月三日某啓上又某頓首盛介至辱真翰三復感嘆不容於懷欣承履兹庚伏起居增勝昨蒙惠丹固璀璨精華非止扶衰而巳然亦未敢遽服者不知和國為何人六月二十六夜忽脾疼異常天明方止而鏡中形容陡覺瘦瘠異常心甚疑之是夕忽夢三道士來黃冠豫若將起程北歸者道士邀僕於去城六七里間授與道書兩卷云是司馬子微養生説僕不暇閲納之懷中臨别最長道士言我有丹四粒藏之松中將取以授子僕以擔杖巳行不及翌日問趙主簿長沙人和國為誰趙云張丞相封和國公始大感悟藏之松中者松為十八公神固告之矣晨起焚香作禮先服白丹一粒其餘不知可繼進否兩日氣象巳如舊豈殘生未即埃溘有同塗之幸歟不宣某頓首又某頓首前月末黎下班轉致中秋所惠書欣承善逹吉陽粗巳安居不勝慰喜嵗律遒盡元正俯臨賢君子道泰之時伏惟味道之腴知德之奧起居佳勝某衰苶如故自九月初鄉民不靖郡縣擾擾至今想巳流聞郊赦雖有檢舉之文仇人在朝固巳絶望死生禍福定非偶然中間得李守書云吉陽羊米特勝諸郡魚蟹亦不論錢有此數物人生更復何求况君子無入而不自得想琴書自娛不知身在萬里外也承喻易説敘引固當如命然擬非其倫則不敢當已勉作數語俟左右北轅面納餘冀自重不宣某頓首上又某少懇近逢時託撰軍學記雖已勉強撰得巳下手刻石矣但昌化軍學記五字欲得邦衡作漢𨽻比已令停刀筆以俟幸速得之恃愛忘率爾悚息之至元衡未中第才業人望如此後必中耳令嗣想不廢學異時必能繼公清風也令郎氣象可喜為胡邦衡子而命又與僕相似它時寧為凶人必不為佞人也呵呵似聞廬陵書來尊少俱康佳僕家書不出此月必至隻影萬里頗有意外之慮去秋人回令津遣三兩老妳婢來孟堅不在家不知小兒能辦此否得孟堅書頗能不廢學抗論甚偉某已寫書一幅忽蜀僧行密至袖出寂照庵三字如獲至寶餘俟後便某再拜湧月閣三字森然如入武庫見古劍戟凛然如覩正人端士之容即已付郡侯而前榜及僕惡札彼以人情不肯亟換須俟從容耳某再啓又令郎氣象不凡又朝夕侍側日聞妙言異時未易量也某猥懇中間在瓊管作雙泉記君前携去副本意欲得左右作漢𨽻文雖不工然古之碑碣賴字畫以傳逺者多矣漫裝界卷子一軸風和日暖或不憚煩承興一揮灑之幸甚某再啓又某手啓昨顧巡檢行奉記伏承老人以夀終想人子之痛豈易堪忍况吾友至性過人幸勿至傷生尼父每以中道立教載在禮經過此失禮意况五十嵗以上血氣不比少年時吾徒處憂患之際又瘴癘侵其外惟痛自裁抑乃免病苦至懇至祝近緣議者傳僕擅離貶所見在清湘出入王安撫家諸處雖已申奏見在本軍城裏居住而諸司尚以為疑陰遣使人直至昌化緝探節前至此今巳回矣度此報至朝廷必已釋然曲折符尉知之此不詳具八十老人死自其分耳年來亦覺頓衰步趨無力心志健忘聰明不及前時矣又緣為文字纒擾晨起嘗晏坐而喜抄書以此不得全功於鍊養但絶欲十四五年色身尚強耳十一月九日至節是日戊午乃僕本命作小醮青詞末云滌除玄覽悟色境之皆空専氣致柔冀形神之俱妙大略如此覽封州書感嘆不可言或以僕近日動靜一寬朋友之念也丹砂甚妙為更求數粒古人云內丹既就外丹自來豈其然乎偶此便甚的因致此幅紙不宣某啓上又某冉啓某老病日益衰瘁加以羣囂未靖杜門待盡以此久不通書唯是懷企道義未嘗一日忘也吾徒憂患至此古今罕有如僕老病死自其分公今遭此家禍更宜以逺業自重勿過悲傷居瘴煙之地血氣巳耗七七之後冝茹葷鮮以助真氣凡居喪有疾飲酒食肉聖人所許儋崖瘴毒之地獨不比有疾乎又某啓相望不逺而風濤洶然久不承問動止此心傾仰何可勝言仲夏酷暑起居佳勝某老病如故日夕汛掃此心時至即行非如吾友盛壯之年前程萬里惟祝乘此間放盡為巳之學至處憂患之際則當安之若命胸中浩然之氣未嘗不自若也邦衡豈俟鄙言仲尼作易亦専論此事困剛掩也險以説困而不失其所亨其惟君子乎剝必有復否終則傾邦衡素明此道需之時則當以飲食燕樂僕之頑鄙又垂盡之年惟知生死事大無常迅速故汲汲耳此間為况甘君必能言之僕自去年四月家僮至復杳不知消息舶船今嵗無往浙者亦且任之古人以離火宅棄妻子為勝尚子平之徒是也吉陽氣候與昌化不異君子無入而不自得千萬勉之不宣五月朔某啓上湧月二詩極超勝本不欲出而光芒萬丈孰能遏之它時録本付陳氏永為海外之傳不但藏祕篋笥間也又某啓相望隔小海風波洶然冝相忘於無相忘也杪秋氣爽伏惟道體超勝患難至此正是著力處想宴居有以自娛動則觀書以廣智靜則息念以存誠賦詩一首彈琴一曲古人困而能通用此道也江西必續得近耗封人消息何自而來周機宜何人哉人情物態近益可畏不宣某啓上邦衡學士老友又某啓甘子行嘗奉手函諒巳塵視日來煩暑伏惟起居佳勝某老病如常儋崖天下至惡弱之地吾二人居之能不以為陋內有黃卷聖賢外有青襟士子或一枰之上三酌之餘陶然自樂是非榮辱了不相干故十五年之間雖老而未死蓋有出乎死生之外者符子海外有識之士廉而有才相從踰嵗如一日想能道僕起居之詳舍人公相見為僕致意三蒙惠醖此意厚矣念正牢落未能致一物修城立寨一勞永逸尚何罪乎聞太夫人襄事須俟公歸甚善甚善不宣某啓上邦衡編修老友又某頓首使至辱惠真翰深佩雅意相望雖若不逺而山海之隔不啻弱水人情險巇過於蜀道去冬嘗作書不敢輕付即日恭審台候佳勝某老繆椎魯不文過辱寵示太夫人行狀俾之著撰伏讀赧然此非老於文學者其誰敢為然邦衡名節凛然老朽得附名其間豈非幸願但此文須少從容若止述婦人閨門之行其他畏避而不敢言則非僕之志豈足以慰士友之望邦衡之心哉無由面談切冀保重不宣某頓首劉夢得謫播州栁子厚以禹錫母老願以栁易播是時裴晉公在朝言陛下方以孝治天下願俯從其請禹錫遂移連州今聞邦衡有奔喪之請不知大臣中亦有慨然如晉公為開陳者乎今冬郊恩邦衡歸有期矣願益自愛某又上又覽機宜公書超然如見其人亨仲亦蹈竒禍蓋非偶然深於術數者能言之一切順受更有何事僕年垂八十喜進者尚下石不巳所論無根却非廟堂之意既言僕擅離貶所見在清湘言者亦得之傳聞使有意見害欲加之罪豈無名乎然一犬吠雪百犬皆應連月人情大有可笑置之勿復道也年來衰頽步趨瞻視皆不及前時但心志尚強耳清河時聞動靜然謹不欲以無益書問纍之茂逺竒士僕初南遷過臨川預以書戒其勿出渠回書慨然反出十餘里外相迓清談終夕傾倒然中間消息甚惡心不以為然今聞機冝公所報悲愴不已如此人者世豈多有造物不仁何奪之遽耶如聞秦國却能稍寬老人平時參禪於夢幻死生是第一義但子母之情豈易割邪但漸逺漸忘耳機冝公數詩皆妙作憂患中陶寫性靈實賴詩酒張第劉昉楊願皆惡病而殂孰謂造物果無心耶老懶加之畏禍又善纍人皆不敢作書近又緣虛驚取平生朋友書問悉付丙丁已而又悵然如邦衡往來書亦不免為煨燼矣如詩文它日尚可求也某再拜與陳伯厚書某啓自辛酉度嶺今十四年矣前此郡縣皆遇善友不復有流落之嘆近緣呂帥到任小人歆艷意望超擢皆有陵藉之意平生守道遇所當為雖鼎鑊刀鋸在前不避賴上天眷祐背我者殃害我者亡而祐我者昌以此處之淡然至於老兵不過抽去數卒無所損益但小人觀望鬼怪百出未易筆舌陳也政使趙瀳之言得徹廟堂并諸司自可一笑前此固知足下必來愚意老率之言先入於諸司以公與僕厚不能無過慮蓋為吾友慮耳今田憲既深知公似可無疑矣與王彥恭書某啓去冬忽郡中備坐省劄勘會在與不在本軍兼行下一宗行遣事雖無根而諸司絡繹郡遣使臣微服察探人情恟恟觀望百端至今逺近知友無一人敢通問者今日初方有人北來者士友亦節節通書言事巳明白還公元官復知雷州聞之而喜可知也過去事不復具述因禍得福事豈偶然想今巳到家種種如故矣即日伏惟台候起居萬福某老病如故年幾八十直旦暮人耳未知何時握手相從一笑耳想廟堂深察旦夕必有帥漕之除豈小郡所能淹留耶僕年來衰病傍無一人不免取最小兒孟傳若來不出今冬未知人事又如何峽州亦不知音耗自公行後所傳多端不可具述大抵幸災樂禍者多不足怪也公氣候却一向安樂吾徒但能寡欲自可無病彭祖云上士别床中士異被服藥千裹不如獨卧此最要言海外近頗擾擾瓊州黎人反叛見起兵誅討未聞平蕩吉陽纍政不得人百姓無告澄邁令黃璋權郡諸司按發現在海康取勘諸司差到武德郎王庚近又為士民所訴渠不勝忿又申奏朝廷及諸司言結連陳適兄弟謀反兹事體大聞瓊司已收留二陳矣皆異事也向熱千萬自重不宣某啓上彥恭安撫老友乙亥三月二十一日答樓仲暉書承寄示宣城父老王霖等申狀讀之恍然既感且嘆僕頃守宣城無惠愛及民今巳二十八載矣年垂八十死在旦暮自度此生不能再當郡寄以撫循斯民又道路隔逺不能效朱仲卿死葬桐鄉東望雙溪疊嶂之勝感嘆而已因見諸父老為致此意惟祝率勵子孫仰事俯育為士為農勉為忠孝戮力以事田疇先期而畢租稅立身揚名以顯父母是所望也與胡邦衡書人情恟恟想杜門飲醇與僕况味同也自去冬緣王彥恭事驚憂不小數日所傳朝廷已察知其誣王盡復官復知雷州了城壁人情陡變凡知友半嵗不通問者連日踵至可付一笑耳邦衡憂患重重冝有以自寬清心宴坐絶欲忘緣莊老吾師也其餘經史且可撥置僕今年七十有八平生萬事足所欠惟一死耳年來諸况如故但腰膝無力然平生故人死亡略盡通封川書為轉求丹砂實濟扶衰之用某冉批孫女乃孟堅次女年未及笄親期能稍緩為幸蓋不可越次故也又某啓久不通問實以小人窺伺者衆不欲以無益之寒溫奉纍也日來起居佳勝今早林令自瓊州專人報秦公十月十八日歿故前日赦文不見此公階位心知如此今果然也僕巳為太夫人撰得埋文其間有難回避者前巳為上淨本須面納也前日赦文固知非渠意想宅上自有專人至矣某老病遂有復見松楸之望度不出二三月間必有朝命可即促裝也惟保愛是禱不宣十二月二十六日某啓上又十二月二日蒙恩檢舉移郴尚未被受省劄至即首塗矣邦衡旦夕必有指揮幸加鞭相遇於雷化間幸甚切便促裝勿以細故滯留也昨日一報尤快意謹納上埋文漫草就不能盡褒贊之意望不外垂喻餘非面見莫罄所懷某啓上三月二日某頓首又前奉書并銘文久矣中間人情尚未堅決故不能無過慮今似稍定檜黨略盡先太夫人銘志輒以奉寄然猶未可示不相知者僕巳有郴江居住之命然未得省劄姑忍待之不知邦衡已得移命否此無可疑但促裝旦夕必至或傳已得家書須令人計會省劄昨早得小兒書云正月十八日已遣兩兵今猶未到不知帶得公文來否遞中恐浮沉耳某少懇近以邦人欲得儋耳廟記漫撰成念非邦衡妙翰無以增潤骫骳之文幸輟少刻一揮灑之僕得公文即行前途定期少欵四月十日某頓首上台眷均勝過儋或僕已行即便可入行衙少駐也天氣正熱須早行日中少駐也某再啓又僕平生故人如蕭振賀允中皆巳擢用前日不合通書十二三人各皆被召如陸升之乃傾陷僕與孟堅者今巳勒停編管雷州天之報施何如哉孟堅已復官歸矣與呂仁甫書某頓首一别甚久遭罹禍患不復具言近聞還朝尋復舊物方深慰喜俄聞復有投間之請殊不可料中間承書曾未及報乏便因循殊愧惕也即日伏惟台候增勝某蒙恩近徙脫瘴癘之鄉固已厚幸幸不可數亦且安之死生禍福固巳素定如吾仁甫才識學問豈能終厄之乎處憂患之際政須勉力想曠懷逹識不俟老朽區區之言也宣城僕舊所臨仲曄又僕故人也銜觴道舊想有足樂至於覽觀溪山之勝追繼隱侯之妙作時或見寄一洗胸中萬斛之塵誠所望者連發鄉書目昏手顫不盡所懷不宣某頓首上仁甫郎中老友
