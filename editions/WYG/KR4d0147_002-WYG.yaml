body:
  text: 荘簡集巻二宋李光撰五言古詩和徐漕苦雨之什澤國三月雨浩渺灌室廬爕調歸化工佞佛計已踈乗時舞鰌鱔快意鳬鶩趋君来持龍節問俗浮江湖風濤正豗蹙斯民豈寧居一飽不可期况乃供軍須素懐澄清志慷慨時登車田疇得安業十郡通有無隂霾㑹消釋清風為驅除漸聞閭里間歡聲變嗟吁元夕隂雨孤城愁坐適魏十二介然書来言瓊臺将然萬炬因以寄之海濵遇元夕况值愁隂天重隂障佳月㣲雨雜瘴煙孤城欲黄昏里巷已蕭然荒祠鼓坎坎老巫舞蹁躚揮杖眩村氓捩齒傳神言異域俗尚鬼殊形耳垂肩邦人素敬畏香燈競駢闐使君招我飲老病不得前有如伏櫪馬硉兀難加鞭遥知瓊臺上萬炬照綺筵幽人正愁絶跏趺坐深禪霧靄埋羣山不礙孤月圓茅菴一燈留照我獨不眠夜闌香篆銷息息火自傳何當訪羽客同上羅浮巔羅浮山不甚穹而夜見日東坡有詩云羅浮見日雞一鳴又小説中秋大雷雨坐有道人引客上羅浮頂月色皎然雲雷皆在山脚下丙寅重九權郡李申之置酒嚴氏野趣亭愛其幽深因作此詩遷流南海濵兩見菊蘂黄今晨有嘉招駕言陟崇岡負郭得勝㳺幽居𣺌雲荘小亭椰葉間下有青蓮塘寒花卧短籬踈松間修篁隔屋雞犬聲逺村散牛羊使君慕幽貞愛此野趣長緬懐千載人聊復舉一觴西風起蕭瑟吹我兩鬢霜旋駕豈無期良燕詎易忘瓊惟水東林木幽茂予愛此三士所居雖無亭館之勝而氣象清逺連日水漲隔絶悠然遐想各成一詩目為城東三詠今存二首南極多老人及見九代孫君生古崖州氣質清且溫今年八十二頗覺行歩奔白髪暎紅頰疑是羲皇人城東有幽居瀟洒真隠淪淵明寓栗里子美還羌村遷流到雙泉得與君子隣仁里聖所擇徳齒古所尊佳節近重陽黄花已紛紛家家社酒香處處烹雞豚今朝風日好水落依舊痕一散腰脚頑杖䇿時叩門杜公司法我愛曽城居負郭頗幽雅田疇遶屋廬門逕絶車馬但虞水侵門敢怨風飄瓦淵明非避俗自覺往来寡嗟予屏斥乆兹地猶里社相望十里間舟楫幸可假風休水亦落晴日照郊野願言駕柴車始覺我憂冩林曽城自然解印北還作古風送行徐侯古循吏作牧海南邉三載撫民人擒縱出拘攣里巷絶嗟呼囹圄無淹延父老有好詞不見吏索錢忽聞解印綬蠻歌惨離筵逺控横海鯨追躡凌波仙寄語廣利神無令颶風顛臨行一麾手萬事盡棄捐勿作兒女戀吚嚘涕潺湲火雲赤崢嶸修途願加鞭愛君氣猛厲心似鐵石堅逈悟出世法痛掃習氣纒明窻净棐几華藏了大千别語徒諄諄維摩本無言憶筍㑹稽富竹萌窮臈鞭已抽我家南山南不羡萬户侯暮春杜䳌啼茁茁蓬麻稠冒土出羊角穿籬露猫頭紫蕨性隂冷荻芽體輕浮愛此凌雲姿不與凡卉儔勝韻貴苦腴兒童悦甘柔爽口聊一快弱胃敢怨尤朅来海南邦腥鹹厭蠻羞桃枝但叢生澀勒蔽道周遥看貌或似美惡如薫蕕安能助盤餐嘔嘔但棘喉唯有㯽榔心羮臛或暗投鄉味不可忘坐想空涎流人生各有適勿語王子猷去地草丁夘四月望城東古雙泉清駛給萬家缾罌晝夜給舶賈雜隣娃蠻童與蜑女赤脚兩髻丫常苦藻荇繁滋蔓掩白沙蕭䟱失林影䀨䀨鳴亂蛙十夫勇善沒入水初紛拏詎勞斧鉞誅芟荑費鋤杷除惡去根本無令再萌芽依凴絶纎鱗驚懼失老蛇風吹有縠紋月照無纎瑕銅盆湛冰雪石鼎發乳花餘波及農圃父老免嘆嗟叙逰二十韻呈亨叔列之戊辰三月晦端居倦煩促是時天乆旱炎烝劇三伏出門得幽尋佳處在東北二子俱可人皎皎瑩氷玉得趣琴有絃對案食無肉是日以丁亥斷屠初弹醉翁操再皷南風曲琅然山水音一洗瘴霧毒陳園俯江郊茅茨擁修竹造門慕子猷緩歩效顔斶汲泉瀹佳茗蕭散謝羈束清華臨水岸下有萬荷緑韋君所居亭名清華下臨荷池披榛訪蕭子清净獨無欲黎沈爇瓦鼎溪蓀養石斛石昌蒲非九節者皆溪蓀杖藜轉修徑夹道森喬木歸途遇馮姥斂袂不羞縮蕉花雜山丹㯽榔繞新屋欲我留姓名呼兒為磨墨似憐窮獨叟曽沗十州牧良辰不易遇此㑹豈難續他時倘重来更為呼醉秃閩僧元伯本好飲近乃折節痛戒世以啄木為珍禽其聲至入樂府而海南一種形小而聲滛每四五月間飛鳴如蛙蟈至八九月乃已亦名啄木繁聲可惡然瓊人訛其聲為罵秃禽殆得其實因為賦詩南海四五月有鳥名啄木飛鳴亂葉間形眇聲繁促枝間時瞥見黒啄羽毛緑雌雄相應和生哺依老穀或疑在家僧受施不㸔讀為禽不知名但自罵秃秃小兵特輕趫修竿每馳逐今晨耳目清桑下聞布榖黄鸝兩三聲睍睆出幽谷從今屏菑翳遶舍植梧竹鳴鳳倘可期樛枝要棲宿居嶺外遇寒食春日自明霽我心何鬱傷草木競芳菲飛鳴自頡頏悄悄坐書幌幽幽宴空床既無功名念反思白晝長愁来不自持零落鴻雁行三過解澤流六見槐栁黄最憐小兒女路逺不得将生還一笑喜死去埋他鄉生死如循環我師佛老荘感此寒食節新烟過隣墻松楸渺雲海目極摧肝腸書成附鱗翼不如永相忘何以慰目前作詩示阿張仲兄去嵗落一齒書来悵然作詩以寛其意四大非我有元氣力護持齒從齠齓換既老還復隳太公含兩齒卒為帝王師睢陽嚼空齦名與日月垂張儀但舌在折齒激范雎漢相老無齒飲乳如嬰兒安得鐵如意擊堕還離離齒存固可喜齒落無深悲退之有成言軟飯穏送之何須噬乾胏但可食肉靡養生已有堂晏坐吞朝曦谷神定不死老􅆅豈吾欺時為五禽戲納息如靈龜命友日飲醇弄孫且含飴齒落㑹復生千載儻可期八月七日夜對月仲秋氣已爽林壑雨新過忽驚浮靄空乍覺天宇大夜凉風露清佳月纔半破清輝漸可愛入户驚照坐團圞遶中庭有似蟻循磨西山聳岡巒輪側愁易堕魏子不解飲詩語頗頓挫呼兒聊與醆我唱渠輙和停杯看月落客去未能卧海月夜夜好新詩幸頻課庚午春予得罪再貶昌化瓊士餞送者皆悵然有不忍别之意嚴君錫魏介然追路至儋耳兹事當求之古人感歎成古風二首送行紹興庚午春李子復南徙倉皇就長途夜擔不敢弛餞我無雜賓亦有方外士裴杜二耆哲矍鑠渾童稚老禪不忍别握手揮涕淚行行至澄邁名姓難盡紀酒酣通湖閣頗獲一笑喜緬懐雙泉居風土信清美牀頭掛海月枕上聴流水夜棊招隠淪濁酒㑹隣里桑下不三宿悵戀吾過矣人生隨遇樂已過猶脱屣最憐嚴與魏觸熱到儋耳世情逐炎凉萬古同一軌對境心數役何以敵生死南窻可寄傲散帙忽盈几松林十里間移植頗易致赫日資繁隂且復宥老楮夜凉得深禅日永常晚起恨君不少留伴我讀書史寓多老穀方暑藉其繁隂不忍伐去海外謡有序瓊崖儋萬四州限在海外地里險逺輸賦科徭率不以法所出沉香翠羽怪珍之物徴取無藝百姓無所赴訴不勝其忿則相煽剽刻嵗在已已盗起瓊山旁郡不禀約束苐隂拱以觀其變經畧司亟遣官弁将士且招且捕凡踰時始以次殱滅明年春三月渠魁授首而紫羅諸村焚蕩一空雖足以懲戒後来然致冦之因實縁賍吏予懼叛民雖熄而賍吏愈熾因摭其起事之因作海外謠一篇庶㡬採詩者逹之諸司稍更舊法精擇㢘吏使吾赤子咸被恩澤不甚幸歟嗟爾海南民遭此賍吏阨銜寃無所訴相熾起為賊為賊計誠拙尚可活朝夕攝官陳建中貪猥最狼藉有女攀勢要不料非偶匹但務房奩多苞苴又絡繹挟此恣貪惏如虎傅以翼貳車號按察往訴遭箠擊最後差丁夫欲免人十直貧民賣妻孥强者起持㦸陳集成縁此起至今文昌縣白晝無人迹其次經界官太守乃姻戚隨行縱獄吏聲勢如霹靂經界覆量官王琮郡差獄司雜職隨行郡縣遭唾罵圖冊成覆易琮自雷取紙每幅定價七十圖冊已成者皆焚棄三豪因衆怒從者如葦棘去年從説諭閭里已帖息狂謀起賕吏從此復反側愚民夲無知脅誘冒鋒鏑焚蕩玉石俱老弱轉溝洫遺骸横道路流血千里赤殺戮誠快意賍吏有徳色從今無忌憚徴斂㡬時息沉香與翠羽窮搜逺彈射烏衣徧村墟氣燄已可炙乆矣攝官弊至此亦云極祖宗有成法賍吏盍杖脊疲民正憔悴使者冝憫惻軺車難數来時遣一幕職永寛海外氓精求二千石世無採詩官吾言徒感激紹聖中蘇公内翰謫居儋耳甞與軍使張中遊黎氏園愛其水木之勝勸坐客醵錢作堂黎氏名子雲因用揚雄故事名其堂曰載酒予始至儋與瓊士魏安石杖策訪之退作二詩何年老揚雄寄此十畝園年深草木荒杖策誰叩門緬懐東坡老陳迹記舊痕空餘載酒堂往事孰與論黄柑與丹荔不受瘴霧昏邦人時餽奠一笑空罍尊東坡載酒堂二詩蓋用淵明始春懐古田舍韻遂不見於後集予至儋始得真本因追和其韻荒園草木深樵牧不敢踐雖無南國愛正以東坡免平泉與金谷視此顔有靦至今儋耳民里巷多樂善勝逰儻可繼杖策敢辭逺燕談有佳侣永日可忘返酒酣任歌呼此興吾不淺嗟彼南海郡土瘠士常貧藷芋餉晝耕松明照夜勤當年兩黎老能邀玉堂人一往五十年遺迹宛若新邦君時舉酒父老舉欣欣邇去城三里郡守勸農多㑹此堂賢多隠農圃耦耕可問津魯叟欲乗桴東坡願卜鄰東坡贈黎詩云借君三畝地結茅為君鄰他年青衿子凛凛多秀民客有見饋溫劑云可壮元陽感而有作世人服煖藥皆云壮元陽元陽本無虧藥石徒損傷人生百嵗期南北隨炎凉君㸔田野間父老多康强茅簷弄兒孫春隴驅牛羊何曽識丹劑但喜秫黍香伊予十年謫日聞貴人亡金丹不離口丱妙常在傍真元日滲漏滓穢留空腸四大忽分離一物不得将歌喉變哀音舞衣換縗裳爐殘箭鏃砂箧餘鹿角霜咄哉此愚夫取樂殊未央我有出世法亦知不死方禦寒須布帛欲飽資稻粱床頭酒一壺膝上琴一張興来或揮手客至亦舉觴滌硯臨清池抄書傍明窻日用但如斯便覺日月長参苓性和平扶衰固難忘恃藥恣聲色如人畜豺狼此理甚明白吾言豈荒唐書為座右銘聊以砭世盲食無肉養生有真詮虚心實其腹十年嶺海㳺一鉢隨僧粥納息歸丹田息在火亦伏黄河朝崑崙晝夜自回復空膓無滓穢氣轉聲漉漉腥膻减吾夀厚味有腊毒顔囘稱好學陋巷一瓢足何侯日萬錢但取身後辱虀塩有餘味何必常食肉居無屋處世若傳舍吾生聊託宿志士守蝸廬幽人卧空谷君看漢梁董日享萬鍾禄華榱庇千間子孫無託足海南吾欲老是處堪卜築結庵傍松林開牖面修竹野老日往来席地有棊局俯仰天地寛莫嘆居無屋海南有五色雀土人呼為小鳳罕有見者蘇子瞻謫居此郡紹聖庚辰冬再見之常作詩記其事公實以是年北歸癸酉冬予亦兩見之今二年矣乙亥八月二十二日㑹客陳氏園飛鳴庭下囘翔乆之衆客驚嘆創見因賦是詩海南有珍禽厥服具五色絳者為之長飛鳴隨止息佳哉陳氏園形制存古迹我遊秀野堂森木䕃華席羣飛為我来馴擾如夙昔鴟梟既逺遁烏鳶俱辟易邦人號小鳳隠見異凡翼姬公嘆不聞尼父未之識嗟予戅且愚疾惡不量力叱杞誚希烈流竄至南極神物知吾忠天公憐我直吉凶有先兆告我將返北蘇公不吾欺流詠冠今昔斯言儻有徴便可具接淅不出老氏不出牖莊生務内㳺猿猱猶習定難犬放須収俛仰超三際翺翔隘九州坐㤀師正一辟榖慕㽞侯客至酒三酌睡餘茶一甌蕭然方丈内卒嵗更何求五月十三日北歸雷化道中謫居了無營贏得一味間杜門十六年草深沒柴關猛獸當路號虺蛇伏榛菅今兹果何年天誅此凶姦羣妖既蕩除善類稍北遷仲子萬里来喜極涕淚潸坐定復載笑喜我顔渥丹人生七十稀况復加九年平生學飬生吐納留真詮忘家何足道絶欲亦偶然歸歟謝世榮収功在丹田宴坐息息匀頻嚥舌底泉日用形欲勞何必驅小蠻看我鰥氣成空行躡飛仙七言古詩和胡徳暉松軒詩炎天羣木無葱蒼朝曦夕照繞屋梁一榻南窻復東廂老松效技扶披猖㣲風颼飀㺯笙簧坐變熱惱為清凉簿書相仍愁肺腸細聲入夢我豈遑但覺風日明晴窻皎如夜月和秋霜樛枝鱗皴龍蜃走翠葉鬱律鸞鳳翔燧明徒誇能照夜坐想煙霧風中香何如軒成獨賦雲錦章從兹遂愛夏日長㑹㸔壑聳仍霄昻辛未人日同郡僚逰陳氏園海南人日春已濃栁條逺映桃花紅攜觴尋伴逐春色杖藜縱歩遊城東陳園新築芳亭小緑竹猗猗自圍繞杯行不用管絃催枝上綿蠻囀春鳥舊傳人日天多隂今年人日春光好田家但喜藷芋収我軰惟憂酒樽少明朝有興還復来賸買鹿蹄􅂸醉倒樂㑹雷令數恵筍作詩為謝朝餐敢歎庖無肉食罷時時自捫腹肯羡何侯日萬錢不學天隨甞杞菊傳聞樂㑹似淇園坐想猗猗千畝緑邦人富比萬户侯縣尹清亷仍不俗尺書逺致擬兼金錦綳解縛排寒玉為君急食不敢餘恐被南風吹作竹清湘道士潘静素抱琴南来予方謫居逺屏郊外如逃虚中每佳辰良夜風清月明對脩竹俯清池必快作數弄如是㡬年今将北還舊隠索詩為别屢請而不懈因歌而送之道人南来冒炎酷雲水生涯寄枯木嗟予乆墮魑魅羣黎唱蠻歌耳根熟深林迥静嘯鵂鶹雨濕天隂聞鬼哭君来為我一揮手洗盡胸中塵萬斛伯牙師涓死已乆此聲欲絶君能續快彈初作鸞鳳鳴忽如啼烏集華屋吟猱抑按神氣閒流水㳙㳙赴幽谷夜深餘響應霜鐘朝来吟對蕭蕭竹静中最喜讀書聲妙響琅然振寒玉要知心與古人㑹不務新竒誇俚俗浩歌别我出門去潮回風便難追逐道人来時湘水渾道人歸去湘江緑湘靈抱琴待君来月眀莫向江頭宿贈裴道人癸酉昌化軍作道人今年七十六問我修行惟絶欲宻栽澀勒當䟱籬旋闢荒榛結茅屋不抄書不㸔讀宴坐凝然常瞑目夜深頻嚥玉池泉晨起隨縁飽藷粥海外惟昌化地瘠狹米資之泉廣土人以藷為糧其大徑尺每斤不過一二錢也故少饑民天以活此一方之人甘脆肥濃腐我腸巧笑蛾眉真鴆毒蠻煙瘴霧隘空虚謹守藥爐誰敢觸我愛裴君道機熟過我𤣥談已超俗三峯頂上少人行百尺竿頭防失足三峯下術也世人那識天地根往来綿綿無斷續嗟予流轉海南村智者方明禍中福君不見龎道藴盡将活計沈湘江自織笟籬供口腹又不見成都市上嚴君平終日垂簾唯賣卜王侯螻螘同丘墟學道從来貴幽獨蚌生珠石含玉㸔我丹成跨鴻鵠馬蹄去去穏着鞭闗山路永多坑谷成氏園八月晦逰城西成氏園呈李子從并幕中諸彦泰和坊外成家園花木幽茂泉㳙㳙竹籬茅舍稱野逸平坡細徑遥相連青松翠竹晚色净紅蕉素槿秋争鮮幽禽頡頏樹蒙宻古木夭矯藤交纒嗟予與子成二老登山臨水追少年幕中羣彦盡豪俊小兒亦許依紅蓮焚香隠几如逃禪一枰勝負聊欣然誰云嶺南瘴癘地城西一壑吾欲専四月十七夜觀月成詠曉来新過雨天宇肅以凉横空跨綵虹物被五色光夜乆羣動息月出東南方團團葉間露皎皎瓦上霜四月未全熱清飈吹我裳新橋跨長堤下有百里江月色萬古在江流自奔忙誰呼謫仙人被髪下大荒對月哦汝詩臨流飲我觴夜景信竒絶茲㳺固難忘天地多變態况乃魑魅鄉不如坐待赫日射屋梁妖禽孽狐都走藏𤣥珠吟予十年間重履憂患自藤而瓊自瓊而儋一日忽悟笑曰此造物者知其頑礦難化故以此苦之爾偶讀荘周書言黄帝遺𤣥珠而罔象得之又讀維摩經云髙原陸地不生蓮華因成𤣥珠吟適妙喜書来乃贈之黄帝曽逰赤水北遺了𤣥珠無處覔我今偶到海南村煩惱泥中親拾得珠體圓明光滴瀝流轉根塵人不識只在尋常動用中未見争知吾不失吁嗟世人空費力欲見此珠須目擊要令心息每相依宻宻䕶持防六賊可歎金陵失守何怱怱敵兵燒我天子宫守臣頂香率父老開門羅拜惟鞠躬翠華遥遥遵海道漢家詔令不得通外交内應儔與鄴所在州縣皆望風坐觀豈但宣撫望拜降亦有丞相充山巔水涯多白骨邇来十室九已空權臣悍将恣吞噬剥膚椎髓方稱雄敵来擁兵保妻子敵去奏㨗希侯封城狐社䑕争附㑹浙部復産勔與冲紛紛餘子何足數我眎文舉真如龍子猷知府給事寵寄道中阻雨之什憂時憫農有古良二千石之風感歎次韻老農麥熟還忍饑蠶婦見絲翻淚垂耕田辛苦竟何補長安㳺手多輕􅏂良牧憂晴復憂雨咄咄書空應自語皇天于物無偏頗不須怨嗟梅雨多赤子既迫寒且饑異時嚴警如邉垂棄捐溝壑死鋒鏑有如秦越視瘠肥公来隨車霈靈雨織婦耕農聞好語愛民戢吏政不苛兵興敢避科徭多坐忘吟李季言以觀海圖詩見寄其言蓋寓養生之意因作坐忘吟荅之我聞天台坐忘仙清虚石壁留真詮長生要妙止一篇林間宴坐心超然壁觀無異逹磨禪繫念一處離葛纒真人祕語豈浪傳谷神𤣥牝常綿綿嚥津納息歸丹田泝流直上朝泥丸下灌舌底生玉泉身輕超脱如蜕蟬御風騎氣追偓佺神逰八極俯仰間度人濟物功行圎要㸔白日見青天短歌贈柯山祝道人年来憂患老病纒獨寝一室方蕭然道人顧我笑且憐贈以一粒金華丹彤霞入腹氣熻赫紫燄照日光斒斕寸田溫溫起真火尾閭厯厯朝泥丸道人年少逰賢關曵裾躧履公卿間宣和天子崇神僊近臣薦引登金鑾造膝一語開天顔羽衣縹緲黄其冠吴筠雖甞入禁掖稚川終隠羅浮山荆棘掃盡棃棗熟汞鈆九轉龍虎蟠一裘百衲聊卒嵗斗酒滿引冰雪寒朅来鐔津施丹劑應病與藥俱輕安度人濟世功行圓超脱滓穢猶蜕蟬唐道士劉道合善鍊丹後尸解而去髙宗營奉天宫遷其殯室弟子開棺将改葬惟有空皮而背上開坼若蟬蜕焉良弼使君寄梅花翌日曹憲仲約偶成長句北歸已度梅花嶺洗盡瘴塵愁欲醒一枝何處最竒絶鏡裏形容水中影西湖處士語已妙東坡先生句尤警三篇自可追少陵一賦誰復傳宋璟老人新從海外歸枕冷燈清愁夜永使君憐我老無伴折贈欲令娱晚境夜寒相對黙無言耿耿此心如古井主人皓首自能歌倒載花前􅂸酩酊飲茶歌予性不嗜酒客至無早暮必設茶頃見中州士友相戒不飲茶蓋信俗醫之說謂茶性冷能銷鑠腎氣故好色者信之然當時貴人未有長年者今恣情色慾而獨戒飲茶豈不謬哉陶隠居云茶能輕身換骨黄石君服之仙去雖未必然益知茶不能害人也作飲茶歌以示同好者朝来一飽萬事足鼻息齁齁眠正熟忽聞剥啄誰叩門窻外蕭蕭風動竹起㝷幽夢不可追旋破小團敲碎玉山東石銚海上来活火新泉候魚目湯多莫使雲脚散激沸須令面如粥嗜好初傳陸羽經品流詳載君謨録輕身換骨有竒功一洗塵勞散昏俗謝宗論茶云昏俗塵勞一洗而盡盧仝七盌喫不得我今日飲亦五六修仁土茗亦時須格韻卑凡比奴僕客来清坐但飲茶壑源日鑄新且馥炎方酷熱夏日長麴蘖薫人仍有毒古来飲流多喪身竹林七子俱沉淪飲人以狂藥不如茶味真君不見古語云欲知花乳清泠味須是眠雲卧石人義郴廖翁贈予靈夀杖歌以謝之郴山峩峩水濺濺清淑之氣鍾神仙山頭老木㡬千年不入樵斧隨飛烟廖翁好竒自掄選真材不用加雕䥴鏗然入手龍脊瘦宛轉隨歩鶴膝堅今晨過我有喜色磨捋持贈誇竒特老人年来腰脚頑出入政藉扶持力拄上岡頭望故鄉萬壑千巖纔咫尺天寒醉卧不出門杖兮雖良長倚壁載酒堂東坡文章喧宇宙粲如日星垂不朽六一老人猶避路作者紛紛皆束手歐公見東坡文歎曰老夫當避路放他出一頭地也俊逸精神追李杜華妙雄豪配韓栁晚年流落海南村黎唱蠻謳隨蜑叟先生已去五十年遺墨殘篇尚多有豐城寳劒埋獄中光熖猶能射牛斗敗垣壊壁秘蝸涎夭矯龍蛇已驚走東坡真迹多為有力者取去所存但摹本耳獨餘黎氏舊園亭喬木森森免薪槱半是東坡親手植老幹樛枝互纒糾杖藜乗興訪遺像遐想英風竚立乆曽吹葱葉送迎翁當日兒童今白首子雲之子今六十餘矣東坡所謂小童即此人也莫嗟寂寂路荒蕪亦有幽人時載酒
