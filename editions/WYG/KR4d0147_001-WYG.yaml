body:
  text: 莊簡集巻一宋李光撰五言古詩讀書低頭對千載把巻竟長日興亡見俯仰忠佞更得失意合心自知感嘅屢沾臆朱黄紛几硯緗素互編帙比隣亦好事挾策到蓬萆縱談及羲皇坐待寒月出贈李頥老𢎞毅年少時學易一念酷研精覃思苦見理不見欲一朝感蒼蒼床下産神竹𢎞毅益自信夜寐目不屬族長閔其勞令人付斤劚惜哉凌雲姿一斷不復續𢎞毅少安枕旦氣㡬為梏時匠司剪伐夀命旋見蹙神明信可畏感應亦何速至今旁舍笋不生𢎞毅屋康成書帯草千載登史録吾書此段竒後學宜三復𢎞毅勉嵗寒任道照猗緑夜起對月西風掃浮雲素月清夜滿幽人愁不寐一夕㡬輾轉天河見澄霽江流俯清淺身隨栖鳥息興與孤雲逺叩門復何人隔竹空吠犬竟須掩闗眠爐薫裊香篆縣齋清坐有懐門外無俗軌相對惟獨鶴短翮雖未全志已翔寥廓軒然避雞羣不受鷹隼搏持以比佳士潔白誠相若筆端生雲烟胷中貯丘壑憐君青雲姿胡為滯蓮幕英豪出草萊闒茸履臺閣新詩時有寄妙語洗煩灼種學求根源意匠無斧鑿自慙非清流訟牒困酬酢好古雖膽大去惡愧力弱君来破吾顔商㩁盡流畧髙軒掛琴劒景物如宿約遥山倚青㝠逺水帯城郭圓荷已浮花晚筍亦脱籜㳙㳙風露清湛湛河漢落濁醪有妙理與子隨意酌萬事付儻来何必問日脚學道未忘名欲跨揚州鶴淵明賦歸来頗恨未恢廓平生剛褊性敢避窮獸搏君詩如清琴平淡猶賀若泠然山水音妙響振林壑寧為太史走豈事桓温幕樂哉吴望㳺㣲凉生殿閣况兹積雨後枕簟謝焚灼未能去三彭便可休六鑿跌宕文字間詩酒自相酢氣凌李杜豪力振曺劉弱偏師攻長城稍稍出方畧山川助離騷景象如宿約隂風起虚籟暮靄昏城郭菡蓞泛金塘篔簹隕銀籜卧㸔曉參横坐待殘月落不愁衣典盡尊空莫起酌明朝醉復醒生憂押垂脚雪中過盤石山寄劉季山離家六十日晴嵐逐征鞍已嫌狐裘重漸喜絺縠單朅来古清湘狂風捲濤瀾小市人寂寂夜深雪漫漫誰知桂嶺北風雪如長安明朝過盤石仰見蒼蒼山上有千尺松下有百丈灘劉子方避謗結􅈋寓其間却掃謝友朋兒女俱團圞南行敢躊躇履險如驚湍我心本無慮莫作拘囚㸔肯學老鍾儀楚奏聲嘶酸伊洛節上人寓浯溪中宫寺作溪月亭諸人咸賦詩輙留鄙句結亭臨大江浯溪出其側道人傍溪月月照溪逾碧當知月在天分身千百億此月有虧盈我心本澄寂合眼聽溪聲開眼見溪色聲色兩不留我心何處覔夢覺月在窻還如舊知識次韻子忱游東山古風休沐不暇懶趂此郊原晴駕言出東門蹀躞馬在坰江山恣游眺頗惬幽人情同行有勝侣豪氣如陳登妙語傾錦囊璀璨珠璣盈暫釋簿領勞頓覺心迹清人生一世中轉徙如郵亭愛君絶塵姿坦坦心地平當年功名念晚節師淵明出處豈有心敢論虧與成吾衰百念冷端如在家僧東山本非山名字空峥嶸不見古松色詎聞山鳥聲演師獨面壁燕坐朝黄庭骨冷喚不回蚌珠祕龕燈次韻元裕同游東山佳什東坡所謂愛此小天竺即其地也東坡謫蠻荒夢想兩天竺哦詩寄東山妙響振林麓作祠衛公旁一杯奠椒漿相望栁栁州追配韓潮陽懐人空隕涕亭榭今荒墟溪山不改色松聲契真如嗟余麋鹿姿慣逐漁樵伴平生鐵石腸那復置冰炭尋山得佳侣聊遂幽人意登臨有遐矚俯仰觀此世君為丞相孫仕作淵明清一枰可消憂五字堪析酲人生各有役詩棊豈妨道閉户朝黄庭習氣終一掃杜子固參議累覔南窻詩勉成鄙句子固謂杜氏古無二族祁公其近屬也長懐杜陵老遐想靖節翁二子不並世千載餘清風君為南國秀志氣陵蒼穹盤屈不得伸妙畧參元戎歸来侣漁樵香火陪琳宫卜居牛斗墟築室瓦礫中依然植五栁髣髴餘四松南窻有幽意寄傲膝可容拊床寒月侵曝背㣲陽通琴書樂忘憂尊中常不空吾鄉有諸杜源流自祁公歸歟有成言葛巾永相從季㣲季暉昆仲相繼見訪風姿議論皆慨然有祖風季暉仍出佳篇見貽語極不凡且云即往山中讀書作詩送行吾鄉顧虎頭千里飛食肉名参慶厯賢罪入元祐録堂堂想儀刑凛凛見眉目百年議論定竒禍反為福森然見諸孫刻勵如白屋我觀宣和間權倖互當軸一時名家子半為閹宦辱暫時得富貴卑賤等厮僕君家賢伯仲抗志守先躅幽情寄鉛槧雅尚在松竹僧房忍朝饑雪牖耽夜讀訪我五松山懐袖粲珠玉嗟予乆放浪嵗晚守窮獨閉門雀可羅三徑草常緑依山結衡茅一飯共脱粟呼兒具原本缺山肴雜野䔩對桉笑復顰負我十圍腹去去樂琴書山中芋魁熟迎山閣為長慶寺登覽之勝暇日擕觴命友屢醉其上因賦此詩青山似幽人那肯入城府逺碧横春空穠綠浮天宇常苦俗物遮不得快觀覩何年敞層閣軒豁開牖户千巖勞顧揖萬壑隨仰俯飛騰若鵬鸞盤踞狀龍虎翩翩垂翅翼蜿蜿回肘股朝来拄笏㸔爽氣逼簷廡孤雲時去来寒月静吞吐溪山自竒絶信美真吾土我老賸得閒遇勝輙為主朋簮俱莫逆棊酒屢清聚亦有支遁流時来共揮麈迎客如迎山好事免嘲侮常烹雨前茶不打齋後皷從今賛公房名字照千古五月七日分韻得食苦筍詩此君凌雲材節葉貫霜雪千林富東南百種自區别前後互萌芽一一調苦舌貓頭效􅐑嵬竹箭資𤨏屑世方嗜柔腴我獨甘苦節幽姿照匕筯挺特似英傑定非淇園栽要是首陽蘖侯門厭珍烹鼎爼雜葵蕨安能知正味但欲取客悦何當薦君槃茹香資激烈欲雪㑹稽恥志氣在餔歠甲卒五千人猶能覇吴越和胡江州丹陽道中二首君才固英竒志在行天討胡為尚兀兀疲馬踏長道論兵當節制摧敵如振槁不數圯上翁顧笑渭濵老凛然擊搏手試用豈不早他年梁棟姿涵養已合抱士卒常有餘食廪苦不足妻孥驚笑我陡換髯鬢綠江西魚稻鄉升平氣全復以公封侯相自可飛食肉韜畧固輻凑精神常滿腹去去復何憂驅除仍覆育伯㝢知府給事寵和子賤與僕域字韻詩格力超絶輙復次韻中原困干戈衣冠淪異域忠臣憤切骨義士血空滴平生憂國心豈以死生易年来返田廬門巷無轍迹老驥萬里心垂耳卧空櫪素交今㡬人十載勞夢役宣城擁朱轓潘子縛禪寂屹然障頺波我亦心匪石和杜得之探梅之什家山富梅林開落紛無數二年屏荒村踏遍溪頭路孤標凛冰雪幽香襲巾屨陽坡照晨曦永夜泣月露端如玉妃謫清絶欲誰顧嵗寒偶相逢政復慰遲暮君㸔桃杏面争妍競深注何如叢棘中獲此秀傑句寄題餘姚徐宰新作嚴公堂子陵古真隠逸氣横九州平生江海志自比巢與由鴻飛本㝠㝠肯為稻粱謀虚屈萬乗顧枉煩物色求貽書誚君房預作腰領憂舜江公邑里公去踰千秋青山無古今大江日東流人物浪淘盡英名至今留當年漁釣地陳迹餘荒丘徐侯有佳政百里安田疇作堂名嚴公懐賢慕前修時来對江山一尊更獻酬我豈隠淪歟三黜今白頭年来賸得閒忘機狎羣鷗結茅牟湖傍一竿幸可投蒻笠青蓑衣生涯寄扁舟嚴子定不死吾将從之㳺稚山運使作齋名藏暉且覔詩乆不能成今兹以大農召行有日因成鄙句并以送行美玉當韞櫝明珠産深淵逹士貴混俗大隠常居㕓皓皓終易汙嶢嶢難自全和光同其塵老聃有成言徐侯如水鑑胷中定媸妍疾惡若仇讎論事敢直前朅来大江西獨攬刺舉權姦贓盡屏迹豺狼敢垂涎顧欲藏其暉名室以自鐫老火正滛恣旱氣方接連悵别南浦亭去去朝日邉中原正塗炭生民思息肩公歸明光奏輸忠傾肺肝功成不自居名與日月懸江西乆旱徧禱莫應稚山少卿将赴行朝一夕大雨遐邇霑足因成喜雨詩送行老火擅炎夏枯旱氣欲然傷心早晚禾注目髙下田民窮捨耒耜羣起操戈鋋小偷何足道所憂在四邊夜来滄江雨朝望水接天歡聲逹四境渥澤遍大千清風亦徐来扇簟皆可捐有懐林壑幽僧窻思晝眠流浪生死海一往六十年何以報主恩粗了江西縁羡子朝上國揚帆若登仙江山亦世情雨後清且妍悵别南浦亭杯行莫流連去去聞好音一嵗定九遷某天資坦率人也性又剛褊偶以使事暫去行闕馬上放目頗適野性作出郊一首簡知我者出郊何所欣所欣在觀眺殷紅著新枝濃緑浮逺嶠悠然出塵想快若追風驃㡬年偪仄懐兒女困嘲誚人生貴適意官職豈不要從来坦率性痼疾難救療沈湎與獨醒亦各以所好鶴脛自然長斷之定號呌譬如食茶味煎煑人外料言行自有常安能改吾調浩歌歸去来家有老徳耀永託煙雲岑終焉擅漁釣為向伯恭題向公天下士慷慨有祖風亦復對行殿宻議禆天聰君臣意氣合每進甞從容飄飄青雲志顧肯貪天功榮塗拂衣歸安坐薌林中作堂榜企䟽進退聊比蹤父老非故鄉何必囊金空俗軌競奔馳世路方尚同善為子孫謀但務田園豐偉哉此二子遐舉希㝠鴻富貴如浮雲聲名壓岱嵩千載繼者誰我友向伯恭和劉提舉㳺龍井謁清獻辨才二像我觀二大士超悟非適今過去與未来一一現此心緬懐清獻公兹地舊所臨餘愛存甘棠過者猶斂襟平生辨才老般若縁契深圖像儼如昔遺迹了可尋坐使茨棘塲化為薝蔔林法嗣傳衣燈膏肓存砭箴圓顱擁敗褐華髪欹半簮相對了無言清標映孤岑丹青乆剥落感嘆成㣲吟了知身外身不坐喬木隂真形換緗素妙句劖青琳與子成三賢清風逈蕭森凛然龍象姿不受鼯䑕侵從兹香火社永為人天欽謫居古藤病起禁鷄猪不食與兒子攻苦食淡久之頗覺安健吕居仁書来傳道家胎息之術因作食粥詩示孟愽并寄徳應侍郎晨起一甌粥香粳粲如玉稀稠要得所進火寧過熟空腸得軟暖和氣自渗漉過午一甌粥缾罍有餘粟淡薄資薑塩腥穢謝魚肉嶺南氣候惡永日值三伏外强㡬中乾那受外物觸兩餐莫過飽二粥可接續故人尺書至教我禦瘴毒燕坐朝黄庭妙理端可矚神車御氣馬晝夜更往復乆乆當自佳根深柯葉緑寄語陳太丘人生真易足醉飽厭腥羶忽認海南叔送孟博二首我昔在閭里燕居處中堂兒女滿眼前嬉戯羅酒漿威命忽臨門一物不得將回顧堂中人獨汝在我傍舟行有蛟螭夜宿畏虎狼豈無平生交鄙逺多遁藏古藤底處所敗驛無垣墻急雨挟風雷漏水夜沒床竹屋聞號呼老兵凍欲僵郡僚誰復顧獨見李與黄李中之黄元功時時餽一臠稍稍葺兩廊生意春欲回倒景照屋梁散歩得幽徑讀書有明窻僕夫浣我衣鄰娃縫汝裳晨庖鱸膾美宻室沉水香文字可消憂探索易老荘我唱汝輙和不知嵗月長葛洪隠岣嶁蒼梧真帝鄉汝歸固不惡淹泊庸何傷作詩送汝行示汝鴻雁行我少事逺逰出門如野鶴藩籬脱雞羣乗風縱寥廓一往四十年平地起山嶽世縁真夢幻電過不可捉南来㡬萬里顧笑恍如昨昔如雲釋嶠今若龜脱殻朅来容江上風物喜淳朴豈無鄉土戀浮念起即覺汝歸暫歡顔所念路悠邈朝行避煙瘴夜宿傍城郭賸誇魚米賤勿説風土惡嚬送與笑迎但可付一噱有嘉堂酒寄吴令今晨有好懐薄日照窻牖幽人不可致誰共一杯酒鄰翁有逺餉分寄中山友歡伯信可人麴生亦耐乆豈比從事君開緘化烏有獨酌還徑醉千篇莫停手應思水邊人竹屋雜蜑叟簽判黄元功公廨枕江有小亭落成之初予偶假居之明潔深穏因得㳺息其上榜曰寓亭并留鄙句以見意物生天壤間有形孰非寓心隨萬境轉飛走各依附嶠南山河異嵗月亦屢度新亭枕江臯杳渺可飛步風濤振几席雲月隨杖屨吾生真寄耳那復歎淹駐當年有離憂政以南北故舉足皆道場意適隨所遇往參少林禪歸指曹溪路去住吾何心要以生死喻逺迹混漁樵忘機狎鷗鷺千載如知心相對猶旦暮題李子從清風閣吾宗河山傑氣直甘賤貧一坐古藤州十見嶺嶠春深林寄倦翼涸轍横修鱗華閣俯大江東望山嶙峋一榻自俯仰鼻息撼四隣稚兒日戯側丱妙參席珍人間正熱惱道上多瘴塵清風颯然至自謂羲皇人願師陶靖節不羡石季倫有酒但頻酌從渠喜還嗔新亭新亭結雲根暗谷通子午環山繚逺碧雲木巧相補峭壁倚層霄痕迹無鑿斧朝登晻靄中嵐氣隨歩武須㬰大明升萬象快觀覩一日一坐間變態難悉數松隂轉虛簷清梵出重廡閭閻萬瓦合下視纔一縷悠悠落日吞耿耿寒月吐邀朋文字飲四座揮玉麈雅詩發天慳妙語叩𤣥圃援琴奏哀彈得趣忘抑撫人生貴適意渉世隨仰俯陋矣韓淮隂耻與噲等伍三年瞬息中聊作溪山主杯深且樂聖綆短強汲古至理在目擊何用苦撐拄超然心境空逸韻渺天宇九月二日自公館遷居雙泉風物幽勝作雙泉詩二十韻山腰祕靈源初出纔一線方池湛空碧奔馳忽縈轉皎皎涵青蘋纍纍湧珠串夜深耿落月澄澈静如練呀然舊穴深神物或時現邦人儻知敬早嵗起雷電瓊山瀕巨海鹵水充煎煉凛然居其間正味獨不變我来卜幽居蕭灑得奇觀挹彼注兩泉澠淄忘分辨陶公豈虚言掬飲逃禍難激齒冰雪寒晨起頻𠻳嚥入腹清而冽丹田賴澆灌甘寒勝鍾乳精潔可羞薦静無蛙蜩喧不受泥滓澱恵泉入權門疲人走郵傳貪泉亦强名聞者自鄙賤瓶罌日夜汲閭里悉周徧數椽如可老一壑吾欲擅時時俯清泠照見本来面九月二日徙居雙泉翌日徐自然使君李申之監郡携酒見過退成古調百三十言戯簡二公一笑南行踰萬里公館煩造請主人憐老病為卜林廬静郊居偶然遂俗慮盡可屏雙泉信竒絶嵗乆渾泥濘稍覺藻荇繁漸已産蛙黽滌除頼衆力傾頺費修整幽竇響珮環平地散林影潺潺来枕上客夢安得永邦人日夜汲攜挈雜罌皿秋蔬灌百畦夏稻溉千頃端能滴冷泉那復遜冰井蒼梧冰井元次山遺迹存焉使君屏歌吹政恐煞風景我亦慣窮獨客至但煎茗雙泉詩有序自然使君屢督雙泉詩顧東坡絶唱在前何敢輕作今晨又辱佳章因次韻為謝作詩媿才慳徒勤再三請一聆咸池奏頓覺哇滛静惡句如惡人浪出必遭屏君詩似澄江萬里無滓濘我詩昩格律聒耳類鼃黽蘇公經行地亭宇稍葺整方池湛寒碧曽照東坡影新詩與妙畫千載未為永不聞宗廟器傍欲間瓦皿吾徒且加餐今古屈伸頃何如棄寸繩要出千尺井蓬莱隔弱水未易凌倒景時能訪幽獨論文具醪茗九日登瓊臺再次前韻異鄉感節物聊赴使君請層臺縹緲間野曠天宇静木落水涵空氛霧俱逺屏籬邉菊斕斑逺摘帯沙濘誰云皷吹雄謾欲等鼃黽短髪不勝簮烏帽倩誰整衰頹强追歡起舞羞顧影君憂白晝短我愛清夜永三釂意彌勤殽酒罄杯皿棄置身外事聊復樂俄頃世方洶波瀾我心猶古井歸来豪興盡宴坐朝内景明朝汲新泉舊篋餘賜茗中秋謝彦恭恵酒中秋有佳月名醖来海康海康太守賢憐我持空觴逺分十具至呼兒喚鄰墻坐客盡飲流一舉空罍缸酒酣對明月不藉燈燭光移席俯清流照我兩鬢霜海北與海南各在天一方我老歸無期兩地遥相望宴坐桄榔庵守此嵗月長願子一咄嗟跨空結飛梁度此往来人魚鹽變耕桑籬邊白衣来莫待菊蘂黄
