body:
  text: 莊簡集巻十六宋李光撰序閒樂先生奏議序議官御史專以犯顔嬰鱗排擊奸邪為職若論而不切則不能起人主之意辨之不早則不能折禍亂之萌建中靖國初太上皇新即大位號召天下名賢聚之朝廷自執政大臣下逮䑓閣之士皆極一時之選故殿中侍御史陳公伯修其一也是時蔡京方為翰林學士承㫖雖明智之士未能知其必亂天下也公獨慨然論奏條其過惡章凡四五上而不已且曰若果用京則治亂自此分祖宗基業自此隳臣非自愛而憂之蓋為陛下憂為社稷憂為天下賢人君子憂未㡬京遂為執政盡逐異已者固寵市權熒惑主聽握國柄者㡬三十年諫爭之路自此塞絶卒之强敵肆虐生民塗炭公之言始效於此可不謂先見之明乎司馬温公誌呂獻可墓稱其論列王安石於海内歸重之時人主信任之際以謂明逹先識已所不及若伯修可謂無愧於斯人矣某嘗恨今世士大夫徒知稱誦陳瑩中而知公者尚鮮豈非造膝之言祕不敢傳乎古人之稱死而不朽者如臧文仲既殁其言立是也韓退之作諫臣論曰入則諫其君出不使人知之者大臣宰相之事若官以諫為名宜有以奉其職使四方後代知朝廷有直言骨鯁之臣顧不美歟公既殁其子某乃集録平生遺藁得奏議十有五篇以書抵武林張子韶求予序冠其首子韶曰伯修立志如此一䧟黨籍至老且死終不用凡有志於斯道者孰不惻然某雖生晚幸及識公於三衢引接誨誘待以國士今二十一年矣追惟平昔因泫然而書之嗚呼君子小人不两進邪謟得君則正士危理勢自然無足深慨公雖流離竄斥終身抱不遇之歎于今望之凜凜尚有生氣而彼紛紛者果安在哉覧是書者亦可為持禄養交擇利畏禍者之戒云紹興三年八月二十日上虞李某序記養生堂記予兄徳充寓居越之餘姚實在龍泉之北江山映帯最為勝壤嘗於南偏作堂爽塏而深隠外不假䑓池苑囿之翫内不列琴書圖畵之觀蕭然一榻而日㳺息其中吐納導引以求長年因牓之曰養生客有過而問曰子於治生則信有術矣何自而知養生乎徳充曰嘻子烏知治生使子而知治生則可與論養生之妙矣予今燕坐一室心超三際方以形為舍宅神為主人灌潄乎玉池之清泉以溉丹田呼吸乎𤣥牝之冲氣以營尺宅鋤胷中之荆棘而梨棗生薅害稼之稂莠而嘉榖植子視予之養生果異於治生乎客無以應某方謫處南荒書來告曰予闢養生堂世俗之人或以為疑予雖告以大畧意有未盡汝其為我記之某自少年喜閲道書㳺走四方延見方士多矣神仙之説雖傳記偹載然皆虚荒幻怪不足考信自陶隠居以正一之道授王知逺潘師正司馬子㣲皆蟬蛻而去然其法後世罕傳惟抱朴子論最簡而易行者其説以住息為妙葢息息之中神氣相合如嬰兒之處乎胞胎及其至也如釋氏之入定六根皆廢心想都㓕胎從復氣中結氣自有胎中息然非真積力乆功行俱圓者未易到也世人不能捐棄外事澄心觀照而日奔趨乎是非利害之境遂使氣自出入乎内神自馳乎外神氣各行子母不相守至於夭死者非不幸也古之善養生者莫如廣成子莊周之書載黄帝問答之語最詳摘其要言曰無視無聼抱神以静形將自正又曰汝神將守形形乃長生老氏五千言雖泛論道徳之㫖其要言則曰谷神不死是謂𤣥牝𤣥牝之門是謂天地根綿綿若存用之不勤此二者皆胎息之門户也徳充學道垂三十年平生寡欲無所嗜好悟厚禄髙位之傷徳故每安於卑官知珍脆肥濃之害性故自甘於藜藿以慈儉為可寳故無侈汰之過以朴素為可尚故絶聲色之娯今以從心之年白鬚紅頰浮沉里巷無一不如志者雖使不知吐納嚥潄之理固可與數子爭年而比夀矣尚何慕於彼哉雖然廣成子修身千二百嵗而形未嘗衰老氏則跨歴商周至秦莫知所終又有深於此者西域聖人巳成等正覺視身猶浮雲斯須變㓕惟圎明一㸃歴刼而常存今大乗諸經偹載斯事徳充倘兼修此道暇時訪尋禪宿叅透西來的的意則飛行自在出没去來真逰戱事古所謂神形俱妙殆謂是也某去鄉四年憂傷困悴有他人不能堪者徳充萬里致書必以此道過相勉䇿且有白首相從之語覧之悽然因書其末以見區區之志異時倘遂生還將築室泥灣之上風雨對床其必有日矣紹興甲子孟夏幾望藤州寓亭北忩某謹記瓊州雙泉記洪範論五行一曰水曰潤下作鹹山者水所出海者水所鍾莫崇於山莫卑於海故海中之水無不醎者自雷渡海而南曰瓊瓊本海中山耳而雙泉之井獨冠於二廣豈其源淵所稟得天地粹靈之􅂔而不資於海邪陸羽茶經論水云山水上江水次井水下又云山水乳泉漫流者上江水取去人逺者井取汲多者雙泉在郡之東北隅岡巒囘抱泉谽竇間其發源甚微初為小池泓澄清澈􅉷若氷鑑不見其流動之形葢所謂乳泉漫流者也郡人初不知貴蘇公端明南遷過瓊酌水而異之徃告其人而郡守求亭名與詩遂名其亭曰泂酌且留詩其上紹興乙丑予自藤江再貶海外以三月望至瓊衆指雙泉之勝乃葺居一日盡出積水因得詳究二泉所從來盖一井而有两脉其一自西南其一自正北皆濆湧而出水既渇泉益湍駛因各盛以器皿色味初若不可辨乆之衆皆謂西南來者尤清甘然後知只尺而異味者非虚語也泉自小溝南走十餘歩溢為方池又自两龍口入下池則泉之觱發者益衆水益深廣每當暴雨漲溢衆流散漫灌注於外四方之民無男女少長挈缾罌就浣濯者無晝夜常滿雙泉之名聞於逺近實自蘇公發之舊傳有白龍嘗露脊尾氣浮水面詢之故老以為信然蘇公既不載然亦莫有見者獨惠洪記注間一詩其畧云異哉寸波中露此横海脊舉首玉箸挿忽去銀丁擲大身何時見夭矯翔霹靂誰言􅉇背大更覺宇宙窄語雖不凡然决非蘇公詩龍之有無固不係水之美惡今所在潭洞池井以龍得名者其神靈或能興雲雨而未必皆甘泉也葢水之有源其畜必深畜之深則其發必逺其為龍神所宅焉無有疑者易言山下出泉䝉禹貢載禹之治水之跡亦詳其所出葢水之發源不過桮勺間及為江沱潛漢為渭為洛則貫穿中華横絶呉楚非有本者能如是乎世所稱甘泉多出於深山亂石中好竒之士至窮探逺討不憚巖壑之險攀縁上下然後得之今乃不出户庭几席之上清流滉漾影揺牕扉潺湲之聲夜到枕上風月之下毎與客把酒徘徊酌泉而歌之曰泉之泠泠兮以濯予纓泉之湛湛音沈兮以洗予心朝資予之食飲兮暮伴予之孤吟或泛流桮或横素琴予既寓居之乆矣日渉淺而汲深嚥潄元和滌除煩襟玉池生肥兮沙礫變金凜氷雪之遶齒兮何瘴煙毒霧之能侵邪歌罷輙欣然自得忘其身之在萬里外也獨恨海外險逺不得與惠山虎丘南零諸水同列於圖經非蘇公一顧之重則斯泉也委於荒榛蔓草間飲牛羊而産鼃鮒矣流俗所傳既多怪妄因志其本末使後來者有考焉四月七日上虞李某記昌化軍學記學校王政之本也三代至治之世未嘗無學皆所以明人倫崇教本長育人材而化成天下也周衰至春秋之際學校廢缺雖齊晉之大國晏嬰叔向之賢未嘗一及於此魯獨僖公能修泮宫而詩人歌詠其徳鄭惟子産不毁鄉校而仲尼追稱其仁葢古之學者以聖王為師而專師孔子則自鄒魯始當時諸侯雖不能盡用而四方學者如孟僖子之徒皆翕然從之升堂入室至於三千難疑問答其畧見於論語至自衛反魯然後樂正雅頌各得其所而三綱五常之道賴以不絶無他學故也故孟軻以謂自生民以來未有如夫子又曰以予觀於夫子賢於堯舜逺矣豈過論哉自漢以來其道益隆雖天子之尊躬執薦祼非道師萬世言法天下疇克當之我宋之興崇儒重道聖聖相承至仁宗皇帝始詔大臣問以治天下之道當時條對咸以學校為請熈寜元豐以來繼志述事弗替益隆乃闢成均乃建辟廱黨庠術序逹於海隅可謂盛矣逮主上中興和戎偃兵天下寖以無事乃詔中外謹庠序之教復太學之制旁逹郡國靡然嚮風唯海南地處遐裔雖屢更俶擾而是邦獨不見兵革里閭之間晏如承平人知教子家習儒事青衿之秀日以增盛毎詔下羣試於有司者至三百餘人然舊學庳陋傍迫居民人士每病之也先是城之東南隅郊原迤邐氣象軒豁黎阜拱揖昌江映帯實占一郡之勝至是人謀龜筮實協實從諸生獻謀工徒輸力富者效其貲貧者尸其勞郡守陳侯適亦樂從之期年而新學落成且於民家得古肖像華冠象佩逺合鄒魯群賢從祀取法上庠御書有閣講説有堂齋祭有室誦讀有舍賓客之位附於三門繚以周垣崇以列㦸下至庖湢莫不畢具固足以激奮士心作新後學士之周旋其間者且將磨揉遷革日趨於善變島夷卉服之陋為絃誦禮樂之鄉䘮祭冠婚無悖禮之失禨祥巫覡袪習俗之蔽使一變而至魯再變而至道將必由是啟之昔蘇公端明謫居此邦有逰學舍詩云攝衣造两塾窺户無一人邦風方杞夷廟貌猶殷因先生饌巳闕弟子散莫臻葢歎之也今相去五六十年間文學彬彬不異閩浙予以放逐至此時得與其士子相從文字間而王霄諸生又多及見前輩喜與遷客㳺一日摳衣踵門以學記為請念方衰病乆廢筆硯屢辭不獲因書其經始大畧如此異時長材秀民業精行成登巍科膺膴仕者繼踵而出則予雖老矣尚庻㡬及見之紹興二十二年嵗次壬申十月庚子上虞李某記碑儋耳廟碑昌化軍古儋州也後漢四裔傳載儋耳國最恭順其俗皆鏤其頰皮如雞腸垂之連耳因以為號非自然也夫人馮氏生隋末累世䇿勲有平㓂之功建國開府比古諸侯夫人諱冼五代偽劉之世封清福夫人紹興乙亥詔封廟額用太守陳適請邦人敬事之過於南海城隍二神舊城去今廟三十餘里日湳灘常有水患一夕人見夫人具畚鍤躬率人夫遷之工畢而人不知今凡二百餘年地形爽塏東望黎阜下臨長江百川灌注瀕海而水易洩故無旱澇之患雖地狹民貧而酒茗皆資之舶舡土宜藷芋民資之以為糧歉嵗惟食藷藷有二種大者徑尺豐嵗㡬不論錢故㓙年不見丐者雖無富民而風俗儉約婦人不曳羅綺不施粉黛女子自少小惟緝吉貝為生故多跣足冨者穿履韈而已蘇子瞻嘗有詩云馮冼古烈婦至歌此送迎詩近年風俗稍變葢中原士人謫居者相踵故家知教子士風浸盛應舉終塲者凡三百人比徃年㡬十倍三郡併試時得人最多夫人生有功於國没能庇其民天有水旱民有疾苦求無不應每嵗節序羣巫踏舞士女軿輳簫皷之聲不絶者累日自郡守已下旦望朝謁甚恭必有神靈以鎮一方而為之主宰舊説二廣葢陰中之陽故男子弱而婦人強男子多坐食於内而婦人經營於外豈其然乎紹興辛酉十一月建寜軍節度副使李某得罪於朝三貶而至乎儋丙子某月天子推曠蕩之恩北歸有日矣邦人父老丐予文以記其畧因念謫居之乆䝉冒煙嵐脱於萬死天地神靈實祐之謹躬詣廟廷再三稽首碑而銘之曰國名儋耳古所傳鏤如鷄腸耳垂肩夫人馮氏忠且賢錦􅓫平亂功曄然爰擇休壤美水泉居人按堵城池遷黎山擁抱完且堅邦人敬事乆益䖍年豐米賤佳吉蠲歌詩送迎巫蹁躚辭感春辭一篇為自然使君作有美人兮天一方秀外而慧中兮體便姢而生香腰支婀娜兮曵六銖之仙裳表傾城之巨麗兮施粉太白增之則長瞬明眸而流盼兮瑩秋水之清揚良辰勝日賓客滿堂忽歌喉之宛轉兮聲遏雲而遶梁異巫山之朝雲兮徒見夢於楚襄悵尤物之不可乆兮撫衾枕於空牀耿青燈之閃閃兮怨秋夕之未央記音容於彷彿兮掩涕涙之浪浪于時煩暑既退㣲露宵零風蕭蕭而入牖蟲唧唧而悲鳴徂清夜於蘭房収亂志於短檠雖冥冥而罔覿猶依依而奉承嗟予生之耿介兮視死生於虚誑慕壯夫之猛烈兮悟釋氏之真妄浩歌徑醉飲醇啜醨我兮為客彼得所歸焚香清坐神氣相随有來唁者一笑而揮之銘吳伯成推官晦堂銘至陰之原日行於冥升於九天物無遁形聖賢體之用晦而明谷虚能應水静則清政惡察察善無近名如處重闈以觀户庭惟伯成父皎皎夙成老氏和光舜曰勿矜以此事上貎肅意誠以此臨下氣和而平我作此詩為座右銘姜山静凝院鐘銘上虞餘姚之間青山盤紆寒溪漫流中有招提曰静凝院僧仲珣實嗣南山下惠通律師講席有衆千指香大浄供人天所依爰作大鐘以聲旦暮羣聾六時有所歸仰旁震萬壑聲聞九天幽途苦海無不解脱於是珣以書抵里人平江守李某求銘以識其上乃為銘曰我觀世人逐物䘮真莫覺莫悟三界沉淪爰有大雄獨振宗風雷震霆擊警世昏聾天鼓既動罪垢俱空平湖之傍姜嶺之巔其山峩峩其流㳙㳙我銘斯鐘可千萬年等慈寺鐘銘等慈寺於上虞為大伽藍慶厯中咸潤師所創建經方臘之變金碧之區鞠為草莾越二十一載有僧首妙智大師志逺始出其衣囊與其徒法常兼募衆縁經營而一新之師既以大厦安四衆又欲以鴻鐘警六時悲願既深衆應如響於是㳙擇吉日精求良工得冨陽人陳誠稽合律度範模陰陽凡用銅三千六百觔髙廣之數厚薄之齊咸適厥中將以覺昏聾滅罪垢迷法性者尋聲而頓悟沈幽途者聞響而解脱其功用豈不大哉實紹興辛酉九月某日也邑人李某覩兹勝事随喜結縁乃為銘曰諸佛出世開方便門引導衆生莫㨗聲聞爰作鴻鐘以警朝昏滅除罪垢誘掖善根衆生愚癡淪墮幽扉曠刼長夜永無出期天鼓一動若輪息機如雷如霆淵逹幽明聲來耳邉不於空生若夢而覺若醉而醒衆真羣魔稽首聳聼轉物庵銘世尊語阿難曰一切衆生從無始來迷已為物失其本心為物所轉故於是中觀大觀小若能轉物則同如來嗟夫學道之士以成佛為難則一切衆生無復有得者以為知易則世尊大慈大悲經厯塵刼受諸苦惱至於歌利王割截支體不生瞋恚猶不了悟其餘大弟子及諸菩薩方修行之初或投崖飼虎斷臂燃眉立雪齊腰如是勤勞然後乃得未有自凡夫徑超佛果者譬如瓦礫欲成黄金雖經百鍊終不能成若銷金鑛則鑛盡金現是金在鑛中必資鍛鍊當知一切衆生各有佛性無欠無賖非專苦行非離苦行若契本心則苦行如握土成金若不明本心則如黒月履於險道當觀人與非人性相平等妄情不起真心徧知特在一轉之頃耳昧者不知乃欲除煩惱而求菩提捨無明而求佛性不知煩惱即是菩提無明即是佛性失其本心去道愈逺我今自念此身流浪濁穢渉世不止卒蹈大難昧其根塵為物所轉無有了期於是宴坐一室反觀自性六用不行雖有去來随有不昧因牓所居室曰轉物而為銘曰若能轉物即同如來咄哉瞿曇誑謼癡獃物無自性我亦非有轉者為誰徒勞心手知無自性復是何物瞥起情塵捫空揣骨此庵無所住者何人具頂門眼試辨踈親端硯銘贈六十五姪孟容紫淵之精膏潤不枯以畀猶子旌其勤渠杜門著述如漢仲舒期汝褎然飛聲天衢孟堅硯銘端巖之珍玉徳斯具祕蔵深淵如士未遇出為世用匠石一顧温潤中涵文彩不露伏膺寒牕守此直素研窮經史講磨世務伸紙落筆三峽倒注丹墀縱言青𤨏緩歩収功翰墨繄汝之助孟珍房相様硯銘端溪之英非黒非赬方其未用也匣而藏之以瑞其家庭及其為用也波濤洶洶一揮而成文字之祥皎如日星人皆誦詠衆所推稱老人志願如此汝其勉承當務實學毋事虚聲孟珍端溪方硯銘端溪之石非黳非赤斲為汝硯斯文是力唯古聖賢是鑚是研飛聲丹陛落筆萬言孟傳硯銘席上之珍鑚之彌堅曰吾衣鉢尼父所傳孰為汝師南極老仙匣而藏之以畀曾𤣥秉徳之操如石之堅種學績文以磨以研治吾墨莊若農服田鹵莾㓕裂其報亦然我銘斯硯以貽孟傳方寸之地破暗發䝉㳙滴之水膏潤無窮溢為江河升為雲龍匣之藏之不敢妄用以全其功贊老人星贊晉書天文志云老人星常以秋分見於南方或曰南極見則夀昌世人多圖其形像配以靈龜松鶴三物程公給事伯㝢頃於維揚得是畵歸為致政中大夫生朝之夀且命友人李某為之贊云我聞古之真人服氣餐霞騎箕登天惟世耆耋上應星躔清秋既分雲月娟娟晨見南極其光􅁮然瑞公家庭非雲非煙惟此老人矍鑠蹁躚積徳行仁克生忠賢綵衣侍側玉潤金堅如鶴在松如龜巢蓮或金章紫綬出入乎黄扉紫闥或芒鞋幅巾徜徉乎水涯山巔閲世三百與此三物而周旋者乎正獻祁國杜公畵贊正獻杜公正色立朝以不欺為忠尤抑僥倖凡内降與恩澤者毎積至十數則連封而面還之以是為昭陵所敬一時正人羣邪所忌公獨左右之搢紳之士聞其風聲雖千嵗之下猶足興起其功利之及天下後世豈不大哉小人欲容身保寵者徃徃反舉以相戒曰是特沽激取名耳嗚呼悲夫公之六世孫師文寄示遺像予適有所感因再拜稽顙而贊之於穆正獻大節孤忠天骨秀㧞泰華倚空致君唐虞稷契䕫龍嬰鱗犯顔蹇蹇匪躬夀考康寜昭明有融咄哉鄙夫朋淫黨同謂天可欺謂俗皆聾曰位可竊曰身可容敬觀遺像遐想英風揆路百日萬世之功嗚呼祁公牧牛圖贊博白蘇令汝文出此圖相示二童子各牧一牛其一牛背上吹笛其一坡上箕踞而坐云是唐韓晉公筆晉公畵與族人幹本相上下及位將相耻以自名當時固已不傳矣然此本筆跡蕭散自是名筆何必託之斯人哉因以書其後云平原曠野熟視牛跡豐草長林随意所適彼二牧童逍遥自得陽坡箕踞牛背横笛咄哉慧蔵狂念未息孔鼻拽來費許多力戯作金粟湯贊我有一湯香味勝粥朝飲一杯和氣滿腹處處現身是名金粟子賤舍人寄入定觀音像因讃其上惟觀世音有感斯應䝉頭宴坐如金在并法無起滅動不離静能作此觀是真入定不出贊顔囘阨窮簞瓢自足揚雄草𤣥寂寞天禄嗟古聖賢遭此困辱我獨何人敢怨顛覆杜門却掃轉禍為福徳雖有鄰道貴静獨學當求巳言豈媚俗明牕静几助我幽讀優哉㳺哉以俟其復郴守江君畫贊望之儼然如臨其民即之温然如見大賓曰守與令而亷其聲曰清與白而避其名吾言豈欺既乆必聞後有良史秉筆而傳循吏庶比夫上逸事而補闕文者也病中自贊今年八十百病相攻今夕明月炯然當空似我方寸不欺為忠得死牖下是惟善終雖四山相逼五藴皆空唯靈光一㸃穿透地獄天宫咄甚喚作地獄天宫郴州寫真贊此予八十嵗郴江所傳衆曰似之然乎不然若其氣貎之軒然議論之凛然雖老而不衰者顧丹青之筆豈能得其全
