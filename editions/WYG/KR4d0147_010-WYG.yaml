body:
  text: 莊簡集巻十宋李光撰奏議論國是劄子臣聞楚莊王問于孫叔敖曰寡人未得所以為國是也叔敖曰國之有是衆非之所惡也君臣不合國是無由定也夫以區區之楚欲立國定制猶知所審况陛下紹膺大統撫御寰區當中外多事之時羣趣殊方衆志異慮可不知審所是而定之乎伏見陛下即位以來敵人内侮國勢搶攘寛大之令數頒求言之詔屢下巨姦元惡斥逐殆盡忠臣義士聘舉無遺凡所以收人心者可謂至矣而廟堂之上所與協心圖治者不過六七執政大臣乃復牽于浮議各營已私噂沓背憎結怨嫁禍莫肯慨然以天下為已任者方今民勞官冗將驕卒惰外則邊境繹騷内則財用匱乏此誠國家危急之時陛下憂慄焦勞于上而羣公大夫族談竊議于下學校之士不務宿業而以投匭為課程縉紳之徒不循分義而以捭闔為職任自白身而登儒館由選調而參廟謨祖宗以来所未有也行姑息之政徇茍且之習爵禄濫冒名器寖輕因一夫流言為變法易令者數矣人主威權何時而立祖宗法度何時而行朝廷綱紀何時而定此實社稷之深憂也臣愚伏望聖慈明詔大臣深加訓敕察其邪正辯其臧否熟問深思求合理道然後斷而行之疑其為姦則如勿任知其可任則不必疑奮乾剛以明黜陟隆委任以責成功庶㡬國是定而法制立矣天下幸甚取進止引對人乞先經三司劄子臣伏見陛下踐阼之初下詔求言虛懐聴納雖疎逖小臣間或引對親賜詢考將以開廣言路簡拔雋髦此盛徳之舉也臣愚竊慮陛下驟當㡬㣲臣下忠邪未易洞照其間頗有利口辯言乗時僥倖以徼寵禄姦人窺覬名器寖輕而實材忠樸之士徃徃恥於自售甚失陛下所以惻怛訪逮之意欲乞今後臣寮非本職合上殿人委三省大臣博采公議先次審察如委有行實及䇿畧議論過人即令引對庶㡬抑絶奔競以來儁異之士取進止論李㑹李擢劄子臣伏覩除目以李㑹李擢為左右司諫訓詞褒諭以首論蔡京有功特被召用外庭之議無不駭愕臣之區區亦所未喻夫首論蔡京者陳瓘也其次則有石公弼張克公毛注之流相繼彈擊上皇覺悟既罷而復用者數矣京與王黼前後用事權傾天下言路塞絶多士盈庭莫敢開說方是時也忠義奮發不避死亡之誅慷慨言事不過曹輔等三五人爾下逮韋布之士廷對大問進藥石之言則有若范宗尹投匭獻計箴時政之失則有若朱夢說而㑹擢在當時迭為臺官身任言責保寵固位被阿諛之譏目覩時事曽無一言逮陛下龍飛灼見姦慝太學諸生伏闕上書首論六賊之害蔡京之惡夫人而能言之矣諫官御史能於此時明目張膽擊姦指佞實恃陛下聖明不啻摧枯拉朽之易何足為功况㑹擢當金兵圍逼都城力附白時中李邦彦専主避敵割地之謀方肅王之北渡也不罪金人之渝盟乃敢奮筆横議以上皇還宫問肅王所在刼持上下必欲以祖宗基業委之敵國至有三鎮與王室孰重之語章䟽具存可以考按今時中邦彦坐是落職議者猶謂輕典而㑹擢反被召用復預諫争之列不知誰為陛下薦此二人者陛下好惡取舍如此廟堂之論何時而定百官有司之衆何所適從乎臣愚伏望陛下深思熟察辨邪正之歸無為詭辭偏說之所傾奪庶以仰稱陛下艱難求助之意副四方跂竦之情所有㑹擢等召命伏乞特賜寢罷以安衆情取進止乞出第一劄子臣出自寒鄉服勤州縣踰二十年學問荒落風節無聞比者伏遇陛下龍飛偶承人乏擢置言路亦既閱時志弱膽薄不任彈擊聞見淺陋無所建明夙夜震恐罔知攸濟大懼仰負陛下任使之意伏念臣頃縁狂率逺貶嶺外還朝未㡬復以妻室䘮亡家貧子㓜私計逼迫兼臣與今御史中丞陳過庭實有鄉閭之舊不無朋比之嫌接武憲臺義當回避伏望聖慈特賜矜憫出於迫切非敢矯偽除臣一合入差遣使得從容嵗時陛下不忍終棄臣或未填溝壑復得收召東西南北惟命是從臣不勝哀祈激切之請奉御筆所乞不允仍不得再有陳請乞出第二劄子臣近具劄子以不任彈擊無所建明乞在外一合入差遣䝉陛下批答所乞不允仍不得再有陳請臣疎逺㣲賤仰惟陛下寵遇之厚恩㫖之嚴不敢再有塵瀆夙夜震惕進退徊徨臣伏見陛下以邊方未寧有當食忘餐之語義當捐軀以圖報稱顧臣實東南書生材力緜薄内之不能竭愚夫千慮之得外之不能效戎行一旅之用而陛下虛心訪逮發於懇誠聖心焦勞中外歎仰豈臣之分尚得晏然况今豪傑志義之士介特隠淪之賢彈冠結綬願立王朝誠非乏材之時而臣乆處要塗實妨言路臣雖有䘮𦵏婚嫁之迫當兹急難豈敢僥倖東南差遣以便私計或䝉陛下哀憐别除臣一閒慢去處或京東西小郡使之推行詔條撫循凋瘵臣亦乆在州縣粗諳民情庶㡬勉竭愚短以報萬分伏望睿明俯憐悃愊特賜俞允取進止再乞出第一狀臣近嘗兩具哀懇仰瀆聖聴乞東南小郡犬馬之誠雖自謂切至終未足以動天聴之崇進退隕越莫知所為臣切自念猥以庸愚遭值陛下初政首置言路閲時既乆訖無涓埃少報萬分仍積罪悔上煩保全若日復一日必至顛隮兼臣近年因遭禍患志氣摧傷乆得怔忪之疾比數發動難以冒居繩糾之地伏望赦其狂愚特賜矜憫除臣小郡或宫祠差遣一次使退處閒散之地將理衰疾萬一未填溝壑尚當糜捐仰報聖造臣自今月二十七日更不敢入臺臣見居家俟命無任祈懇激切之至謹具狀奏聞伏候勅㫖再乞出第二狀臣近嘗具奏牘以不任彈擊等事乞在外一合入差遣至今累日未䝉施行臣輒不避斧鉞之誅再凟冕旒之聴伏念臣流落之乆自去年五月還朝遭罹禍釁妻室䘮亡家貧累重難以乆任京局自春夏以來嘗因進對備瀝誠懇累乞解罷言職聖恩深厚未賜矜從兼臣乆在臺端才力緜弱無所建明難以冐處言責之地雖陛下天地父母覆燾涵容未即罷遣在臣愚分實不自安伏望檢臣前奏除臣東南小郡或宫觀差遣一次伏惟睿明俯矜㣲賤哀而憐之特賜俞允冒犯天威臣無任惶懼激切之至謹具狀奏聞伏候勅㫖論彗劄子臣聞易曰天垂象見吉凶聖人象之蓋觀乎天文以驗得失者誠聖王之先務也臣伏見近者彗出寅艮間躔度甚速此變易之大者或傳朝廷用隂陽家說以分野言之為敵人滅亡之證此恐導諛之人以甘言諂辭媚恱陛下輕信其說無復答謝天譴之意則虧損盛徳非宗廟生靈之福臣聞孔子作春秋不書祥瑞而書災異者蓋欲警戒人君而知恐懼修省以應天變不聞以災異歸敵人也二百四十二年之間彗星三見禍亂輒應周室㣲弱上下交怨此皆人事之所感動也天心仁愛人君故出災異以譴告之不聞天心仁愛遐荒欲其修省也陛下萬一惑于邪說凡天地變動各以分野言之則陛下之失自今以徃誰復敢言蓋天變之發或發于未然之前或發于已然之後皆所以覺悟人君也所謂應天變之術豈有他哉在於修人事而巳臣伏見陛下自即位以來凡所施為無非仰合天心下當人意者勤儉憂勞不聞有過然舉措之間安得毎事皆當亦當窮究致彗之由推至誠行直道政事之不中不平者或未加治萬民之失業窮困者或未加䘏姦邪之徒熒惑主聴者或未加察言路駸駸復有壅隔之患則隂陽之和何時而致天地之變何時而息乎臣所以居言責之地而不能黙黙也冒犯天威臣無任激切恐懼之至論治道劄子臣嘗謂帝王者神民萬物之主也以一身而寄天下之上所恃者衆心之所戴也厯考自古興衰撥亂之君未有不因乎人心而能有為者蓋觀人心之所與則知天命之所歸故敵國之盛强或不足畏盗賊之猖獗或不足憂中原之竊據或不足慮關陜之捷奏或不足喜臣願陛下凡所舉措務合人心而已今移蹕之初扶攜之民歸徃如市海内顒顒皆托命於陛下士民傾屬以觀聖化之行則今日之所施為安得不汲汲乎昔梁襄王問於孟子曰天下惡乎定對曰定於一孰能一之對曰不嗜殺人者能一之孰能與之曰天下莫不與也又曰不行王政爾茍行王政四海之内皆引領而望之欲以為君夫豈在乎山河之固甲兵之利土地之廣哉臣願陛下克已恭勤隆道徳於上大臣守法奉公肅紀綱於下明賞罰辨邪正懲汙偽之黨以砥礪名節去姦贓之吏以恵養小民容受直言駕馭英傑如是而人心不歸海内不服未之前聞也惟陛下畱神省察取進止乞廢常平主管官罷發運司劄子臣謂今日之急務莫切於理財而理財之政有避其名而因失其實者有無其實而徒存其名者固未易槩舉今姑論其大者其事有二常平之法本於漢耿夀昌今州縣錢穀有屬常平令者名色非一悉總於户部右曹今乃以王安石之故而廢之既使香鹽司兼領又别差主管官一員有司莫之適從錢穀因致失陷豈非避其名而失其實乎發運司本以總六路財計以漕輓中都餽餉為職兵興以來既無轉輸今乃以糴買事委之其本錢盡從朝廷給降無慮五六百萬緡又以淮南摠制司及諸路失陷回易市易贍軍等錢嵗亦不下數十萬緡此國用所以益窘也臣愚欲望聖慈特降睿㫖廢常平主管官依舊令香鹽官兼領罷發運司其糴買摠制等事令户部侍郎専領庶㡬名正而事成官省而職舉不勝幸甚取進止乞免放散民兵狀契勘近縁金人渡江侵占建康府大隊復陷廣徳軍明越秀州幸賴官兵同保甲用命防托把隘得保無虞今月初三日凖徳音一項應調發州縣鄉村民兵把隘候徳音到限一日放散訖申尚書省縁見今大隊方離臨安府取蘇秀路前去及建康府并淮南敵騎未退近日又被殘破太平州相去本州界不及五七十里人情震恐正藉民兵同官兵把隘守禦日下未敢放散更合取自朝廷指揮三月二十五日奉聖㫖候敵兵退日審度放散乞罷王淵焦師叔狀臣竊見本州新兵馬鈐轄武功大夫焦師叔前任平江府鈐轄到任未及數月因敵騎侵突作縁故離任兼本官既係掌兵若已失守雖朝廷寛恩放罪難以便除一般差遣下政已差武功大夫忠州團練使王淵係内臣王仍之子纔二十餘嵗竊縁本州宻邇江岸正係緊切控阨之地防秋之際全藉官兵戮力捐軀以捍冦盜其王淵童騃無知焦師叔憸猾二人皆難倚仗伏望聖慈别選有材武忠實之士填上件窠闕庶㡬緩急之際不至闕事乞進兵状昨自建康失守右僕射杜充退守儀真陳邦光李梲率吏民迎降金人大隊由境上入浙㳺騎晝夜侵逼及防江潰兵四散剽掠幸賴朝廷威徳將士協力防守至今臣探得建康所留敵騎不過數千人金蕭張二大帥與陳邦光李梲同治府事時復遣兵及黄旂招誘州縣如溧水等處縣官皆已投拜本州實與接境人情反側不住分遣將士前後殺獲首級招安到潰兵僉軍班直契丹渤海等處人兵多方存養譏察外臣近據於潜知縣通直郎陳近仁昌化縣尉保義郎平協申去年十二月二十日金經畧使稱四太子郎君金知臨安府李儔差修武郎樂宏齎文字黄旂前來臨安於潜昌化等縣招撫官吏本縣官吏各奮忠義遂將樂宏等四人斬首其臨安餘杭知縣將帶老父入城投拜邀請敵兵就縣敷買金銀疋帛又於今年正月初十日再遣凌秀才王秀才二人金補承信郎令齎文字前來本縣亦將此二人處斬梟首號令及兩縣弓手土豪章開王仙畢康等糾率諸鄉保甲義不從降委是防托有功縁本州管下寧國縣與兩邑接境其知臨安府康允之未知去處吏民無所申訴臣已逐急依已得聖㫖便宜措置將立功四人先次借補承信郎及専遣使臣齎去年十二月二十日蠟彈手詔曉諭官吏兵民各用命守禦去訖臣竊觀金人敢深入江浙於天時地利皆非所宜臣已率勵將士及將巳圖結到六縣保甲并招安到杜充防江統制官馬吉李進并班直京軍等邀其歸路臣巳移文劉光世乞帶領大兵前來同衛王室及申本路轉運使李尚行朱異前來權建康府安撫司職事庶㡬列郡有所稟承並未䝉回報今敵馬既屯駐臨安府行在信息隔絶難通小人遂無忌憚臣累具奏聞欲乞速降睿㫖差委重臣前來建康或令宣撫使周望傳檄四方約日進兵水陸分布可使隻輪不返伏候勅㫖乞與宣州官吏推賞狀契勘近縁金人渡江建康府廣徳軍臨安府溧水建平餘杭臨安縣等處失守本州境壤相接事勢危急自十一月十八日以後敵騎潰兵日夕侵逼動以萬計少者亦不下千百人所賴官吏協心將士保甲用命防守至今凡九十餘日卒保無虞所有前後出戰把隘守城招撫等文武將佐人吏等實有勤勞欲望聖慈令臣開具保奏推恩庶㡬有以激勸乞令漕臣應副岳飛錢糧等狀臣契勘本州自軍興以來偶免殘破前後過軍萬數浩瀚皆臣竭力應副不敢毫髪仰干朝廷今來巨師古劉晏岳飛大兵屯泊境上應副錢糧需索犒設臣不敢辭避竊縁官軍與戚賊相持雖已出境縁建平溧水縣廣徳軍諸處並無官吏人民臣不免出界應副臣見差官三員在廣徳界上及岳飛軍前専切運糧委是費力其本路漕臣亦合移檄傍近州縣同共那移應副錢糧及犒設金銀等况建康府巳收復了畢自合前來管幹職事望聖慈憫察本州係是小郡前後被害非一速賜行下本路漕臣應副岳飛一項人兵六月二十日奉㫖岳飛一行軍兵已降指揮聴張俊節制所有合用錢糧自合張俊下隨軍轉運應副仰隨軍轉運副使劉䝉疾速支撥應副不得少有闕誤乞與土豪鮑琢補官狀契勘管下旌徳縣保甲土豪鮑琢等一項僅三千人縁自方賊作過時已自結集中間保䕶州境雖未立顯效不曽費耗官中錢糧當州縣擾攘之時起發入城官兵寡弱亦倚以為重盜賊不入郡境前知州吕好問嘗假以承信郎及校尉等名目縁此累經朝廷陳狀希望恩賞朝廷以許置土俗器仗今防秋之際若因而撫之亦足倚仗今來不敢别干朝廷只乞依已得指揮將前知州劉資政巳給降空名劄子先次補授五七品此輩既巳得官遂有顧藉防托過冬春將已結保甲盡行散遣收其器仗庶不為乆逺之害乞回避曽紆狀朝奉郎新除徽猷閣待制知臨安府兼兩浙兩路兵馬鈐轄臣李某奏䝉恩除前件差遣將欲到任伏見新除本路轉運使曽紆臣頃任侍御史日曾論列本官縁此送吏部今來正係統轄兼軍興之際財計用度動相關决委有妨嫌伏望聖慈憫察别除臣一合入差遣或宫祠一次伏候敕㫖十月五日奉聖㫖特不回避乞留吳錫狀臣伏聞已降指揮楊沂中出戌淮甸及吳錫一軍亦隨逐前去臣之愚見竊慮敵人知大軍盡屯淮西或遣舟師由海道𢷬虛又徐文乆在江浙熟於道路今聞徃來沿海登萊諸郡風帆浪舶日行數千里理宜關防臣愚欲望聖慈且留吳錫一軍以備緩急狂瞽之言誠為過慮然大駕所在理宜嚴宻惟陛下留意省察幸甚謹録奏聞伏候敕㫖小帖子臣之愚見竊慮楊沂中合令候巨師古到然後啟行伏乞聖察又小帖子議者謂春夏風多東南然亦時轉西北伏乞聖察
